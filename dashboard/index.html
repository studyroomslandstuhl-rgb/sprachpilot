<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprachPilot – Dashboard</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div id="accountStrip" class="account-strip"></div>
<script type="module" src="/js/guard.js"></script>
<div class="container">
<section class="hero">
  <a href="/index.html" style="text-decoration:none;color:inherit">
    <div class="logo-wrap">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs>
        <circle cx="60" cy="60" r="52" fill="url(#g)"/>
        <path d="M28 63 C43 38,70 30,91 38 C75 43,63 53,55 70 C47 66,38 63,28 63Z" fill="#fff" opacity=".95"/>
        <path d="M54 70 C63 53,75 43,91 38 C84 57,72 75,52 91 C55 82,56 75,54 70Z" fill="#ffcc33"/>
        <circle cx="71" cy="49" r="5" fill="#667eea"/>
      </svg>
    </div>
    <h1>SprachPilot</h1>
  </a>
  <p class="subtitle">Dein Lernstand und deine freigeschalteten Bereiche.</p>
</section>

<section class="card">
  <h2>Dashboard</h2>
  <div id="studentBox"></div>
</section>

<section class="dashboard-grid" id="progressGrid"></section>

<footer>© SprachPilot</footer>
</div>

<script type="module">
import { requireLogin, renderAccountStrip, logout, safeText } from "../js/auth.js";
window.logout=logout;

const p=requireLogin();
if(p){
  renderAccountStrip();

  document.querySelector("#studentBox").innerHTML=`
    <div class="ok">
      <strong>${safeText(p.vorname)} ${safeText(p.nachname)}</strong><br>
      Kurs: ${safeText(p.kurs)} · Muttersprache: ${safeText(p.muttersprache)}
    </div>
  `;

  const c=p.assignments||{};
  const modules=[
    {key:"Fragen A1",title:"Fragen A1",href:"../fragen-A1/",progress:p.fragenFortschritt||0},
    {key:"Wortschatz",title:"Wortschatz",href:"../wortschatz/",progress:p.wortschatzFortschritt||0},
    {key:"Verben A1",title:"Verben A1",href:"../verben-A1/",progress:p.verbenFortschritt||0},
    {key:"Grammatik",title:"Grammatik",href:"../grammatik/",progress:p.grammatikFortschritt||0}
  ];

  document.querySelector("#progressGrid").innerHTML=modules.map(m=>{
    const enabled=c.enabledModules?.[m.key]!==false;
    return `
      <div class="progress-card-small ${enabled?'':'locked'}">
        <div class="progress-title">${m.title}</div>
        <span class="status-pill">${enabled?'Freigeschaltet':'Gesperrt'}</span>
        <div class="progressbar"><span style="width:${m.progress}%"></span></div>
        <p><b>${m.progress}%</b> fertig</p>
        ${enabled?`<a class="btn" href="${m.href}">Weiterlernen</a>`:`<p class="small">Dieser Bereich ist für deinen Kurs noch nicht freigeschaltet.</p>`}
      </div>`;
  }).join("");
}
</script>
</body>
</html>
