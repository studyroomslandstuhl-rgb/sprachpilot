<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SprachPilot – Dashboard</title>
<link rel="stylesheet" href="../style.css">
<style>
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:16px}
.dash-card{background:white;border-radius:22px;padding:18px;box-shadow:0 10px 26px rgba(0,0,0,.12);border:2px solid #eef2ff}
.dash-card h3{color:#667eea;margin-bottom:8px}
.star-total{font-size:44px;color:#f5b301;letter-spacing:3px;text-align:center}
.star-line{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #eee;padding:8px 0}
.locked{opacity:.5;filter:grayscale(.3)}
</style>
</head>
<body>
<div id="accountStrip" class="account-strip"></div>
<div class="container">
<section class="hero">
  <a href="/index.html" style="text-decoration:none;color:inherit"><h1>SprachPilot</h1></a>
  <p class="subtitle">Dein Dashboard</p>
</section>

<section class="card">
  <h2>Dein Lernstand</h2>
  <div id="studentBox">Dashboard wird geladen …</div>
</section>

<section class="dash-grid" id="dashGrid"></section>

<footer>© SprachPilot</footer>
</div>

<script type="module">
import { getActiveProfile, refreshActiveProfile, logout, safeText, renderAccountStrip } from "../js/auth.js";
window.logout=logout;

function examHistory(key){
  try{return JSON.parse(localStorage.getItem(key)||"[]")}catch(e){return[]}
}
function bestExam(key){
  const h=examHistory(key);
  if(!h.length)return null;
  return h.reduce((best,x)=>(!best||Number(x.percent||0)>Number(best.percent||0)?x:best),null);
}
function starsForPercent(p){
  p=Number(p||0);
  if(p>=100)return 3;
  if(p>=70)return 2;
  if(p>=50)return 1;
  return 0;
}
function starsHtml(n){
  n=Number(n||0);
  return "★".repeat(n)+"☆".repeat(3-n);
}

const availableTopics=[
  {title:"Lektion 4 · Thema 1", key:"SP_L4_T1_EXAM_HISTORY_V1", max:3, href:"../wortschatz/A1-Lektion-4/Thema-1/"}
];

function moduleEnabled(p,name){
  const c=p?.assignments||{};
  return c.enabledModules?.[name]!==false;
}

async function init(){
  if(localStorage.getItem("SP_TEACHER_MODE")==="1"){
    location.href="../teacher/index.html";
    return;
  }

  try{ await refreshActiveProfile(); }catch(e){ console.warn(e); }
  const p=getActiveProfile();
  if(!p){
    location.href="../login/?redirect="+encodeURIComponent("/dashboard/");
    return;
  }

  renderAccountStrip();

  studentBox.innerHTML=`<div class="ok"><strong>Eingeloggt:</strong> ${safeText(p.vorname||"")} ${safeText(p.nachname||"")}<br>Kurs: ${safeText(p.kurs||"")} · Muttersprache: ${safeText(p.muttersprache||"")}</div>`;

  let earned=0, possible=0;
  const topicLines=availableTopics.map(t=>{
    possible+=t.max;
    const best=bestExam(t.key);
    const stars=best?starsForPercent(best.percent):0;
    earned+=stars;
    return `<div class="star-line"><span>${t.title}</span><b>${starsHtml(stars)} ${best?best.percent+"%":"offen"}</b></div>`;
  }).join("");

  const fragen=moduleEnabled(p,"Fragen A1");
  const wortschatz=moduleEnabled(p,"Wortschatz");
  const verben=moduleEnabled(p,"Verben A1");

  dashGrid.innerHTML=`
    <div class="dash-card">
      <h3>Sterne</h3>
      <div class="star-total">${earned} / ${possible}</div>
      ${topicLines}
    </div>

    <div class="dash-card ${fragen?'':'locked'}">
      <h3>Fragen A1</h3>
      <p>${fragen?'Freigeschaltet':'Noch nicht freigeschaltet'}</p>
      ${fragen?'<a class="btn" href="../fragen-A1/">Öffnen</a>':'<span class="badge">Gesperrt</span>'}
    </div>

    <div class="dash-card ${wortschatz?'':'locked'}">
      <h3>Wortschatz</h3>
      <p>${wortschatz?'Freigeschaltet':'Noch nicht freigeschaltet'}</p>
      ${wortschatz?'<a class="btn" href="../wortschatz/">Öffnen</a>':'<span class="badge">Gesperrt</span>'}
    </div>

    <div class="dash-card ${verben?'':'locked'}">
      <h3>Verben A1</h3>
      <p>${verben?'Freigeschaltet':'Noch nicht freigeschaltet'}</p>
      ${verben?'<a class="btn" href="../verben-A1/">Öffnen</a>':'<span class="badge">Gesperrt</span>'}
    </div>
  `;
}
init();
</script>
</body>
</html>
