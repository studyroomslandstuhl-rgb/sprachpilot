<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SprachPilot – Dashboard</title>
<link rel="stylesheet" href="../style.css">
<style>
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:16px}
.dash-card{background:white;border-radius:22px;padding:18px;box-shadow:0 10px 26px rgba(0,0,0,.12);border:2px solid #eef2ff}
.dash-card h3{color:#667eea;margin-bottom:8px}
.star-total{font-size:44px;color:#f5b301;letter-spacing:3px;text-align:center;font-weight:900}
.star-line{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #eee;padding:8px 0;align-items:center}
.locked{opacity:.55;filter:grayscale(.3)}
.quick-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.topic-status{font-size:13px;color:#666;margin-top:4px}
</style>
</head>
<body>
<div id="accountStrip" class="account-strip"></div>

<div class="container">
<section class="hero">
  <a href="/index.html" style="text-decoration:none;color:inherit"><h1>SprachPilot</h1></a>
  <p class="subtitle">Dein Dashboard</p>
</section>

<section class="card">
  <h2>Dein Lernstand</h2>
  <div id="studentBox">Dashboard wird geladen …</div>
</section>

<section class="dash-grid" id="dashGrid"></section>

<footer>© SprachPilot</footer>
</div>

<script type="module">
import { getActiveProfile, logout, safeText, renderAccountStrip } from "../js/auth.js?v=dashfix2";
window.logout=logout;

function examHistory(key){
  try{return JSON.parse(localStorage.getItem(key)||"[]")}catch(e){return[]}
}
function bestExam(key){
  const h=examHistory(key);
  if(!h.length)return null;
  return h.reduce((best,x)=>(!best||Number(x.percent||0)>Number(best.percent||0)?x:best),null);
}
function starsForPercent(p){
  p=Number(p||0);
  if(p>=100)return 3;
  if(p>=70)return 2;
  if(p>=50)return 1;
  return 0;
}
function starsHtml(n){
  n=Number(n||0);
  return "★".repeat(n)+"☆".repeat(3-n);
}

const availableTopics=[
  {title:"Lektion 4 · Thema 1", key:"SP_L4_T1_EXAM_HISTORY_V1", max:3, href:"../wortschatz/A1-Lektion-4/Thema-1/"},
  {title:"Lektion 4 · Thema 2", key:"SP_L4_T2_EXAM_HISTORY_V1", max:3, href:"../wortschatz/A1-Lektion-4/Thema-2/"},
  {title:"Lektion 4 · Thema 3", key:"SP_L4_T3_EXAM_HISTORY_V1", max:3, href:"../wortschatz/A1-Lektion-4/Thema-3/"},
  {title:"Lektion 4 · Thema 4", key:"SP_L4_T4_EXAM_HISTORY_V1", max:3, href:"../wortschatz/A1-Lektion-4/Thema-4/"}
];

function moduleEnabled(p,name){
  const c=p?.assignments||{};
  return c.enabledModules?.[name]!==false;
}

function getProfileFallback(){
  let p=getActiveProfile();
  if(p) return p;

  try{
    p=JSON.parse(localStorage.getItem("SP_USER_PROFILE")||"null");
    if(p) return p;
  }catch(e){}

  return null;
}

function moduleCard(title,desc,href,enabled){
  return `
    <div class="dash-card ${enabled?'':'locked'}">
      <h3>${title}</h3>
      <p>${enabled?desc:"Noch nicht freigeschaltet."}</p>
      <div class="quick-links">
        ${enabled?`<a class="btn" href="${href}">Öffnen</a>`:`<span class="badge">Gesperrt</span>`}
      </div>
    </div>
  `;
}

async function init(){
  if(localStorage.getItem("SP_TEACHER_MODE")==="1"){
    location.href="../teacher/index.html";
    return;
  }

  let p=getProfileFallback();

  if(!p){
    studentBox.innerHTML=`
      <div class="no">
        Profil konnte nicht geladen werden. Bitte erneut einloggen.
        <br><a class="btn secondary" href="../login/?redirect=/dashboard/">Zum Login</a>
      </div>
    `;
    return;
  }

  renderAccountStrip();

  studentBox.innerHTML=`
    <div class="ok">
      <strong>Eingeloggt:</strong> ${safeText(p.vorname||"")} ${safeText(p.nachname||"")}<br>
      Kurs: ${safeText(p.kurs||"")} · Muttersprache: ${safeText(p.muttersprache||"")}
    </div>
  `;

  let earned=0;
  let possible=0;

  const topicLines=availableTopics.map(t=>{
    possible+=t.max;
    const best=bestExam(t.key);
    const stars=best?starsForPercent(best.percent):0;
    earned+=stars;
    return `
      <div class="star-line">
        <span>
          ${t.title}
          <div class="topic-status">${best?`Prüfung: ${best.percent}% · ${best.score||0}/${best.maxScore||0} Punkte`:"noch keine Prüfung"}</div>
        </span>
        <b>${starsHtml(stars)}</b>
      </div>
    `;
  }).join("");

  const fragen=moduleEnabled(p,"Fragen A1");
  const wortschatz=moduleEnabled(p,"Wortschatz");
  const verben=moduleEnabled(p,"Verben A1");
  const grammatik=moduleEnabled(p,"Grammatik");

  dashGrid.innerHTML=`
    <div class="dash-card">
      <h3>Gesammelte Sterne</h3>
      <div class="star-total">${earned} / ${possible}</div>
      ${topicLines}
    </div>

    ${moduleCard("Fragen A1","Fragen und Antworten üben.","../fragen-A1/",fragen)}
    ${moduleCard("Wortschatz","Wortschatz-Lektionen und Themen üben.","../wortschatz/",wortschatz)}
    ${moduleCard("Verben A1","Verben mit Bildern, Schreiben, Hören und Sprechen.","../verben-A1/",verben)}
    ${moduleCard("Grammatik","Grammatikübungen.","../grammatik/",grammatik)}
  `;
}

init();
</script>
</body>
</html>
