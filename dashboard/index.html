<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprachPilot – Dashboard</title>
<link rel="stylesheet" href="../style.css">
<style>
.dashboard-menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:16px}
.dash-card{background:white;border-radius:24px;padding:20px;box-shadow:0 12px 30px rgba(0,0,0,.14);border:2px solid #eef2ff}
.dash-card h3{color:#667eea;font-size:26px;margin-bottom:8px}
.dash-card p{color:#666;line-height:1.4}
.dash-card .btn{margin:8px 6px 0 0;padding:10px 13px;font-size:14px}
.lesson-box{background:#f8f9ff;border:2px solid #eef2ff;border-radius:18px;margin:12px 0;padding:12px}
.lesson-box summary{font-weight:900;color:#333;cursor:pointer}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:10px}
.topic-card{background:white;border-radius:16px;padding:12px;border:1px solid #e6e9ff}
.topic-card b{display:block;color:#667eea;margin-bottom:6px}
.locked{opacity:.45;filter:grayscale(.3)}
.small-note{font-size:13px;color:#777;margin-top:8px}
</style>
</head>
<body>
<div id="accountStrip" class="account-strip"></div>

<div class="container">
<section class="hero">
  <a href="/index.html" style="text-decoration:none;color:inherit">
    <div class="logo-wrap">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs>
        <circle cx="60" cy="60" r="52" fill="url(#g)"/>
        <path d="M28 63 C43 38,70 30,91 38 C75 43,63 53,55 70 C47 66,38 63,28 63Z" fill="#fff" opacity=".95"/>
        <path d="M54 70 C63 53,75 43,91 38 C84 57,72 75,52 91 C55 82,56 75,54 70Z" fill="#ffcc33"/>
        <circle cx="71" cy="49" r="5" fill="#667eea"/>
      </svg>
    </div>
    <h1>SprachPilot</h1>
  </a>
  <p class="subtitle">Dein Menü und deine freigeschalteten Inhalte.</p>
</section>

<section class="card">
  <h2>Dein Dashboard</h2>
  <div id="studentBox"></div>
</section>

<section id="menuArea"></section>

<footer>© SprachPilot</footer>
</div>

<script type="module">
import { getActiveProfile, refreshActiveProfile, logout, safeText, renderAccountStrip } from "../js/auth.js?v=studentdash1";
window.logout=logout;

const STRUCTURE = {
  wortschatz: [
    {
      key:"Wortschatz/A1 Lektion 3",
      title:"A1 Lektion 3 · Einkaufen",
      href:"../wortschatz/A1-Lektion-3/",
      topics:[
        {key:"Thema 1", title:"Thema 1", href:"../wortschatz/A1-Lektion-3/Thema-1/"},
        {key:"Thema 2", title:"Thema 2", href:"../wortschatz/A1-Lektion-3/Thema-2/"}
      ]
    },
    {
      key:"Wortschatz/A1 Lektion 4",
      title:"A1 Lektion 4 · Wohnung",
      href:"../wortschatz/A1-Lektion-4/",
      topics:[
        {key:"Thema 1", title:"Thema 1 · Wohnung & Zimmer", href:"../wortschatz/A1-Lektion-4/Thema-1/"},
        {key:"Thema 2", title:"Thema 2 · Möbel & Adjektive", href:"../wortschatz/A1-Lektion-4/Thema-2/"},
        {key:"Thema 3", title:"Thema 3 · Farben", href:"../wortschatz/A1-Lektion-4/Thema-3/"}
      ]
    }
  ]
};

function enabledModule(p, name){
  const c=p.assignments||{};
  return c.enabledModules?.[name] !== false;
}

function enabledLesson(p, key){
  const c=p.assignments||{};
  return c.enabledLessons?.[key] !== false;
}

function enabledTaskPrefix(p, prefix){
  const c=p.assignments||{};
  const tasks=c.enabledTasks||{};
  const relevant=Object.keys(tasks).filter(k=>k.startsWith(prefix));
  if(!relevant.length) return true;
  return relevant.some(k=>tasks[k]!==false);
}

function moduleCard({title,desc,href,enabled,extra=""}){
  return `<div class="dash-card ${enabled?'':'locked'}">
    <h3>${title}</h3>
    <p>${enabled?desc:'Dieser Bereich ist für deinen Kurs noch nicht freigeschaltet.'}</p>
    ${enabled?`<a class="btn" href="${href}">Öffnen</a>${extra}`:`<span class="badge">Gesperrt</span>`}
  </div>`;
}

function wortschatzMenu(p){
  if(!enabledModule(p,"Wortschatz")) return "";

  return `<div class="dash-card">
    <h3>Wortschatz</h3>
    <p>Deine freigeschalteten Wortschatz-Lektionen und Themen.</p>
    <a class="btn" href="../wortschatz/">Wortschatz-Übersicht</a>

    ${STRUCTURE.wortschatz.map(lesson=>{
      const lessonOn=enabledLesson(p,lesson.key);
      const topicHtml=lesson.topics.map(t=>{
        const topicPrefix=`${lesson.key}/${t.key}`;
        const on=lessonOn && enabledTaskPrefix(p,topicPrefix);
        return `<div class="topic-card ${on?'':'locked'}">
          <b>${safeText(t.title)}</b>
          ${on?`<a class="btn secondary" href="${t.href}">Starten</a>`:`<span class="badge">Gesperrt</span>`}
        </div>`;
      }).join("");

      return `<details class="lesson-box" ${lessonOn?'open':''}>
        <summary>${safeText(lesson.title)} ${lessonOn?'':'· gesperrt'}</summary>
        <div class="topic-grid">${topicHtml}</div>
      </details>`;
    }).join("")}
  </div>`;
}

async function init(){
  if(localStorage.getItem("SP_TEACHER_MODE")==="1"){
    location.href="../teacher/index.html";
    return;
  }

  try{
    await refreshActiveProfile();
  }catch(e){
    console.warn("Profil konnte nicht aktualisiert werden", e);
  }

  const p=getActiveProfile();
  if(!p){
    location.href="../login/?redirect="+encodeURIComponent("/dashboard/");
    return;
  }

  renderAccountStrip();

  document.querySelector("#studentBox").innerHTML=`
    <div class="ok">
      <strong>Eingeloggt:</strong> ${safeText(p.vorname)} ${safeText(p.nachname)}<br>
      Kurs: ${safeText(p.kurs)} · Muttersprache: ${safeText(p.muttersprache)}
    </div>
  `;

  const fragenOn=enabledModule(p,"Fragen A1");
  const verbenOn=enabledModule(p,"Verben A1");
  const wortschatzOn=enabledModule(p,"Wortschatz");
  const grammatikOn=enabledModule(p,"Grammatik");

  document.querySelector("#menuArea").innerHTML=`
    <div class="dashboard-menu">
      ${moduleCard({
        title:"Fragen A1",
        desc:"Fragen und Antworten üben.",
        href:"../fragen-A1/",
        enabled:fragenOn
      })}

      ${wortschatzMenu(p)}

      ${moduleCard({
        title:"Verben A1",
        desc:"Verben mit Bildern, Karteikarten, Hören, Schreiben und Sprechen üben.",
        href:"../verben-A1/",
        enabled:verbenOn
      })}

      ${moduleCard({
        title:"Grammatik",
        desc:"Grammatikübungen.",
        href:"../grammatik/",
        enabled:grammatikOn
      })}
    </div>

    <section class="card">
      <h2>Hinweis</h2>
      <p class="small-note">Du siehst hier nur die Inhalte, die für deinen Kurs freigeschaltet sind. Wenn etwas fehlt, frage deine Lehrkraft.</p>
    </section>
  `;
}

init();
</script>
</body>
</html>
