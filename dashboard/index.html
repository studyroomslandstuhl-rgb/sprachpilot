<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprachPilot – Dashboard</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div id="accountStrip" class="account-strip"></div>
<div class="container">
<section class="hero">
  <a href="/index.html" style="text-decoration:none;color:inherit">
    <div class="logo-wrap">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs>
        <circle cx="60" cy="60" r="52" fill="url(#g)"/>
        <path d="M28 63 C43 38,70 30,91 38 C75 43,63 53,55 70 C47 66,38 63,28 63Z" fill="#fff" opacity=".95"/>
        <path d="M54 70 C63 53,75 43,91 38 C84 57,72 75,52 91 C55 82,56 75,54 70Z" fill="#ffcc33"/>
        <circle cx="71" cy="49" r="5" fill="#667eea"/>
      </svg>
    </div>
    <h1>SprachPilot</h1>
  </a>
  <p class="subtitle">Dein Lernstand und deine freigeschalteten Bereiche.</p>
</section>

<section class="card">
  <h2>Dein Dashboard</h2>
  <div id="studentBox"></div>
</section>

<section class="modules" id="modules"></section>

<footer>© SprachPilot</footer>
</div>

<script type="module">
import { getActiveProfile, refreshActiveProfile, logout, safeText, renderAccountStrip } from "../js/auth.js?v=studentfix2";
window.logout=logout;

async function init(){
  try{
    if(localStorage.getItem("SP_TEACHER_MODE")==="1"){
      location.href="../teacher/index.html";
      return;
    }

    await refreshActiveProfile();
  }catch(e){
    console.warn("refresh skipped", e);
  }

  const p=getActiveProfile();

  if(!p){
    location.href="../login/?redirect="+encodeURIComponent("/dashboard/");
    return;
  }

  renderAccountStrip();

  document.querySelector("#studentBox").innerHTML=`
    <div class="ok">
      <strong>Eingeloggt:</strong> ${safeText(p.vorname)} ${safeText(p.nachname)}<br>
      Kurs: ${safeText(p.kurs)} · Muttersprache: ${safeText(p.muttersprache)}
    </div>
  `;

  const c=p.assignments||{};
  const verben=c.enabledModules?.["Verben A1"]!==false;
  const fragen=c.enabledModules?.["Fragen A1"]!==false;
  const wortschatz=c.enabledModules?.["Wortschatz"]!==false;

  document.querySelector("#modules").innerHTML=`
    <a class="module" href="${fragen?'../fragen-A1/':'#'}" ${fragen?'':'onclick="return false;" style="opacity:.55"'}>
      <div class="module-title">Fragen A1</div>
      <p>${fragen?'Wichtige Fragen und Antworten für Alltag, Kurs und Prüfung.':'Für deinen Kurs noch nicht freigeschaltet.'}</p>
      <span class="badge">${fragen?'Starten':'Gesperrt'}</span>
    </a>

    <a class="module" href="${wortschatz?'../wortschatz/':'#'}" ${wortschatz?'':'onclick="return false;" style="opacity:.55"'}>
      <div class="module-title">Wortschatz</div>
      <p>${wortschatz?'Schritte Plus Neu':'Für deinen Kurs noch nicht freigeschaltet.'}</p>
      <span class="badge">${wortschatz?'Starten':'Gesperrt'}</span>
    </a>

    <a class="module" href="${verben?'../verben-A1/':'#'}" ${verben?'':'onclick="return false;" style="opacity:.55"'}>
      <div class="module-title">Verben A1</div>
      <p>${verben?'Verben mit Bildern, Karteikarten, Sprechen, Schreiben und Wiederholung.':'Für deinen Kurs noch nicht freigeschaltet.'}</p>
      <span class="badge">${verben?'Starten':'Gesperrt'}</span>
    </a>
  `;
}

init();
</script>
</body>
</html>
