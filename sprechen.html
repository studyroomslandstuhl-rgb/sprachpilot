<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sprechen</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=40"></script><script>header("Sprechen");let Q=queueFor('sprechen.html',singularWords());function render(){Q.cur=nextItem(Q);if(!Q.cur){complete(area,'sprechen.html','schreiben.html');return}Q.tries=0;Q.had=false;area.innerHTML=prog(Q)+`<div class="question">Sprich Artikel + Nomen.</div><img class="food-img" src="${Q.cur.image}" onerror="fixImg(this)"><div class="actions"><button id="mic" class="btn" onclick="say()">Sprechen</button><button class="btn secondary" onclick="showWrite()">Ich kann nicht sprechen</button></div><div id="writeBox" class="hidden"><input id="ans" placeholder="Artikel + Nomen"><button class="btn" onclick="checkText()">Kontrollieren</button></div><div id="micStatus" class="hint hidden"></div><div id="fb" class="feedback"></div>`}function showWrite(){writeBox.classList.remove('hidden')}function ok(){right(Q,Q.cur);fb.textContent='Richtig!';setTimeout(render,700)}function say(){mic.disabled=true;micStatus.classList.remove('hidden');micStatus.textContent='Mikrofon aktiv ...';speech((txt)=>{mic.disabled=false;micStatus.classList.add('hidden');if(!txt){fb.innerHTML='Ich konnte dich nicht hören.';return}let d=diagnose(txt,Q.cur);d.ok?ok():(wrong(Q),fb.innerHTML=fail(Q,d))})}function checkText(){let d=diagnose(ans.value,Q.cur);d.ok?ok():(wrong(Q),fb.innerHTML=fail(Q,d))}render();</script></body></html>
