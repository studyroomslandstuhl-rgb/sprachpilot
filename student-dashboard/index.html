<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Schüler-Dashboard · SprachPilot</title>
<style>
:root{--blue:#47ABC6;--blue-dark:#2F7F96;--baby:#84E3FF;--green:#16A34A;--ink:#123047;--muted:#5F7180;--line:#D9EEF7;--shadow:0 14px 34px rgba(18,48,71,.12)}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#E8FBFF,#F6FDFF 46%,#fff);color:var(--ink);min-height:100vh}.wrap{max-width:1100px;margin:0 auto;padding:16px}.top,.card,.module{background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}.top{border-radius:24px;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}.brand img{width:58px;height:58px;object-fit:contain;border-radius:16px}.brand h1{margin:0;font-size:25px}.sub,.small{font-size:14px;color:var(--muted)}.userbar{display:flex;gap:8px;flex-wrap:wrap}.navbtn{border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:#EFFAFF;color:var(--ink);font-weight:800;text-decoration:none;cursor:pointer}.logout{background:#FFE1E1;color:#8A1F11}.hero{display:grid;grid-template-columns:1.35fr .65fr;gap:14px;margin:16px 0}.card{border-radius:22px;padding:18px}.progressHead{display:flex;align-items:center;gap:16px}.circle{width:96px;height:96px;border-radius:50%;background:conic-gradient(var(--green) calc(var(--p)*1%),#EFFAFF 0);display:grid;place-items:center;font-weight:900;font-size:24px;position:relative;flex:0 0 auto}.circle:after{content:"";position:absolute;inset:10px;background:#fff;border-radius:50%}.circle span{position:relative;z-index:2}.bar{height:12px;background:#EFFAFF;border-radius:999px;overflow:hidden;margin:10px 0}.fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--baby));border-radius:999px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:#F0FBFF;border:1px solid var(--line);border-radius:18px;padding:14px;text-align:center}.stat b{display:block;font-size:25px;color:var(--blue-dark)}.sectionTitle{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:22px 0 12px}.sectionTitle h2{margin:0;font-size:22px;color:var(--blue-dark)}.count,.chip{background:#E8F9F0;color:#166534;border-radius:999px;padding:6px 10px;font-weight:800;font-size:13px}.modules{display:grid;gap:12px}.module{border-radius:22px;padding:16px}.moduleHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.module h3{margin:0;color:var(--blue-dark)}.moduleGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-top:12px}.item{border:1px solid var(--line);border-radius:16px;background:#F8FCFF;padding:12px}.item h4{margin:0 0 5px;color:var(--ink)}.itemMeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.leader{display:grid;gap:8px}.rank{background:#F8FCFF;border:1px solid var(--line);border-radius:16px;padding:12px;display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center}.rankNo{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,var(--baby),var(--blue));display:grid;place-items:center;font-weight:900}.empty{padding:18px;border-radius:18px;background:#F8FCFF;border:1px dashed #9FB7C7;color:#263846}.stars{font-size:18px;color:#7E2D00;letter-spacing:1px;white-space:nowrap}@media(max-width:800px){.hero{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr 1fr}.circle{width:84px;height:84px;font-size:21px}.moduleHead{flex-direction:column}.rank{grid-template-columns:34px 1fr}.rank .points{grid-column:2}.userbar .navbtn{flex:1;text-align:center}}
</style>
</head>
<body>
<div class="wrap">
<header class="top"><a class="brand" href="/index.html"><img src="/assets/logo/sprachpilot-logo.png" alt="SprachPilot Logo"><div><h1>SprachPilot</h1><div class="sub">Schüler-Dashboard</div></div></a><div class="userbar"><span id="userPill" class="navbtn">Schüler/in · Kurs</span><a class="navbtn" href="/profile/index.html">Profil</a><a class="navbtn" href="/index.html">Start</a><button class="navbtn logout" onclick="logout()">Abmelden</button></div></header>
<section class="hero"><div class="card"><div class="progressHead"><div class="circle" id="totalCircle" style="--p:0"><span>0%</span></div><div style="flex:1"><h2 style="margin:0">Dein Lernstand</h2><div class="small" id="summaryText">Dein Fortschritt wird angezeigt.</div><div class="bar"><div class="fill" id="totalFill" style="width:0%"></div></div></div></div></div><div class="card"><div class="stats"><div class="stat"><b id="pointsTotal">0</b><span>Punkte</span></div><div class="stat"><b id="starsTotal">0</b><span>Sterne</span></div><div class="stat"><b id="doneTotal">0</b><span>fertig</span></div></div></div></section>
<div class="sectionTitle"><h2>Freigeschaltete Inhalte</h2><span class="count" id="contentCount">0 Inhalte</span></div><section class="modules" id="contentGrid"></section>
<div class="sectionTitle"><h2>Rangliste im Kurs</h2><button class="navbtn" id="rankingBtn" onclick="loadRanking()">Rangliste laden</button></div><section class="card leader" id="leaderboard"><div class="empty">Die Rangliste wird nur geladen, wenn du sie öffnest.</div></section>
</div>
<script>
function readJSON(k,f){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch(e){return f}}
function esc(s){return String(s||'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function profile(){return readJSON('SP_USER_PROFILE', readJSON('sprachpilotUser', null)) || {}}
function userName(){const p=profile();return [p.firstName||p.vorname||p.name,p.lastName||p.nachname].filter(Boolean).join(' ')||p.displayName||p.email||'Schüler/in'}
function courseCode(){const p=profile();return p.courseCode||p.kurs||p.course||p.kursCode||localStorage.getItem('SP_COURSE_CODE')||'Kurs'}
function studentId(){const p=profile();return p.studentId||p.uid||p.email||p.id||String((p.kurs||'')+'_'+(p.email||p.vorname||'student')).toLowerCase().replace(/[^a-z0-9]+/g,'-')}
function isTeacherPreview(){const p=profile();const r=String(localStorage.getItem('SP_LOGIN_ROLE')||localStorage.getItem('SP_ACTIVE_ROLE')||p.role||p.loginRole||'').toLowerCase();return r==='teacher'||r==='lehrer'||p.teacherPreview===true||p.isTeacher===true||localStorage.getItem('SP_TEACHER_PREVIEW')==='1'}
function clamp(n){return Math.max(0,Math.min(100,Math.round(Number(n)||0)))}
function stars(n){n=Math.max(0,Math.min(3,Number(n||0)));return '★'.repeat(n)+'☆'.repeat(3-n)}
function listLen(x){return Array.isArray(x)?x.length:(x&&typeof x==='object'?Object.keys(x).length:0)}
function verbStats(mod={}){const learned=listLen(mod.learnedVerbs||mod.known||mod.state?.learnedVerbs||mod.state?.known||[]);const active=listLen(mod.activeVerbs||mod.state?.activeVerbs||mod.state?.active||[]);const known=listLen(mod.known||mod.state?.known||[]);const unsure=listLen(mod.unsure||mod.state?.unsure||[]);const unknown=listLen(mod.unknown||mod.state?.unknown||[]);return{learned,active,known,unsure,unknown,contentsDone:Math.floor(learned/20),packagePercent:Math.min(100,Math.round(((learned%20)||(learned?20:0))/20*100))}}
function safeLocal(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function allProgress(){return Object.values(readJSON('SP_DASHBOARD_PROGRESS',{})).filter(Boolean).map(normalizeItem)}
function normalizeItem(x){const moduleKey=x.module||x.moduleId||'wortschatz';const moduleTitle=moduleKey==='wortschatz'?'Wortschatz':moduleKey==='verben'?'Verben':moduleKey==='fragen'?'Fragen':moduleKey==='grammatik'?'Grammatik':String(moduleKey||'Modul');const lesson=x.lesson||x.lektion||'';const theme=x.theme||x.topic||x.thema||'';return {...x,moduleKey,moduleTitle,lesson,theme,percent:clamp(x.percent),title:x.title||x.id||moduleTitle}}
function totals(data){return{points:Number(localStorage.getItem('SP_POINTS_TOTAL')||0)||0,stars:data.reduce((s,x)=>s+Number(x.exam?.stars||x.stars||0),0),progress:data.length?clamp(data.reduce((s,x)=>s+Number(x.percent||0),0)/data.length):0,done:data.filter(x=>Number(x.percent||0)>=100||Number(x.exam?.percent||0)>=100).length}}
function render(){const data=allProgress();const t=totals(data),course=courseCode();userPill.textContent=userName()+' · '+course;totalCircle.style.setProperty('--p',t.progress);totalCircle.innerHTML='<span>'+t.progress+'%</span>';totalFill.style.width=t.progress+'%';summaryText.textContent=data.length?t.done+' von '+data.length+' Inhalten abgeschlossen':'Noch keine Inhalte abgeschlossen.';pointsTotal.textContent=t.points;starsTotal.textContent=t.stars;doneTotal.textContent=t.done;contentCount.textContent=data.length+' Inhalte';renderModules(data)}
function renderModules(data){if(!data.length){contentGrid.innerHTML='<div class="empty">Noch keine gespeicherten Inhalte gefunden. Öffne zuerst eine Aufgabe oder ein Thema.</div>';return}const groups={};data.forEach(x=>{const k=x.moduleKey||'module';(groups[k]||(groups[k]={title:x.moduleTitle||k,items:[]})).items.push(x)});contentGrid.innerHTML=Object.values(groups).map(g=>{const avg=clamp(g.items.reduce((s,x)=>s+Number(x.percent||0),0)/g.items.length);return `<article class="module"><div class="moduleHead"><div><h3>${esc(g.title)}</h3><div class="small">${g.items.length} Inhalt${g.items.length===1?'':'e'}</div></div><b>${avg}%</b></div><div class="bar"><div class="fill" style="width:${avg}%"></div></div><div class="moduleGrid">${g.items.map(itemHtml).join('')}</div></article>`}).join('')}
function itemHtml(x){if(x.isVerbSummary)return `<div class="item"><h4>Verben A1</h4><div class="small">${Number(x.learned||0)} Verben gelernt</div><div class="itemMeta"><span class="chip">Aktiv: ${Number(x.active||0)}</span><span class="chip">Sicher: ${Number(x.known||0)}</span><span class="chip">Unsicher: ${Number(x.unsure||0)}</span></div></div>`;return `<div class="item"><h4>${esc(x.title)}</h4><div class="bar"><div class="fill" style="width:${clamp(x.percent)}%"></div></div><div class="itemMeta"><span class="chip">${clamp(x.percent)}%</span><span class="chip">${Number(x.completedTasks||0)}/${Number(x.totalTasks||0)} Aufgaben</span>${x.exam?.attempted?`<span class="chip">${stars(x.exam.stars)} ${clamp(x.exam.percent||x.exam.bestPercent)}%</span>`:''}</div></div>`}
function normalizeTopic(id,t,moduleKey='wortschatz'){return{id,module:moduleKey,moduleTitle:t.moduleTitle||'Wortschatz',level:t.level||'A1',lesson:t.lesson||'',theme:t.theme||'',title:t.title||id,percent:t.progressPercent||t.current?.percent||0,completedTasks:t.completedTasks||0,totalTasks:t.totalTasks||0,exam:t.exam||{}}}
function isTopicRecord(k,v){return v&&typeof v==='object'&&!Array.isArray(v)&&(v.tasks||v.exam||v.current||v.lifetime||v.progressPercent||v.title)}
async function loadOnlineProgress(){if(isTeacherPreview())return;try{const mod=await import('/js/firebase.js');const snap=await Promise.race([mod.getDoc(mod.doc(mod.db,'progress',studentId())),new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),1800))]);if(!snap.exists())return;const p=snap.data()||{};const all={};['wortschatz','fragen','grammatik'].forEach(m=>Object.entries(p[m]||{}).forEach(([id,t])=>{if(isTopicRecord(id,t))all[id]=normalizeTopic(id,t,m)}));const vs=verbStats(p.verben||{});if(vs.learned||vs.active||vs.known||vs.unsure||vs.unknown){all['verben-a1']={id:'verben-a1',module:'verben',moduleTitle:'Verben',title:'Verben A1',isVerbSummary:true,learned:vs.learned,active:vs.active,known:vs.known,unsure:vs.unsure,unknown:vs.unknown,contentsDone:vs.contentsDone,packagePercent:vs.packagePercent,percent:vs.packagePercent}}safeLocal('SP_DASHBOARD_PROGRESS',all);if(p.totals)localStorage.setItem('SP_POINTS_TOTAL',Number(p.totals.points||0));render()}catch(e){console.warn('Dashboard Online-Daten später verfügbar',e)}}
async function loadRanking(){leaderboard.innerHTML='<div class="empty">Rangliste lädt …</div>';try{const mod=await import('/js/firebase.js');const q=mod.query(mod.collection(mod.db,'progress'),mod.where('kurs','==',courseCode()),mod.limit(30));const snap=await Promise.race([mod.getDocs(q),new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),2500))]);const list=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(Number(b.totals?.points||b.pointsTotal||b.lifetimePoints||0)-Number(a.totals?.points||a.pointsTotal||a.lifetimePoints||0))).slice(0,30);leaderboard.innerHTML=list.length?list.map((x,i)=>`<div class="rank"><div class="rankNo">${i+1}</div><div><b>${esc(x.studentName||x.name||x.email||'Schüler/in')}</b><div class="small">${esc(courseCode())}</div></div><div class="points"><b>${Number(x.totals?.points||x.pointsTotal||x.lifetimePoints||0)}</b> Punkte</div></div>`).join(''):'<div class="empty">Noch keine Rangliste vorhanden.</div>'}catch(e){leaderboard.innerHTML='<div class="empty">Rangliste konnte gerade nicht geladen werden.</div>'}}
function logout(){if(!confirm('Möchten Sie sich abmelden?'))return;['SP_USER_PROFILE','SP_STUDENT_PROFILE','SP_KEEP_LOGGED_IN','SP_STUDENT_ID','sprachpilotUser','SP_CURRENT_USER','SP_LOGIN','SP_LOGIN_ROLE','SP_ACTIVE_ROLE','SP_AUTH_ROLE','SP_LOGIN_CONTEXT','SP_TEACHER_MODE','SP_TEACHER_EMAIL','SP_TEACHER_ID','SP_TEACHER_UID','SP_TEACHER_PROFILE'].forEach(k=>localStorage.removeItem(k));try{sessionStorage.removeItem('SP_TEACHER_PREVIEW');sessionStorage.removeItem('SP_TEACHER_MODE_WAS_ACTIVE');sessionStorage.removeItem('SP_PREVIEW_COURSE')}catch(e){}location.href='/index.html'}
render();setTimeout(loadOnlineProgress,200);
</script>
</body>
</html>
