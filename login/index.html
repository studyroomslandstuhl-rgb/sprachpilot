<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SprachPilot – Login</title><link rel="stylesheet" href="../style.css"></head><body><div class="container"><section class="hero"><a href="/index.html" style="text-decoration:none;color:inherit"><div class="logo-wrap"><img src="/assets/logo/sprachpilot-logo.png" alt="SprachPilot Logo"></div><h1>SprachPilot</h1></a><p class="subtitle">Deutsch lernen mit klaren Übungen, Bildern, Fragen und Wiederholung.</p></section><section class="card"><h2>Schüler-Login</h2><p class="small">Logge dich mit E-Mail und Kurscode ein.</p><label>E-Mail *</label><input id="loginEmail" type="email" required placeholder="name@email.com"><label>Kurscode *</label><input id="loginCourse" required placeholder="z. B. GLK-68"><button class="success" onclick="studentLogin()">Einloggen</button><a class="btn secondary" href="../register/">Neu registrieren</a><a class="btn secondary" href="../">Zur Startseite</a><div id="loginResult"></div></section><footer>© SprachPilot</footer></div><script type="module">
import { loginStudent, $, safeText, getRedirectTarget } from "../js/auth.js?v=step133";
window.studentLogin=async function(){const email=$("loginEmail").value.trim().toLowerCase(),kurs=$("loginCourse").value.trim(),result=$("loginResult");if(!email||!kurs){result.innerHTML='<div class="no">Bitte E-Mail und Kurscode eingeben.</div>';return}result.innerHTML='<div class="ok">Login wird geprüft...</div>';try{await loginStudent(email,kurs);location.href=(getRedirectTarget("/index.html").includes("/teacher/")?"/index.html":getRedirectTarget("/index.html"))}catch(err){console.error(err);if(err.message==="COURSE_NOT_FOUND")result.innerHTML=`<div class="no">Dieser Kurscode existiert nicht: ${safeText(kurs)}</div>`;else if(err.message==="STUDENT_NOT_FOUND")result.innerHTML='<div class="no">Profil nicht gefunden. Bitte zuerst registrieren.</div>';else result.innerHTML='<div class="no">Login nicht möglich. Bitte Firebase-Regeln prüfen.</div>'}}
</script><script src="/shared/sprachpilot-design-system.js"></script>
</body></html>
