<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SprachPilot – Login</title><link rel="stylesheet" href="../style.css"></head><body><div class="container"><section class="hero"><a href="/index.html" style="text-decoration:none;color:inherit"><div class="logo-wrap"><svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs><circle cx="60" cy="60" r="52" fill="url(#g)"/><path d="M28 63 C43 38,70 30,91 38 C75 43,63 53,55 70 C47 66,38 63,28 63Z" fill="#fff" opacity=".95"/><path d="M54 70 C63 53,75 43,91 38 C84 57,72 75,52 91 C55 82,56 75,54 70Z" fill="#ffcc33"/><circle cx="71" cy="49" r="5" fill="#667eea"/><path d="M33 82 C43 78,50 76,58 78" stroke="#fff" stroke-width="7" stroke-linecap="round" fill="none"/></svg></div><h1>SprachPilot</h1></a><p class="subtitle">Deutsch lernen mit klaren Übungen, Bildern, Fragen und Wiederholung.</p></section><section class="card"><h2>Schüler-Login</h2><p class="small">Logge dich mit E-Mail und Kurscode ein.</p><label>E-Mail *</label><input id="loginEmail" type="email" required placeholder="name@email.com"><label>Kurscode *</label><input id="loginCourse" required placeholder="z. B. GLK-68"><button class="success" onclick="studentLogin()">Einloggen</button><a class="btn secondary" href="../register/">Neu registrieren</a><a class="btn secondary" href="../">Zur Startseite</a><div id="loginResult"></div></section><footer>© SprachPilot</footer></div><script type="module">
import { loginStudent, $, safeText, getRedirectTarget } from "../js/auth.js";
window.studentLogin=async function(){const email=$("loginEmail").value.trim().toLowerCase(),kurs=$("loginCourse").value.trim(),result=$("loginResult");if(!email||!kurs){result.innerHTML='<div class="no">Bitte E-Mail und Kurscode eingeben.</div>';return}result.innerHTML='<div class="ok">Login wird geprüft...</div>';try{await loginStudent(email,kurs);location.href=getRedirectTarget("../")}catch(err){console.error(err);if(err.message==="COURSE_NOT_FOUND")result.innerHTML=`<div class="no">Dieser Kurscode existiert nicht: ${safeText(kurs)}</div>`;else if(err.message==="STUDENT_NOT_FOUND")result.innerHTML='<div class="no">Profil nicht gefunden. Bitte zuerst registrieren.</div>';else result.innerHTML='<div class="no">Login nicht möglich. Bitte Firebase-Regeln prüfen.</div>'}}
</script></body></html>
