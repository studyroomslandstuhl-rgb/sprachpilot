<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprachPilot · Lehrer-Login</title>
<link rel="stylesheet" href="css/styles.css">

<style>
.login-card{
  max-width:460px;
  margin:70px auto;
}
.login-card input{
  width:100%;
  display:block;
  margin-bottom:14px;
}
.login-actions{
  display:flex;
  flex-direction:column;
  gap:8px;
}
</style>
</head>

<body>

<main class="teacher-shell">

  <section class="card login-card">
    <h1>Lehrer-Login</h1>

    <label>E-Mail</label>
    <input id="email" type="email" placeholder="E-Mail">

    <label>Passwort</label>
    <input id="password" type="password" placeholder="Passwort">

    <div class="login-actions">
      <button onclick="TeacherAuth.login()">Einloggen</button>
      <button class="secondary" onclick="TeacherAuth.register()">Als Lehrkraft registrieren</button>
      <button class="secondary" onclick="TeacherAuth.resetPassword()">Passwort vergessen</button>
    </div>

    <div id="loginMsg"></div>
  </section>

</main>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
