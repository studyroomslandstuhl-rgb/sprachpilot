<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprachPilot · Lehrer Login</title>

<link rel="stylesheet" href="css/styles.css">

<style>
.login-wrapper{
  max-width:520px;
  margin:70px auto;
}

.login-card{
  background:white;
  border-radius:24px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}

.login-card h1{
  color:#667eea;
  text-align:center;
  margin-bottom:8px;
}

.login-card p{
  text-align:center;
  color:#666;
  margin-bottom:22px;
}

.login-card label{
  display:block;
  margin-top:12px;
  font-weight:bold;
  color:#667eea;
}

.login-card input{
  width:100%;
  padding:13px;
  border:2px solid #ddd;
  border-radius:12px;
  margin-top:6px;
  font-size:16px;
}

.login-buttons{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:20px;
}

.mode-box{
  margin-top:18px;
  padding-top:14px;
  border-top:2px solid #eef2ff;
}

.hidden{
  display:none!important;
}

.msg{
  margin-top:14px;
}
</style>
</head>

<body>

<div class="login-wrapper">

  <div class="login-card">

    <h1>Lehrerbereich</h1>
    <p>Einloggen, registrieren oder Passwort zurücksetzen</p>

    <div id="loginMode">

      <label>E-Mail</label>
      <input id="email" type="email" placeholder="lehrer@email.de">

      <label>Passwort</label>
      <input id="password" type="password" placeholder="Passwort">

      <div class="login-buttons">
        <button onclick="TeacherAuth.login()">Einloggen</button>
        <button class="secondary" onclick="showRegisterMode()">Als Lehrkraft registrieren</button>
        <button class="secondary" onclick="showResetMode()">Passwort vergessen</button>
      </div>

    </div>

    <div id="registerMode" class="hidden mode-box">

      <h2>Lehrkraft registrieren</h2>

      <label>E-Mail</label>
      <input id="regEmail" type="email" placeholder="lehrer@email.de">

      <label>Passwort</label>
      <input id="regPassword" type="password" placeholder="mindestens 6 Zeichen">

      <label>Schule / Institution</label>
      <input id="regSchool" type="text" placeholder="z. B. VHS, Sprachschule, Bildungsträger">

      <label>Beruf / Rolle</label>
      <input id="regJob" type="text" placeholder="z. B. DaF-Lehrkraft, Kursleitung">

      <div class="login-buttons">
        <button onclick="TeacherAuth.register()">Registrieren</button>
        <button class="secondary" onclick="showLoginMode()">Zurück zum Login</button>
      </div>

    </div>

    <div id="resetMode" class="hidden mode-box">

      <h2>Passwort vergessen</h2>

      <label>E-Mail</label>
      <input id="resetEmail" type="email" placeholder="lehrer@email.de">

      <div class="login-buttons">
        <button onclick="TeacherAuth.resetPassword()">Reset-Link senden</button>
        <button class="secondary" onclick="showLoginMode()">Zurück zum Login</button>
      </div>

    </div>

    <div id="loginMsg" class="msg"></div>

  </div>

</div>

<script>
function showLoginMode(){
  document.getElementById("loginMode").classList.remove("hidden");
  document.getElementById("registerMode").classList.add("hidden");
  document.getElementById("resetMode").classList.add("hidden");
  document.getElementById("loginMsg").innerHTML="";
}

function showRegisterMode(){
  document.getElementById("loginMode").classList.add("hidden");
  document.getElementById("registerMode").classList.remove("hidden");
  document.getElementById("resetMode").classList.add("hidden");
  document.getElementById("loginMsg").innerHTML="";
}

function showResetMode(){
  document.getElementById("loginMode").classList.add("hidden");
  document.getElementById("registerMode").classList.add("hidden");
  document.getElementById("resetMode").classList.remove("hidden");
  document.getElementById("loginMsg").innerHTML="";
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
