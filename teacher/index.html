<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SprachPilot · Lehrer-Dashboard</title>
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>
<div class="container">
  <section class="hero">
    <div class="teacher-top"><a class="teacher-brand" href="/index.html"><img src="/assets/logo/sprachpilot-logo.png" alt="SprachPilot Logo"><div><h1>SprachPilot</h1><p class="subtitle">Lehrer-Dashboard</p></div></a><div class="teacher-actions"><button onclick="TeacherPreview.openAll()">SprachPilot öffnen</button><button class="secondary" onclick="teacherLogout()">Abmelden</button></div></div>
  </section>
  <main id="app"><div class="card">Dashboard wird geladen …</div></main>
  <footer>© SprachPilot</footer>
</div>
<script>
(function(){
  function safeText(value){return String(value||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function showLoadProblem(message){
    var app=document.getElementById("app");
    if(!app)return;
    var current=app.textContent||"";
    if(!/Dashboard wird geladen/.test(current))return;
    app.innerHTML='<div class="card warning-card"><h2>Lehrer-Dashboard lädt nicht vollständig</h2><p>'+safeText(message||"Eine Datei oder Firebase antwortet gerade nicht.")+'</p><div class="toolbar"><button onclick="location.reload()">Neu laden</button><a class="btn secondary" href="login.html">Zum Lehrerlogin</a><a class="btn secondary" href="/index.html">Zur Startseite</a></div></div>';
  }
  window.addEventListener("error",function(e){showLoadProblem(e.message||"JavaScript-Fehler beim Laden.");});
  window.addEventListener("unhandledrejection",function(e){var reason=e.reason&&e.reason.message?e.reason.message:e.reason;showLoadProblem(reason||"Firebase-Abfrage wurde abgebrochen.");});
  window.__teacherLoadWatch=setTimeout(function(){showLoadProblem("Das Dashboard hat länger als 10 Sekunden geladen. Bitte neu laden oder erneut einloggen.");},10000);
})();
</script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js?v=teacher-safe-20260701"></script>
<script src="../verben-A1/data/verbs.js?v=12"></script>
<script src="../verben-A1/data/translations.js?v=12"></script>
<script src="../verben-A1/data/sentences.js?v=13"></script>
<script src="../verben-A1/data/grammar.js?v=12"></script>
<script src="../verben-A1/data/verbs-extra.js?v=1"></script>
<script src="../verben-A1/data/translation-deduplicate.js?v=5"></script>
<script src="../verben-A1/data/a1-verb-expansion.js?v=2"></script>
<script src="../verben-A1/data/verb-default-locks.js?v=4"></script>
<script src="../verben-A1/data/verb-sentence-conjugation-fix.js?v=1"></script>
<script src="../verben-A1/data/verb-translation-fix.js?v=1"></script>
<script src="courses.js?v=teacher-safe-20260701"></script>
<script src="course-lock-default.js?v=teacher-safe-20260701"></script>
<script src="students.js?v=teacher-safe-20260701"></script>
<script src="analytics.js?v=teacher-safe-20260701"></script>
<script src="teacher-preview.js?v=teacher-safe-20260701"></script>
<script src="releases.js?v=teacher-safe-20260701"></script>
<script src="release-course-code-fix.js?v=teacher-safe-20260701"></script>
<script src="verb-release-extra.js?v=teacher-safe-20260701"></script>
<script src="release-parent-rules.js?v=teacher-safe-20260701"></script>
<script src="app.js?v=teacher-safe-20260701"></script>
<script src="dashboard-enhancements.js?v=teacher-safe-20260701"></script>
<script>
window.addEventListener("load",function(){
  setTimeout(function(){
    var app=document.getElementById("app");
    if(window.__teacherLoadWatch)clearTimeout(window.__teacherLoadWatch);
    if(app && /Dashboard wird geladen/.test(app.textContent||"")){
      app.innerHTML='<div class="card warning-card"><h2>Lehrer-Dashboard lädt nicht vollständig</h2><p>Bitte neu laden oder erneut einloggen. Wenn das wieder passiert, ist Firebase/Auth noch nicht fertig verbunden.</p><div class="toolbar"><button onclick="location.reload()">Neu laden</button><a class="btn secondary" href="login.html">Zum Lehrerlogin</a><a class="btn secondary" href="/index.html">Zur Startseite</a></div></div>';
    }
  },11000);
});
</script>
<script src="/shared/sprachpilot-design-system.js"></script>
</body>
</html>
