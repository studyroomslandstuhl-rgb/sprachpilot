<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SprachPilot · Teacher Dashboard</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <header class="topbar">

    <div class="brand">

      <div class="logo">
        SP
      </div>

      <div>
        <h1>Teacher Dashboard</h1>
        <p>Alle Kurse, Schüler und Fortschritte auf einen Blick</p>
      </div>

    </div>

    <div class="toolbar">

      <button onclick="TeacherApp.render()">
        Aktualisieren
      </button>

      <button
        class="danger"
        onclick="TeacherAuth.logout()">
        Logout
      </button>

    </div>

  </header>

  <main id="app" class="teacher-shell">

    <div class="card">
      Dashboard wird geladen …
    </div>

  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <!-- Verben -->
  <script src="../verben-A1/data/verbs.js"></script>

  <!-- Teacher -->
  <script src="js/firebase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/courses.js"></script>
  <script src="js/releases.js"></script>
  <script src="js/students.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
