<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fragen ohne Fragewort</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="translations.js?v=40"></script><script src="app.js?v=40"></script><script>header("Fragen ohne Fragewort");
let data=[{"tokens": ["kaufen", "Sie", "Brot", "?"], "order": ["kaufen", "Sie", "Brot", "?"], "verb": "kaufen", "sub": "Sie", "obj": "Brot"}, {"tokens": ["kaufst", "du", "Käse", "?"], "order": ["kaufst", "du", "Käse", "?"], "verb": "kaufst", "sub": "du", "obj": "Käse"}, {"tokens": ["kauft", "Maria", "Milch", "?"], "order": ["kauft", "Maria", "Milch", "?"], "verb": "kauft", "sub": "Maria", "obj": "Milch"}, {"tokens": ["kaufen", "Peter und Julia", "Tomaten", "?"], "order": ["kaufen", "Peter und Julia", "Tomaten", "?"], "verb": "kaufen", "sub": "Peter und Julia", "obj": "Tomaten"}, {"tokens": ["brauche", "ich", "Zucker", "?"], "order": ["brauche", "ich", "Zucker", "?"], "verb": "brauche", "sub": "ich", "obj": "Zucker"}, {"tokens": ["brauchst", "du", "Salz", "?"], "order": ["brauchst", "du", "Salz", "?"], "verb": "brauchst", "sub": "du", "obj": "Salz"}, {"tokens": ["braucht", "er", "Wasser", "?"], "order": ["braucht", "er", "Wasser", "?"], "verb": "braucht", "sub": "er", "obj": "Wasser"}, {"tokens": ["brauchen", "wir", "Eier", "?"], "order": ["brauchen", "wir", "Eier", "?"], "verb": "brauchen", "sub": "wir", "obj": "Eier"}, {"tokens": ["möchtest", "du", "Tee", "?"], "order": ["möchtest", "du", "Tee", "?"], "verb": "möchtest", "sub": "du", "obj": "Tee"}, {"tokens": ["möchten", "Sie", "Kaffee", "?"], "order": ["möchten", "Sie", "Kaffee", "?"], "verb": "möchten", "sub": "Sie", "obj": "Kaffee"}, {"tokens": ["möchte", "Peter", "Kuchen", "?"], "order": ["möchte", "Peter", "Kuchen", "?"], "verb": "möchte", "sub": "Peter", "obj": "Kuchen"}, {"tokens": ["möchten", "Maria und Anna", "Saft", "?"], "order": ["möchten", "Maria und Anna", "Saft", "?"], "verb": "möchten", "sub": "Maria und Anna", "obj": "Saft"}, {"tokens": ["isst", "du", "Fisch", "?"], "order": ["isst", "du", "Fisch", "?"], "verb": "isst", "sub": "du", "obj": "Fisch"}, {"tokens": ["essen", "wir", "Brot", "?"], "order": ["essen", "wir", "Brot", "?"], "verb": "essen", "sub": "wir", "obj": "Brot"}, {"tokens": ["trinkt", "er", "Saft", "?"], "order": ["trinkt", "er", "Saft", "?"], "verb": "trinkt", "sub": "er", "obj": "Saft"}, {"tokens": ["trinkt", "sie", "Wasser", "?"], "order": ["trinkt", "sie", "Wasser", "?"], "verb": "trinkt", "sub": "sie", "obj": "Wasser"}, {"tokens": ["bezahlt", "ihr", "den Kuchen", "?"], "order": ["bezahlt", "ihr", "den Kuchen", "?"], "verb": "bezahlt", "sub": "ihr", "obj": "den Kuchen"}, {"tokens": ["bringen", "Sie", "Käse", "?"], "order": ["bringen", "Sie", "Käse", "?"], "verb": "bringen", "sub": "Sie", "obj": "Käse"}, {"tokens": ["kocht", "Maria", "Suppe", "?"], "order": ["kocht", "Maria", "Suppe", "?"], "verb": "kocht", "sub": "Maria", "obj": "Suppe"}, {"tokens": ["macht", "Peter", "Pfannkuchen", "?"], "order": ["macht", "Peter", "Pfannkuchen", "?"], "verb": "macht", "sub": "Peter", "obj": "Pfannkuchen"}, {"tokens": ["fahren", "Peter und Julia", "zum Supermarkt", "?"], "order": ["fahren", "Peter und Julia", "zum Supermarkt", "?"], "verb": "fahren", "sub": "Peter und Julia", "obj": "zum Supermarkt"}, {"tokens": ["liest", "Julia", "die Liste", "?"], "order": ["liest", "Julia", "die Liste", "?"], "verb": "liest", "sub": "Julia", "obj": "die Liste"}, {"tokens": ["sieht", "Maria", "die Tomaten", "?"], "order": ["sieht", "Maria", "die Tomaten", "?"], "verb": "sieht", "sub": "Maria", "obj": "die Tomaten"}],idx=0,built=[];
function render(){if(idx>=data.length){finishTask('fragen-ohne-fragewort.html');area.innerHTML='<div class="big">Gut gemacht!</div><a class="btn" href="fragen-mit-fragewort.html">Nächste Aufgabe →</a>';return}let cur=data[idx];built=[];area.innerHTML=`<div class="question">Baue die Frage. Setze auch ?</div><div id="built" class="built"></div><div class="tiles">${shuffle(cur.tokens).map(x=>`<button class="tile ${x===cur.verb?'verb':''}" onclick="add(this,'${x}')">${x}</button>`).join('')}</div><div class="actions"><button class="btn" onclick="control()">Kontrollieren</button><button class="btn secondary" onclick="render()">Neu starten</button></div><div id="step"></div><div id="fb" class="feedback"></div>`;window.cur=cur}
function add(b,x){built.push(x);b.disabled=true;document.getElementById('built').textContent=built.map((v,i)=>i===0?v.charAt(0).toUpperCase()+v.slice(1):v).join(' ')}
function control(){let ok=cur.order.join('|')===built.join('|');if(ok){fb.textContent='Reihenfolge richtig.';askVerb()}else{fb.innerHTML='Reihenfolge falsch. Klicke auf „Neu starten“ und korrigiere dich.<div class="hint">Das Verb ist rot markiert.</div>'}}
function askVerb(){step.innerHTML=`<div class="question">Wo ist das Verb/Prädikat?</div><div class="tiles">${cur.order.map(x=>`<button class="tile ${x===cur.verb?'verb':''}" onclick="${x===cur.verb?'askSubject()':'badMark()'}">${x}</button>`).join('')}</div>`}
function askSubject(){step.innerHTML=`<div class="question">Wo ist das Subjekt?</div><div class="tiles">${cur.order.map(x=>`<button class="tile" onclick="${x===cur.sub?'askObject()':'badMark()'}">${x}</button>`).join('')}</div>`}
function askObject(){if(!cur.obj){pass();return}step.innerHTML=`<div class="question">Wo ist das Objekt?</div><div class="tiles">${cur.order.map(x=>`<button class="tile" onclick="${x===cur.obj?'nextAfterObj()':'badMark()'}">${x}</button>`).join('')}</div>`}
function nextAfterObj(){pass()}
function askQword(){step.innerHTML=`<div class="question">Wo ist das Fragewort?</div><div class="tiles">${cur.order.map(x=>`<button class="tile" onclick="${x===cur.qword?'pass()':'badMark()'}">${x}</button>`).join('')}</div>`}
function badMark(){fb.innerHTML='Falsch markiert. Versuche es noch einmal.'}
function pass(){idx++;fb.textContent='Richtig!';setTimeout(render,700)}
render();
</script></body></html>
