function key(){return "SP_VERBS_"+(profile?profile.userId:"guest")}

const VERB_SKILLS = [
  "karteikarte",
  "memory",
  "bild_verb",
  "verb_bild",
  "schreiben",
  "hoeren_schreiben",
  "hoeren_sprechen",
  "bild_sprechen"
];

const VERB_SKILL_LABELS = {
  "karteikarte":"Karteikarten",
  "memory":"Memory",
  "bild_verb":"Bild → Verb",
  "verb_bild":"Verb → Bild",
  "schreiben":"Schreiben",
  "hoeren_schreiben":"Hören → Schreiben",
  "hoeren_sprechen":"Hören → Sprechen",
  "bild_sprechen":"Bild → Sprechen"
};

function skillKey(skill){
  if(skill==="zuordnung") return "bild_verb";
  if(skill==="karteikarte_schreiben" || skill==="karteikarte_sprechen") return "karteikarte";
  if(skill==="verb_bild") return "verb_bild";
  if(skill==="bild_sprechen") return "bild_sprechen";
  if(skill==="hoeren_schreiben") return "hoeren_schreiben";
  if(skill==="hoeren_sprechen") return "hoeren_sprechen";
  if(skill==="schreiben") return "schreiben";
  if(skill==="memory") return "memory";
  return skill;
}

function ensureSkillState(v){
  state.skillDone = state.skillDone || {};
  state.skillAttempts = state.skillAttempts || {};
  state.skillSuccess = state.skillSuccess || {};
  state.skillDone[v] = state.skillDone[v] || {};
  state.skillAttempts[v] = state.skillAttempts[v] || {};
  state.skillSuccess[v] = state.skillSuccess[v] || {};
}

function verbSkillCount(v){
  ensureSkillState(v);
  return VERB_SKILLS.filter(s=>state.skillDone[v][s]).length;
}

function verbCount(v){
  return verbSkillCount(v);
}

function verbPercent(v){
  return Math.round((verbSkillCount(v) * 100) / VERB_SKILLS.length);
}

function markSkill(v,skill,good){
  const sk=skillKey(skill);
  ensureSkillState(v);
  state.skillAttempts[v][sk]=(state.skillAttempts[v][sk]||0)+1;
  if(good){
    state.skillSuccess[v][sk]=(state.skillSuccess[v][sk]||0)+1;
    if(sk==="karteikarte"){
      if((state.skillSuccess[v][sk]||0)>=2) state.skillDone[v][sk]=true;
    }else{
      state.skillDone[v][sk]=true;
    }
  }else{
    state.weak[v]=(state.weak[v]||0)+1;
  }
}

function skillBadges(v){
  ensureSkillState(v);
  return VERB_SKILLS.map(s=>{
    const ok=state.skillDone[v][s];
    const att=state.skillAttempts[v][s]||0;
    return `<div class="small">${ok?"✅":"⬜"} ${VERB_SKILL_LABELS[s]} ${att?`(${att}x)`:""}</div>`;
  }).join("");
}

function migrateState(){
  state.learned=state.learned||[];
  state.encounters=state.encounters||{};
  state.successBySkill=state.successBySkill||{};
  state.skillDone=state.skillDone||{};
  state.skillAttempts=state.skillAttempts||{};
  state.skillSuccess=state.skillSuccess||{};
  state.active=state.active||[];
  state.known=state.known||[];
  state.unsure=state.unsure||[];
  state.unknown=state.unknown||[];
  state.currentGame=state.currentGame||"";
  state.flashSession=state.flashSession||null;
  (state.active||[]).forEach(v=>ensureSkillState(v));
}
function loadState(){
  try{
    const saved=JSON.parse(localStorage.getItem(key())||"null");
    if(saved) state={...state,...saved};
  }catch(e){}
  migrateState();
}
function saveState(){
  migrateState();
  localStorage.setItem(key(),JSON.stringify(state));
  sendProgress();
}

function overall(){
  if(!state.active.length)return 0;
  let sum=state.active.reduce((s,v)=>s+verbPercent(v),0);
  return Math.round(sum/state.active.length);
}
function learnedTotal(){return state.learned.length + state.active.filter(v=>verbPercent(v)>=100).length}
function sendProgress(){
  if(!profile)return;
  const done=overall();
  const payload={
    userId:profile.userId,kurs:profile.kurs,vorname:profile.vorname,nachname:profile.nachname,
    geburtsdatum:profile.geburtsdatum,heimatland:profile.heimatland,muttersprache:profile.muttersprache,
    fremdsprache:profile.fremdsprache,wohnort:profile.wohnort,kinder:profile.kinder,
    fragenFortschritt:profile.fragenFortschritt||0,verbenFortschritt:done,gesamtpunkte:done,
    profile:profile,verbenState:state,timestamp:new Date().toISOString()
  };
  try{fetch(GOOGLE_SHEET_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)})}catch(e){}
}
function img(v){return ALL_VERBS.find(x=>x.v===v)||{v:v,emoji:"⭐",img:"Bild"}}
function unusedVerbs(){
  const used=[...state.known,...state.unsure,...state.unknown,...state.active,...state.learned];
  return ALL_VERBS.map(x=>x.v).filter(v=>!used.includes(v));
}
function currentPickVerb(){
  const used=[...state.known,...state.unsure,...state.unknown,...state.active,...state.learned];
  for(let i=state.index;i<ALL_VERBS.length;i++){
    if(!used.includes(ALL_VERBS[i].v)){state.index=i;return ALL_VERBS[i];}
  }
  return null;
}


function imageFileName(v){
  return String(v||"")
    .toLowerCase()
    .replaceAll("ä","ae")
    .replaceAll("ö","oe")
    .replaceAll("ü","ue")
    .replaceAll("ß","ss")
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/^-|-$/g,"") + ".png";
}
function realImage(v, small=false){
  const cls = small ? "real-img-small" : "real-img";
  return `<img class="${cls}" src="bilder/${imageFileName(v)}" alt="" loading="eager" decoding="async" onerror="this.onerror=null;this.remove();">`;
}
function speakTextVerb(t,slow=false){
  try{
    if(!window.speechSynthesis || !window.SpeechSynthesisUtterance){
      const fb=$("fb")||$("cardFeedback");
      if(fb)fb.innerHTML="<div class='no'>Hören wird auf diesem Gerät nicht unterstützt.</div>";
      return;
    }
    const u=new SpeechSynthesisUtterance(String(t||""));
    u.lang="de-DE";
    u.rate=slow?0.55:0.75;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }catch(e){
    const fb=$("fb")||$("cardFeedback");
    if(fb)fb.innerHTML="<div class='no'>Beim Hören gab es ein Problem.</div>";
  }
}

function scrollToGame(){
  setTimeout(()=>{const g=$("game"); if(g) g.scrollIntoView({behavior:"smooth",block:"start"});},80);
}
function scrollToFeedback(){
  setTimeout(()=>{const fb=$("fb")||$("cardFeedback")||$("game"); if(fb) fb.scrollIntoView({behavior:"smooth",block:"center"});},80);
}
function normalizeVerbAnswer(s){
  return clean(String(s||"").replace(/\s+/g," "));
}
function checkVerbAnswer(answer, correct){
  return normalizeVerbAnswer(answer)===normalizeVerbAnswer(correct);
}
function setMicStatus(txt){
  const m=$("micStatus");
  if(m)m.innerHTML=txt;
}
function recogVerb(cb){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    const fb=$("cardFeedback")||$("fb");
    if(fb)fb.innerHTML="<div class='no'>Mikrofon funktioniert auf diesem Gerät/Browser nicht. Bitte die Antwort schreiben.</div>";
    scrollToFeedback();
    return;
  }
  try{
    let r=new SR();
    r.lang="de-DE";
    r.interimResults=false;
    r.continuous=false;
    r.maxAlternatives=3;
    let result="";
    let timer=null;
    let done=false;
    function finish(){
      if(done)return;
      done=true;
      clearTimeout(timer);
      setMicStatus("⚪ Mikrofon aus");
      if(result.trim())cb(result.trim());
      else{
        const fb=$("cardFeedback")||$("fb");
        if(fb)fb.innerHTML="<div class='no'>Ich habe nichts verstanden. Bitte noch einmal sprechen oder schreiben.</div>";
        scrollToFeedback();
      }
    }
    function stopSoon(){
      clearTimeout(timer);
      timer=setTimeout(()=>{try{r.stop()}catch(e){finish()}},2000);
    }
    r.onstart=()=>{setMicStatus("🔴 Mikrofon aktiv – sprechen Sie jetzt."); stopSoon();};
    r.onspeechstart=()=>clearTimeout(timer);
    r.onspeechend=()=>stopSoon();
    r.onsoundend=()=>stopSoon();
    r.onresult=e=>{
      let best="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i]&&e.results[i][0])best=e.results[i][0].transcript||best;
      }
      result=best||result;
      const heard=$("heard");
      if(heard)heard.innerText="Gehört: "+result;
      stopSoon();
    };
    r.onerror=e=>{
      clearTimeout(timer);
      setMicStatus("⚪ Mikrofon aus");
      const fb=$("cardFeedback")||$("fb");
      let msg="Mikrofonfehler. Bitte schreiben.";
      if(e&&e.error==="not-allowed")msg="Mikrofon ist blockiert. Bitte erlauben oder schreiben.";
      if(e&&e.error==="no-speech")msg="Ich habe nichts gehört. Bitte noch einmal sprechen oder schreiben.";
      if(fb)fb.innerHTML="<div class='no'>"+msg+"</div>";
      scrollToFeedback();
    };
    r.onend=finish;
    r.start();
  }catch(e){
    const fb=$("cardFeedback")||$("fb");
    if(fb)fb.innerHTML="<div class='no'>Mikrofon konnte nicht gestartet werden. Bitte schreiben.</div>";
    scrollToFeedback();
  }
}

  }
  $("app").innerHTML=`<h2>Verb einschätzen</h2>
    <div class="mini-top-progress"><strong>Paket:</strong> ${state.active.length}/20 Verben gesammelt</div>
    <p class="small">Entscheide schnell. Danach kommt automatisch das nächste Verb.</p>
    <div class="card" style="box-shadow:none;background:#f7f8ff;text-align:center">
      ${realImage(v.v,false)}
      <h1 style="color:#667eea">${v.v}</h1>
      <p>${v.img}</p>
    </div>
    <button class="success" onclick="rateVerb('${v.v}','known')">✅ kann ich</button>
    <button onclick="rateVerb('${v.v}','unsure')">❓ unsicher</button>
    <button onclick="rateVerb('${v.v}','unknown')">❌ kann ich nicht</button>`;
  renderProgressPanel(false);
}
function rateVerb(v,level){
  ["known","unsure","unknown"].forEach(k=>state[k]=state[k].filter(x=>x!==v));
  state[level].push(v);
  if(level!=="known" && !state.active.includes(v)){
    state.active.push(v);
    state.encounters[v]=state.encounters[v]||0;
  }
  state.index++;
  if(state.active.length>=20){
    state.active=state.active.slice(0,20);
    state.phase="tasks";
    saveState();
    renderHome();
  }else{
    saveState();
    renderOneVerb();
  }
}
function replaceLearnedIfNeeded(){
  let complete=state.active.filter(v=>verbPercent(v)>=100);
  if(complete.length<3)return false;
  let toReplace=complete.slice(0,3);
  toReplace.forEach(v=>{
    if(!state.learned.includes(v))state.learned.push(v);
    state.active=state.active.filter(x=>x!==v);
  });
  let candidates=[...state.unknown,...state.unsure,...unusedVerbs()].filter(v=>!state.active.includes(v)&&!state.learned.includes(v));
  candidates.slice(0,toReplace.length).forEach(v=>{
    if(!state.active.includes(v)){state.active.push(v);state.encounters[v]=state.encounters[v]||0;}
  });
  saveState();
  return true;
}
function addEncounter(v,skill,good=true){
  markSkill(v,skill,good);
  saveState();
  if(replaceLearnedIfNeeded()){
    showAutoReplaceMessage();
  }
}
function showAutoReplaceMessage(){
  const msg=`<div class="ok"><strong>🎉 3 Verben gelernt!</strong><br>Sie wurden automatisch durch neue Verben ersetzt.</div>`;
  const g=$("game");
  if(g)g.insertAdjacentHTML("afterbegin",msg);
}
function renderHome(resume=true){
  preloadActiveImages();
  state.phase="tasks";
  saveState();
  $("app").innerHTML=`<h2>Verben üben</h2>
    <div class="mini-top-progress">
      <strong>Aktiv:</strong> ${state.active.length} Verben |
      <strong>Gelernt:</strong> ${state.learned.length} |
      <strong>Fortschritt:</strong> ${overall()}%
    </div>
    <div id="game" class="game-frame">
      <h3 class="current-task-title">Aufgabe wählen</h3>
      <p class="small">Wähle eine Übung. Dein Fortschritt wird gespeichert.</p>
    </div>
    <div class="task-grid compact">
      <button class="task-card" onclick="startTask('flashcards')"><span class="big-icon">🃏</span>Karten</button>
      <button class="task-card" onclick="startTask('memory')"><span class="big-icon">🖼️</span>Memory</button>
      <button class="task-card" onclick="startTask('quiz')"><span class="big-icon">✅</span>Bild→Verb</button>
      <button class="task-card" onclick="startTask('writeVerb')"><span class="big-icon">✍️</span>Schreiben</button>
      <button class="task-card" onclick="startTask('hearWrite')"><span class="big-icon">🔊</span>Hören+Schr.</button>
      <button class="task-card" onclick="startTask('hearSpeak')"><span class="big-icon">🎧</span>Hören+Spr.</button>
      <button class="task-card" onclick="startTask('imageSpeak')"><span class="big-icon">🎤</span>Bild+Spr.</button>
      <button class="task-card" onclick="startTask('verbToImage')"><span class="big-icon">🖼️</span>Verb→Bild</button>
    </div>`;
  renderProgressPanel(false);
  if(resume) resumeTask();
}
function toggleProgressPanel(){
  const p=$("progressPanel");
  if(!p)return;
  if(p.classList.contains("hidden")){renderProgressPanel(true);p.classList.remove("hidden");}
  else p.classList.add("hidden");
}
function renderProgressPanel(openOnly){
  const p=$("progressPanel");
  if(!p)return;
  const activeRows=state.active.map(v=>`<div class="progress-row">
    <strong>${v}</strong> <span class="small">${verbSkillCount(v)}/${VERB_SKILLS.length} · ${verbPercent(v)}%</span><div class="progress-line"><div class="progress-fill" style="width:${verbPercent(v)}%"></div></div><div class="small">Fehler: ${state.weak[v]||0}</div>${skillBadges(v)}
  </div>`).join("");
  p.innerHTML=`<h2>📊 Fortschritt</h2>
    <button class="secondary" onclick="toggleProgressPanel()">Schließen</button>
    <div class="progress-row"><strong>Gesamt</strong><br>Aktiv: ${state.active.length} · Gelernt: ${state.learned.length} · Offen: ${unusedVerbs().length}</div>
    <h3>Aktive Verben</h3>${activeRows||"<p>Noch keine aktiven Verben.</p>"}
    <h3>Gelernt</h3><p class="small">${state.learned.length?state.learned.join(", "):"Noch keine."}</p>`;
}
function chooseVerbForPractice(){
  let pool=state.active.filter(v=>verbPercent(v)<100);
  if(!pool.length)return null;
  pool.sort((a,b)=>{
    const wa=state.weak[a]||0, wb=state.weak[b]||0;
    return (verbPercent(a)-verbPercent(b)) || (wb-wa);
  });
  return pool[Math.floor(Math.random()*Math.min(6,pool.length))];
}

function preloadActiveImages(){
  try{
    (state.active||[]).forEach(v=>{
      const im=new Image();
      im.src="bilder/"+imageFileName(v);
    });
  }catch(e){}
}







function startTask(name){
  state.currentGame=name;
  if(name==="flashcards"){
    startFlashcardSession(true);
  }
  saveState();
  runTask(name);
}
function runTask(name){
  if(name==="flashcards") return flashcards();
  if(name==="memory") return memory();
  if(name==="quiz") return quiz();
  if(name==="writeVerb") return writeVerb();
  if(name==="hearWrite") return hearWrite();
  if(name==="hearSpeak") return hearSpeak();
  if(name==="imageSpeak") return imageSpeak();
  if(name==="verbToImage") return verbToImage();
}
function resumeTask(){
  if(state.currentGame){
    runTask(state.currentGame);
  }
}

function startFlashcardSession(force=false){
  if(!force && state.flashSession && state.flashSession.total && flashDoneCount()<state.flashSession.total){
    return;
  }
  const pool=(state.active||[]).filter(v=>!state.skillDone?.[v]?.karteikarte && verbPercent(v)<100);
  state.flashSession={
    queue:shuffle(pool),
    correct:{},
    wrong:{},
    done:[],
    total:pool.length,
    current:null
  };
  pool.forEach(v=>{
    state.flashSession.correct[v]=0;
    state.flashSession.wrong[v]=0;
  });
  saveState();
}
function flashDoneCount(){
  if(!state.flashSession)return 0;
  return (state.flashSession.done||[]).length;
}
function flashPercent(){
  if(!state.flashSession || !state.flashSession.total)return 0;
  return Math.round((flashDoneCount()*100)/state.flashSession.total);
}
function flashProgressHtml(){
  const total=(state.flashSession&&state.flashSession.total)||0;
  const done=flashDoneCount();
  const left=Math.max(0,total-done);
  const pct=total?Math.round((done*100)/total):0;
  return `<div class="flash-progress-box">
    <strong>Karteikarten-Runde</strong>
    <div class="flash-bar"><div class="flash-fill" style="width:${pct}%"></div></div>
    <div class="flash-meta">
      <span>${pct}% fertig</span>
      <span>${done}/${total} Wörter abgeschlossen</span>
      <span>noch ${left}</span>
    </div>
  </div>`;
}
function nextFlashVerb(){
  if(!state.flashSession || !state.flashSession.total){
    startFlashcardSession(false);
  }
  if(!state.flashSession || !state.flashSession.total)return null;
  if(flashDoneCount()>=state.flashSession.total)return null;
  if(!state.flashSession.queue.length){
    const remaining=(state.active||[]).filter(v=>!state.flashSession.done.includes(v) && !state.skillDone?.[v]?.karteikarte);
    state.flashSession.queue=shuffle(remaining);
  }
  if(!state.flashSession.queue.length)return null;
  const v=state.flashSession.queue.shift();
  state.flashSession.current=v;
  saveState();
  return v;
}
function finishFlashVerb(v,good){
  state.flashSession=state.flashSession||{queue:[],correct:{},wrong:{},done:[],total:0,current:null};
  state.flashSession.correct[v]=state.flashSession.correct[v]||0;
  state.flashSession.wrong[v]=state.flashSession.wrong[v]||0;

  if(good){
    state.flashSession.correct[v]++;
    addEncounter(v,"karteikarte",true);
    if(state.flashSession.correct[v]>=2){
      if(!state.flashSession.done.includes(v))state.flashSession.done.push(v);
      state.flashSession.queue=state.flashSession.queue.filter(x=>x!==v);
    }else{
      state.flashSession.queue.push(v);
    }
  }else{
    state.flashSession.wrong[v]++;
    state.flashSession.correct[v]=0;
    addEncounter(v,"karteikarte",false);
    state.flashSession.queue.push(v,v);
  }
  saveState();
}
function flashcardDoneMessage(){
  state.currentGame="flashcards";
  saveState();
  $("game").innerHTML=`${flashProgressHtml()}<div class="ok"><h3>Gut gemacht!</h3><p>Karteikarten abgeschlossen. Die Karteikarten-Spalte ist für die erfolgreichen Wörter gefüllt.</p><button class="success" onclick="state.currentGame='';saveState();renderHome(false)">Nächste Aufgabe wählen</button><button class="secondary" onclick="startFlashcardSession(true);flashcards()">Karteikarten nochmal machen</button></div>`;
  scrollToGame();
}

function flashcards(){
  state.currentGame="flashcards";
  let v=nextFlashVerb();
  if(!v){flashcardDoneMessage();return}
  state.currentVerb=v;
  saveState();
  const correctNow=(state.flashSession&&state.flashSession.correct&&state.flashSession.correct[v])||0;
  const wrongNow=(state.flashSession&&state.flashSession.wrong&&state.flashSession.wrong[v])||0;
  $("game").innerHTML=`${flashProgressHtml()}
    <h3 class="current-task-title">Karteikarten: Nenne das deutsche Wort</h3>
    <div class="flash-word-row">
      <span>Dieses Wort: <strong>${correctNow}/2 richtig</strong></span>
      <span>Fehler: ${wrongNow}</span>
    </div>
    <p class="small">Wenn ein Wort 2× richtig war, verschwindet es aus dieser Karteikarten-Runde.</p>
    <div class="study-card-wrap">
      <div id="studyCard" class="study-card" onclick="this.classList.toggle('flipped')">
        <div class="study-face">
          <div class="small">Muttersprache: ${nativeLang()}</div>
          <div class="native-word">${nativeWord(v)}</div>
          <p class="small">Wie heißt das auf Deutsch?</p>
        </div>
        <div class="study-face study-back">
          <div class="small">Deutsch</div>
          <div class="german-word">${v}</div>
        </div>
      </div>
    </div>
    <input id="cardAnswer" placeholder="Deutsches Verb schreiben...">
    <button class="success" onclick="checkFlashcardAnswer('${v}')">Überprüfen</button>
    <button onclick="speakFlashcardAnswer('${v}')">🎤 Sagen</button>
    <div id="micStatus" class="small">⚪ Mikrofon aus</div>
    <p id="heard" class="small"></p>
    <div id="cardFeedback"></div>`;
  scrollToGame();
}

function checkFlashcardAnswer(v){
  const input=$("cardAnswer");
  const val=input?input.value:"";
  const fb=$("cardFeedback");
  if(checkVerbAnswer(val,v)){
    finishFlashVerb(v,true);
    const current=(state.flashSession.correct[v]||0);
    if(fb)fb.innerHTML=`<div class="ok">✔ Richtig: <strong>${v}</strong><br>${current>=2?"Dieses Wort ist für diese Runde fertig.":"Noch 1 richtige Antwort, dann ist dieses Wort fertig."}</div><button class="success" onclick="flashcards()">Nächste Karte</button>`;
  }else{
    finishFlashVerb(v,false);
    if(fb)fb.innerHTML=`<div class="no">❌ Noch nicht. Dieses Wort kommt nochmal, damit du es festigst.<br>Richtige Antwort: <strong>${v}</strong></div><button onclick="flashcards()">Nächste Karte</button>`;
  }
  scrollToFeedback();
}
function speakFlashcardAnswer(v){
  recogVerb(t=>{
    const heard=$("heard");
    if(heard)heard.innerText="Gehört: "+t;
    const fb=$("cardFeedback");
    if(checkVerbAnswer(t,v)){
      finishFlashVerb(v,true);
      const current=(state.flashSession.correct[v]||0);
      if(fb)fb.innerHTML=`<div class="ok">✔ Richtig gesprochen: <strong>${v}</strong><br>${current>=2?"Dieses Wort ist für diese Runde fertig.":"Noch 1 richtige Antwort, dann ist dieses Wort fertig."}</div><button class="success" onclick="flashcards()">Nächste Karte</button>`;
    }else{
      finishFlashVerb(v,false);
      if(fb)fb.innerHTML=`<div class="no">❌ Gehört: ${t}<br>Dieses Wort kommt nochmal, damit du es festigst.<br>Richtig: <strong>${v}</strong></div><button onclick="flashcards()">Nächste Karte</button>`;
    }
    scrollToFeedback();
  });
}

function memory(){
  state.currentGame="memory";
  state.first=null;state.lock=false;
  state.memoryCards=[];
  state.active.slice(0,10).forEach((v,i)=>{
    state.memoryCards.push({p:i,t:"de",v:v,html:`<span class="mem-german">${v}</span>`,o:false,d:false});
    state.memoryCards.push({p:i,t:"img",v:v,html:`${realImage(v,true)}`,o:false,d:false});
  });
  state.memoryCards=shuffle(state.memoryCards);
  saveState();
  renderMemory();
  scrollToGame();
}
function renderMemory(){
  $("game").innerHTML=`<h3>Memory: Bild ↔ deutsches Verb</h3>
  <p class="small">Finde das Bild und das passende deutsche Verb.</p>
  <div class="memory">${state.memoryCards.map((c,i)=>`<button class="mem ${c.o?'open':''} ${c.d?'done':''}" onclick="flip(${i})">${(c.o||c.d)?c.html:"?"}</button>`).join("")}</div><div id="fb"></div>`;
}
function flip(i){
  if(state.lock)return;
  let c=state.memoryCards[i];
  if(!c||c.o||c.d)return;
  c.o=true;renderMemory();
  if(state.first===null){state.first=i;saveState();return}
  state.lock=true;
  let a=state.memoryCards[state.first],b=state.memoryCards[i],good=a.p===b.p&&a.t!==b.t;
  setTimeout(()=>{
    if(good){a.d=b.d=true;addEncounter(a.v,'memory',true)}else{a.o=b.o=false;addEncounter(a.v,'memory',false);addEncounter(b.v,'memory',false)}
    state.first=null;state.lock=false;saveState();renderMemory();
    if(state.memoryCards.every(x=>x.d))$("fb").innerHTML="<div class='ok'>Memory geschafft!</div>";
  },600);
}
function quiz(){
  state.currentGame="quiz";
  let v=chooseVerbForPractice();
  if(!v){renderHome();return}
  let opts=shuffle([v,...shuffle(state.active.filter(a=>a!==v)).slice(0,3)]);
  state.currentVerb=v;saveState();
  $("game").innerHTML=`<h3>Welches Verb passt?</h3>${realImage(v,false)}${opts.map(o=>`<button onclick="checkQuiz('${o}','${v}')">${o}</button>`).join("")}<div id="fb"></div>`;
  scrollToGame();
}
function checkQuiz(a,v){
  if(a===v){addEncounter(v,'zuordnung',true);$("fb").innerHTML="<div class='ok'>Richtig!</div><button onclick='quiz()'>weiter</button>"}
  else{addEncounter(v,'zuordnung',false);$("fb").innerHTML="<div class='no'>Noch nicht.</div>"} scrollToFeedback();
}
function writeVerb(){
  state.currentGame="write";
  let v=chooseVerbForPractice();
  if(!v){renderHome();return}
  state.currentVerb=v;saveState();
  $("game").innerHTML=`<h3>Schreibe das deutsche Verb</h3>${realImage(v,false)}<input id="w"><button onclick="checkWrite('${v}')">prüfen</button><button class="secondary" onclick="showTranslationHelp('${v}')">Hilfe</button><div id="fb"></div>`;
  scrollToGame();
}
function checkWrite(v){
  let a=$("w").value;
  if(clean(a)===clean(v)){addEncounter(v,'schreiben',true);$("fb").innerHTML="<div class='ok'>Richtig!</div><button onclick='writeVerb()'>weiter</button>"}
  else{addEncounter(v,'schreiben',false);$("fb").innerHTML=`<div class='no'>Richtig: ${v}</div>`} scrollToFeedback();
}
function wordSearch(){renderHome();}
function chosenDone(){renderHome();}
init();
</script></body></html>
