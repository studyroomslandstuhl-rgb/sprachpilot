<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprachPilot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="accountStrip" class="account-strip"></div>
<div class="container">
  <section class="hero">
    <a class="brand-logo" href="/index.html">
      <img src="/assets/logo/sprachpilot-logo.png" alt="SprachPilot Logo">
      <h1>SprachPilot</h1>
    </a>
    <p class="subtitle">Deutsch lernen mit klaren Übungen, Bildern, Fragen und Wiederholung.</p>
  </section>

  <section class="card">
    <h2>Willkommen</h2>
    <div id="loggedBox"></div>
    <div id="guestBox" class="actions">
      <a class="btn success" href="register/">Als Schüler registrieren</a>
      <a class="btn secondary" href="login/">Schüler-Login</a>
      <a class="btn secondary" href="teacher/login.html">Lehrer-Login</a>
    </div>
  </section>

  <section class="modules" id="modules"></section>
  <footer>© SprachPilot</footer>
</div>

<script type="module">
import { getActiveProfile, getActiveRole, dashboardHref, logout, safeText, renderAccountStrip } from "./js/auth.js?v=release-refresh-20260701";
import { db, doc, getDoc, collection, query, where, getDocs, limit } from "./js/firebase.js";
window.logout=logout;

function isTeacherAllAccess(){
  if(getActiveRole()!=="teacher") return false;
  try{
    const p=JSON.parse(sessionStorage.getItem("SP_TEACHER_PREVIEW")||"null");
    return !!(p && p.teacherPreview===true && p.allAccess===true);
  }catch(e){return false;}
}
function courseCodes(p){
  const raw=[p?.courseDocId,p?.kurs,p?.kursnummer,p?.courseCode,p?.courseId,p?.courseName,p?.code,localStorage.getItem("SP_COURSE_CODE")]
    .map(v=>String(v||"").trim()).filter(Boolean);
  const out=[];
  raw.forEach(v=>out.push(v,v.toUpperCase(),v.toLowerCase(),v.replace(/\s+/g,""),v.toLowerCase().replace(/\s+/g,"")));
  return [...new Set(out.filter(Boolean))];
}
function hasReleaseData(d){return !!(d && (d.enabledModules || d.enabledLessons || d.enabledThemes || d.enabledWords || d.enabledSets || d.releases || d.releaseMode || d.defaultLocked!==undefined));}
async function loadCourseRelease(p){
  const fallback=p?.assignments || {};
  const codes=courseCodes(p);
  for(const code of codes){
    try{
      const snap=await getDoc(doc(db,"courses",String(code)));
      if(snap.exists()){
        const data={id:snap.id,...(snap.data()||{})};
        if(hasReleaseData(data)) return data;
      }
    }catch(e){}
  }
  const fields=["courseCode","kurs","kursnummer","courseDocId","courseId","id","name","courseName","code"];
  for(const field of fields){
    for(const code of codes){
      try{
        const qs=await getDocs(query(collection(db,"courses"),where(field,"==",String(code)),limit(1)));
        if(!qs.empty){
          const d=qs.docs[0];
          const data={id:d.id,...(d.data()||{})};
          if(hasReleaseData(data)) return data;
        }
      }catch(e){}
    }
  }
  return fallback;
}
function moduleOpen(assignments,key,slug){
  if(!assignments || !hasReleaseData(assignments)) return true;
  const vals=[
    assignments.enabledModules?.[key],
    assignments.enabledModules?.[slug],
    assignments.releases?.[key]?.enabled,
    assignments.releases?.[slug]?.enabled
  ];
  if(vals.some(v=>v===false)) return false;
  if(vals.some(v=>v===true)) return true;
  if(assignments.releaseMode==="all" || assignments.releaseMode==="open" || assignments.defaultLocked===false) return true;
  return false;
}
function renderModules(p){
  const teacherAll=isTeacherAllAccess();
  const c=p?.assignments||{};
  const verben=teacherAll || moduleOpen(c,"Verben A1","verben-A1");
  const fragen=teacherAll || moduleOpen(c,"Fragen A1","fragen-A1");
  const wortschatz=teacherAll || moduleOpen(c,"Wortschatz","wortschatz");
  document.querySelector("#modules").innerHTML=`
    <a class="module" href="${fragen?'fragen-A1/':'#'}" ${fragen?'':'onclick="return false;" style="opacity:.55"'}>
      <div class="module-title">Fragen A1</div><p>${fragen?'Wichtige Fragen und Antworten für Alltag, Kurs und Prüfung.':'Für deinen Kurs noch nicht freigeschaltet.'}</p><span class="badge">${fragen?'Starten':'Gesperrt'}</span>
    </a>
    <a class="module" href="${wortschatz?'wortschatz/':'#'}" ${wortschatz?'':'onclick="return false;" style="opacity:.55"'}>
      <div class="module-title">Wortschatz</div><p>${wortschatz?'Wortschatz nach Lektionen und Themen.':'Für deinen Kurs noch nicht freigeschaltet.'}</p><span class="badge">${wortschatz?'Starten':'Gesperrt'}</span>
    </a>
    <a class="module" href="${verben?'verben-A1/':'#'}" ${verben?'':'onclick="return false;" style="opacity:.55"'}>
      <div class="module-title">Verben A1</div><p>${verben?'Verben mit Bildern, Karteikarten, Sprechen, Schreiben und Wiederholung.':'Für deinen Kurs noch nicht freigeschaltet.'}</p><span class="badge">${verben?'Starten':'Gesperrt'}</span>
    </a>`;
}

const role=getActiveRole();
let p=role==="student" ? getActiveProfile() : null;
const box=document.querySelector("#loggedBox");
const guest=document.querySelector("#guestBox");
if(p){
  box.innerHTML=`<div class="ok"><strong>Eingeloggt:</strong> ${safeText(p.vorname)} ${safeText(p.nachname)} | Kurs: ${safeText(p.kurs)} | Muttersprache: ${safeText(p.muttersprache)}<br><a class="btn secondary" href="profile/">Profil bearbeiten</a> <button class="secondary" onclick="logout()">Abmelden</button></div>`;
  guest.classList.add("hidden");
  renderModules(p);
  loadCourseRelease(p).then(assignments=>{
    p={...p,assignments:assignments||{}};
    if(assignments?.courseDocId || assignments?.id) p.courseDocId=assignments.courseDocId||assignments.id;
    if(assignments?.courseCode || assignments?.kurs || assignments?.kursnummer) p.courseCode=assignments.courseCode||assignments.kurs||assignments.kursnummer;
    try{
      localStorage.setItem("SP_USER_PROFILE",JSON.stringify(p));
      localStorage.setItem("SP_STUDENT_PROFILE",JSON.stringify(p));
      localStorage.setItem("SP_COURSE_RELEASES",JSON.stringify(assignments||{}));
    }catch(e){}
    renderModules(p);
  }).catch(()=>renderModules(p));
}else if(role==="teacher"){
  box.innerHTML=`<div class="ok"><strong>Lehrerzugang:</strong> Du siehst SprachPilot im Testmodus. Es werden keine Schülerpunkte gespeichert.<br><a class="btn secondary" href="${dashboardHref()}">Lehrer-Dashboard</a> <button class="secondary" onclick="logout()">Abmelden</button></div>`;
  guest.classList.add("hidden");
  renderModules({assignments:{enabledModules:{"Fragen A1":true,"Wortschatz":true,"Verben A1":true}}});
}else{
  box.innerHTML='<p>Registriere dich oder logge dich mit deinem Kurscode ein.</p>';
  renderModules({assignments:{}});
}
renderAccountStrip();
</script>
<script src="/shared/sprachpilot-design-system.js"></script>
</body>
</html>
