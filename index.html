<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprachPilot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="accountStrip" class="account-strip"></div>
<div class="container">
  <section class="hero">
    <a class="brand-logo" href="/index.html">
      <img src="/assets/logo/sprachpilot-logo.png" alt="SprachPilot Logo">
      <h1>SprachPilot</h1>
    </a>
    <p class="subtitle">Deutsch lernen mit klaren Übungen, Bildern, Fragen und Wiederholung.</p>
  </section>

  <section class="card">
    <h2>Willkommen</h2>
    <div id="loggedBox"></div>
    <div id="guestBox" class="actions">
      <a class="btn success" href="register/">Als Schüler registrieren</a>
      <a class="btn secondary" href="login/">Schüler-Login</a>
      <a class="btn secondary" href="teacher/login.html">Lehrer-Login</a>
    </div>
  </section>

  <section class="modules" id="modules"></section>
  <footer>© SprachPilot</footer>
</div>

<script type="module">
import { getActiveProfile, getActiveRole, dashboardHref, logout, safeText, renderAccountStrip } from "./js/auth.js?v=release-core-20260701";
import { loadCourseRelease, moduleOpen } from "./js/course-releases.js?v=release-core-20260701";
window.logout=logout;

function isTeacherAllAccess(){
  if(getActiveRole()!=="teacher") return false;
  try{
    const p=JSON.parse(sessionStorage.getItem("SP_TEACHER_PREVIEW")||"null");
    return !!(p && p.teacherPreview===true && p.allAccess===true);
  }catch(e){return false;}
}
function renderModules(p){
  const teacherAll=isTeacherAllAccess();
  const c=p?.assignments||{};
  const verben=teacherAll || moduleOpen(c,"Verben A1");
  const fragen=teacherAll || moduleOpen(c,"Fragen A1");
  const wortschatz=teacherAll || moduleOpen(c,"Wortschatz");
  document.querySelector("#modules").innerHTML=`
    <a class="module" href="${fragen?'fragen-A1/':'#'}" ${fragen?'':'onclick="return false;" style="opacity:.55"'}>
      <div class="module-title">Fragen A1</div><p>${fragen?'Wichtige Fragen und Antworten für Alltag, Kurs und Prüfung.':'Für deinen Kurs noch nicht freigeschaltet.'}</p><span class="badge">${fragen?'Starten':'Gesperrt'}</span>
    </a>
    <a class="module" href="${wortschatz?'wortschatz/':'#'}" ${wortschatz?'':'onclick="return false;" style="opacity:.55"'}>
      <div class="module-title">Wortschatz</div><p>${wortschatz?'Wortschatz nach Lektionen und Themen.':'Für deinen Kurs noch nicht freigeschaltet.'}</p><span class="badge">${wortschatz?'Starten':'Gesperrt'}</span>
    </a>
    <a class="module" href="${verben?'verben-A1/':'#'}" ${verben?'':'onclick="return false;" style="opacity:.55"'}>
      <div class="module-title">Verben A1</div><p>${verben?'Verben mit Bildern, Karteikarten, Sprechen, Schreiben und Wiederholung.':'Für deinen Kurs noch nicht freigeschaltet.'}</p><span class="badge">${verben?'Starten':'Gesperrt'}</span>
    </a>`;
}

const role=getActiveRole();
let p=role==="student" ? getActiveProfile() : null;
const box=document.querySelector("#loggedBox");
const guest=document.querySelector("#guestBox");
if(p){
  box.innerHTML=`<div class="ok"><strong>Eingeloggt:</strong> ${safeText(p.vorname)} ${safeText(p.nachname)} | Kurs: ${safeText(p.kurs)} | Muttersprache: ${safeText(p.muttersprache)}<br><a class="btn secondary" href="profile/">Profil bearbeiten</a> <button class="secondary" onclick="logout()">Abmelden</button></div>`;
  guest.classList.add("hidden");
  renderModules(p);
  loadCourseRelease(p).then(assignments=>{
    p={...p,assignments:assignments||{}};
    renderModules(p);
  }).catch(()=>renderModules(p));
}else if(role==="teacher"){
  box.innerHTML=`<div class="ok"><strong>Lehrerzugang:</strong> Du siehst SprachPilot im Testmodus. Es werden keine Schülerpunkte gespeichert.<br><a class="btn secondary" href="${dashboardHref()}">Lehrer-Dashboard</a> <button class="secondary" onclick="logout()">Abmelden</button></div>`;
  guest.classList.add("hidden");
  renderModules({assignments:{releaseMode:"all",defaultLocked:false}});
}else{
  box.innerHTML='<p>Registriere dich oder logge dich mit deinem Kurscode ein.</p>';
  renderModules({assignments:{}});
}
renderAccountStrip();
</script>
<script src="/shared/sprachpilot-design-system.js"></script>
</body>
</html>
