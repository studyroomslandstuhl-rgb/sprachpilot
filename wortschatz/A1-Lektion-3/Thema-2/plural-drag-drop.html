<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pluralgruppen</title><link rel="stylesheet" href="style.css"></head>
<body>
<div id="accountStrip" class="account-strip"></div>
<div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div>
<section class="card" id="area"><p>Wort antippen, dann Gruppe antippen. Danach kontrollieren.</p><div id="chips"></div><div class="drop-grid" id="zones"></div>
<button id="controlBtn" class="btn" onclick="control()">Kontrollieren</button><div id="fb" class="feedback"></div><a id="nextBtn" class="btn hidden" href="memory.html">Nächste Aufgabe →</a></section>
<footer>© SprachPilot</footer></div><script src="app.js?v=12"></script><script>
header("Pluralgruppen");
let groups=['-n','-en','-er/Umlaut','-e','-s','-'];
let selected=null;
const TASK_FILE='plural-drag-drop.html';
const TASK_TOTAL=WORDS.length;

function markTaskDone(file,total){
  const done=[...Array(total).keys()];
  const st={total,queue:[],done,current:null,tries:0};
  try{localStorage.setItem(spTaskStateKey(file),JSON.stringify(st));}catch(e){}
}

zones.innerHTML=groups.map(g=>`<div class="dropzone" data-g="${g}"><h2>${g}</h2></div>`).join('');
chips.innerHTML=WORDS.map(w=>`<span class="chip" data-id="${w.id}">${full(w)}</span>`).join('');

function clearCorrectionsForChip(c){
  c.classList.remove('selected','no');
  let n=c.nextElementSibling;
  if(n && n.classList.contains('correction')) n.remove();
}

function makeSelectable(){
 document.querySelectorAll('.chip').forEach(c=>{
   c.onclick=(ev)=>{
     ev.stopPropagation();
     if(c.classList.contains('ok')) return;

     document.querySelectorAll('.chip').forEach(x=>x.classList.remove('selected'));
     selected=c;
     c.classList.add('selected');
   };
 });
}

function setupZones(){
 document.querySelectorAll('.dropzone').forEach(z=>{
   z.onclick=(ev)=>{
     if(!selected) return;
     clearCorrectionsForChip(selected);
     z.appendChild(selected);
     selected=null;
     makeSelectable();
   };
 });
}

function control(){
 document.querySelectorAll('.correction').forEach(x=>x.remove());
 let ok=0;

 document.querySelectorAll('.dropzone .chip').forEach(c=>{
   let w=WORDS.find(x=>x.id===c.dataset.id);
   let z=c.closest('.dropzone');

   c.classList.remove('ok','no','selected');

   if(z.dataset.g===w.pluralGroup){
     c.classList.add('ok');
     ok++;
   }else{
     c.classList.add('no');
     let note=document.createElement('span');
     note.className='correction';
     note.textContent='richtig: '+w.pluralGroup;
     c.after(note);
   }
 });

 selected=null;
 makeSelectable();
 setupZones();

 if(ok===WORDS.length){
   markTaskDone(TASK_FILE,TASK_TOTAL);
   complete(area,TASK_FILE,'memory.html');
 }else{
   fb.textContent='Korrigiere die roten Wörter. Tippe ein rotes Wort an und tippe dann die richtige Tabelle an.';
 }
}

makeSelectable();
setupZones();
</script>
<script type="module" src="/js/guard.js"></script></body></html>
