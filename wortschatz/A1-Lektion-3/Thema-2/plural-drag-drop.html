<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pluralgruppen</title><link rel="stylesheet" href="style.css"></head>
<body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div>
<section class="card"><p>Wort antippen, dann Gruppe antippen. Danach kontrollieren.</p><div id="chips"></div><div class="drop-grid" id="zones"></div>
<button class="btn" onclick="control()">Kontrollieren</button><div id="fb" class="feedback"></div><a id="nextBtn" class="btn hidden" href="memory.html">Nächste Aufgabe →</a></section>
<footer>© SprachPilot</footer></div><script src="app.js?v=8"></script><script>
header("Pluralgruppen");
let groups=['-n','-en','-er/Umlaut','-e','-s','-'];let selected=null;
zones.innerHTML=groups.map(g=>`<div class="dropzone" data-g="${g}"><h2>${g}</h2></div>`).join('');
chips.innerHTML=WORDS.map(w=>`<span class="chip" data-id="${w.id}">${full(w)}</span>`).join('');
function makeSelectable(){
 document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
   if(c.classList.contains('ok')) return;
   document.querySelectorAll('.chip').forEach(x=>x.classList.remove('selected'));
   selected=c;c.classList.add('selected');
 });
}
makeSelectable();
document.querySelectorAll('.dropzone').forEach(z=>z.onclick=()=>{
 if(selected){
   selected.classList.remove('selected','no');
   let n=selected.nextElementSibling; if(n&&n.classList.contains('correction')) n.remove();
   z.appendChild(selected); selected=null; makeSelectable();
 }
});
function control(){
 document.querySelectorAll('.correction').forEach(x=>x.remove());
 let ok=0;
 document.querySelectorAll('.dropzone .chip').forEach(c=>{
   let w=WORDS.find(x=>x.id===c.dataset.id);
   let z=c.closest('.dropzone');
   c.classList.remove('ok','no');
   if(z.dataset.g===w.pluralGroup){c.classList.add('ok');ok++}
   else{c.classList.add('no');let note=document.createElement('span');note.className='correction';note.textContent='richtig: '+w.pluralGroup;c.after(note)}
 });
 if(ok===WORDS.length){done('plural-drag-drop.html');nextBtn.classList.remove('hidden');fb.textContent='Gut gemacht!'}
 else fb.textContent='Korrigiere die roten Wörter. Rote Wörter bleiben verschiebbar.';
}
</script>
<script>
(function(){
  function unlockWrongDragItems(){
    document.querySelectorAll('.wrong,.incorrect,.fehler,.error,.bad').forEach(el=>{
      el.setAttribute('draggable','true');
      el.draggable = true;
      el.style.pointerEvents = 'auto';
      el.style.opacity = '1';
      el.classList.remove('locked','disabled','done');
    });
    document.querySelectorAll('[draggable="false"]').forEach(el=>{
      const c = el.className || "";
      if(/wrong|incorrect|fehler|error|bad/.test(c)){
        el.setAttribute('draggable','true');
        el.draggable = true;
        el.style.pointerEvents = 'auto';
      }
    });
  }

  document.addEventListener('click',()=>setTimeout(unlockWrongDragItems,80),true);
  document.addEventListener('touchend',()=>setTimeout(unlockWrongDragItems,80),true);

  document.addEventListener('dragstart',e=>{
    const target = e.target.closest('[draggable], .word, .chip, .item, .card, .drag');
    if(!target) return;
    const text = target.dataset.id || target.dataset.word || target.textContent.trim();
    try{
      e.dataTransfer.setData('text/plain', text);
      window.__spDragEl = target;
    }catch(err){}
  },true);

  document.addEventListener('drop',e=>{
    const zone = e.target.closest('.dropzone,.drop-zone,.group,.box,.table,.column,.target,[data-group],[data-article],[data-plural]');
    if(zone && window.__spDragEl){
      e.preventDefault();
      zone.appendChild(window.__spDragEl);
      unlockWrongDragItems();
    }
  },true);

  document.addEventListener('dragover',e=>{
    const zone = e.target.closest('.dropzone,.drop-zone,.group,.box,.table,.column,.target,[data-group],[data-article],[data-plural]');
    if(zone) e.preventDefault();
  },true);

  setInterval(unlockWrongDragItems,500);
})();
</script>

</body></html>
