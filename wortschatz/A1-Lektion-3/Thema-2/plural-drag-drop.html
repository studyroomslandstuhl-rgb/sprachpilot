<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pluralgruppen</title><link rel="stylesheet" href="style.css">
<style>
.help-box{background:#f0f4ff;border-left:5px solid #667eea;padding:12px;border-radius:10px;margin:10px 0}
.answer-box{background:#d9f7e8;border-left:5px solid #27ae60;padding:12px;border-radius:10px;margin:10px 0;font-weight:700}
.no{background:#ffe1e1;border-left:5px solid #e74c3c;padding:12px;border-radius:10px;margin:10px 0}
.ok{background:#d9f7e8;border-left:5px solid #27ae60;padding:12px;border-radius:10px;margin:10px 0}
</style>

</head>
<body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div>
<section class="card"><p>Wort antippen, dann Gruppe antippen. Falsch zugeordnete rote Wörter bleiben verschiebbar.</p><div id="chips"></div><div class="drop-grid" id="zones"></div>
<button class="btn" onclick="control()">Kontrollieren</button><div id="fb" class="feedback"></div><a id="nextBtn" class="btn hidden" href="memory.html">Nächste Aufgabe →</a></section>
<footer>© SprachPilot</footer></div><script src="app.js?v=41"></script><script>
header("Pluralgruppen");
let groups=['-n','-en','-er/Umlaut','-e','-s','-'];let selected=null;
zones.innerHTML=groups.map(g=>`<div class="dropzone" data-g="${g}"><h2>${g}</h2></div>`).join('');
chips.innerHTML=shuffle(WORDS).map(w=>`<span class="chip" data-id="${w.id}">${full(w)}</span>`).join('');
function clearNotes(){document.querySelectorAll('.correction').forEach(x=>x.remove())}
function selectChip(c){if(c.classList.contains('ok'))return;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('selected'));selected=c;c.classList.add('selected')}
document.addEventListener('click',e=>{let chip=e.target.closest('.chip');if(chip){selectChip(chip);return}let z=e.target.closest('.dropzone');if(z&&selected){clearNotes();selected.classList.remove('selected','no');z.appendChild(selected);selected=null;fb.textContent=''}});
function control(){clearNotes();let ok=0;document.querySelectorAll('.dropzone .chip').forEach(c=>{let w=WORDS.find(x=>x.id===c.dataset.id);let z=c.closest('.dropzone');c.classList.remove('ok','no','selected');if(z.dataset.g===w.pluralGroup){c.classList.add('ok');ok++}else{c.classList.add('no');let note=document.createElement('span');note.className='correction';note.textContent='richtig: '+w.pluralGroup;c.after(note)}});if(ok===WORDS.length){done('plural-drag-drop.html');nextBtn.classList.remove('hidden');fb.textContent='Gut gemacht!'}else fb.textContent='Korrigiere die roten Wörter. Tippe ein rotes Wort an und dann die richtige Gruppe.'}
</script>
<script>
/* SprachPilot globaler 3-Stufen-Fehlerhelfer */
window.SP_Attempts = window.SP_Attempts || {};
function spNormalizeText(x){
  return String(x || "")
    .trim()
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[.,!?;:€]/g,"")
    .replace(/\s+/g," ");
}
function spErrorType(user, solution){
  const u = String(user || "");
  const s = String(solution || "");
  if(u && u.toLowerCase() === s.toLowerCase() && u !== s){
    return "Groß-/Kleinschreibung";
  }
  if(spNormalizeText(u) === spNormalizeText(s) && u !== s){
    return "Zeichen / Satzzeichen";
  }
  if(Math.abs(u.length - s.length) <= 2){
    return "Rechtschreibung";
  }
  return "Grammatik oder Wortwahl";
}
function spFeedback(id, user, solution){
  window.SP_Attempts[id] = (window.SP_Attempts[id] || 0) + 1;
  const n = window.SP_Attempts[id];
  const type = spErrorType(user, solution);
  if(n === 1){
    return `<div class="no">Noch nicht ganz richtig. Fehlerbereich: <strong>${type}</strong>.</div>`;
  }
  if(n === 2){
    return `<div class="help-box"><strong>Tipp:</strong> Prüfe genau Artikel, Endung, Großschreibung und fehlende Buchstaben.</div>`;
  }
  return `<div class="answer-box"><strong>Lösung:</strong><br>${solution}</div>`;
}
function spResetFeedback(id){ window.SP_Attempts[id] = 0; }
</script>


<script>
/* SprachPilot Fix: falsche Drag-&-Drop-Karten bleiben verschiebbar */
function spMakeWrongItemsDraggableAgain(){
  document.querySelectorAll('.wrong,.no,.incorrect,.fehler,.error').forEach(el=>{
    el.setAttribute('draggable','true');
    el.draggable = true;
    el.style.pointerEvents = 'auto';
    el.style.opacity = '1';
    el.classList.remove('locked','disabled');
  });
  document.querySelectorAll('[draggable="false"]').forEach(el=>{
    if(el.classList.contains('wrong') || el.classList.contains('incorrect') || el.classList.contains('fehler') || el.classList.contains('error')){
      el.setAttribute('draggable','true');
      el.draggable = true;
    }
  });
}
document.addEventListener('click',()=>setTimeout(spMakeWrongItemsDraggableAgain,80),true);
document.addEventListener('dragstart',e=>{
  if(e.target){
    e.dataTransfer.setData('text/plain', e.target.dataset.word || e.target.textContent.trim());
  }
},true);
</script>

</body></html>
