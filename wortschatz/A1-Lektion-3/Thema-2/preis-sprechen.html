<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Preis sprechen</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff7ed;color:#222;padding:14px}.app{max-width:900px;margin:auto}.top{position:sticky;top:0;background:#fff7ed;padding:10px 0;z-index:10}.card{background:white;border:2px solid #fed7aa;border-radius:20px;padding:18px;margin:12px 0;box-shadow:0 8px 22px rgba(194,65,12,.12)}h1,h2{color:#ea580c;margin:0 0 10px}.progress{height:12px;background:#ffedd5;border-radius:999px;overflow:hidden}.progress>div{height:100%;background:#fb923c;width:0%}.price{font-size:42px;font-weight:900;text-align:center;background:#fff7ed;border:3px solid #fed7aa;border-radius:18px;padding:20px;margin:12px 0}input{width:100%;padding:14px;border:2px solid #fed7aa;border-radius:14px;font-size:18px}button{border:0;border-radius:14px;padding:12px 16px;font-weight:800;background:#f97316;color:white;margin:6px 4px;cursor:pointer}.secondary{background:#ffedd5;color:#7c2d12}.option{display:block;width:100%;margin:8px 0;background:#fff7ed;color:#222;border:2px solid #fed7aa}.ok{background:#dcfce7;border-left:5px solid #16a34a;padding:12px;border-radius:10px;margin:10px 0}.no{background:#fee2e2;border-left:5px solid #dc2626;padding:12px;border-radius:10px;margin:10px 0}.help-box{background:#ffedd5;border-left:5px solid #f97316;padding:12px;border-radius:10px;margin:10px 0}.answer-box{background:#dcfce7;border-left:5px solid #16a34a;padding:12px;border-radius:10px;margin:10px 0;font-weight:700}.small{color:#666}
</style></head><body><div class="app"><div class="top"><button class="secondary" onclick="history.back()">← Zurück</button><h1>Preis sprechen</h1><div class="progress"><div id="bar"></div></div><p id="count" class="small"></p></div><div class="card"><p class="small">Sieh den Preis und lies ihn mit Mikrofon. Mikrofon kann an- und ausgeschaltet werden.</p><div id="box"></div><button class="secondary" onclick="next()">Weiter</button></div></div><script>
const PRICES=["0,15 €", "0,69 €", "1,09 €", "1,59 €", "2,09 €", "2,69 €", "3,19 €", "3,99 €", "6,49 €", "7,25 €", "8,99 €", "11,50 €", "16,80 €", "21,99 €", "29,90 €", "36,40 €", "49,99 €", "69,00 €", "84,95 €", "100,00 €"];let i=0,tries=0;
function speak(t){try{let u=new SpeechSynthesisUtterance(t.replace("€","Euro"));u.lang="de-DE";u.rate=.8;speechSynthesis.speak(u)}catch(e){}}
function norm(x){return String(x||"").toLowerCase().replace(/euro/g,"€").replace(/eur/g,"€").replace(/\s+/g," ").trim()}
function makeOptions(correct){let all=[...PRICES].filter(x=>x!==correct); all.sort(()=>Math.random()-.5); return [correct,...all.slice(0,3)].sort(()=>Math.random()-.5);}

let micOn=false, rec=null;
function render(){
 const p=PRICES[i]; tries=0; micOn=false;
 document.getElementById("bar").style.width=((i+1)*100/PRICES.length)+"%";document.getElementById("count").textContent=(i+1)+" / "+PRICES.length;
 document.getElementById("box").innerHTML=`<div class="price">${p}</div><button id="micBtn" onclick="toggleMic()">🎤 Mikrofon an</button><button class="secondary" onclick="checkManual()">Ich habe gelesen</button><div id="heard" class="small"></div><div id="fb"></div>`;
}
function toggleMic(){
 if(micOn){ if(rec){try{rec.stop()}catch(e){}} micOn=false; document.getElementById("micBtn").textContent="🎤 Mikrofon an"; return; }
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR){document.getElementById("fb").innerHTML="<div class='no'>Mikrofon wird hier nicht unterstützt.</div>";return}
 rec=new SR(); rec.lang="de-DE"; rec.interimResults=false; rec.continuous=false;
 rec.onresult=e=>{const txt=e.results[0][0].transcript; document.getElementById("heard").textContent="Gehört: "+txt; checkSpoken(txt);};
 rec.onend=()=>{micOn=false; const b=document.getElementById("micBtn"); if(b)b.textContent="🎤 Mikrofon an";};
 micOn=true; document.getElementById("micBtn").textContent="⏹ Mikrofon aus"; rec.start();
}
function checkManual(){document.getElementById("fb").innerHTML="<div class='ok'>Weiter geht's.</div>";}
function checkSpoken(txt){const p=PRICES[i]; if(norm(txt).includes(norm(p).replace("€","").trim()) || txt.toLowerCase().includes("euro")){document.getElementById("fb").innerHTML="<div class='ok'>Aufgenommen.</div>";return} tries++; if(tries===1)document.getElementById("fb").innerHTML="<div class='no'>Ich habe den Preis nicht klar erkannt. Versuch es noch einmal.</div>"; else if(tries===2)document.getElementById("fb").innerHTML="<div class='help-box'><strong>Tipp:</strong> Lies Euro und Cent langsam.</div>"; else document.getElementById("fb").innerHTML=`<div class='answer-box'><strong>Preis:</strong><br>${p}</div>`;}

function next(){i=(i+1)%PRICES.length;render()}
render();
</script></body></html>
