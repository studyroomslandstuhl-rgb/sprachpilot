<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preis sprechen</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=30"></script><script>header("Preis sprechen");let TASKS=PRICE_SPEAK_TASKS,i=0,tries=0;function show(){if(i>=TASKS.length){complete(area,'preis-sprechen.html','frage-und-antwort.html');return}let t=TASKS[i];tries=0;area.innerHTML=`<div class="small">${i} richtig · ${TASKS.length-i} übrig</div><div class="progress"><div class="bar" style="width:${Math.round(i/TASKS.length*100)}%"></div></div><div class="question">Sieh den Preis und lies ihn mit dem Mikrofon.</div><div class="big">${t.price}</div><div class="actions"><button id="micBtn" class="btn mic-btn" onclick="say()"><span class="mic-icon">🎤</span>Sprechen</button><button class="btn secondary" onclick="showWrite()">Ich kann nicht sprechen</button></div><div id="micStatus" class="mic-status"></div><div id="write" class="hidden"><input id="ans" placeholder="Das kostet ..."><button class="btn" onclick="checkText()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}function showWrite(){write.classList.remove('hidden')}function ok(){fb.textContent='Richtig!';i++;setTimeout(show,700)}function checkText(){let a=simple(ans.value),p=simple(TASKS[i].spoken);if(a===p||a.includes(simple(TASKS[i].price.replace('€','Euro')))){ok()}else{tries++;fb.innerHTML=feedbackStep(tries,'Noch nicht ganz.','Beginne mit: Das kostet ...',TASKS[i].spoken)}}function say(){startMic(micBtn,(txt)=>{showWrite();ans.value=txt;let a=simple(txt),p=simple(TASKS[i].spoken);if(a===p||a.includes(simple(TASKS[i].price.replace('€','Euro')))){ok()}else{tries++;fb.innerHTML='Ich habe gehört: '+txt+'<br>'+feedbackStep(tries,'Noch nicht ganz.','Beginne mit: Das kostet ...',TASKS[i].spoken)}})}show();</script></body></html>
