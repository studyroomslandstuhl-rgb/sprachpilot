<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preis sprechen</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=41"></script><script>header("Preis sprechen");let TASKS=PRICE_SPEAK_TASKS,i=0;function show(){if(i>=TASKS.length){complete(area,'preis-sprechen.html','frage-und-antwort.html');return}let t=TASKS[i];area.innerHTML=`${taskProgressHtml(i,TASKS.length)}<div class="question">Sprich einen ganzen Satz. Beginne mit: „Das kostet ...“</div><div class="big">${t.price}</div><div class="actions"><button id="micBtn" class="btn mic-btn" onclick="say()"><span class="mic-icon">🎤</span>Sprechen</button><button class="btn secondary" onclick="showWrite()">Ich kann nicht sprechen</button></div><div id="micStatus" class="mic-status"></div><div id="write" class="hidden"><input id="ans" placeholder="Das kostet ..."><button class="btn" onclick="checkText()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}function showWrite(){write.classList.remove('hidden')}function ok(){fb.textContent='Richtig!';i++;setTimeout(show,700)}function checkText(){if(acceptablePriceSentence(ans.value,TASKS[i].price)){ok()}else fb.innerHTML='Beginne mit: Das kostet ...<br>Muster: '+TASKS[i].spoken}function say(){startMic(micBtn,(txt)=>{let a=txt||'';if(acceptablePriceSentence(a,TASKS[i].price)){ok()}else fb.innerHTML='Ich habe gehört: '+a+'<div class="hint">Beginne mit: Das kostet ...<br>Muster: '+TASKS[i].spoken+'</div>'})}show();</script></body></html>
