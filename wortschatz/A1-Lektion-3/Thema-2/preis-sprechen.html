<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preis sprechen</title><link rel="stylesheet" href="style.css"></head><body>
<div id="accountStrip" class="account-strip"></div>
<script type="module" src="/js/guard.js"></script><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=12"></script><script>

header("Preis sprechen");
const FILE='preis-sprechen.html'; let i=0;
function show(){
  if(spLoadTaskState(FILE,PRICE_TASKS.length).done.length>=PRICE_TASKS.length){complete(area,FILE,'frage-und-antwort.html');return}
  i=spNextIndex(FILE,PRICE_TASKS.length);
  if(i===undefined || i===null){localStorage.removeItem(spTaskStateKey(FILE)); i=spNextIndex(FILE,PRICE_TASKS.length)}
  let t=PRICE_TASKS[i];
  area.innerHTML=`${spProgressHtml(FILE,PRICE_TASKS.length)}<div class="question">Lies den Preis laut.</div><div class="big">${t.price}</div><button id="micBtn" class="btn mic-btn" onclick="say()">🎤 Mikrofon an</button><button class="btn secondary" onclick="manualOk()">Ich habe gelesen</button><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`;
}
function say(){startMic(micBtn,(txt)=>{fb.textContent='Aufgenommen.';spMarkRight(FILE,PRICE_TASKS.length);setTimeout(show,700)})}
function manualOk(){spMarkRight(FILE,PRICE_TASKS.length);show()}
show();

</script></body></html>
