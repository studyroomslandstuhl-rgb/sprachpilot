<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verpackung + Produkt</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff7ed;color:#222;padding:14px}
.app{max-width:980px;margin:auto}
.top{position:sticky;top:0;background:#fff7ed;padding:10px 0;z-index:10}
.card{background:white;border:2px solid #fed7aa;border-radius:20px;padding:18px;margin:12px 0;box-shadow:0 8px 22px rgba(194,65,12,.12)}
h1,h2{color:#ea580c;margin:0 0 10px}
.progress{height:12px;background:#ffedd5;border-radius:999px;overflow:hidden}
.progress>div{height:100%;background:#fb923c;width:0%}
.task-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:center}
.pic{min-height:150px;border:3px solid #fed7aa;border-radius:18px;background:#fff7ed;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:900;color:#ea580c;text-align:center;padding:12px}
input{width:100%;padding:14px;border:2px solid #fed7aa;border-radius:14px;font-size:18px}
button{border:0;border-radius:14px;padding:12px 16px;font-weight:800;background:#f97316;color:white;margin:6px 4px;cursor:pointer}
.secondary{background:#ffedd5;color:#7c2d12}
.ok{background:#dcfce7;border-left:5px solid #16a34a;padding:12px;border-radius:10px;margin:10px 0}
.no{background:#fee2e2;border-left:5px solid #dc2626;padding:12px;border-radius:10px;margin:10px 0}
.help-box{background:#ffedd5;border-left:5px solid #f97316;padding:12px;border-radius:10px;margin:10px 0}
.answer-box{background:#dcfce7;border-left:5px solid #16a34a;padding:12px;border-radius:10px;margin:10px 0;font-weight:700}
.small{color:#666}
@media(max-width:650px){.task-grid{grid-template-columns:1fr}.pic{min-height:110px}}
</style>
</head>
<body>
<div class="app">
<div class="top">
  <button class="secondary" onclick="history.back()">← Zurück</button>
  <h1>Verpackung + Produkt</h1>
  <div class="progress"><div id="bar"></div></div>
  <p id="count" class="small"></p>
</div>
<div class="card">
  <p class="small">Sieh die Menge/Verpackung und das Produkt. Schreibe die passende Wortgruppe.</p>
  <div id="task"></div>
</div>
</div>
<script>
const TASKS=[
 {qty:"1 Flasche", qtyIcon:"🍾", prod:"Wasser", prodIcon:"💧", answer:"eine Flasche Wasser"},
 {qty:"3 Flaschen", qtyIcon:"🍾🍾🍾", prod:"Wasser", prodIcon:"💧", answer:"drei Flaschen Wasser"},
 {qty:"1 Dose", qtyIcon:"🥫", prod:"Tomaten", prodIcon:"🍅", answer:"eine Dose Tomaten"},
 {qty:"4 Dosen", qtyIcon:"🥫🥫🥫🥫", prod:"Cola", prodIcon:"🥤", answer:"vier Dosen Cola"},
 {qty:"500 g", qtyIcon:"500 g", prod:"Käse", prodIcon:"🧀", answer:"500 g Käse"},
 {qty:"250 g", qtyIcon:"250 g", prod:"Butter", prodIcon:"🧈", answer:"250 g Butter"},
 {qty:"1 kg", qtyIcon:"1 kg", prod:"Kartoffeln", prodIcon:"🥔", answer:"1 kg Kartoffeln"},
 {qty:"2 kg", qtyIcon:"2 kg", prod:"Orangen", prodIcon:"🍊", answer:"2 kg Orangen"},
 {qty:"1 Pfund", qtyIcon:"1 Pfund", prod:"Äpfel", prodIcon:"🍎", answer:"1 Pfund Äpfel"},
 {qty:"200 g", qtyIcon:"200 g", prod:"Schinken", prodIcon:"🥓", answer:"200 g Schinken"}
];
let i=0, tries=0;
function norm(x){return String(x||"").toLowerCase().replace(/[.,]/g,"").replace(/ein kilo/g,"1 kg").replace(/eine flasche/g,"1 flasche").replace(/\s+/g," ").trim()}
function render(){
  const t=TASKS[i]; tries=0;
  document.getElementById("bar").style.width=((i+1)*100/TASKS.length)+"%";
  document.getElementById("count").textContent=(i+1)+" / "+TASKS.length;
  document.getElementById("task").innerHTML=`
    <div class="task-grid">
      <div class="pic" aria-label="Menge">${t.qtyIcon}</div>
      <div class="pic" aria-label="Produkt">${t.prodIcon}</div>
    </div>
    <input id="ans" placeholder="Antwort schreiben">
    <button onclick="check()">Kontrollieren</button>
    <button class="secondary" onclick="next()">Weiter</button>
    <div id="fb"></div>
  `;
}
function check(){
  const t=TASKS[i], v=document.getElementById("ans").value;
  if(norm(v)===norm(t.answer)){document.getElementById("fb").innerHTML="<div class='ok'>Richtig!</div>";return}
  tries++;
  if(tries===1) document.getElementById("fb").innerHTML="<div class='no'>Noch nicht ganz. Prüfe Menge, Großschreibung und Produkt.</div>";
  else if(tries===2) document.getElementById("fb").innerHTML="<div class='help-box'><strong>Tipp:</strong> Achte darauf, ob die Verpackung im Singular oder Plural ist.</div>";
  else document.getElementById("fb").innerHTML="<div class='answer-box'><strong>Lösung:</strong><br>"+t.answer+"</div>";
}
function next(){i=(i+1)%TASKS.length;render()}
render();
</script>
</body>
</html>
