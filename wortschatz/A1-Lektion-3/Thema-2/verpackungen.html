<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verpackung + Produkt</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=30"></script><script>
header("Verpackung + Produkt");
let i=0, tries=0;
function show(){
 if(i>=COMBOS.length){complete(area,'verpackungen.html','preis-hoeren.html');return}
 let c=COMBOS[i]; tries=0;
 area.innerHTML=`<div class="small">${i} fertig · ${COMBOS.length-i} übrig</div><div class="progress"><div class="bar" style="width:${Math.round(i/COMBOS.length*100)}%"></div></div><div class="question">Schreibe die Kombination.</div>${comboImages(c)}<input id="ans" placeholder="Antwort schreiben"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`;
}
function check(){
 let c=COMBOS[i];
 if(simple(ans.value)===simple(c.text)){fb.textContent='Richtig!';i++;setTimeout(show,700);return}
 tries++;
 fb.innerHTML=feedbackStep(tries,'Noch nicht ganz.','Achte auf Singular/Plural und die richtige Menge.',''+c.text);
}
show();
</script></body></html>
