<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verpackung + Produkt</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=1"></script><script>header("Verpackung + Produkt");let i=0;function show(){if(i>=COMBOS.length){complete(area,'verpackungen.html','preis-hoeren.html');return}let c=COMBOS[i],cw=WORDS.find(w=>w.id===c.container),p=PRODUCTS.find(x=>x.id===c.product);area.innerHTML=`<div class="question">Schreibe die Kombination.</div><div class="imgrow"><img src="${cw.image}" onerror="fixImg(this)"><img src="${p.image}" onerror="fixImg(this)"></div><input id="ans"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}function check(){if(simple(ans.value)===simple(COMBOS[i].text)){fb.textContent='Richtig!';i++;setTimeout(show,700)}else fb.innerHTML='Falsch.<div class="hint">Lösung: '+COMBOS[i].text+'</div>'}show();</script></body></html>
