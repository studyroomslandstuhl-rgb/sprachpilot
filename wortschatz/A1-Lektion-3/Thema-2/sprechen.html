<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sprechen</title><link rel="stylesheet" href="style.css"></head><body>
<div id="accountStrip" class="account-strip"></div>
<div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=8"></script><script>header("Sprechen");let Q=queue('sprechen.html',WORDS);function render(){Q.cur=next(Q);if(!Q.cur){complete(area,'sprechen.html','schreiben.html');return}Q.tries=0;Q.had=false;area.innerHTML=prog(Q)+`<div class="question">Sprich Artikel + Nomen.</div><img class="food-img" src="${Q.cur.image}" onerror="fixImg(this)"><div class="actions"><button id="micBtn" class="btn mic-btn" onclick="say()"><span class="mic-icon">🎤</span>Sprechen</button><button class="btn secondary" onclick="writeIt()">Ich kann nicht sprechen</button></div><div id="micStatus" class="mic-status"></div><div id="write" class="hidden"><input id="ans"><button class="btn" onclick="checkText()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}function writeIt(){write.classList.remove('hidden')}function ok(){right(Q,Q.cur);fb.textContent='Richtig!';setTimeout(render,700)}function say(){startMic(micBtn,(txt)=>{let d=diagnose(txt,Q.cur);d.ok?ok():(wrong(Q),fb.innerHTML=fail(Q,d))})}function checkText(){let d=diagnose(ans.value,Q.cur);d.ok?ok():(wrong(Q),fb.innerHTML=fail(Q,d))}render();</script><script type="module" src="/js/guard.js"></script></body></html>
