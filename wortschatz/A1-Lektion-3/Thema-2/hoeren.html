<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hören</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=5"></script><script>header("Hören");let Q=queue('hoeren.html',WORDS),clicks=0;function render(){Q.cur=next(Q);if(!Q.cur){complete(area,'hoeren.html','sprechen.html');return}clicks=0;Q.tries=0;Q.had=false;area.innerHTML=prog(Q)+`<div class="question">Höre und schreibe.</div><div class="actions"><button class="btn" onclick="hear()">Hören</button><button id="slow" class="btn secondary hidden" onclick="speak(full(Q.cur),true)">Langsam</button></div><input id="ans"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}function hear(){clicks++;speak(full(Q.cur));if(clicks>=2)slow.classList.remove('hidden')}function check(){let d=diagnose(ans.value,Q.cur);if(d.ok){right(Q,Q.cur);fb.textContent='Richtig!';setTimeout(render,700)}else{wrong(Q);if(Q.tries>=2)slow.classList.remove('hidden');fb.innerHTML=fail(Q,d)}}render();</script></body></html>
