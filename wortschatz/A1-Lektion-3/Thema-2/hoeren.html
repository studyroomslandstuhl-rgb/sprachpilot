<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hören</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="accountStrip" class="account-strip"></div>

<div class="container">
  <section class="hero"></section>
  <div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div>
  <section class="card" id="area">
    <div class="question">Aufgabe wird geladen …</div>
  </section>
  <footer>© SprachPilot</footer>
</div>

<script src="app.js?v=20"></script>
<script>
header("Hören");

const FILE = "hoeren.html";
let i = null;
let heardClicks = 0;

function show(){
  if(spLoadTaskState(FILE, WORDS.length).done.length >= WORDS.length){
    complete(area, FILE, "sprechen.html");
    return;
  }

  i = spNextIndex(FILE, WORDS.length);
  if(i === undefined || i === null){
    spResetTask(FILE);
    i = spNextIndex(FILE, WORDS.length);
  }

  heardClicks = 0;
  const w = WORDS[i];

  area.innerHTML = `${spProgressHtml(FILE, WORDS.length)}
    <div class="question">Höre und schreibe das Wort mit Artikel.</div>
    <div class="actions">
      <button class="btn" onclick="hear()">🔊 Hören</button>
      <button id="slowBtn" class="btn secondary hidden" onclick="speak(full(WORDS[i]), true)">Langsam hören</button>
    </div>
    <input id="ans" placeholder="z. B. die Flasche">
    <button class="btn" onclick="check()">Kontrollieren</button>
    <div id="fb" class="feedback"></div>`;
}

function hear(){
  heardClicks++;
  speak(full(WORDS[i]), false);
  if(heardClicks >= 2){
    slowBtn.classList.remove("hidden");
  }
}

function check(){
  const w = WORDS[i];

  if(simple(ans.value) === simple(full(w))){
    fb.textContent = "Richtig!";
    spMarkRight(FILE, WORDS.length);
    setTimeout(show, 700);
  }else{
    const tries = spMarkWrong(FILE, WORDS.length);
    fb.innerHTML = feedbackForHearing(tries, full(w), "Artikel und Wort");
    // Wichtig: NICHT automatisch weitergehen.
  }
}

function feedbackForHearing(tries, solution, type){
  if(tries === 1) return "Da ist noch ein Fehler.";
  if(tries === 2) return "Tipp: Höre noch einmal langsam und prüfe den Artikel.";
  return "Lösung: " + solution;
}

show();
</script>
<script type="module" src="/js/guard.js"></script>
</body>
</html>
