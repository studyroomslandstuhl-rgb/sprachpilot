<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prüfung</title><link rel="stylesheet" href="style.css"></head><body>
<div id="accountStrip" class="account-strip"></div>
<script type="module" src="/js/guard.js"></script><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=31"></script><script>header("Prüfung");let Q=queueFor('pruefung.html',singularWords());function render(){Q.cur=nextItem(Q);if(!Q.cur){complete(area,'pruefung.html','index.html');return}Q.tries=0;Q.had=false;let v=`<img class="food-img" src="${Q.cur.image}" onerror="fixImg(this)">`;area.innerHTML=prog(Q)+`<div class="question">Prüfung: Schreibe Artikel + Nomen.</div>${v}<input id="ans" placeholder="Artikel + Nomen"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}function check(){let d=diagnose(ans.value,Q.cur);if(d.ok){right(Q,Q.cur);fb.textContent='Richtig!';setTimeout(render,700)}else{wrong(Q);fb.innerHTML=fail(Q,d)}}render();</script></body></html>
