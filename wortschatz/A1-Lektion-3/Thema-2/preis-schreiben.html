<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preis schreiben</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=2"></script><script>header("Preis schreiben");let i=0;function show(){if(i>=PRICE_TASKS.length){complete(area,'preis-schreiben.html','preis-sprechen.html');return}let t=PRICE_TASKS[i];area.innerHTML=`<div class="small">${i} richtig · ${PRICE_TASKS.length-i} übrig</div><div class="progress"><div class="bar" style="width:${Math.round(i/PRICE_TASKS.length*100)}%"></div></div><div class="question">Höre den Satz und schreibe den Preis.</div><button class="btn" onclick="speak('${t.spoken}')">Hören</button><input id="ans" placeholder="z. B. 4,20 €"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}function check(){if(cleanPrice(ans.value)===cleanPrice(PRICE_TASKS[i].price)){fb.textContent='Richtig!';i++;setTimeout(show,700)}else fb.innerHTML='Falsch.<div class="hint">Lösung: '+PRICE_TASKS[i].price+'</div>'}show();</script></body></html>
