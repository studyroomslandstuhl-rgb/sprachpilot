<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Preis schreiben</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff7ed;color:#222;padding:14px}.app{max-width:900px;margin:auto}.top{position:sticky;top:0;background:#fff7ed;padding:10px 0;z-index:10}.card{background:white;border:2px solid #fed7aa;border-radius:20px;padding:18px;margin:12px 0;box-shadow:0 8px 22px rgba(194,65,12,.12)}h1,h2{color:#ea580c;margin:0 0 10px}.progress{height:12px;background:#ffedd5;border-radius:999px;overflow:hidden}.progress>div{height:100%;background:#fb923c;width:0%}.price{font-size:42px;font-weight:900;text-align:center;background:#fff7ed;border:3px solid #fed7aa;border-radius:18px;padding:20px;margin:12px 0}input{width:100%;padding:14px;border:2px solid #fed7aa;border-radius:14px;font-size:18px}button{border:0;border-radius:14px;padding:12px 16px;font-weight:800;background:#f97316;color:white;margin:6px 4px;cursor:pointer}.secondary{background:#ffedd5;color:#7c2d12}.option{display:block;width:100%;margin:8px 0;background:#fff7ed;color:#222;border:2px solid #fed7aa}.ok{background:#dcfce7;border-left:5px solid #16a34a;padding:12px;border-radius:10px;margin:10px 0}.no{background:#fee2e2;border-left:5px solid #dc2626;padding:12px;border-radius:10px;margin:10px 0}.help-box{background:#ffedd5;border-left:5px solid #f97316;padding:12px;border-radius:10px;margin:10px 0}.answer-box{background:#dcfce7;border-left:5px solid #16a34a;padding:12px;border-radius:10px;margin:10px 0;font-weight:700}.small{color:#666}
</style></head><body><div class="app"><div class="top"><button class="secondary" onclick="history.back()">← Zurück</button><h1>Preis schreiben</h1><div class="progress"><div id="bar"></div></div><p id="count" class="small"></p></div><div class="card"><p class="small">Höre den Preis und schreibe ihn.</p><div id="box"></div><button class="secondary" onclick="next()">Weiter</button></div></div><script>
const PRICES=["0,10 €", "0,25 €", "0,59 €", "0,99 €", "1,29 €", "1,79 €", "2,49 €", "2,99 €", "3,79 €", "4,49 €", "5,99 €", "8,25 €", "14,99 €", "19,95 €", "27,50 €", "44,90 €", "64,50 €", "79,99 €", "99,00 €", "100,00 €"];let i=0,tries=0;
function speak(t){try{let u=new SpeechSynthesisUtterance(t.replace("€","Euro"));u.lang="de-DE";u.rate=.8;speechSynthesis.speak(u)}catch(e){}}
function norm(x){return String(x||"").toLowerCase().replace(/euro/g,"€").replace(/eur/g,"€").replace(/\s+/g," ").trim()}
function makeOptions(correct){let all=[...PRICES].filter(x=>x!==correct); all.sort(()=>Math.random()-.5); return [correct,...all.slice(0,3)].sort(()=>Math.random()-.5);}

function render(){
 const p=PRICES[i]; tries=0;
 document.getElementById("bar").style.width=((i+1)*100/PRICES.length)+"%";document.getElementById("count").textContent=(i+1)+" / "+PRICES.length;
 document.getElementById("box").innerHTML=`<p class="small">Höre den Preis und schreibe ihn.</p><button onclick="speak(PRICES[i])">🔊 Preis hören</button><input id="ans" placeholder="z.B. 2,49 €"><button onclick="checkWrite()">Kontrollieren</button><div id="fb"></div>`;
}
function checkWrite(){const p=PRICES[i], v=document.getElementById("ans").value; if(norm(v)===norm(p)){document.getElementById("fb").innerHTML="<div class='ok'>Richtig!</div>";return} tries++; if(tries===1)document.getElementById("fb").innerHTML="<div class='no'>Noch nicht ganz. Prüfe Euro und Cent.</div>"; else if(tries===2)document.getElementById("fb").innerHTML="<div class='help-box'><strong>Tipp:</strong> Schreibe mit Komma, z.B. 2,49 €.</div>"; else document.getElementById("fb").innerHTML=`<div class='answer-box'><strong>Lösung:</strong><br>${p}</div>`;}

function next(){i=(i+1)%PRICES.length;render()}
render();
</script></body></html>
