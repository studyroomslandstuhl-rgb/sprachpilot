<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preis schreiben</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=30"></script><script>header("Preis schreiben");let TASKS=PRICE_WRITE_TASKS,i=0,tries=0;function show(){if(i>=TASKS.length){complete(area,'preis-schreiben.html','preis-sprechen.html');return}let t=TASKS[i];tries=0;area.innerHTML=`<div class="small">${i} richtig · ${TASKS.length-i} übrig</div><div class="progress"><div class="bar" style="width:${Math.round(i/TASKS.length*100)}%"></div></div><div class="question">Höre den Preis und schreibe den Preis.</div><button class="btn" onclick="speak('${t.spoken}')">Hören</button><input id="ans" placeholder="z. B. 4,20 €"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}function cleanPrice(x){return simple(x).replace('euro','').trim()}function check(){if(cleanPrice(ans.value)===cleanPrice(TASKS[i].price)){fb.textContent='Richtig!';i++;setTimeout(show,700)}else{tries++;fb.innerHTML=feedbackStep(tries,'Noch nicht ganz.','Schreibe den Preis mit Komma und Eurozeichen, z. B. 2,49 €.',TASKS[i].price)}}show();</script></body></html>
