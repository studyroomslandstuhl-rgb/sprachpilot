<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preis schreiben</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=1"></script><script>header("Preis schreiben");let i=0;function show(){if(i>=PRICES.length){complete(area,'preis-schreiben.html','preis-auswaehlen.html');return}area.innerHTML=`<div class="question">Höre und schreibe den Preis.</div><button class="btn" onclick="speak('${PRICES[i].replace('€','Euro')}')">Hören</button><input id="ans" placeholder="z. B. 1,50 €"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}function clean(x){return x.replace(/\s/g,'').replace('Euro','€')}function check(){if(clean(ans.value)===clean(PRICES[i])){fb.textContent='Richtig!';i++;setTimeout(show,700)}else fb.innerHTML='Falsch.<div class="hint">Lösung: '+PRICES[i]+'</div>'}show();</script></body></html>
