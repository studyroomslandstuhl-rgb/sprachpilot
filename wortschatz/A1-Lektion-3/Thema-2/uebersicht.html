<div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card"><h2>Alle Wörter</h2><div id="list" class="word-table"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=8"></script><script>header("Übersicht");list.innerHTML=WORDS.map(w=>`<div class="word-row"><img src="${w.image}" onerror="fixImg(this)"><div><b>${full(w)}</b><br><span class="small">${w.plural}</span><br><span class="small">${tr(w)}</span></div></div>`).join('')</script><script type="module" src="/js/guard.js"></script></body></html>
