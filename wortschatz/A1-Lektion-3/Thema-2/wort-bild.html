<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wort → Bild</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=5"></script><script>header("Wort → Bild");let Q=queue('wort-bild.html',WORDS);function render(){Q.cur=next(Q);if(!Q.cur){complete(area,'wort-bild.html','hoeren.html');return}let opts=shuffle([Q.cur,...shuffle(WORDS.filter(w=>w.id!==Q.cur.id)).slice(0,3)]);area.innerHTML=prog(Q)+`<div class="question">${full(Q.cur)}</div><div class="options">${opts.map(o=>`<button class="opt" onclick="pick('${o.id}',this)"><img class="food-img" src="${o.image}" onerror="fixImg(this)"></button>`).join('')}</div><div id="fb" class="feedback"></div>`}function pick(id,b){if(id===Q.cur.id){b.classList.add('ok');right(Q,Q.cur);setTimeout(render,700)}else{b.classList.add('no');wrong(Q);fb.textContent='Falsches Bild.'}}render();</script></body></html>
