<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Artikel zuordnen</title><link rel="stylesheet" href="style.css"></head>
<body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div>
<section class="card"><p>Wort antippen, dann Gruppe antippen. Danach kontrollieren.</p><div id="chips"></div>
<div class="drop-grid"><div class="dropzone" data-a="der"><h2>der</h2></div><div class="dropzone" data-a="die"><h2>die</h2></div><div class="dropzone" data-a="das"><h2>das</h2></div></div>
<button class="btn" onclick="control()">Kontrollieren</button><div id="fb" class="feedback"></div><a id="nextBtn" class="btn hidden" href="plural.html">Nächste Aufgabe →</a></section>
<footer>© SprachPilot</footer></div><script src="app.js?v=8"></script><script>
header("Artikel zuordnen");
let selected=null;
chips.innerHTML=WORDS.map(w=>`<span class="chip" data-id="${w.id}">${w.word}</span>`).join('');
function makeSelectable(){
 document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
   if(c.classList.contains('ok')) return;
   document.querySelectorAll('.chip').forEach(x=>x.classList.remove('selected'));
   selected=c; c.classList.add('selected');
 });
}
makeSelectable();
document.querySelectorAll('.dropzone').forEach(z=>z.onclick=()=>{
 if(selected){
   selected.classList.remove('selected','no');
   let n=selected.nextElementSibling; if(n&&n.classList.contains('correction')) n.remove();
   z.appendChild(selected); selected=null; makeSelectable();
 }
});
function control(){
 document.querySelectorAll('.correction').forEach(x=>x.remove());
 let ok=0;
 document.querySelectorAll('.dropzone .chip').forEach(c=>{
   let w=WORDS.find(x=>x.id===c.dataset.id);
   let z=c.closest('.dropzone');
   c.classList.remove('ok','no');
   if(z.dataset.a===w.article){c.classList.add('ok');ok++}
   else{c.classList.add('no');let note=document.createElement('span');note.className='correction';note.textContent='richtig: '+w.article;c.after(note)}
 });
 if(ok===WORDS.length){done('drag-drop-artikel.html');nextBtn.classList.remove('hidden');fb.textContent='Gut gemacht!'}
 else fb.textContent='Korrigiere die roten Wörter. Rote Wörter bleiben verschiebbar.';
}
</script>
<script>
(function(){
  let dragged=null;
  function isCorrect(el){return /\b(correct|ok|richtig)\b/.test(el.className||"");}
  function unlock(){
    document.querySelectorAll('[draggable], .word, .chip, .item, .drag, .card').forEach(el=>{
      if(isCorrect(el)) return;
      if((el.textContent||"").trim().length>0){
        el.setAttribute('draggable','true');
        el.draggable=true;
        el.style.pointerEvents='auto';
        el.style.opacity='1';
        el.classList.remove('locked','disabled');
      }
    });
  }
  document.addEventListener('dragstart',e=>{
    let el=e.target.closest('[draggable], .word, .chip, .item, .drag, .card');
    if(!el || isCorrect(el)) return;
    dragged=el;
    try{e.dataTransfer.setData('text/plain', el.dataset.id||el.dataset.word||el.textContent.trim());}catch(err){}
  },true);
  document.addEventListener('dragover',e=>{
    if(e.target.closest('.dropzone,.drop-zone,.group,.box,.table,.column,.target,[data-group],[data-article],[data-plural]')) e.preventDefault();
  },true);
  document.addEventListener('drop',e=>{
    let zone=e.target.closest('.dropzone,.drop-zone,.group,.box,.table,.column,.target,[data-group],[data-article],[data-plural]');
    if(zone && dragged){
      e.preventDefault();
      zone.appendChild(dragged);
      dragged=null;
      setTimeout(unlock,50);
    }
  },true);
  document.addEventListener('click',()=>setTimeout(unlock,80),true);
  setInterval(unlock,500);
  unlock();
})();
</script>

</body></html>
