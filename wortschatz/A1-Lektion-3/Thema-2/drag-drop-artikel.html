<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Artikel zuordnen</title><link rel="stylesheet" href="style.css"></head>
<body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div>
<section class="card"><p>Wort antippen, dann Gruppe antippen. Falsch zugeordnete rote Wörter bleiben verschiebbar.</p><div id="chips"></div>
<div class="drop-grid"><div class="dropzone" data-a="der"><h2>der</h2></div><div class="dropzone" data-a="die"><h2>die</h2></div><div class="dropzone" data-a="das"><h2>das</h2></div></div>
<button class="btn" onclick="control()">Kontrollieren</button><div id="fb" class="feedback"></div><a id="nextBtn" class="btn hidden" href="plural.html">Nächste Aufgabe →</a></section>
<footer>© SprachPilot</footer></div><script src="app.js?v=41"></script><script>
header("Artikel zuordnen");
let selected=null;
chips.innerHTML=shuffle(WORDS).map(w=>`<span class="chip" data-id="${w.id}">${w.word}</span>`).join('');
function clearNotes(){document.querySelectorAll('.correction').forEach(x=>x.remove())}
function selectChip(c){if(c.classList.contains('ok'))return;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('selected'));selected=c;c.classList.add('selected')}
document.addEventListener('click',e=>{let chip=e.target.closest('.chip');if(chip){selectChip(chip);return}let z=e.target.closest('.dropzone');if(z&&selected){clearNotes();selected.classList.remove('selected','no');z.appendChild(selected);selected=null;fb.textContent=''}});
function control(){clearNotes();let ok=0;document.querySelectorAll('.dropzone .chip').forEach(c=>{let w=WORDS.find(x=>x.id===c.dataset.id);let z=c.closest('.dropzone');c.classList.remove('ok','no','selected');if(z.dataset.a===w.article){c.classList.add('ok');ok++}else{c.classList.add('no');let note=document.createElement('span');note.className='correction';note.textContent='richtig: '+w.article;c.after(note)}});if(ok===WORDS.length){done('drag-drop-artikel.html');nextBtn.classList.remove('hidden');fb.textContent='Gut gemacht!'}else fb.textContent='Korrigiere die roten Wörter. Tippe ein rotes Wort an und dann die richtige Gruppe.'}
</script></body></html>
