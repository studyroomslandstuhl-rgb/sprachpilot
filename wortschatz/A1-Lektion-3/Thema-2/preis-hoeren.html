<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preis hören</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=1"></script><script>header("Preis hören");let i=0;function show(){if(i>=PRICES.length){complete(area,'preis-hoeren.html','preis-schreiben.html');return}let price=PRICES[i],opts=shuffle([price,...shuffle(PRICES.filter(p=>p!==price)).slice(0,3)]);area.innerHTML=`<div class="question">Höre den Preis und klicke.</div><button class="btn" onclick="speak('${price.replace('€','Euro')}')">Hören</button><div class="options">${opts.map(o=>`<button class="opt" onclick="pick('${o}',this)">${o}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}function pick(o,b){if(o===PRICES[i]){b.classList.add('ok');i++;setTimeout(show,700)}else{b.classList.add('no');fb.textContent='Falsch.'}}show();</script></body></html>
