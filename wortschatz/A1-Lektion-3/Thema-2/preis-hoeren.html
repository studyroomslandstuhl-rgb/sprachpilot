<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preis hören</title><style>
*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);margin:0;padding:16px;color:#222}main{max-width:850px;margin:auto}.card{background:white;border-radius:20px;padding:20px;margin:14px 0;box-shadow:0 8px 24px rgba(0,0,0,.18)}h1{color:#667eea}.price{font-size:34px;font-weight:900;background:#f0f4ff;border-radius:16px;padding:18px;margin:12px 0;text-align:center}input{width:100%;padding:14px;border:2px solid #ddd;border-radius:12px;font-size:18px}button{border:0;border-radius:14px;padding:12px 16px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);color:white;margin:6px;cursor:pointer}.secondary{background:#eef2ff;color:#333}.help-box{background:#f0f4ff;border-left:5px solid #667eea;padding:12px;border-radius:10px;margin:10px 0}.answer-box{background:#d9f7e8;border-left:5px solid #27ae60;padding:12px;border-radius:10px;margin:10px 0;font-weight:700}.no{background:#ffe1e1;border-left:5px solid #e74c3c;padding:12px;border-radius:10px;margin:10px 0}.ok{background:#d9f7e8;border-left:5px solid #27ae60;padding:12px;border-radius:10px;margin:10px 0}
</style></head><body><main><section class="card"><h1>Preis hören</h1><div id="box"></div></section></main>
<script>
const PRICES=["0,39 €", "0,79 €", "1,19 €", "1,49 €", "1,99 €", "2,29 €", "2,79 €", "3,49 €", "4,99 €", "5,50 €", "6,75 €", "7,99 €", "9,49 €", "12,95 €", "18,40 €", "24,99 €", "32,50 €", "39,90 €", "59,99 €", "89,00 €"];
let i=0, tries=0;
function speak(t){try{let u=new SpeechSynthesisUtterance(t.replace("€","Euro"));u.lang="de-DE";speechSynthesis.speak(u)}catch(e){}}
function norm(x){return String(x||"").toLowerCase().replace(/euro/g,"€").replace(/eur/g,"€").replace(/\s+/g," ").trim()}
function render(){tries=0;const p=PRICES[i];document.getElementById("box").innerHTML=`<p>$Höre den Preis und schreibe ihn.</p><button onclick="speak(PRICES[i])">🔊 Preis hören</button><input id="ans" placeholder="Preis schreiben, z.B. 2,49 €"><button onclick="check()">Kontrollieren</button><button class="secondary" onclick="next()">Weiter</button><div id="fb"></div><p>${i+1} / ${PRICES.length}</p>`;}
function check(){const p=PRICES[i], v=document.getElementById("ans").value;if(norm(v)===norm(p)){document.getElementById("fb").innerHTML="<div class='ok'>Richtig!</div>";return}tries++;if(tries===1)document.getElementById("fb").innerHTML="<div class='no'>Noch nicht ganz. Prüfe Komma, Cent und Eurozeichen.</div>";else if(tries===2)document.getElementById("fb").innerHTML="<div class='help-box'><strong>Tipp:</strong> Schreibe den Preis mit Komma, z.B. 2,49 €.</div>";else document.getElementById("fb").innerHTML=`<div class='answer-box'><strong>Lösung:</strong><br>${p}</div>`;}
function next(){i=(i+1)%PRICES.length;render()}
render();
</script></body></html>
