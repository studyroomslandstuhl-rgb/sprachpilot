<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preis hören</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=5"></script><script>header("Preis hören");let i=0;function show(){if(i>=PRICE_TASKS.length){complete(area,'preis-hoeren.html','preis-schreiben.html');return}let t=PRICE_TASKS[i],opts=shuffle([t.price,...shuffle(PRICE_TASKS.map(x=>x.price).filter(p=>p!==t.price)).slice(0,3)]);area.innerHTML=`<div class="small">${i} richtig · ${PRICE_TASKS.length-i} übrig</div><div class="progress"><div class="bar" style="width:${Math.round(i/PRICE_TASKS.length*100)}%"></div></div><div class="question">Höre den Satz und klicke auf den Preis.</div><button class="btn" onclick="speak('${t.spoken}')">Hören</button><div class="options">${opts.map(o=>`<button class="opt" onclick="pick('${o}',this)">${o}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}function pick(o,b){if(o===PRICE_TASKS[i].price){b.classList.add('ok');i++;setTimeout(show,700)}else{b.classList.add('no');fb.textContent='Falsch. Höre noch einmal.'}}show();</script></body></html>
