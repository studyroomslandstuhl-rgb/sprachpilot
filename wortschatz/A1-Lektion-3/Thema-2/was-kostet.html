<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Was kostet ...?</title><link rel="stylesheet" href="style.css"></head><body>
<div id="accountStrip" class="account-strip"></div>
<script type="module" src="/js/guard.js"></script><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=1"></script><script>header("Was kostet ...?");let i=0;function show(){if(i>=COMBOS.length){complete(area,'was-kostet.html','was-kosten.html');return}let c=COMBOS[i],text=c.text;area.innerHTML=`<div class="question">Was kostet ...?</div><div class="big">${text}</div><div class="big">${c.price}</div><input id="ans" placeholder="Antwort schreiben"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}function check(){let c=COMBOS[i],text=c.text;let sol=text+' kostet '+c.price.replace('€','Euro'); if(false) sol=text+' kosten '+c.price.replace('€','Euro'); if(simple(ans.value)===simple(sol)){fb.textContent='Richtig!';i++;setTimeout(show,700)}else fb.innerHTML='Falsch.<div class="hint">Muster: '+sol+'</div>'}show();</script></body></html>
