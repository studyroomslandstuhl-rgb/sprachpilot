<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Karteikarten</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="accountStrip" class="account-strip"></div>

<div class="container">
  <section class="hero"></section>
  <div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div>
  <section class="card" id="area">
    <div class="question">Aufgabe wird geladen …</div>
  </section>
  <footer>© SprachPilot</footer>
</div>

<script src="app.js?v=14"></script>
<script src="../shared/lektion3-fix.js?v=2"></script>
<script>
header("Karteikarten");
const FILE = "karteikarten.html";
let i = null;
function cardLang(){return typeof spL3PreferredLang==='function'?spL3PreferredLang():lang();}
function translation(w){const l=cardLang();return (w.translations&&(w.translations[l]||w.translations.Russisch||w.translations.Englisch))||w.word;}
function show(){
  if(spLoadTaskState(FILE, WORDS.length).done.length >= WORDS.length){complete(area, FILE, "bild-wort.html");return;}
  i = spNextIndex(FILE, WORDS.length);
  if(i === undefined || i === null){spResetTask(FILE);i = spNextIndex(FILE, WORDS.length);}
  const w = WORDS[i];
  area.innerHTML = `${spProgressHtml(FILE, WORDS.length)}
    <div class="question">Sage das deutsche Wort mit Artikel.</div>
    <div class="hint">Muttersprache: <b>${translation(w)}</b></div>
    <img class="food-img" src="${w.image}" onerror="fixImg(this)" alt="">
    <div class="actions">
      <button id="micBtn" class="btn mic-btn" onclick="say()">🎤 Sprechen</button>
      <button class="btn secondary" onclick="writeBox()">Ich kann nicht sprechen</button>
      <button class="btn secondary" onclick="flip()">Karte umdrehen</button>
    </div>
    <div id="micStatus" class="mic-status"></div>
    <div id="box" class="hidden">
      <input id="ans" placeholder="z. B. die Flasche">
      <button class="btn" onclick="check(ans.value)">Kontrollieren</button>
    </div>
    <div id="fb" class="feedback"></div>`;
}
function writeBox(){box.classList.remove("hidden");}
function flip(){const w=WORDS[i];const tries=spMarkWrong(FILE,WORDS.length);fb.innerHTML=feedbackForCard(tries,full(w),"Artikel und Wort");box.classList.remove("hidden");ans.value=full(w);}
function say(){startMic(micBtn,txt=>{writeBox();ans.value=txt;check(txt);});}
function check(txt){const w=WORDS[i];if(simple(txt)===simple(full(w))){fb.textContent="Richtig!";spMarkRight(FILE,WORDS.length);setTimeout(show,700);}else{const tries=spMarkWrong(FILE,WORDS.length);fb.innerHTML=feedbackForCard(tries,full(w),"Artikel und Wort");}}
function feedbackForCard(tries,solution,type){if(tries===1)return "Da ist noch ein Fehler.";if(tries===2)return "Tipp: Prüfe "+type+".";return "Lösung: "+solution;}
show();
</script>
<script type="module" src="/js/guard.js"></script>
</body>
</html>
