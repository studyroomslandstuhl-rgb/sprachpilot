<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karteikarten</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=5"></script><script>header("Karteikarten");let Q=queue('karteikarten.html',WORDS);function render(){Q.cur=next(Q);if(!Q.cur){complete(area,'karteikarten.html','bild-wort.html');return}Q.tries=0;Q.had=false;area.innerHTML=prog(Q)+`<div class="question">Sage auf Deutsch:</div><div class="big">${tr(Q.cur)}</div><div class="actions"><button id="micBtn" class="btn mic-btn" onclick="say()"><span class="mic-icon">🎤</span>Sprechen</button><button class="btn secondary" onclick="writeIt()">Ich kann nicht sprechen</button><button class="btn secondary" onclick="flip()">Karte umdrehen</button></div><div id="micStatus" class="mic-status"></div><div id="write" class="hidden"><input id="ans"><button class="btn" onclick="check()">Kontrollieren</button></div><div id="fb" class="feedback"></div><button id="go" class="btn hidden" onclick="render()">Weiter</button>`}function writeIt(){write.classList.remove('hidden')}function flip(){wrong(Q);fb.innerHTML='Hilfe benutzt. Wort wird wiederholt.<div class="hint">'+full(Q.cur)+' · Plural: '+Q.cur.plural+'</div>';go.classList.remove('hidden')}function say(){startMic(micBtn,(txt)=>{let d=diagnose(txt,Q.cur);if(d.ok){right(Q,Q.cur);fb.textContent='Richtig!';go.classList.remove('hidden')}else{wrong(Q);fb.innerHTML=fail(Q,d)}})}function check(){let d=diagnose(ans.value,Q.cur);if(d.ok){right(Q,Q.cur);fb.textContent='Richtig!';go.classList.remove('hidden')}else{wrong(Q);fb.innerHTML=fail(Q,d)}}render();</script></body></html>
