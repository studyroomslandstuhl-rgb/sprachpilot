<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lektion 3 · Thema 2</title><link rel="stylesheet" href="../shared/lektion3-standard.css?v=step13"></head><body><div class="container"><header class="topbar"></header><section class="card progress-card"><div class="circle" id="totalCircle">0%</div><div class="progress-main"><h2>Dein Fortschritt</h2><p class="small" id="totalText">0 Aufgaben abgeschlossen</p><div class="progress"><div class="bar" id="totalBar"></div></div><p class="small">Ziel: Mengen, Verpackungen, Preise, Einkaufsdialoge und Prüfung üben.</p><div id="topicExamSummary"></div></div></section><section class="grid" id="taskGrid"></section><footer>© SprachPilot</footer></div><script type="module" src="/js/guard.js"></script><script src="../shared/lektion3-standard.js?v=step13"></script><script src="app.js?v=14"></script><script src="../shared/lektion3-fix.js?v=3"></script><script>
renderL3Header({title:"Mengen & Verpackungen",subtitle:"A1 Lektion 3 · Thema 2",backHref:"../index.html",overviewHref:"uebersicht.html",statsHref:"statistik.html",resetButton:true});
const releaseCtx={module:'wortschatz',lesson:'A1-Lektion-3',theme:'Thema-2'};
const baseTasks=[['karteikarten.html',WORDS.length,'Karteikarten','🃏','Wörter lernen.'],['bild-wort.html',WORDS.length,'Bild → Wort','🖼️','Schreibe das Wort.'],['wort-bild.html',WORDS.length,'Wort → Bild','🔁','Wähle das Bild.'],['hoeren.html',WORDS.length,'Hören','🎧','Höre und wähle.'],['artikel.html',WORDS.length,'Artikel','der die das','der, die oder das?'],['drag-drop-artikel.html',WORDS.length,'Artikel zuordnen','🧲','Ordne die Artikel zu.'],['plural.html',WORDS.length,'Plural','1→2+','Schreibe den Plural.'],['plural-drag-drop.html',WORDS.length,'Pluralgruppen','📦','Ordne die Pluralformen.'],['memory.html',WORDS.length,'Memory','🧠','Finde Paare.'],['verpackungen.html',COMBOS.length,'Verpackung + Produkt','🧺','Verbinde Menge und Produkt.'],['preis-hoeren.html',PRICE_TASKS.length,'Preis hören','💶','Höre den Preis.'],['preis-schreiben.html',PRICE_TASKS.length,'Preis schreiben','✍️','Schreibe den Preis.'],['preis-sprechen.html',PRICE_TASKS.length,'Preis sprechen','🎤','Sprich den Preis.'],['frage-und-antwort.html',COMBOS.length,'Frage & Antwort','💬','Übe kurze Einkaufsdialoge.']];
function released(file){return !window.SprachPilotRelease||SprachPilotRelease.taskReleased(file,releaseCtx)}
function moduleHtml(t,num){const p=pctFor(t[0],t[1]);return `<a class="module" href="${t[0]}"><div class="num">${num}. ${t[2]}</div><div class="icon">${t[3]}</div><p>${t[4]}</p><div class="progress"><div class="bar" style="width:${p}%"></div></div><div class="small">${p}%</div><div class="start">${p>=100?'Fertig':'Starten'}</div></a>`}
function lockedExamHtml(num){return `<div class="module locked exam-locked"><div class="num">${num}. Prüfung</div><div class="icon exam-icon">🔒</div><p>Prüfung wird erst freigeschaltet, wenn alle freigegebenen Aufgaben 100% erreicht haben.</p><div class="progress"><div class="bar" style="width:0%"></div></div><div class="small">gesperrt</div><div class="start">Prüfung gesperrt</div></div>`}
function examHtml(num){const p=pctFor('pruefung.html',WORDS.length);return `<a class="module" href="pruefung.html" id="examLink"><div class="num">${num}. Prüfung</div><div class="icon exam-icon">★</div><p>Teste dein Wissen.</p><div class="progress"><div class="bar" style="width:${p}%"></div></div><div class="small">${p}%</div><div class="start">${p>=100?'Fertig':'Starten'}</div></a>`}
function renderPage(){const tasks=baseTasks.filter(t=>released(t[0]));let n=1;taskGrid.innerHTML=tasks.map(t=>moduleHtml(t,n++)).join('');const examUnlocked=tasks.length===0||tasks.every(t=>pctFor(t[0],t[1])>=100);taskGrid.innerHTML+=examUnlocked?examHtml(n++):lockedExamHtml(n++);const progressTasks=[...tasks,['pruefung.html',WORDS.length]];const done=progressTasks.filter(t=>pctFor(t[0],t[1])>=100).length;const all=Math.min(100,Math.round(progressTasks.reduce((s,t)=>s+pctFor(t[0],t[1]),0)/Math.max(1,progressTasks.length))||0);totalCircle.textContent=all+'%';totalBar.style.width=all+'%';totalText.textContent=done+' / '+progressTasks.length+' freigegebene Aufgaben abgeschlossen';if(document.getElementById('topicExamSummary')&&typeof bestExamSummaryHtml==='function'){const examSummary=bestExamSummaryHtml();topicExamSummary.innerHTML=examSummary;topicExamSummary.style.display=examSummary?'block':'none';}}
renderPage();if(window.SprachPilotRelease)SprachPilotRelease.refresh().then(renderPage).catch(()=>{});
</script></body></html>
