<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thema 2</title><link rel="stylesheet" href="style.css"></head>
<body>
<div id="accountStrip" class="account-strip"></div>
<div class="container"><section class="hero"></section>

<section class="card"><h2>📦 Wortschatz</h2><div class="grid" id="wortschatz"></div></section>
<section class="card"><h2>🥤 Verpackungen & Mengen</h2><div class="grid" id="mengen"></div></section>
<section class="card"><h2>💶 Preise</h2><div class="grid" id="preise"></div></section>
<section class="card"><h2>🛒 Im Supermarkt</h2><div class="grid" id="supermarkt"></div></section>
<section class="card"><h2>📊 Fortschritt</h2><div class="grid" id="fortschritt"></div></section>

<footer>© SprachPilot</footer></div>
<script src="app.js?v=8"></script>
<script>
header("Thema 2");
function card(file,label,total=WORDS.length){
  let p = pctFor(file,total);
  return `<a class="module" href="${file}"><h2>${label}</h2><div class="progress"><div class="bar" style="width:${p}%"></div></div><span class="badge">${p}%</span></a>`;
}
wortschatz.innerHTML=[
  card('karteikarten.html','🃏 Karteikarten'),
  card('bild-wort.html','🖼️ Bild → Wort'),
  card('wort-bild.html','🔍 Wort → Bild'),
  card('hoeren.html','🎧 Hören'),
  card('artikel.html','🏷️ Artikel'),
  card('drag-drop-artikel.html','📌 Artikel zuordnen'),
  card('plural.html','🔢 Plural'),
  card('plural-drag-drop.html','📦 Pluralgruppen'),
  card('memory.html','🧩 Memory')
].join('');
mengen.innerHTML=[
  card('verpackungen.html','📦 Verpackung + Produkt',COMBOS.length)
].join('');
preise.innerHTML=[
  card('preis-hoeren.html','🎧 Preis hören',PRICE_TASKS.length),
  card('preis-schreiben.html','✍️ Preis schreiben',PRICE_TASKS.length),
  card('preis-sprechen.html','🎤 Preis sprechen',PRICE_TASKS.length)
].join('');
supermarkt.innerHTML=[
  card('frage-und-antwort.html','❓ Frage & Antwort',COMBOS.length)
].join('');
fortschritt.innerHTML=[
  `<a class="module" href="statistik.html"><h2>📊 Statistik</h2></a>`,
  `<a class="module" href="uebersicht.html"><h2>📖 Übersicht</h2></a>`
].join('');
</script><script type="module" src="/js/guard.js"></script></body></html>
