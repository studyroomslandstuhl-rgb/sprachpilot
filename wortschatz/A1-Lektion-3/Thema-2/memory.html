<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Memory</title><link rel="stylesheet" href="style.css"></head>
<body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div>
<section class="card"><p class="small">Öffne zwei Karten und finde die Paare.</p><div id="board" class="memory-grid"></div><div id="fb" class="feedback"></div><a id="nextBtn" class="btn hidden" href="verpackungen.html">Nächste Aufgabe →</a></section>
<footer>© SprachPilot</footer></div><script src="app.js?v=8"></script><script>
header("Memory");
let pairs=shuffle(WORDS).slice(0,8);
let cards=shuffle(pairs.flatMap(w=>[{id:w.id,html:`<img src="${w.image}" onerror="fixImg(this)">`},{id:w.id,html:full(w)}]));
let open=[],found=0;
board.innerHTML=cards.map(c=>`<button class="opt memory-card" data-id="${c.id}" data-html='${c.html.replace(/'/g,"&apos;")}' onclick="pick(this)">?</button>`).join('');
function pick(b){
 if(open.includes(b)||b.classList.contains('ok')||open.length>=2)return;
 b.innerHTML=b.dataset.html;open.push(b);
 if(open.length===2){
   if(open[0].dataset.id===open[1].dataset.id){
     open.forEach(x=>x.classList.add('ok'));open=[];found++;
     if(found===pairs.length){done('memory.html');fb.textContent='Gut gemacht!';nextBtn.classList.remove('hidden')}
   }else setTimeout(()=>{open.forEach(x=>x.innerHTML='?');open=[]},900)
 }
}
</script></body></html>
