<!DOCTYPE html><html lang="de"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bild → Wort</title><link rel="stylesheet" href="style.css"></head>
<body><div class="container"><section class="hero"></section>
<div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div>
<section class="card" id="area"></section><footer>© SprachPilot</footer></div>
<script src="app.js?v=8"></script>
<script>
header("Bild → Wort");
let Q=queue('bild-wort.html',WORDS);
function render(){
  Q.cur=next(Q);
  if(!Q.cur){complete(area,'bild-wort.html','wort-bild.html');return}
  Q.tries=0; Q.had=false;
  area.innerHTML=prog(Q)+`
    <div class="question">Schreibe Artikel + Nomen.</div>
    <img class="food-img" src="${Q.cur.image}" onerror="fixImg(this)">
    <input id="ans" placeholder="z. B. die Flasche">
    <button class="btn" onclick="check()">Kontrollieren</button>
    <div id="fb" class="feedback"></div>`;
}
function check(){
  let d=diagnose(ans.value,Q.cur);
  if(d.ok){
    right(Q,Q.cur);
    fb.textContent='Richtig!';
    setTimeout(render,700);
  }else{
    wrong(Q);
    fb.innerHTML=fail(Q,d);
  }
}
render();
</script></body></html>
