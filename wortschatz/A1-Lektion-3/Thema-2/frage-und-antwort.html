<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Frage + Antwort</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=5"></script><script>header("Frage + Antwort");let i=0,phase='q';function show(){if(i>=COMBOS.length){complete(area,'frage-und-antwort.html','index.html');return}let c=COMBOS[i];if(phase==='q'){area.innerHTML=`<div class="small">${i} fertig · ${COMBOS.length-i} übrig</div><div class="progress"><div class="bar" style="width:${Math.round(i/COMBOS.length*100)}%"></div></div><div class="question">Frage nach dem Preis.</div>${comboImages(c)}<div class="actions"><button id="micBtn" class="btn mic-btn" onclick="sayQ()"><span class="mic-icon">🎤</span>Frage sprechen</button><button class="btn secondary" onclick="writeQ()">Ich kann nicht sprechen</button></div><div id="micStatus" class="mic-status"></div><div id="write" class="hidden"><input id="ans" placeholder="Was kostet ...?"><button class="btn" onclick="checkQ()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}else{area.innerHTML=`<div class="question">Antworte auf deine Frage.</div>${comboImages(c)}<div class="big">${c.price}</div><div class="actions"><button id="micBtn" class="btn mic-btn" onclick="sayA()"><span class="mic-icon">🎤</span>Antwort sprechen</button><button class="btn secondary" onclick="writeA()">Ich kann nicht sprechen</button></div><div id="micStatus" class="mic-status"></div><div id="write" class="hidden"><input id="ans" placeholder="... kostet ... Euro."><button class="btn" onclick="checkA()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}}function writeQ(){write.classList.remove('hidden')}function writeA(){write.classList.remove('hidden')}function checkQ(){let c=COMBOS[i];if(acceptableQuestion(ans.value,c)){phase='a';show()}else fb.innerHTML='Muster: '+c.question}function checkA(){let c=COMBOS[i];if(acceptableAnswer(ans.value,c)){i++;phase='q';show()}else fb.innerHTML='Muster: '+c.answer}function sayQ(){startMic(micBtn,(txt)=>{if(!document.getElementById('ans'))writeQ();ans.value=txt;checkQ()})}function sayA(){startMic(micBtn,(txt)=>{if(!document.getElementById('ans'))writeA();ans.value=txt;checkA()})}show();</script></body></html>
