<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Artikel</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=2"></script><script>header("Artikel");let Q=queue('artikel.html',WORDS);function render(){Q.cur=next(Q);if(!Q.cur){complete(area,'artikel.html','drag-drop-artikel.html');return}Q.tries=0;Q.had=false;area.innerHTML=prog(Q)+`<div class="question">___ ${Q.cur.word}</div><div class="options">${['der','die','das'].map(a=>`<button class="opt" onclick="pick('${a}',this)">${a}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}function pick(a,b){if(articleOk(a,Q.cur)){b.classList.add('ok');right(Q,Q.cur);setTimeout(render,700)}else{b.classList.add('no');wrong(Q);fb.innerHTML=fail(Q,{msg:'Artikel falsch.',tip:'Achte auf der/die/das.',sol:full(Q.cur)})}}render();</script></body></html>
