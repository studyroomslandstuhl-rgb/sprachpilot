<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lektion 3 · Thema 1</title>
<link rel="stylesheet" href="../shared/lektion3-standard.css?v=step12">
</head>
<body>
<div class="container">
  <header class="topbar"></header>
  <div id="progressArea"></div>
  <section class="card">
    <h2 class="section-title">Wortgruppe</h2>
    <div id="batch"></div>
  </section>
  <section class="card">
    <h2 class="section-title">Wortschatztraining</h2>
    <p class="small">Diese Aufgaben wiederholen sich für jede 20er-Wortgruppe.</p>
    <div id="vocab" class="grid"></div>
  </section>
  <section class="card">
    <h2 class="section-title">Grammatik</h2>
    <p class="small">Diese Aufgaben bleiben dauerhaft gespeichert.</p>
    <div id="grammar" class="grid"></div>
  </section>
  <section class="card">
    <h2 class="section-title">Prüfung</h2>
    <div id="exam" class="grid"></div>
  </section>
  <footer>© SprachPilot</footer>
</div>
<script type="module" src="/js/guard.js"></script>
<script src="../shared/lektion3-standard.js?v=step12"></script>
<script src="translations.js?v=40"></script>
<script src="app.js?v=41"></script>
<script src="../shared/lektion3-fix.js?v=2"></script>
<script>
renderL3Header({title:"Lebensmittel & Getränke",subtitle:"A1 Lektion 3 · Thema 1",backHref:"../index.html",overviewHref:"uebersicht.html",statsHref:"statistik.html",resetButton:true});
const allTasks=[...TASKS.map(t=>t.file),'pruefung.html'];
const allP=Math.round(allTasks.reduce((s,f)=>s+taskPercent(f),0)/allTasks.length)||0;
const doneCount=allTasks.filter(f=>taskPercent(f)>=100).length;
progressArea.innerHTML=progressCard({percent:allP,doneText:`${doneCount} / ${allTasks.length} Aufgaben abgeschlossen`,goal:"Lebensmittel, Getränke, Artikel, Plural, einfache Fragen und Prüfung üben."});
let b=batchInfo();
batch.innerHTML=`<p>Gruppe ${b.batch+1}: Wörter ${b.start+1}–${b.end} von ${b.total}</p><p class="small">Die nächste Gruppe wird automatisch freigeschaltet, wenn alle Wortschatzaufgaben fertig sind.</p>`;
const taskIcons={
  'karteikarten.html':'🃏',
  'bild-wort.html':'🖼️',
  'wort-bild.html':'🍎',
  'hoeren.html':'🎧',
  'artikel.html':'der die das',
  'plural.html':'1→2+',
  'memory.html':'🧠',
  'fragen-bilden.html':'❓',
  'ein-eine.html':'①',
  'kein-keine.html':'🚫',
  'pruefung.html':'★'
};
function taskIcon(t){return taskIcons[t.file] || (t.type==='vocab'?'🍏':'🔤')}
function taskCard(t,i){let p=taskPercent(t.file);return moduleCard({href:t.file,num:i+1,title:t.name,desc:t.type==='vocab'?"Wortschatz üben":"Grammatik üben",progress:p,status:p>=100?"Fertig":"Starten",icon:taskIcon(t)})}
vocab.innerHTML=TASKS.filter(t=>t.type==='vocab').map(taskCard).join('');
grammar.innerHTML=TASKS.filter(t=>t.type==='grammar').map(taskCard).join('');
const ep=taskPercent('pruefung.html');
exam.innerHTML=moduleCard({href:'pruefung.html',num:allTasks.length,title:'Prüfung',desc:'Wiederhole die Prüfung, bis du 100% erreichst.',progress:ep,status:ep>=100?'Fertig':'Starten',icon:taskIcons['pruefung.html']});
</script>
</body>
</html>
