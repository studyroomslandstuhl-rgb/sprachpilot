<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Thema 1: Lebensmittel & Getränke</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="../index.html">← Zurück zu Lektion 3</a><button class="btn secondary" onclick="localStorage.removeItem(KEY);location.reload()">Fortschritt löschen</button></div>
<section class="card"><h2 class="module-title">Statistik</h2><div class="stats"><div class="stat"><div class="num" id="learned">0</div><div class="small">gelernte Wörter</div></div><div class="stat"><div class="num" id="stars">0 ⭐</div><div class="small">Sterne</div></div><div class="stat"><div class="num" id="doneN">0/14</div><div class="small">Aufgaben erledigt</div></div><div class="stat"><div class="num" id="pct">0%</div><div class="small">Fortschritt</div></div></div><div class="progress"><div class="bar" id="bar"></div></div><div class="actions"><a class="btn" id="cont" href="karteikarten.html">Weiter</a></div></section>
<section class="card"><h2 class="module-title">Muttersprache</h2><div class="actions"><button class="btn secondary" onclick="setLang('Englisch')">Englisch</button><button class="btn secondary" onclick="setLang('Russisch')">Russisch</button></div></section><section class="grid" id="mods"></section><footer>© SprachPilot</footer></div><script src="app.js"></script><script>hero("Thema 1: Lebensmittel & Getr\u00e4nke");let s=state();s.tasks=s.tasks||{};s.learned=s.learned||[];let a=assigned(),v=TASKS.filter(t=>a.includes(t.file));let d=v.filter(t=>s.tasks[t.file]).length,p=Math.round(d/v.length*100);learned.textContent=s.learned.length;stars.textContent=s.learned.length+" ⭐";doneN.textContent=d+"/"+v.length;pct.textContent=p+"%";bar.style.width=p+"%";let n=v.find(t=>!s.tasks[t.file])||v[0];cont.href=n.file;mods.innerHTML=v.map((t,i)=>`<a class="module" href="${t.file}"><div class="module-title">${i+1}. ${t.name}</div><span class="badge ${s.tasks[t.file]?'ok':''}">${s.tasks[t.file]?'Erledigt ✓':'Starten'}</span></a>`).join("");</script></body></html>
