<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Thema 1: Lebensmittel & Getränke</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="../index.html">← Zurück zu Lektion 3</a><button class="btn secondary" onclick="localStorage.removeItem(KEY);location.reload()">Fortschritt löschen</button></div>
<section class="card"><h2 class="module-title">Aktuelle Wortgruppe</h2><div id="batchBox"></div></section>
<section class="card"><h2 class="module-title">Statistik</h2><div class="stats"><div class="stat"><div class="num" id="totalW">0</div><div class="small">aktive Wörter in dieser Gruppe</div></div><div class="stat"><div class="num" id="doneT">0/0</div><div class="small">Aufgaben erledigt</div></div><div class="stat"><div class="num" id="percent">0%</div><div class="small">Fortschritt</div></div></div><div class="progress"><div class="bar" id="bar"></div></div><div class="actions"><a class="btn" id="cont" href="karteikarten.html">Weiter</a><button class="btn secondary hidden" id="nextBatch" onclick="unlockNextBatch();location.reload()">Nächste 20 Wörter</button></div></section>
<section class="grid" id="mods"></section><footer>© SprachPilot</footer></div><script src="app.js?v=11"></script><script>hero("Thema 1: Lebensmittel & Getränke");
let s=st();s.tasks=s.tasks||{};let active=activeWords();let info=batchInfo();batchBox.innerHTML=`<p class="small">Gruppe ${info.batch}: Wörter ${info.start}–${info.end} von ${info.total}</p>`;let allowed=assignedTasks();let visible=TASKS.filter(t=>allowed.includes(t.file));let done=visible.filter(t=>s.tasks[t.file]).length;let pct=visible.length?Math.round(done/visible.length*100):0;
totalW.textContent=active.length;doneT.textContent=done+'/'+visible.length;percent.textContent=pct+'%';bar.style.width=pct+'%';
let n=visible.find(t=>!s.tasks[t.file])||visible[0];cont.href=n.file;if(done===visible.length && info.end<info.total)nextBatch.classList.remove('hidden');
mods.innerHTML=visible.map((t,i)=>{let p=s.tasks[t.file]?100:0;return `<a class="module" href="${t.file}"><div class="module-title">${i+1}. ${t.name}</div><div class="progress"><div class="bar" style="width:${p}%"></div></div><span class="badge ${p===100?'ok':''}">${p}%</span></a>`}).join('');
</script></body></html>
