<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Thema 1: Lebensmittel & Getränke</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="../index.html">← Zurück zu Lektion 3</a><button class="btn secondary" onclick="localStorage.removeItem(KEY);location.reload()">Fortschritt löschen</button></div><section class="card"><h2 class="module-title">Statistik</h2><div class="stats"><div class="stat"><div class="num" id="totalW">0</div><div class="small">aktive Wörter</div></div><div class="stat"><div class="num" id="doneT">0/0</div><div class="small">Aufgaben erledigt</div></div><div class="stat"><div class="num" id="percent">0%</div><div class="small">Fortschritt</div></div></div><div class="progress"><div class="bar" id="bar"></div></div><div class="actions"><a class="btn" id="cont" href="karteikarten.html">Weiter</a></div></section><section class="grid" id="mods"></section><section class="card"><h2 class="module-title">Dashboard-Vorbereitung</h2><p class="small">Aktive Wörter/Aufgaben werden später aus SP_TEACHER_A1_L3_T1 gelesen.</p></section><footer>© SprachPilot</footer></div><script src="app.js"></script><script>hero("Thema 1: Lebensmittel & Getr\u00e4nke");let s=st();s.tasks=s.tasks||{};let v=TASKS.filter(t=>assignedTasks().includes(t.file)),d=v.filter(t=>s.tasks[t.file]).length,p=Math.round(d/v.length*100)||0;totalW.textContent=activeWords().length;doneT.textContent=d+'/'+v.length;percent.textContent=p+'%';bar.style.width=p+'%';let n=v.find(t=>!s.tasks[t.file])||v[0];cont.href=n.file;mods.innerHTML=v.map((t,i)=>`<a class='module' href='${t.file}'><div class='module-title'>${i+1}. ${t.name}</div><div class='progress'><div class='bar' style='width:${s.tasks[t.file]?100:0}%'></div></div><span class='badge ${s.tasks[t.file]?'ok':''}'>${s.tasks[t.file]?'100%':'0%'}</span></a>`).join('');</script></body></html>
