<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Statistik</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card"><h2 class="module-title">Fortschritt pro Wort</h2><div id="stats" class="word-table"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=20"></script><script>header("Statistik");stats.innerHTML=activeWords().map(w=>{let p=wordPct(w.id);return `<div class="word-row"><img src="${w.image}" onerror="fixImg(this)"><div><b>${full(w)}</b><div class="progress"><div class="bar" style="width:${p}%"></div></div><span class="small">${p}%</span></div></div>`}).join('');</script></body></html>
