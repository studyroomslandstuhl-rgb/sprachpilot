<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Artikel</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=4"></script><script>hero("Artikel");let q=Q(singularWords());function render(){q.cur=next(q);if(!q.cur){complete(area,'artikel.html','drag-drop-artikel.html');return}q.tries=0;q.had=false;area.innerHTML=prog(q)+`<div class='question'>___ ${q.cur.word}</div><div class='options'>${['der','die','das'].map(a=>`<button class='opt' onclick='pick("${a}",this)'>${a}</button>`).join('')}</div><div id='fb' class='feedback'></div>`}function pick(a,b){document.querySelectorAll('.opt').forEach(x=>x.disabled=true);if(articleOk(a,q.cur)){b.classList.add('ok');right(q,q.cur);fb.textContent='Richtig!';setTimeout(render,700)}else{b.classList.add('no');wrong(q);fb.innerHTML=fail(q,{msg:'Falsche Grammatik: Der Artikel ist falsch.',tip:'Lerne Artikel mit Nomen.',sol:full(q.cur)});setTimeout(render,1800)}}render();</script></body></html>
