<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fragen ohne Fragewort</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js"></script><script>hero("Fragen ohne Fragewort");let data=[{"q": "Haben Sie Eier?", "a": ["Ja, ich habe Eier.", "Nein, ich habe keine Eier."], "tip": "Antworte mit Ja/Nein + ich habe ..."}, {"q": "Brauchen wir Mehl?", "a": ["Ja, wir brauchen Mehl.", "Nein, wir brauchen kein Mehl."], "tip": "Antworte mit wir brauchen / brauchen kein."}, {"q": "Möchten Sie Kaffee?", "a": ["Ja, gern.", "Nein, danke."], "tip": "Kurze Antwort ist hier richtig."}],q={q:shuffle(data),bad:[]},cur,tries=0;function nx(){if(q.q.length)return q.q.shift();if(q.bad.length){q.q=shuffle(q.bad);q.bad=[];return q.q.shift()}return null}function render(){cur=nx();if(!cur){finish(area,"fragen-ohne-fragewort.html","fragen-mit-fragewort.html");return}tries=0;area.innerHTML=`<div class="question">${cur.q}</div><div class="actions"><button class="btn secondary" onclick="speak(cur.q)">🔊 Frage hören</button><button class="btn" onclick="say()">🎙️ Antworten</button></div><details><summary>Ich kann nicht sprechen – schreiben</summary><input id="ans"><button class="btn" onclick="check(ans.value)">Prüfen</button></details><div class="feedback" id="fb"></div>`;speak(cur.q)}function check(t){if(cur.a.some(x=>loose(x)===loose(t))){fb.textContent='Richtig!';setTimeout(render,650)}else{tries++;fb.innerHTML='Die Antwort passt noch nicht.<div class="hint">'+(tries===1?cur.tip:'Mögliche Antwort: '+cur.a[0])+'</div>';q.bad.push(cur)}}function say(){rec(t=>{if(!t){fb.innerHTML='Ich konnte dich nicht hören.<div class="hint">Nutze die Schreibzeile.</div>';return}check(t)})}render();</script></body></html>
