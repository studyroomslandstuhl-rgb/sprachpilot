<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plural schreiben</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=31"></script><script>header("Plural schreiben");let Q=queueFor('plural.html',activeWords());function render(){Q.cur=nextItem(Q);if(!Q.cur){complete(area,'plural.html','plural-drag-drop.html');return}Q.tries=0;Q.had=false;area.innerHTML=prog(Q)+`<div class="question">Schreibe den Plural.</div><p class="small">Wenn es keine Pluralform gibt, schreibe: <b>Nur Singular</b></p><div class="big">${full(Q.cur)}</div><input id="ans" placeholder="Plural oder Nur Singular"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}function check(){if(checkPlural(ans.value,Q.cur)){right(Q,Q.cur);fb.textContent='Richtig!';setTimeout(render,700)}else{wrong(Q);fb.innerHTML=fail(Q,{msg:'Plural falsch.',tip:'Schreibe die Pluralform mit Artikel oder Nur Singular.',sol:Q.cur.plural})}}render();</script></body></html>
