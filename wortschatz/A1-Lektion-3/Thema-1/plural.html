<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plural schreiben</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js"></script><script>hero("Plural schreiben");let q=Q(activeWords());function render(){q.cur=next(q);if(!q.cur){complete(area,'plural.html','plural-drag-drop.html');return}q.tries=0;q.had=false;area.innerHTML=prog(q)+`<div class='question'>Schreibe den Plural.</div><p class='small'>Wenn es keine Pluralform gibt, schreibe: <b>Nur Singular</b></p><div class='big'>${full(q.cur)}</div><input id='ans' placeholder='die Äpfel oder Nur Singular'><button class='btn' onclick='check()'>Prüfen</button><div id='fb' class='feedback'></div>`}function check(){if(pluralOk(ans.value,q.cur)){right(q,q.cur);fb.textContent='Richtig!';setTimeout(render,700)}else{wrong(q);fb.innerHTML=fail(q,{msg:'Falscher Plural.',tip:'Schreibe die + Plural oder Nur Singular.',sol:q.cur.plural})}}render();</script></body></html>
