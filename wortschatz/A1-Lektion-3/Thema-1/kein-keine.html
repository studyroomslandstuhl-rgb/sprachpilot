<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nein, das ist ...</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=11"></script><script>hero("Nein, das ist ...");let q=Q(singularWords());function sol(w){return w.article==='die'?'keine '+w.word:'kein '+w.word}function render(){q.cur=next(q);if(!q.cur){complete(area,'kein-keine.html','fragen-ohne-fragewort.html');return}q.tries=0;q.had=false;area.innerHTML=prog(q)+`<div class='question'>Nein, das ist ...</div><img class='food-img' src='${q.cur.image}'><input id='ans'><button class='btn' onclick='check()'>Prüfen</button><div id='fb' class='feedback'></div>`}function check(){let s=sol(q.cur);if(norm(ans.value)===s){right(q,q.cur);fb.textContent='Richtig!';setTimeout(render,700)}else{wrong(q);fb.innerHTML=fail(q,{msg:'Falsche Grammatik oder Rechtschreibung.',tip:'Zählbar: ein/eine. Unzählbar: ohne ein/eine.',sol:s})}}render();</script></body></html>
