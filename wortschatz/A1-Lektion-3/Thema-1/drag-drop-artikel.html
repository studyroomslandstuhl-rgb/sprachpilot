<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pull & Drop Artikel</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card"><p class="small">Ziehe die Nomen in die richtige Tabelle.</p><div id="chips"></div><div class="drop-grid"><div class="dropzone" data-a="der" ondrop="drop(event)" ondragover="event.preventDefault()"><h2>der</h2></div><div class="dropzone" data-a="die" ondrop="drop(event)" ondragover="event.preventDefault()"><h2>die</h2></div><div class="dropzone" data-a="das" ondrop="drop(event)" ondragover="event.preventDefault()"><h2>das</h2></div></div><div class="feedback" id="fb"></div><a class="btn hidden" id="nxt" href="plural.html">Nächste Aufgabe →</a></section><footer>© SprachPilot</footer></div><script src="app.js"></script><script>hero("Pull & Drop Artikel");let pool=shuffle(WORDS.filter(w=>w.art!=="der/das")).slice(0,18),ok=0;chips.innerHTML=pool.map(w=>`<span class="chip" draggable="true" ondragstart="event.dataTransfer.setData('id','${w.word}')" id="${w.word}" data-a="${w.art}">${w.word}</span>`).join("");function drop(e){e.preventDefault();let el=document.getElementById(e.dataTransfer.getData('id'));if(!el)return;if(el.dataset.a===e.currentTarget.dataset.a){e.currentTarget.appendChild(el);el.draggable=false;el.classList.add('ok');ok++;fb.textContent='Richtig!';if(ok===pool.length){done('drag-drop-artikel.html');fb.textContent='Gut gemacht! Aufgabe erledigt.';nxt.classList.remove('hidden')}}else{fb.innerHTML='Falsche Grammatik: Der Artikel ist falsch.<div class="hint">Tipp: Achte auf der, die oder das.</div>';}}</script></body></html>
