<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Artikel Pull & Drop</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class='actions'><a class='btn secondary' href='index.html'>← Thema 1</a></div><section class='card'><div id='prog'></div><p class='small'>Ziehe die Nomen in die richtige Tabelle.</p><div id='chips'></div><div class='drop-grid'><div class='dropzone' data-a='der'><h2>der</h2></div><div class='dropzone' data-a='die'><h2>die</h2></div><div class='dropzone' data-a='das'><h2>das</h2></div></div><div id='fb' class='feedback'></div><a id='nextTask' class='btn hidden' href='plural.html'>Nächste Aufgabe →</a></section><footer>© SprachPilot</footer></div><script src="app.js?v=4"></script><script>hero("Artikel Pull & Drop");let pool=shuffle(singularWords().filter(w=>w.article!=='der/das')).slice(0,24),done=0;chips.innerHTML=pool.map(w=>`<span class='chip' draggable='true' data-id='${w.id}' data-a='${w.article}'>${w.word}</span>`).join('');function upd(){let p=Math.round(done/pool.length*100);prog.innerHTML=`<div class='small'>${done} richtig · ${pool.length-done} übrig · ${p}%</div><div class='progress'><div class='bar' style='width:${p}%'></div></div>`}upd();document.querySelectorAll('.chip').forEach(c=>c.addEventListener('dragstart',e=>e.dataTransfer.setData('id',c.dataset.id)));document.querySelectorAll('.dropzone').forEach(z=>{z.addEventListener('dragover',e=>e.preventDefault());z.addEventListener('drop',e=>{e.preventDefault();let el=document.querySelector(`[data-id="${e.dataTransfer.getData('id')}"]`);if(!el)return;if(el.dataset.a===z.dataset.a){z.appendChild(el);el.draggable=false;el.classList.add('ok');done++;upd();fb.textContent='Richtig!';if(done===pool.length){finishTask('drag-drop-artikel.html');nextTask.classList.remove('hidden');fb.textContent='Gut gemacht! Aufgabe erledigt.'}}else fb.innerHTML='Falsche Grammatik.<div class="hint">Tipp: der, die oder das?</div>'})});</script></body></html>
