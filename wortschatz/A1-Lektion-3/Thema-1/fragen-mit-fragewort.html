<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fragen mit Fragewort</title><link rel="stylesheet" href="style.css"></head><body>
<div id="accountStrip" class="account-strip"></div>
<script type="module" src="/js/guard.js"></script><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="translations.js?v=40"></script><script src="app.js?v=40"></script><script>header("Fragen mit Fragewort");
let data=[{"tokens": ["Was", "kaufst", "du", "?"], "order": ["Was", "kaufst", "du", "?"], "qword": "Was", "verb": "kaufst", "sub": "du", "obj": ""}, {"tokens": ["Was", "kauft", "Maria", "?"], "order": ["Was", "kauft", "Maria", "?"], "qword": "Was", "verb": "kauft", "sub": "Maria", "obj": ""}, {"tokens": ["Was", "trinken", "Peter und Julia", "?"], "order": ["Was", "trinken", "Peter und Julia", "?"], "qword": "Was", "verb": "trinken", "sub": "Peter und Julia", "obj": ""}, {"tokens": ["Wo", "ist", "der Käse", "?"], "order": ["Wo", "ist", "der Käse", "?"], "qword": "Wo", "verb": "ist", "sub": "der Käse", "obj": ""}, {"tokens": ["Wo", "ist", "die Milch", "?"], "order": ["Wo", "ist", "die Milch", "?"], "qword": "Wo", "verb": "ist", "sub": "die Milch", "obj": ""}, {"tokens": ["Wie viel", "kostet", "das Brot", "?"], "order": ["Wie viel", "kostet", "das Brot", "?"], "qword": "Wie viel", "verb": "kostet", "sub": "das Brot", "obj": ""}, {"tokens": ["Wie viel", "kostet", "die Torte", "?"], "order": ["Wie viel", "kostet", "die Torte", "?"], "qword": "Wie viel", "verb": "kostet", "sub": "die Torte", "obj": ""}, {"tokens": ["Wer", "kauft", "Brot", "?"], "order": ["Wer", "kauft", "Brot", "?"], "qword": "Wer", "verb": "kauft", "sub": "Brot", "obj": ""}, {"tokens": ["Wer", "bezahlt", "den Kuchen", "?"], "order": ["Wer", "bezahlt", "den Kuchen", "?"], "qword": "Wer", "verb": "bezahlt", "sub": "den Kuchen", "obj": ""}, {"tokens": ["Wann", "kaufen", "Sie", "ein", "?"], "order": ["Wann", "kaufen", "Sie", "ein", "?"], "qword": "Wann", "verb": "kaufen", "sub": "Sie", "obj": "ein"}, {"tokens": ["Wann", "kocht", "Maria", "?"], "order": ["Wann", "kocht", "Maria", "?"], "qword": "Wann", "verb": "kocht", "sub": "Maria", "obj": ""}, {"tokens": ["Warum", "kaufst", "du", "Wasser", "?"], "order": ["Warum", "kaufst", "du", "Wasser", "?"], "qword": "Warum", "verb": "kaufst", "sub": "du", "obj": "Wasser"}, {"tokens": ["Warum", "trinkt", "er", "Tee", "?"], "order": ["Warum", "trinkt", "er", "Tee", "?"], "qword": "Warum", "verb": "trinkt", "sub": "er", "obj": "Tee"}, {"tokens": ["Was", "möchte", "Julia", "?"], "order": ["Was", "möchte", "Julia", "?"], "qword": "Was", "verb": "möchte", "sub": "Julia", "obj": ""}, {"tokens": ["Wo", "bezahlt", "Peter", "?"], "order": ["Wo", "bezahlt", "Peter", "?"], "qword": "Wo", "verb": "bezahlt", "sub": "Peter", "obj": ""}],idx=0,built=[];
function render(){if(idx>=data.length){finishTask('fragen-mit-fragewort.html');area.innerHTML='<div class="big">Gut gemacht!</div><a class="btn" href="memory.html">Nächste Aufgabe →</a>';return}let cur=data[idx];built=[];area.innerHTML=`<div class="question">Baue die Frage. Setze auch ?</div><div id="built" class="built"></div><div class="tiles">${shuffle(cur.tokens).map(x=>`<button class="tile ${x===cur.verb?'verb':''}" onclick="add(this,'${x}')">${x}</button>`).join('')}</div><div class="actions"><button class="btn" onclick="control()">Kontrollieren</button><button class="btn secondary" onclick="render()">Neu starten</button></div><div id="step"></div><div id="fb" class="feedback"></div>`;window.cur=cur}
function add(b,x){built.push(x);b.disabled=true;document.getElementById('built').textContent=built.map((v,i)=>i===0?v.charAt(0).toUpperCase()+v.slice(1):v).join(' ')}
function control(){let ok=cur.order.join('|')===built.join('|');if(ok){fb.textContent='Reihenfolge richtig.';askVerb()}else{fb.innerHTML='Reihenfolge falsch. Klicke auf „Neu starten“ und korrigiere dich.<div class="hint">Das Verb ist rot markiert.</div>'}}
function askVerb(){step.innerHTML=`<div class="question">Wo ist das Verb/Prädikat?</div><div class="tiles">${cur.order.map(x=>`<button class="tile ${x===cur.verb?'verb':''}" onclick="${x===cur.verb?'askSubject()':'badMark()'}">${x}</button>`).join('')}</div>`}
function askSubject(){step.innerHTML=`<div class="question">Wo ist das Subjekt?</div><div class="tiles">${cur.order.map(x=>`<button class="tile" onclick="${x===cur.sub?'askObject()':'badMark()'}">${x}</button>`).join('')}</div>`}
function askObject(){if(!cur.obj){askQword();return}step.innerHTML=`<div class="question">Wo ist das Objekt?</div><div class="tiles">${cur.order.map(x=>`<button class="tile" onclick="${x===cur.obj?'nextAfterObj()':'badMark()'}">${x}</button>`).join('')}</div>`}
function nextAfterObj(){askQword()}
function askQword(){step.innerHTML=`<div class="question">Wo ist das Fragewort?</div><div class="tiles">${cur.order.map(x=>`<button class="tile" onclick="${x===cur.qword?'pass()':'badMark()'}">${x}</button>`).join('')}</div>`}
function badMark(){fb.innerHTML='Falsch markiert. Versuche es noch einmal.'}
function pass(){idx++;fb.textContent='Richtig!';setTimeout(render,700)}
render();
</script></body></html>
