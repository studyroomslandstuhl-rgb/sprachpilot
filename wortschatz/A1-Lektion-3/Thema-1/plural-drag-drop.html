<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plural Pull & Drop</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class='actions'><a class='btn secondary' href='index.html'>← Thema 1</a></div><section class='card'><div id='prog'></div><p class='small'>Ziehe die Singularformen in die richtige Pluralgruppe. Danach schreibe die Pluralform.</p><div id='chips'></div><div class='drop-grid' id='zones'></div><div id='writeBox'></div><div id='fb' class='feedback'></div><a id='nextTask' class='btn hidden' href='ein-eine.html'>Nächste Aufgabe →</a></section><footer>© SprachPilot</footer></div><script src="app.js"></script><script>hero("Plural Pull & Drop");const groups=['-/Umlaut','-e/Umlaut-e','-er/Umlaut-er','-en/-n','-s','kein Plural','-'];let pool=shuffle(activeWords()).slice(0,30),done=0,i=0;zones.innerHTML=groups.map(g=>`<div class='dropzone' data-g='${g}'><h2>${g}</h2></div>`).join('');chips.innerHTML=pool.map(w=>`<span class='chip' draggable='true' data-id='${w.id}'>${full(w)}</span>`).join('');function upd(){let p=Math.round(done/pool.length*50);prog.innerHTML=`<div class='small'>${done} zugeordnet · ${pool.length-done} übrig · ${p}%</div><div class='progress'><div class='bar' style='width:${p}%'></div></div>`}upd();document.querySelectorAll('.chip').forEach(c=>c.addEventListener('dragstart',e=>e.dataTransfer.setData('id',c.dataset.id)));document.querySelectorAll('.dropzone').forEach(z=>{z.addEventListener('dragover',e=>e.preventDefault());z.addEventListener('drop',e=>{e.preventDefault();let el=document.querySelector(`[data-id="${e.dataTransfer.getData('id')}"]`),w=pool.find(x=>x.id===e.dataTransfer.getData('id'));if(!el)return;let g=w.pluralGroup==='kein Plural'?'kein Plural':w.pluralGroup;if(g===z.dataset.g){z.appendChild(el);el.draggable=false;el.classList.add('ok');done++;upd();if(done===pool.length)writeStep()}else fb.innerHTML='Falsche Gruppe.<div class="hint">Tipp: Achte auf die Pluralendung.</div>'})});function writeStep(){fb.textContent='Jetzt Pluralformen schreiben.';show()}function show(){let w=pool[i];writeBox.innerHTML=`<div class='question'>${full(w)}</div><input id='pl'><button class='btn' onclick='checkPl()'>Prüfen</button>`}function checkPl(){let w=pool[i];if(pluralOk(pl.value,w)){i++;let p=50+Math.round(i/pool.length*50);prog.innerHTML=`<div class='small'>${i} Pluralformen · ${pool.length-i} übrig · ${p}%</div><div class='progress'><div class='bar' style='width:${p}%'></div></div>`;if(i>=pool.length){finishTask('plural-drag-drop.html');writeBox.innerHTML='';fb.textContent='Gut gemacht! Aufgabe erledigt.';nextTask.classList.remove('hidden')}else show()}else fb.innerHTML='Falsche Pluralform.<div class="hint">Lösung: '+w.plural+'</div>'}</script></body></html>
