<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plural Pull & Drop</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div>
<section class="card"><div id="prog"></div><p class="small">Ziehe oder tippe die Singularformen in die richtige Pluralgruppe. Danach schreibe die Pluralform.</p><div id="chips"></div><div class="drop-grid" id="zones"></div><div id="writeBox"></div><div id="fb" class="feedback"></div><a id="nextTask" class="btn hidden" href="ein-eine.html">Nächste Aufgabe →</a></section><footer>© SprachPilot</footer></div><script src="app.js?v=11"></script><script>hero("Plural Pull & Drop");
const groups=['-/Umlaut','-e/Umlaut-e','-er/Umlaut-er','-en/-n','-s','kein Plural','-'];
let pool=shuffle(activeWords()).slice(0,20),placed=0,writeIndex=0,selected=null;
zones.innerHTML=groups.map(g=>`<div class="dropzone" data-g="${g}"><h2>${g}</h2></div>`).join('');
chips.innerHTML=pool.map(w=>`<span class="chip" draggable="true" data-id="${w.id}">${full(w)}</span>`).join('');
function progress(pct=null){if(pct===null)pct=Math.round(placed/pool.length*50);prog.innerHTML=`<div class="small">${placed} zugeordnet · ${pool.length-placed} übrig · ${pct}%</div><div class="progress"><div class="bar" style="width:${pct}%"></div></div>`}
document.querySelectorAll('.chip').forEach(ch=>{ch.addEventListener('dragstart',e=>e.dataTransfer.setData('id',ch.dataset.id));ch.addEventListener('click',()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('selected'));selected=ch.dataset.id;ch.classList.add('selected');fb.textContent='Jetzt Pluralgruppe wählen.';});});
function groupOf(w){return w.pluralGroup==='kein Plural'?'kein Plural':w.pluralGroup}
function place(id,z){let el=document.querySelector(`.chip[data-id="${id}"]`);let w=pool.find(x=>x.id===id);if(!el||!w)return;if(z.dataset.g===groupOf(w)){z.appendChild(el);el.draggable=false;el.classList.remove('selected');el.classList.add('ok');placed++;selected=null;fb.textContent='Richtig!';progress();if(placed===pool.length)startWrite()}else{fb.innerHTML='Falsche Gruppe.<div class="hint">Tipp: Vergleiche die Pluralendung.</div>';}}
document.querySelectorAll('.dropzone').forEach(z=>{z.addEventListener('dragover',e=>e.preventDefault());z.addEventListener('drop',e=>{e.preventDefault();place(e.dataTransfer.getData('id'),z)});z.addEventListener('click',()=>{if(selected)place(selected,z)});});
progress();
function startWrite(){fb.textContent='Jetzt Pluralformen schreiben.';writeIndex=0;showWrite()}
function showWrite(){let w=pool[writeIndex];writeBox.innerHTML=`<div class="question">${full(w)}</div><input id="plIn" placeholder="Plural oder Nur Singular"><button class="btn" onclick="checkPl()">Prüfen</button>`}
function checkPl(){let w=pool[writeIndex];if(checkPluralOk(plIn.value,w)){writeIndex++;let pct=50+Math.round(writeIndex/pool.length*50);prog.innerHTML=`<div class="small">${writeIndex} Pluralformen geschrieben · ${pool.length-writeIndex} übrig · ${pct}%</div><div class="progress"><div class="bar" style="width:${pct}%"></div></div>`;if(writeIndex>=pool.length){finishTask('plural-drag-drop.html');writeBox.innerHTML='';fb.textContent='Gut gemacht! Aufgabe erledigt.';nextTask.classList.remove('hidden')}else showWrite()}else{fb.innerHTML='Falsche Pluralform.<div class="hint">Richtige Antwort: '+w.plural+'</div>'}}
function checkPluralOk(ans,w){return norm(ans)===w.plural}
</script></body></html>
