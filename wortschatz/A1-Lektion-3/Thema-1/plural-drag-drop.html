<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pluralgruppen</title>
<link rel="stylesheet" href="style.css">
<style>
  .chip{
    cursor:grab;
    user-select:none;
    touch-action:none;
    display:inline-flex;
    margin:5px;
    position:relative;
    z-index:5;
  }
  .chip.selected{
    outline:4px solid #27ae60;
  }
  .chip.no{
    background:#ffe1e1!important;
    border-color:#e74c3c!important;
    color:#9b1c1c!important;
  }
  .chip.ok{
    background:#d9f7e8!important;
    border-color:#27ae60!important;
    color:#145a32!important;
  }
  .correction{
    display:block;
    font-size:12px;
    font-weight:900;
    color:#9b1c1c;
    margin:4px 0 6px 8px;
  }
  .dropzone{
    cursor:pointer;
    min-height:130px;
  }
  .dropzone.drag-over{
    outline:4px dashed #27ae60;
  }
</style>
</head>

<body>
<div id="accountStrip" class="account-strip"></div>
<script type="module" src="/js/guard.js"></script>
<div class="container">
<section class="hero"></section>

<div class="actions">
  <a class="btn secondary" href="index.html">← Zurück</a>
</div>

<section class="card">
  <h2 class="module-title">Pluralgruppen</h2>
  <p class="small">
    Ziehe ein Wort in eine Gruppe oder tippe zuerst auf das Wort und dann auf die Gruppe.
    Nach <b>Kontrollieren</b> bleiben falsche Wörter verschiebbar.
  </p>

  <div class="drop-grid">
    <div class="dropzone" id="poolZone" data-g="pool">
      <h2>Nicht zugeordnet</h2>
      <div id="chips"></div>
    </div>
  </div>

  <div class="drop-grid" id="zones"></div>

  <div class="actions">
    <button class="btn" onclick="control()">Kontrollieren</button>
    <button class="btn secondary" onclick="clearSelection()">Auswahl lösen</button>
  </div>

  <div id="fb" class="feedback"></div>
  <a id="nextTask" class="btn hidden" href="memory.html">Nächste Aufgabe →</a>
</section>

<footer>© SprachPilot</footer>
</div>

<script src="app.js?v=pluralfix-final3"></script>
<script>
if(typeof header === "function"){ header("Pluralgruppen"); }

const GROUPS = [
  "-/Umlaut",
  "-e/Umlaut-e",
  "-er/Umlaut-er",
  "-en/-n",
  "-s",
  "kein Plural",
  "-"
];

function pg(g){
  g = String(g || "").trim();
  if(typeof normalizePluralGroup === "function") g = normalizePluralGroup(g);

  if(g === "-e" || g === "Umlaut-e") return "-e/Umlaut-e";
  if(g === "-er" || g === "Umlaut-er") return "-er/Umlaut-er";
  if(g === "-n" || g === "-en") return "-en/-n";
  if(g === "kein Endung") return "-";

  return g;
}

const pool = (typeof activeWords === "function" ? activeWords() : WORDS).slice(0, 20);
let selected = null;

zones.innerHTML = GROUPS.map(g =>
  `<div class="dropzone" data-g="${g}">
     <h2>${g}</h2>
   </div>`
).join("");

chips.innerHTML = pool.map(w =>
  `<span class="chip" draggable="true" data-id="${w.id}">${w.article ? w.article + " " : ""}${w.word}</span>`
).join("");

function clearCorrections(){
  document.querySelectorAll(".correction").forEach(x => x.remove());
}

function clearSelection(){
  document.querySelectorAll(".chip").forEach(x => x.classList.remove("selected"));
  selected = null;
}

function cleanChip(chip){
  chip.classList.remove("selected", "ok", "no");

  let next = chip.nextElementSibling;
  while(next && next.classList && next.classList.contains("correction")){
    const tmp = next.nextElementSibling;
    next.remove();
    next = tmp;
  }
}

function moveChipToZone(chip, zone){
  if(!chip || !zone) return;
  cleanChip(chip);
  zone.appendChild(chip);
  clearSelection();
}

function initChips(){
  document.querySelectorAll(".chip").forEach(chip => {
    chip.onclick = (e) => {
      e.preventDefault();
      e.stopPropagation();
      clearSelection();
      selected = chip;
      chip.classList.add("selected");
    };

    chip.addEventListener("dragstart", e => {
      selected = chip;
      e.dataTransfer.setData("text/plain", chip.dataset.id);
      e.dataTransfer.effectAllowed = "move";
    });
  });
}

function initZones(){
  document.querySelectorAll(".dropzone").forEach(zone => {
    zone.onclick = (e) => {
      if(e.target.closest(".chip")) return;
      if(selected) moveChipToZone(selected, zone);
    };

    zone.addEventListener("dragover", e => {
      e.preventDefault();
      zone.classList.add("drag-over");
    });

    zone.addEventListener("dragleave", () => {
      zone.classList.remove("drag-over");
    });

    zone.addEventListener("drop", e => {
      e.preventDefault();
      zone.classList.remove("drag-over");
      const id = e.dataTransfer.getData("text/plain");
      const chip = document.querySelector(`.chip[data-id="${id}"]`);
      moveChipToZone(chip, zone);
    });
  });
}

initChips();
initZones();

function control(){
  clearCorrections();

  let ok = 0;

  document.querySelectorAll(".chip").forEach(c => {
    c.classList.remove("selected", "ok", "no");
  });

  GROUPS.forEach(group => {
    const zone = document.querySelector(`.dropzone[data-g="${group}"]`);
    if(!zone) return;

    zone.querySelectorAll(".chip").forEach(c => {
      const w = pool.find(x => x.id === c.dataset.id);
      if(!w) return;

      const correctGroup = pg(w.pluralGroup);
      const chosenGroup = pg(group);

      if(chosenGroup === correctGroup){
        c.classList.add("ok");
        ok++;
        if(typeof updateWordProgress === "function") updateWordProgress(w.id);
      }else{
        c.classList.add("no");

        const note = document.createElement("span");
        note.className = "correction";
        note.textContent = "richtig: " + correctGroup;
        c.after(note);
      }
    });
  });

  const notAssigned = document.querySelectorAll("#poolZone .chip").length;

  if(notAssigned > 0){
    fb.textContent = ok + " von " + pool.length + " richtig. " + notAssigned + " Wörter sind noch nicht zugeordnet.";
  }else if(ok === pool.length){
    fb.textContent = "Alles richtig. Gut gemacht!";
    if(typeof finishTask === "function") finishTask("plural-drag-drop.html");
    else if(typeof done === "function") done("plural-drag-drop.html");
    nextTask.classList.remove("hidden");
  }else{
    fb.textContent = ok + " von " + pool.length + " richtig. Korrigiere die roten Wörter. Sie bleiben verschiebbar.";
  }

  clearSelection();
}
</script>
</body>
</html>
