<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sprechen</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js"></script><script>hero("Sprechen");let q=Q(),w,tries=0;function render(){w=next(q);if(!w){finish(area,"sprechen.html","schreiben.html");return}tries=0;area.innerHTML=`<div class="question">Sprich auf Deutsch:</div><div class="big">${trans(w)}</div><div class="actions"><button class="btn" onclick="say()">🎙️ Sprechen</button><button class="btn secondary" onclick="speak(full(w))">🔊 Lösung hören</button></div><details><summary>Ich kann nicht sprechen – schreiben</summary><input id="ans" placeholder="Artikel + Nomen"><button class="btn" onclick="checkText()">Prüfen</button></details><div class="feedback" id="fb"></div>`}function fail(d){tries++;fb.innerHTML=d.msg+`<div class="hint">${tries===1?d.tip:'Richtige Antwort: '+d.sol}</div>`;bad(q,w)}function ok(){fb.textContent='Richtig!';setTimeout(render,650)}function checkText(){let d=diagnose(ans.value,w);d.ok?ok():fail(d)}function say(){rec(t=>{if(!t){fb.innerHTML='Ich konnte dich nicht hören.<div class="hint">Nutze die Schreibzeile unten.</div>';return}let d=diagnose(t,w);d.ok?ok():fail(d)})}render();</script></body></html>
