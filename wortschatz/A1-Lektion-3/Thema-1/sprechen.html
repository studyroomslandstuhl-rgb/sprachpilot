<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sprechen</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=10"></script><script>hero("Sprechen");let q=Q(singularWords());function render(){q.cur=next(q);if(!q.cur){complete(area,'sprechen.html','schreiben.html');return}q.tries=0;q.had=false;area.innerHTML=prog(q)+`<div class='question'>Sprich Artikel + Nomen.</div><img class='food-img' src='${q.cur.image}'><div class='actions'><button id='micBtn' class='btn' onclick='say()'>🎙️ Sprechen</button></div><details><summary>Schreiben statt sprechen</summary><input id='ans' placeholder='Artikel + Nomen'><button class='btn' onclick='checkText()'>Prüfen</button></details><div id='micStatus' class='hint hidden'></div><div id='fb' class='feedback'></div>`}function ok(){right(q,q.cur);fb.textContent='Richtig!';setTimeout(render,700)}function failNow(d){wrong(q);fb.innerHTML=fail(q,d)}function say(){micBtn.disabled=true;micStatus.classList.remove('hidden');micStatus.textContent='🎙️ Mikrofon ist aktiv. Sprich jetzt ...';fb.textContent='';speech((txt,status)=>{micBtn.disabled=false;micStatus.classList.add('hidden');if(!txt){fb.innerHTML='Ich konnte dich nicht hören.<div class="hint">Prüfe die Mikrofon-Erlaubnis oder nutze unten „Schreiben statt sprechen“.</div>';return}let d=diagnose(txt,q.cur);if(d.ok){ok()}else{failNow(d)}})}function checkText(){let d=diagnose(ans.value,q.cur);d.ok?ok():failNow(d)}render();</script></body></html>
