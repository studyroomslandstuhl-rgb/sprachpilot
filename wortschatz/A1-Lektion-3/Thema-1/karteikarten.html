<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karteikarten</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=10"></script><script>hero("Karteikarten");
let Q=makeQueue(singularWords());
function render(){
 Q.current=nextItem(Q); if(!Q.current){complete(area,'karteikarten.html','bild-wort.html');return}
 Q.tries=0; Q.hadError=false;
 area.innerHTML=progressHTML(Q)+`<div class="question">Sage oder schreibe auf Deutsch:</div><div class="big">${t(Q.current)}</div><img class="food-img" src="${Q.current.image}" onerror="fixImg(this,Q.current.id)" alt=""><div class="actions"><button class="btn" onclick="say()">🎙️ Sprechen</button><button class="btn secondary" onclick="flip()">Karte umdrehen</button></div><input id="ans" placeholder="Artikel + Nomen, z. B. der Apfel"><button class="btn" onclick="checkText()">Prüfen</button><div id="fb" class="feedback"></div><div class="actions"><button id="go" class="btn hidden" onclick="render()">Weiter</button></div>`;
}
function flip(){markWrong(Q);fb.innerHTML='Du hast die Karte umgedreht. Das zählt als Hilfe und wird wiederholt.<div class="hint">Lösung: '+full(Q.current)+'</div>';}
function say(){speech(txt=>{let d=diagnoseFull(txt,Q.current); if(d.ok){fb.textContent='Richtig gesprochen. Schreibe es jetzt korrekt, dann erscheint Weiter.'}else{markWrong(Q);fb.innerHTML=failHTML(Q,d)}})}
function checkText(){let d=diagnoseFull(ans.value,Q.current); if(d.ok){markRight(Q,Q.current);fb.textContent='Richtig!';go.classList.remove('hidden')}else{markWrong(Q);fb.innerHTML=failHTML(Q,d)}}
render();
</script></body></html>
