<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karteikarten</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=11"></script><script>hero("Karteikarten");
let q=Q(singularWords());
function render(){
 q.cur=next(q);if(!q.cur){complete(area,'karteikarten.html','bild-wort.html');return}
 q.tries=0;q.had=false;
 area.innerHTML=prog(q)+`<div class="question">Sage oder schreibe auf Deutsch:</div><div class="big">${t(q.cur)}</div><div class="flip-card" id="card"><div class="food-img" style="display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#e87511;">${t(q.cur)}</div></div><div class="actions"><button id="micBtn" class="btn" onclick="say()">🎙️ Sprechen</button><button class="btn secondary" onclick="flip()">Karte umdrehen</button></div><input id="ans" placeholder="Artikel + Nomen, z. B. der Apfel"><button class="btn" onclick="checkText()">Prüfen</button><div id="micStatus" class="hint hidden"></div><div id="fb" class="feedback"></div><div class="actions"><button id="go" class="btn hidden" onclick="render()">Weiter</button></div>`;
}
function flip(){wrong(q);card.innerHTML=`<div class="food-img" style="display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#e87511;">${full(q.cur)}</div>`;fb.innerHTML='Du hast die Karte umgedreht. Das zählt als Hilfe und wird wiederholt.<div class="hint">Lies die Lösung und klicke dann Weiter.</div>';go.classList.remove('hidden')}
function say(){micBtn.disabled=true;micStatus.classList.remove('hidden');micStatus.textContent='🎙️ Mikrofon ist aktiv. Sprich jetzt ...';speech((txt,status)=>{micBtn.disabled=false;micStatus.classList.add('hidden');if(!txt){fb.innerHTML='Ich konnte dich nicht hören.<div class="hint">Nutze das Schreibfeld.</div>';return}let d=diagnose(txt,q.cur);if(d.ok){fb.textContent='Richtig gesprochen. Schreibe es jetzt korrekt, dann erscheint Weiter.'}else{wrong(q);fb.innerHTML=fail(q,d)}})}
function checkText(){let d=diagnose(ans.value,q.cur);if(d.ok){right(q,q.cur);fb.textContent='Richtig!';go.classList.remove('hidden')}else{wrong(q);fb.innerHTML=fail(q,d)}}
render();
</script></body></html>
