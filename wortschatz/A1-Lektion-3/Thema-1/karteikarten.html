<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Karteikarten</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="accountStrip" class="account-strip"></div>

<div class="container">
  <section class="hero"></section>
  <div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div>
  <section class="card" id="area">
    <div class="question">Aufgabe wird geladen …</div>
  </section>
  <footer>© SprachPilot</footer>
</div>

<script src="app.js?v=41"></script>
<script>
header("Karteikarten");

const FILE = "karteikarten.html";
const CARD_WORDS = (typeof singularWords === "function" ? singularWords() : activeWords());
let Q = queueFor(FILE, CARD_WORDS);

function cardTranslation(w){
  return trans(w) || w.word || full(w);
}

function show(){
  Q.cur = nextItem(Q);

  if(!Q.cur){
    complete(area, FILE, "bild-wort.html");
    return;
  }

  Q.tries = 0;
  Q.had = false;
  const w = Q.cur;

  area.innerHTML = `${prog(Q)}
    <div class="question">Sage das deutsche Wort mit Artikel.</div>
    <div class="hint">Muttersprache: <b>${cardTranslation(w)}</b></div>
    <img class="food-img" src="${w.image}" onerror="fixImg(this)" alt="">
    <div class="actions">
      <button id="micBtn" class="btn mic-btn" onclick="say()">🎤 Sprechen</button>
      <button class="btn secondary" onclick="writeBox()">Ich kann nicht sprechen</button>
      <button class="btn secondary" onclick="flip()">Karte umdrehen</button>
    </div>
    <div id="micStatus" class="mic-status"></div>
    <div id="box" class="hidden">
      <input id="ans" placeholder="z. B. die Tomate">
      <button class="btn" onclick="check(ans.value)">Kontrollieren</button>
    </div>
    <div id="fb" class="feedback"></div>`;
}

function writeBox(){
  box.classList.remove("hidden");
}

function flip(){
  const w = Q.cur;
  wrong(Q);
  persist(Q);
  fb.innerHTML = feedbackForCard(Q.tries, full(w), "Artikel und Wort");
  box.classList.remove("hidden");
  ans.value = full(w);
}

function say(){
  startMic(micBtn, txt => {
    writeBox();
    ans.value = txt;
    check(txt);
  });
}

function check(txt){
  const w = Q.cur;
  const d = diagnose(txt, w);

  if(d.ok){
    fb.textContent = "Richtig!";
    right(Q, w);
    setTimeout(show, 700);
  }else{
    wrong(Q);
    fb.innerHTML = feedbackForCard(Q.tries, d.sol || full(w), d.tip || "Artikel und Wort");
    // Wichtig: NICHT automatisch weitergehen.
  }
}

function feedbackForCard(tries, solution, type){
  if(tries === 1) return "Da ist noch ein Fehler.";
  if(tries === 2) return "Tipp: Prüfe " + type + ".";
  return "Lösung: " + solution;
}

show();
</script>
<script type="module" src="/js/guard.js"></script>
</body>
</html>
