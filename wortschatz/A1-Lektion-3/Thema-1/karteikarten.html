<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karteikarten</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js"></script><script>hero("Karteikarten");let q=Q(singularWords());function render(){q.cur=next(q);if(!q.cur){complete(area,'karteikarten.html','bild-wort.html');return}q.tries=0;q.had=false;area.innerHTML=prog(q)+`<div class='question'>Sage auf Deutsch:</div><div class='big'>${tr(q.cur)}</div><img class='food-img' src='${q.cur.image}'><div class='actions'><button class='btn' onclick='say()'>🎙️ Sprechen</button><button class='btn secondary' onclick='flip()'>Karte umdrehen</button></div><div id='fb' class='feedback'></div>`}function flip(){wrong(q);fb.innerHTML='Du hast Hilfe benutzt. Das Wort kommt später wieder.<div class="hint">Lösung: '+full(q.cur)+'</div>';setTimeout(render,1800)}function say(){speech(txt=>{let d=diagnose(txt,q.cur);if(d.ok){right(q,q.cur);fb.textContent='Richtig!';setTimeout(render,700)}else{wrong(q);fb.innerHTML=fail(q,d)}})}render();</script></body></html>
