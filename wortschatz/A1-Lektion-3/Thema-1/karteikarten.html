<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karteikarten</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=40"></script><script>header("Karteikarten");let Q=queueFor('karteikarten.html',singularWords());function render(){Q.cur=nextItem(Q);if(!Q.cur){complete(area,'karteikarten.html','bild-wort.html');return}Q.tries=0;Q.had=false;area.innerHTML=prog(Q)+`<div class="question">Sage auf Deutsch:</div><div class="big">${trans(Q.cur)}</div><div id="card" class="card" style="box-shadow:none;border:2px solid #ffd39b;text-align:center;min-height:120px"><div class="big">${trans(Q.cur)}</div></div><div class="actions"><button id="mic" class="btn" onclick="say()">Sprechen</button><button class="btn secondary" onclick="showWrite()">Ich kann nicht sprechen</button><button class="btn secondary" onclick="flip()">Karte umdrehen</button></div><div id="writeBox" class="hidden"><input id="ans" placeholder="Artikel + Nomen"><button class="btn" onclick="checkText()">Kontrollieren</button></div><div id="micStatus" class="hint hidden"></div><div id="fb" class="feedback"></div><div class="actions"><button id="go" class="btn hidden" onclick="render()">Weiter</button></div>`}function showWrite(){writeBox.classList.remove('hidden')}function flip(){wrong(Q);card.innerHTML=`<div class="big">${full(Q.cur)}</div>`;fb.innerHTML='Hilfe benutzt. Das Wort wird später wiederholt.';go.classList.remove('hidden')}function say(){mic.disabled=true;micStatus.classList.remove('hidden');micStatus.textContent='Mikrofon aktiv ...';speech((txt)=>{mic.disabled=false;micStatus.classList.add('hidden');if(!txt){fb.innerHTML='Ich konnte dich nicht hören. Nutze „Ich kann nicht sprechen“.';return}let d=diagnose(txt,Q.cur);if(d.ok){right(Q,Q.cur);fb.textContent='Richtig!';go.classList.remove('hidden')}else{wrong(Q);fb.innerHTML=fail(Q,d)}})}function checkText(){let d=diagnose(ans.value,Q.cur);if(d.ok){right(Q,Q.cur);fb.textContent='Richtig!';go.classList.remove('hidden')}else{wrong(Q);fb.innerHTML=fail(Q,d)}}render();</script></body></html>
