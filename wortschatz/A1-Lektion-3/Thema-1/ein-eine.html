<script type="module" src="/js/guard.js"></script><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=40"></script><script>header("Das ist ...");let Q=queueFor('ein-eine.html',singularWords());function sol(w){return w.countable?(w.article==='die'?'eine '+w.word:'ein '+w.word):w.word}function render(){Q.cur=nextItem(Q);if(!Q.cur){complete(area,'ein-eine.html','kein-keine.html');return}Q.tries=0;Q.had=false;area.innerHTML=prog(Q)+`<div class="question">Wie heißt das auf Deutsch? Das ist ...</div><img class="food-img" src="${Q.cur.image}" onerror="fixImg(this)"><input id="ans"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}function check(){let s=sol(Q.cur);if(simple(ans.value)===simple(s)){right(Q,Q.cur);fb.textContent='Richtig!';setTimeout(render,700)}else{wrong(Q);let tip=Q.cur.countable?'Zählbar: ein/eine + Nomen.':'Unzählbares Nomen: kein ein/eine, weil es keine normale Pluralform hat.';fb.innerHTML=fail(Q,{msg:'Falsche Grammatik.',tip:tip,sol:s})}}render();</script></body></html>
