<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wort → Bild</title><link rel="stylesheet" href="style.css"></head><body>
<div id="accountStrip" class="account-strip"></div>
<script type="module" src="/js/guard.js"></script><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=40"></script><script>header("Wort → Bild");let Q=queueFor('wort-bild.html',singularWords());function render(){Q.cur=nextItem(Q);if(!Q.cur){complete(area,'wort-bild.html','hoeren.html');return}Q.tries=0;Q.had=false;let opts=shuffle([Q.cur,...shuffle(singularWords().filter(w=>w.id!==Q.cur.id)).slice(0,3)]);area.innerHTML=prog(Q)+`<div class="question">${full(Q.cur)}</div><div class="options">${opts.map(o=>`<button class="opt image-opt" onclick="pick('${o.id}',this)"><img class="choice-img" src="${o.image}" onerror="fixImg(this)"></button>`).join('')}</div><div id="fb" class="feedback"></div>`}function pick(id,b){if(id===Q.cur.id){b.classList.add('ok');right(Q,Q.cur);fb.textContent='Richtig!';setTimeout(render,700)}else{b.classList.add('no');wrong(Q);fb.innerHTML=fail(Q,{msg:'Falsches Bild.',tip:'Vergleiche das Wort mit dem Bild.',sol:full(Q.cur)});}}render();</script></body></html>
