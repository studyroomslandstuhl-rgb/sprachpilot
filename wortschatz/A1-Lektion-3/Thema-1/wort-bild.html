<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wort → Bild</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="app.js?v=10"></script><script>hero("Wort \u2192 Bild");let q=Q(singularWords());function render(){q.cur=next(q);if(!q.cur){complete(area,'wort-bild.html','hoeren.html');return}q.tries=0;q.had=false;let opts=shuffle([q.cur,...shuffle(activeWords().filter(w=>w.id!==q.cur.id)).slice(0,3)]);area.innerHTML=prog(q)+`<div class='question'>Wähle das richtige Bild: ${full(q.cur)}</div><div class='options'>${opts.map(o=>`<button class='opt image-opt' onclick='pick("${o.id}",this)'><img class='choice-img' src='${o.image}'></button>`).join('')}</div><div id='fb' class='feedback'></div>`}function pick(id,b){document.querySelectorAll('.opt').forEach(x=>x.disabled=true);if(id===q.cur.id){b.classList.add('ok');right(q,q.cur);fb.textContent='Richtig!';setTimeout(render,700)}else{b.classList.add('no');wrong(q);fb.innerHTML=fail(q,{msg:'Falsches Bild.',tip:'Vergleiche Wort und Bild.',sol:full(q.cur)});setTimeout(render,1800)}}render();</script></body></html>
