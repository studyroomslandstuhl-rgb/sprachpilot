<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Wort → Bild</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#f2994a,#f2c94c);color:#222;padding:16px}
.container{max-width:980px;margin:0 auto}
.hero,.card{background:white;border-radius:24px;padding:22px;box-shadow:0 12px 32px rgba(0,0,0,.2);margin-bottom:16px}
.hero{text-align:center;border-top:9px solid #f28c28}
.logo{width:92px;height:92px;margin:0 auto 12px;border-radius:24px;background:#fff4e6;border:3px solid #ffd39b;display:flex;align-items:center;justify-content:center;font-size:42px}
h1{color:#e87511;font-size:32px;margin-bottom:6px}.sub{color:#666;font-size:16px;line-height:1.4}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.btn,.module{display:block;text-decoration:none;text-align:center;border:0;border-radius:16px;padding:15px 14px;font-weight:900;font-size:16px;cursor:pointer;background:linear-gradient(135deg,#f28c28,#f2b84b);color:white;box-shadow:0 8px 18px rgba(0,0,0,.18);margin:6px}
.btn.secondary{background:#fff4e6;color:#7a3d00;border:2px solid #ffd39b;box-shadow:none}
.module{background:white;color:#222;text-align:left;border:3px solid transparent}.module:hover{border-color:#e87511;transform:translateY(-2px)}
.module-title{color:#e87511;font-size:20px;margin-bottom:8px}.badge{display:inline-block;margin-top:10px;background:#fff3cd;border:2px solid #ffc107;color:#7a5400;border-radius:99px;padding:5px 10px;font-size:13px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}.stat{background:#fff4e6;border:2px solid #ffd39b;border-radius:16px;padding:12px;text-align:center}.num{font-size:27px;font-weight:900;color:#e87511}.small{font-size:14px;color:#666}
.progress{height:20px;background:#fff4e6;border-radius:99px;overflow:hidden;margin-top:12px}.bar{height:100%;width:0;background:linear-gradient(135deg,#27ae60,#2ecc71)}
.question{text-align:center;font-size:30px;font-weight:900;color:#e87511;margin:18px 0}.emoji{text-align:center;font-size:80px;margin:12px}
.options{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.opt{border:2px solid #ffd39b;border-radius:16px;background:#fff4e6;color:#222;padding:15px;font-weight:900;font-size:17px;cursor:pointer}
.ok{background:#d9f7e8!important;border-color:#27ae60!important}.no{background:#ffe1e1!important;border-color:#e74c3c!important}
input{width:100%;padding:14px;border:2px solid #ffd39b;border-radius:14px;font-size:18px;margin:10px 0}.feedback{font-weight:900;text-align:center;margin:12px;font-size:20px}.actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}
footer{text-align:center;color:white;margin-top:22px}
@media(max-width:650px){body{padding:10px}h1{font-size:27px}.question{font-size:25px}.emoji{font-size:70px}}
</style></head><body><div class="container">
<section class="hero"><div class="logo">🛒</div><h1>Wort → Bild</h1><p class="sub">A1 Lektion 3 · Thema 1 · Lebensmittel & Getränke</p></section>
<div class="actions"><a class="btn secondary" href="index.html">← Thema 1</a></div><section class="card"><div id="area"></div><div class="feedback" id="fb"></div><div class="actions"><button class="btn secondary" onclick="speak(currentText)">🔊 Hören</button><button class="btn" id="nextBtn" onclick="nextQ()">Weiter</button><a class="btn secondary" href="hoeren.html">Nächste Aufgabe →</a></div></section>
<footer>© SprachPilot</footer></div><script>const WORDS=[{"a": "das", "w": "Brot", "p": "Brote", "cat": "Lebensmittel", "emoji": "🍞"}, {"a": "das", "w": "Brötchen", "p": "Brötchen", "cat": "Lebensmittel", "emoji": "🥖"}, {"a": "die", "w": "Butter", "p": "", "cat": "Lebensmittel", "emoji": "🧈"}, {"a": "die", "w": "Milch", "p": "", "cat": "Getränke", "emoji": "🥛"}, {"a": "das", "w": "Ei", "p": "Eier", "cat": "Lebensmittel", "emoji": "🥚"}, {"a": "das", "w": "Mehl", "p": "", "cat": "Lebensmittel", "emoji": "🌾"}, {"a": "der", "w": "Zucker", "p": "", "cat": "Lebensmittel", "emoji": "🧂"}, {"a": "das", "w": "Salz", "p": "", "cat": "Lebensmittel", "emoji": "🧂"}, {"a": "der", "w": "Reis", "p": "", "cat": "Lebensmittel", "emoji": "🍚"}, {"a": "das", "w": "Fleisch", "p": "", "cat": "Lebensmittel", "emoji": "🥩"}, {"a": "das", "w": "Hackfleisch", "p": "", "cat": "Lebensmittel", "emoji": "🥩"}, {"a": "die", "w": "Wurst", "p": "Würste", "cat": "Lebensmittel", "emoji": "🌭"}, {"a": "das", "w": "Würstchen", "p": "Würstchen", "cat": "Lebensmittel", "emoji": "🌭"}, {"a": "der", "w": "Fisch", "p": "Fische", "cat": "Lebensmittel", "emoji": "🐟"}, {"a": "der", "w": "Käse", "p": "", "cat": "Lebensmittel", "emoji": "🧀"}, {"a": "der/das", "w": "Joghurt", "p": "Joghurts", "cat": "Lebensmittel", "emoji": "🥛"}, {"a": "die", "w": "Sahne", "p": "", "cat": "Lebensmittel", "emoji": "🥛"}, {"a": "der", "w": "Apfel", "p": "Äpfel", "cat": "Obst", "emoji": "🍎"}, {"a": "die", "w": "Banane", "p": "Bananen", "cat": "Obst", "emoji": "🍌"}, {"a": "die", "w": "Birne", "p": "Birnen", "cat": "Obst", "emoji": "🍐"}, {"a": "die", "w": "Orange", "p": "Orangen", "cat": "Obst", "emoji": "🍊"}, {"a": "die", "w": "Kartoffel", "p": "Kartoffeln", "cat": "Gemüse", "emoji": "🥔"}, {"a": "die", "w": "Zwiebel", "p": "Zwiebeln", "cat": "Gemüse", "emoji": "🧅"}, {"a": "die", "w": "Tomate", "p": "Tomaten", "cat": "Gemüse", "emoji": "🍅"}, {"a": "der", "w": "Saft", "p": "Säfte", "cat": "Getränke", "emoji": "🧃"}, {"a": "das", "w": "Mineralwasser", "p": "", "cat": "Getränke", "emoji": "💧"}, {"a": "der", "w": "Kaffee", "p": "Kaffees", "cat": "Getränke", "emoji": "☕"}, {"a": "der", "w": "Tee", "p": "Tees", "cat": "Getränke", "emoji": "🍵"}, {"a": "das", "w": "Bier", "p": "", "cat": "Getränke", "emoji": "🍺"}, {"a": "der", "w": "Wein", "p": "Weine", "cat": "Getränke", "emoji": "🍷"}, {"a": "die", "w": "Schokolade", "p": "", "cat": "Süßes", "emoji": "🍫"}, {"a": "der", "w": "Kuchen", "p": "Kuchen", "cat": "Süßes", "emoji": "🍰"}, {"a": "der", "w": "Pfannkuchen", "p": "Pfannkuchen", "cat": "Süßes", "emoji": "🥞"}];
const TASKS=["karteikarten.html", "memory.html", "bild-wort.html", "wort-bild.html", "hoeren.html", "schreiben.html", "artikel.html", "plural.html", "ein-eine.html", "kein-keine.html", "fragen-ohne-fragewort.html", "fragen-mit-fragewort.html"];

const KEY='SP_WORTSCHATZ_A1_L3_T1';
function state(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){return {}}}
function save(s){localStorage.setItem(KEY,JSON.stringify(s))}
function speak(t){try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='de-DE';u.rate=.85;speechSynthesis.speak(u)}catch(e){}}
function norm(s){return String(s||'').toLowerCase().trim().replaceAll('ä','ae').replaceAll('ö','oe').replaceAll('ü','ue').replaceAll('ß','ss').replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ')}
function done(file,learned){let s=state();s.tasks=s.tasks||{};s.tasks[file]=true;s.learned=s.learned||[];(learned||[]).forEach(w=>{if(!s.learned.includes(w))s.learned.push(w)});save(s)}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}

let file='wort-bild.html', idx=0, score=0, current=null, currentText='';
let pool=shuffle(WORDS).slice(0,20);
function ask(){
 current=pool[idx%pool.length]; fb.textContent='';
 let q='', correct='', opts=[];
 if('wortbild'==='bildwort'){q='<div class="emoji">'+current.emoji+'</div><div class="question">Was ist das?</div>'; correct=current.a+' '+current.w; opts=shuffle([correct,...shuffle(WORDS.filter(x=>x.w!==current.w)).slice(0,3).map(x=>x.a+' '+x.w)]); currentText=correct;}
 if('wortbild'==='wortbild'){q='<div class="question">'+current.a+' '+current.w+'</div>'; correct=current.emoji; opts=shuffle([correct,...shuffle(WORDS.filter(x=>x.emoji!==current.emoji)).slice(0,3).map(x=>x.emoji)]); currentText=current.a+' '+current.w;}
 if('wortbild'==='artikel'){q='<div class="question">___ '+current.w+'</div>'; correct=current.a.includes('/')?'der':current.a; opts=['der','die','das']; currentText=current.a+' '+current.w;}
 if('wortbild'==='ein'){q='<div class="question">Ich brauche ___ '+current.w+'.</div>'; correct=current.a==='die'?'eine':'ein'; opts=['ein','eine']; currentText='Ich brauche '+correct+' '+current.w;}
 if('wortbild'==='kein'){q='<div class="question">Ich habe ___ '+current.w+'.</div>'; correct=current.a==='die'?'keine':'kein'; opts=['kein','keine']; currentText='Ich habe '+correct+' '+current.w;}
 if('wortbild'==='plural'){let plural=current.p||'(Singular)'; q='<div class="question">Plural von: '+current.a+' '+current.w+'</div>'; correct=plural; opts=shuffle([correct,...shuffle(WORDS.map(x=>x.p||'(Singular)').filter(x=>x!==correct)).slice(0,3)]); currentText=current.a+' '+current.w+', '+plural;}
 area.innerHTML=q+'<div class="options">'+opts.map(o=>'<button class="opt" onclick="check(this,`'+o+'`,`'+correct+'`)">'+o+'</button>').join('')+'</div>';
}
function check(btn,val,correct){document.querySelectorAll('.opt').forEach(b=>b.disabled=true);if(val===correct){btn.classList.add('ok');fb.textContent='Richtig!';score++;}else{btn.classList.add('no');fb.textContent='Noch einmal üben: '+correct;}}
function nextQ(){idx++; if(idx>=20){done(file,pool.map(x=>x.w)); area.innerHTML='<div class="question">Gut gemacht! Aufgabe erledigt.</div>'; fb.textContent=''; nextBtn.style.display='none'; return;} ask();}
ask();
</script></body></html>
