<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Memory</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class='actions'><a class='btn secondary' href='index.html'>← Thema 1</a></div><section class='card'><p class='small'>Finde Bild + Wort.</p><div id='board' class='options'></div><div id='fb' class='feedback'></div><a id='nextGame' class='btn hidden' href='pruefung.html'>Nächstes Spiel →</a></section><footer>© SprachPilot</footer></div><script src="app.js?v=4"></script><script>hero("Memory");let pairs=shuffle(singularWords()).slice(0,8),cards=shuffle(pairs.flatMap(w=>[{id:w.id,html:`<img class='choice-img' src='${w.image}'>`},{id:w.id,html:full(w)}])),open=[],found=0;board.innerHTML=cards.map(c=>`<button class='opt image-opt' data-id='${c.id}' onclick='pick(this)'>${c.html}</button>`).join('');function pick(b){if(open.includes(b)||b.classList.contains('ok'))return;b.classList.add('selected');open.push(b);if(open.length===2){if(open[0].dataset.id===open[1].dataset.id){open.forEach(x=>{x.classList.remove('selected');x.classList.add('ok')});open=[];found++;if(found===pairs.length){finishTask('memory.html');fb.textContent='Gut gemacht! Aufgabe erledigt.';nextGame.classList.remove('hidden')}}else{setTimeout(()=>{open.forEach(x=>x.classList.remove('selected'));open=[]},800)}}}</script></body></html>
