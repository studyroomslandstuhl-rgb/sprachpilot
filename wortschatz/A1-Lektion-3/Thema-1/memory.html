<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Memory</title><link rel="stylesheet" href="style.css"></head><body>
<div id="accountStrip" class="account-strip"></div>
<script type="module" src="/js/guard.js"></script><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"><p class="small">Öffne zwei Karten und finde die Paare.</p><div id="board" class="options"></div><div id="fb" class="feedback"></div><a id="nextGame" class="btn hidden" href="pruefung.html">Nächstes Spiel →</a></section><footer>© SprachPilot</footer></div><script src="app.js?v=41"></script><script src="../shared/lektion3-fix.js?v=2"></script><script>header("Memory");let pairs=shuffle(singularWords()).slice(0,8);let cards=shuffle(pairs.flatMap(w=>[{id:w.id,html:`<img src="${w.image}" onerror="fixImg(this)">`},{id:w.id,html:full(w)}]));let open=[],found=0;board.innerHTML=cards.map(c=>`<button class="opt memory-card back" data-id="${c.id}" data-html='${c.html.replace(/'/g,"&apos;")}' onclick="pick(this)">?</button>`).join('');function reveal(b){b.classList.remove('back');b.innerHTML=b.dataset.html}function hide(b){b.classList.add('back');b.innerHTML='?'}function pick(b){if(open.includes(b)||b.classList.contains('ok')||open.length>=2)return;reveal(b);open.push(b);if(open.length===2){if(open[0].dataset.id===open[1].dataset.id){open.forEach(x=>x.classList.add('ok'));open=[];found++;if(found===pairs.length){done('memory.html',singularWords().length);nextGame.classList.remove('hidden');fb.innerHTML='<div class="finish-box"><div class="finish-icon">✓</div><div class="question">Aufgabe geschafft!</div><div class="big">100% erreicht.</div></div>'}}else setTimeout(()=>{open.forEach(hide);open=[]},900)}}</script></body></html>
