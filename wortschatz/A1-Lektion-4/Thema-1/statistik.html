<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Statistik – Thema 1</title>
<link rel="stylesheet" href="style.css">
<style>
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.stat-card{background:white;border:1px solid #ffe28a;border-radius:20px;padding:14px;box-shadow:0 6px 14px rgba(0,0,0,.08)}
.stat-head{display:flex;align-items:center;gap:12px}
.stat-head img{width:64px;height:64px;object-fit:contain;background:#fffdf2;border-radius:12px;border:2px solid #ffe28a}
.stat-word{font-weight:900;color:#c98a00;font-size:18px}
.stat-tr{color:#667085;font-size:14px}
.status-pill{display:inline-block;margin-top:8px;border-radius:999px;padding:5px 10px;background:#fff7d6;border:1px solid #ffe28a;font-weight:900;color:#6b4700}
</style>
</head>
<body>
<div class="container">
<header class="topbar"></header>
<section class="card">
  <h2>Statistik – Wörter</h2>
  <p class="small">Hier siehst du, wie viel Prozent jedes Wortes gelernt wurde.</p>
<div id="examStats"></div></section>
<section class="stat-grid" id="stats"></section>
<footer>© SprachPilot</footer>
</div>
<script src="app.js?v=232"></script>
<script>
header("Statistik");
examStats.innerHTML=bestExamSummaryHtml();
stats.innerHTML=WORDS.map(w=>{
 const p=wordProgress(w.id);
 return `
 <div class="stat-card">
  <div class="stat-head">
   <img src="${w.image}" onerror="fixImg(this)" alt="">
   <div>
    <div class="stat-word">${w.full}</div>
    <div class="stat-tr">${translateWord(w)}</div>
   </div>
  </div>
  <div class="progress"><div class="bar" style="width:${p}%"></div></div>
  <div><b>${p}%</b> · <span class="status-pill">${wordStatus(p)}</span></div>
 </div>`;
}).join("");
</script>
</body>
</html>
