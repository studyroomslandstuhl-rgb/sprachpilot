<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Statistik Thema 1</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
<header class="topbar"></header>
<section class="card">
  <h2>Statistik – Thema 1</h2>
  <p class="small">Hier siehst du den Fortschritt in Wohnung & Zimmer.</p>
  <div id="stats"></div>
</section>
<footer>© SprachPilot</footer>
</div>
<script src="app.js?v=3"></script>
<script>
header("Statistik");
const TASKS=[
 ["karteikarten.html","Karteikarten",WORDS.length],
 ["hoeren.html","Hören",WORDS.length],
 ["artikel-klick.html","Artikel klicken",WORDS.filter(w=>w.article).length],
 ["artikel.html","Artikel zuordnen",WORDS.filter(w=>w.article).length],
 ["plural.html","Plural",WORDS.filter(w=>w.plural).length],
 ["bild-wort.html","Bild → Wort",WORDS.length],
 ["wort-bild.html","Wort → Bild",WORDS.length],
 ["wo-ist.html","Wo ist …?",WO_TASKS.length],
 ["ist-hier.html","Ist …?",IST_TASKS.length]
];
stats.innerHTML=TASKS.map(t=>{
 let p=pct(t[0],t[2]);
 return `<div class="hint"><b>${t[1]}</b><div class="progress"><div class="bar" style="width:${p}%"></div></div><span class="small">${p}%</span></div>`;
}).join("");
</script>
</body></html>
