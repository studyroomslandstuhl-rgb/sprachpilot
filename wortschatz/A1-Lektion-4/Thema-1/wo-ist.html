<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wo ist …?</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=231"></script><script>
header("Wo ist …?");
const FILE="wo-ist.html";
let i=0,phase="example";
function exampleDoneKey(){return taskKey(FILE)+"_exampleDone"}
function show(){
 const done=loadTask(FILE,WO_TASKS.length).done.length;
 if(done>=WO_TASKS.length){complete(area,FILE,"ist-hier.html");return}

 if(phase==="example" && localStorage.getItem(exampleDoneKey())!=="1"){
  area.innerHTML=`${progressHtml(FILE,WO_TASKS.length)}
  <div class="question">Beispiel</div>
  <div class="example-box">
    <b>So funktioniert die Aufgabe:</b><br>
    Bild: die Küche + hier<br>
    Frage: <b>Wo ist die Küche?</b><br>
    Antwort: <b>Die Küche ist hier.</b>
  </div>
  <div class="step-note">Jetzt kommen die Aufgaben. Danach gibt es keine vorgegebene Lösung mehr.</div>
  <button class="btn" onclick="localStorage.setItem(exampleDoneKey(),'1');phase='q';show()">Aufgabe 1 starten</button>`;
  return;
 }

 i=nextIndex(FILE,WO_TASKS.length);
 let t=WO_TASKS[i];
 const number=loadTask(FILE,WO_TASKS.length).done.length+1;

 if(phase==="q"){
  area.innerHTML=`${progressHtml(FILE,WO_TASKS.length)}
  <div class="question">Aufgabe ${number}: Frage mit Wo.</div>
  <div class="step-note">Sprich oder schreibe: Wo ist der/die/das …?</div>
  <div class="imgrow">${roomImg(t.room,false)}</div>
  <div class="actions"><button id="mic" class="btn mic-btn" onclick="sayQ()">🎤 Frage sprechen</button><button class="btn secondary" onclick="writeQ()">Ich kann nicht sprechen</button></div>
  <div id="micStatus" class="mic-status"></div>
  <div id="box" class="hidden"><input id="ans" placeholder="Schreiben Sie die Antwort hier"><button class="btn" onclick="checkQ()">Kontrollieren</button></div>
  <div id="fb" class="feedback"></div>`;
 }else{
  area.innerHTML=`${progressHtml(FILE,WO_TASKS.length)}
  <div class="question">Aufgabe ${number}: Antworte mit hier, da oder dort.</div>
  <div class="step-note">Sprich oder schreibe: Der/Die/Das … ist hier/da/dort.</div>
  ${comboPlaceRoom(t.place,t.room)}
  <div class="actions"><button id="mic" class="btn mic-btn" onclick="sayA()">🎤 Antwort sprechen</button><button class="btn secondary" onclick="writeA()">Ich kann nicht sprechen</button></div>
  <div id="micStatus" class="mic-status"></div>
  <div id="box" class="hidden"><input id="ans" placeholder="Schreiben Sie die Antwort hier"><button class="btn" onclick="checkA()">Kontrollieren</button></div>
  <div id="fb" class="feedback"></div>`;
 }
}
function writeQ(){box.classList.remove("hidden")}
function writeA(){box.classList.remove("hidden")}
function checkQText(txt){let t=WO_TASKS[i];if(okWoQuestion(txt,t)){phase="a";show()}else{let tr=markWrong(FILE,WO_TASKS.length);fb.innerHTML=feedbackForTry(tr,t.question,"Frage mit Wo ist");phase="q";}}
function checkAText(txt){let t=WO_TASKS[i];if(okWoAnswer(txt,t)){markRight(FILE,WO_TASKS.length);phase="q";show()}else{let tr=markWrong(FILE,WO_TASKS.length);fb.innerHTML=feedbackForTry(tr,t.answer,"Antwort mit hier/da/dort");phase="a";}}
function checkQ(){checkQText(ans.value)}
function checkA(){checkAText(ans.value)}
function sayQ(){startMic(mic,txt=>{writeQ();ans.value=txt;checkQText(txt)})}
function sayA(){startMic(mic,txt=>{writeA();ans.value=txt;checkAText(txt)})}
show();
</script></body></html>
