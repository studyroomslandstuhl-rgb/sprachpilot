<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plural</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=40"></script><script>
header("Plural");
const FILE="plural.html";const PLURAL_WORDS=WORDS.filter(w=>w.plural);let i=0;
function show(){if(loadTask(FILE,PLURAL_WORDS.length).done.length>=PLURAL_WORDS.length){complete(area,FILE,"bild-wort.html");return}i=nextIndex(FILE,PLURAL_WORDS.length);let w=PLURAL_WORDS[i];area.innerHTML=`${progressHtml(FILE,PLURAL_WORDS.length)}<div class="question">${w.full}</div><input id="ans" placeholder="Schreiben Sie die Antwort hier"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}
function check(){let w=PLURAL_WORDS[i];if(simple(ans.value)===simple(w.plural)){fb.textContent="Richtig!";markRight(FILE,PLURAL_WORDS.length);setTimeout(show,700)}else{let tr=markWrong(FILE,PLURAL_WORDS.length);fb.innerHTML=feedbackForTry(tr,w.plural,"Pluralform");}}
show();
</script></body></html>
