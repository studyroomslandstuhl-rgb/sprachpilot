<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karteikarten</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=2"></script><script>
header("Karteikarten");
const FILE="karteikarten.html";let i=0;
function show(){
 if(loadTask(FILE,WORDS.length).done.length>=WORDS.length){complete(area,FILE,"hoeren.html");return}
 i=nextIndex(FILE,WORDS.length);let w=WORDS[i];
 area.innerHTML=`${progressHtml(FILE,WORDS.length)}<div class="question">Was ist das?</div><img class="task-img" src="${w.image}" onerror="fixImg(this)"><button class="btn" onclick="flip()">Umdrehen</button><button class="btn secondary" onclick="right()">Kann ich</button><div id="fb" class="feedback"></div>`;
}
function flip(){let w=WORDS[i];fb.innerHTML=`<div class="big">${w.full}</div><div class="hint">Plural: ${w.plural}</div>`}
function right(){markRight(FILE,WORDS.length);show()}
show();
</script></body></html>
