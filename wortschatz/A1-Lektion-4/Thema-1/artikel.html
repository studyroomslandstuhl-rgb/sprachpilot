<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Artikel</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=42"></script><script>
header("Artikel");
const FILE="artikel.html";let selected=null;
area.innerHTML=`<p>Tippe ein Wort an und dann die richtige Tabelle.</p><div id="chips"></div><div class="drop-grid"><div class="dropzone" data-a="der"><h2>der</h2></div><div class="dropzone" data-a="die"><h2>die</h2></div><div class="dropzone" data-a="das"><h2>das</h2></div></div><button class="btn" onclick="control()">Kontrollieren</button><div id="fb" class="feedback"></div>`;
const ARTICLE_WORDS=WORDS.filter(w=>w.article);
chips.innerHTML=ARTICLE_WORDS.map(w=>`<span class="chip" data-id="${w.id}">${w.word}</span>`).join("");
function bind(){document.querySelectorAll(".chip").forEach(c=>c.onclick=e=>{e.stopPropagation();if(c.classList.contains("ok"))return;document.querySelectorAll(".chip").forEach(x=>x.classList.remove("selected"));selected=c;c.classList.add("selected")})}
document.querySelectorAll(".dropzone").forEach(z=>z.onclick=()=>{if(!selected)return;selected.classList.remove("selected","no");let n=selected.nextElementSibling;if(n&&n.classList.contains("correction"))n.remove();z.appendChild(selected);selected=null;bind()});
bind();
function control(){document.querySelectorAll(".correction").forEach(x=>x.remove());let ok=0;document.querySelectorAll(".dropzone .chip").forEach(c=>{let w=wordById(c.dataset.id), z=c.closest(".dropzone");c.classList.remove("ok","no","selected");if(z.dataset.a===w.article){c.classList.add("ok");ok++}else{c.classList.add("no");let note=document.createElement("span");note.className="correction";note.textContent="richtig: "+w.article;c.after(note)}});bind();if(ok===ARTICLE_WORDS.length){let st=loadTask(FILE,ARTICLE_WORDS.length);st.done=[...Array(ARTICLE_WORDS.length).keys()];saveTask(FILE,st);fb.textContent="Gut gemacht!";setTimeout(()=>location.href="plural.html",700)}else fb.textContent="Korrigiere die roten Wörter."}
</script></body></html>
