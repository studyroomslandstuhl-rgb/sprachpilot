<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dialoge</title><link rel="stylesheet" href="style.css">
<style>
.small-inline-img{
  width:60px;
  height:60px;
  object-fit:contain;
}
.dialog-line{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  font-size:28px;
  font-weight:700;
}
</style></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=100"></script><script>header("Dialoge");
const FILE="dialoge.html";
let i=0;

function show(){
 if(loadTask(FILE,DIALOG_TASKS.length).done.length>=DIALOG_TASKS.length){
   complete(area,FILE,"pruefung.html");
   return;
 }

 i=nextIndex(FILE,DIALOG_TASKS.length);
 let t=DIALOG_TASKS[i];
 let w=wordById(t.id);

 const firstRest = t.line1.replace("Ist ___ ","").replace("?","");
 const secondParts = t.line2.split("___");

 area.innerHTML=`${progressHtml(FILE,DIALOG_TASKS.length)}
 <div class="question">Schreibe das Wort und das passende Pronomen.</div>
 <div class="step-note">Erste Lücke: Wort mit Artikel. Zweite Lücke: er / es / sie.</div>

 <div class="gap-dialog">
   <div class="gap-line dialog-line">
     <span>Ist</span>
     <input id="noun" class="gap-input" placeholder="Schreiben Sie die Antwort hier">
     <img class="small-inline-img" src="${w.image}" onerror="fixImg(this)" alt="">
     <span>${firstRest}?</span>
   </div>

   <div class="gap-line dialog-line">
     <span>${secondParts[0]}</span>
     <input id="pronoun" class="gap-input" placeholder="Schreiben Sie die Antwort hier">
     <span>${secondParts[1] || ""}</span>
   </div>
 </div>

 <button class="btn" onclick="check()">Kontrollieren</button>
 <div id="fb" class="feedback"></div>`;
}

function check(){
 let t=DIALOG_TASKS[i];

 if(okDialog(noun.value,pronoun.value,t)){
   fb.textContent="Richtig!";
   markRight(FILE,DIALOG_TASKS.length);
   setTimeout(show,700);
 }else{
   let tr=markWrong(FILE,DIALOG_TASKS.length);
   fb.innerHTML=feedbackForTry(tr,t.answerNoun+" / "+t.answerPronoun,"Nomen mit Artikel und Pronomen");
 }
}

show();</script></body></html>
