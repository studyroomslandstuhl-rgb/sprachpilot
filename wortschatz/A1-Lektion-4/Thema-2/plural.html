<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plural</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=225"></script><script>
header("Plural");const FILE="plural.html";let i=0;
function show(){if(loadTask(FILE,WORDS.length).done.length>=WORDS.length){complete(area,FILE,"bild-wort.html");return}i=nextIndex(FILE,WORDS.length);let w=WORDS[i];area.innerHTML=`${progressHtml(FILE,WORDS.length)}<div class="question">${w.full}</div><input id="ans" placeholder="Schreiben Sie die Antwort hier"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}
function check(){let w=WORDS[i];if(simple(ans.value)===simple(w.plural)){fb.textContent="Richtig!";markRight(FILE,WORDS.length);setTimeout(show,700)}else{let tr=markWrong(FILE,WORDS.length);fb.innerHTML=feedbackForTry(tr,w.plural,"Pluralform");}}show();
</script></body></html>
