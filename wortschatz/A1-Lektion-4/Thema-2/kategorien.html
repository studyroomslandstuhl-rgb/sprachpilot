<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kategorien</title><link rel="stylesheet" href="style.css?v=235"><link rel="stylesheet" href="../shared/lektion4-standard.css?v=235">
<style>
.click-opt{cursor:pointer;pointer-events:auto}
.click-opt.wrong{background:#ffe1e1!important;border-color:#e74c3c!important;color:#9b1c1c!important}
.click-opt.correct{background:#d9f7e8!important;border-color:#2e9e4f!important;color:#145a32!important}
.click-opt.selected{outline:4px solid #2e9e4f}
</style></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script type="module" src="/js/progress.js?v=235"></script><script src="app.js?v=235"></script><script>
header("Kategorien");
const FILE="kategorien.html";
const CATEGORY_ALLOWED=["Möbel", "Elektrogeräte", "Bad"];
const CATEGORY_EXCLUDE_IDS=["spuele", "dach", "tuer", "wand", "boden", "fenster", "bild"];
const CATEGORY_WORDS=WORDS.filter(w=>CATEGORY_ALLOWED.includes(w.category)&&!CATEGORY_EXCLUDE_IDS.includes(w.id));
let i=0;
let locked=false;
let selectedCat="";
let selectedBtn=null;

function categories(){
  return CATEGORY_ALLOWED;
}

function show(){
  locked=false;
  selectedCat="";
  selectedBtn=null;
  if(loadTask(FILE,CATEGORY_WORDS.length).done.length>=CATEGORY_WORDS.length){
    complete(area,FILE,"dialoge.html");
    return;
  }
  i=nextIndex(FILE,CATEGORY_WORDS.length);
  let w=CATEGORY_WORDS[i];
  let cats=categories();
  area.innerHTML=`${progressHtml(FILE,CATEGORY_WORDS.length)}
    <div class="question">Welche Kategorie passt?</div>
    <img class="task-img" src="${w.image}" onerror="fixImg(this)" alt="">
    <div class="big">${w.full}</div>
    <div class="options">${cats.map(c=>`<button class="opt click-opt" onclick="choose('${c.replace(/'/g,"\\'")}',this)">${c}</button>`).join("")}</div>
    <div class="actions"><button class="btn" onclick="checkCategory()">Kontrollieren</button></div>
    <div id="fb" class="feedback"></div>`;
}

function choose(cat,el){
  if(locked)return;
  selectedCat=cat;
  selectedBtn=el;
  document.querySelectorAll('.click-opt').forEach(x=>x.classList.remove('selected','wrong','correct'));
  el.classList.add('selected');
  fb.textContent="";
}

function checkCategory(){
  if(locked)return;
  let w=CATEGORY_WORDS[i];
  if(!selectedCat){fb.innerHTML='<div class="no">Wähle zuerst eine Kategorie.</div>';return}
  if(selectedCat===w.category){
    locked=true;
    if(selectedBtn)selectedBtn.classList.add("correct");
    fb.innerHTML='<div class="ok">Richtig!</div>';
    markRight(FILE,CATEGORY_WORDS.length);
    setTimeout(show,700);
  }else{
    if(selectedBtn)selectedBtn.classList.add("wrong");
    const tries=markWrong(FILE,CATEGORY_WORDS.length);
    fb.innerHTML=feedbackForTry(tries,w.category,"Kategorie");
  }
}
show();
</script></body></html>
