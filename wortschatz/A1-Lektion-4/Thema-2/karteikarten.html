<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karteikarten</title><link rel="stylesheet" href="style.css">
<style>
.flip-card{max-width:360px;height:300px;margin:18px auto;perspective:1000px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;background:white;border:2px solid #ffe28a;border-radius:24px;box-shadow:0 10px 24px rgba(0,0,0,.12);backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;text-align:center}
.flip-front img{width:190px;height:150px;object-fit:contain;margin-bottom:12px}
.flip-back{transform:rotateY(180deg)}
.card-answer{font-size:32px;font-weight:900;color:#c98a00;margin-bottom:10px}
.card-translation{font-size:20px;font-weight:800;color:#7a5100}
</style></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=130"></script><script>
header("Karteikarten");
const FILE="karteikarten.html";
let i=0;

function show(){
 if(loadTask(FILE,WORDS.length).done.length>=WORDS.length){complete(area,FILE,"hoeren.html");return}
 i=nextIndex(FILE,WORDS.length);
 let w=WORDS[i];
 area.innerHTML=`${progressHtml(FILE,WORDS.length)}
 <div class="question">Klicke auf die Karte.</div>
 <div class="flip-card" id="card" onclick="this.classList.toggle('flipped')">
   <div class="flip-inner">
     <div class="flip-front">
       <img src="${w.image}" onerror="fixImg(this)" alt="">
       <div class="card-translation">${translateWord(w)}</div>
     </div>
     <div class="flip-back">
       <div class="card-answer">${w.full}</div>
       <div class="card-translation">Plural: ${w.plural}</div>
     </div>
   </div>
 </div>
 <div class="actions">
   <button class="btn green" onclick="know()">Kann ich</button>
   <button class="btn secondary" onclick="again()">Noch üben</button>
 </div>
 <div id="fb" class="feedback"></div>`;
}
function know(){markRight(FILE,WORDS.length);show()}
function again(){markWrong(FILE,WORDS.length);fb.innerHTML="Okay, kommt später nochmal.";setTimeout(show,500)}
show();
</script></body></html>
