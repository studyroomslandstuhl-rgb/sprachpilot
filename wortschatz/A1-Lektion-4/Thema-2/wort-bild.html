<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wort → Bild</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=20"></script><script>
header("Wort → Bild");const FILE="wort-bild.html";let i=0;
function opts(w){return [w,...WORDS.filter(x=>x.id!==w.id).sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5)}
function show(){if(loadTask(FILE,WORDS.length).done.length>=WORDS.length){complete(area,FILE,"kategorien.html");return}i=nextIndex(FILE,WORDS.length);let w=WORDS[i],o=opts(w);area.innerHTML=`${progressHtml(FILE,WORDS.length)}<div class="question">${w.full}</div><div class="imgrow">${o.map(x=>`<div class="imgbox" onclick="choose('${x.id}')"><img src="${x.image}" onerror="fixImg(this)"></div>`).join("")}</div><div id="fb" class="feedback"></div>`}
function choose(id){let w=WORDS[i];if(id===w.id){fb.textContent="Richtig!";markRight(FILE,WORDS.length);setTimeout(show,700)}else{let tr=markWrong(FILE,WORDS.length);fb.innerHTML=feedbackForTry(tr,w.full,"Wort und Bild");}}show();
</script></body></html>
