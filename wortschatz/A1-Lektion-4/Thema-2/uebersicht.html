<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Übersicht – Thema 2</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><section class="card"><h2>Übersicht – Wörter in Thema 2</h2><p class="small">Alle Wörter mit Bild, Deutsch, Muttersprache, Artikel, Plural und Gruppe.</p><div id="examSummary"></div></section><section id="list"></section><footer>© SprachPilot</footer></div><script src="app.js?v=70"></script><script>
header("Übersicht");
examSummary.innerHTML=bestExamSummaryHtml();
function groupOf(w){return w.releaseGroup || (w.set==="plus" ? "extra" : "book")}
function labelOf(g){return g==="book" ? "Im Buch" : "Nicht im Buch"}
list.innerHTML=["book","extra"].map(g=>{
 const arr=WORDS.filter(w=>groupOf(w)===g);
 if(!arr.length)return "";
 return `<div class="word-section"><span class="group-badge ${g}">${labelOf(g)}</span><div class="word-overview-grid">${arr.map(w=>`<div class="word-card"><img src="${w.image}" onerror="fixImg(this)" alt=""><div class="word-de">${w.full}</div><div class="word-tr">${translateWord(w)}</div><div class="word-meta">Artikel: <b>${w.article}</b><br>Plural: <b>${w.plural}</b><br>Kategorie: <b>${w.category}</b><br>Gruppe: <b>${labelOf(groupOf(w))}</b></div></div>`).join("")}</div></div>`;
}).join("");
</script></body></html>
