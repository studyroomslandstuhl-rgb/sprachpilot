<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Übersicht – Thema 2</title>
<link rel="stylesheet" href="style.css">
<style>
.overview-section{
  margin-bottom:22px;
}
.overview-title{
  background:white;
  border:2px solid #ffe28a;
  border-radius:18px;
  padding:14px 18px;
  margin-bottom:14px;
  font-size:22px;
  font-weight:900;
  color:#7a5100;
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}
.overview-title.book{
  border-color:#8ce0b3;
  background:#f0fff6;
  color:#166534;
}
.overview-title.extra{
  border-color:#ffc107;
  background:#fff8dc;
  color:#7a5400;
}
.word-overview-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}
.word-card{
  background:white;
  border:1px solid #ffe7a8;
  border-radius:20px;
  padding:14px;
  box-shadow:0 8px 18px rgba(0,0,0,.10);
  text-align:center;
}
.word-card img{
  width:100%;
  height:130px;
  object-fit:contain;
  background:white;
  border:2px solid #ffe28a;
  border-radius:16px;
  margin-bottom:10px;
}
.word-de{
  font-size:20px;
  font-weight:900;
  color:#111;
  margin-bottom:6px;
}
.word-tr{
  color:#7a5100;
  font-weight:800;
  min-height:22px;
  margin-bottom:8px;
}
.word-meta{
  font-size:14px;
  color:#64748b;
  line-height:1.45;
}
</style>
</head>
<body>
<div class="container">
<header class="topbar"></header>

<section class="card">
  <h2>Übersicht – Wörter in Thema 2</h2>
  <p class="small">Die Wörter sind in zwei Gruppen sortiert: Im Buch und Nicht im Buch.</p>
</section>

<section id="list"></section>

<footer>© SprachPilot</footer>
</div>

<script src="app.js?v=110"></script>
<script>
header("Übersicht");

function groupOf(w){
  return w.releaseGroup || (w.set==="plus" ? "extra" : "book");
}

function labelOf(g){
  return g==="book" ? "Im Buch" : "Nicht im Buch";
}

function card(w){
  return `<div class="word-card">
    <img src="${w.image}" onerror="fixImg(this)" alt="">
    <div class="word-de">${w.full}</div>
    <div class="word-tr">${translateWord(w)}</div>
    <div class="word-meta">
      Artikel: <b>${w.article}</b><br>
      Plural: <b>${w.plural}</b>
    </div>
  </div>`;
}

const bookWords = WORDS.filter(w=>groupOf(w)==="book");
const extraWords = WORDS.filter(w=>groupOf(w)!=="book");

list.innerHTML = `
  <div class="overview-section">
    <div class="overview-title book">Im Buch (${bookWords.length})</div>
    <div class="word-overview-grid">${bookWords.map(card).join("")}</div>
  </div>

  <div class="overview-section">
    <div class="overview-title extra">Nicht im Buch (${extraWords.length})</div>
    <div class="word-overview-grid">${extraWords.map(card).join("")}</div>
  </div>
`;
</script>
</body>
</html>
