<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Übersicht – Thema 2</title>
<link rel="stylesheet" href="style.css">
<style>
.overview-intro{
  margin-bottom:18px;
}

.overview-section{
  margin-bottom:24px;
}

.overview-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  background:white;
  border-radius:20px;
  padding:14px 18px;
  margin-bottom:14px;
  font-size:20px;
  font-weight:900;
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.overview-title.book{
  border:2px solid #8ce0b3;
  background:#f0fff6;
  color:#166534;
}

.overview-title.extra{
  border:2px solid #ffc107;
  background:#fff8dc;
  color:#7a5400;
}

.word-overview-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}

.word-card{
  background:white;
  border:1px solid #ffe7a8;
  border-radius:20px;
  padding:10px;
  box-shadow:0 8px 18px rgba(0,0,0,.10);
  text-align:center;
  min-height:240px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.word-card img{
  width:100%;
  height:115px;
  object-fit:contain;
  background:white;
  border:2px solid #ffe28a;
  border-radius:16px;
  margin-bottom:8px;
}

.word-de{
  font-size:17px;
  font-weight:900;
  color:#111;
  line-height:1.2;
  margin-bottom:5px;
}

.word-tr{
  color:#7a5100;
  font-weight:800;
  font-size:15px;
  line-height:1.2;
  min-height:20px;
  margin-bottom:6px;
}

.word-plural{
  font-size:13px;
  color:#64748b;
  line-height:1.25;
  border-top:1px solid #f1e2aa;
  padding-top:6px;
  margin-top:auto;
}

@media(min-width:700px){
  .word-overview-grid{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }
  .word-card img{
    height:135px;
  }
}

@media(min-width:1000px){
  .word-overview-grid{
    grid-template-columns:repeat(4,minmax(0,1fr));
  }
}
@media(min-width:1200px){
  .word-overview-grid{grid-template-columns:repeat(5,minmax(0,1fr));}
}
</style>
</head>
<body>
<div class="container">
<header class="topbar"></header>

<section class="card overview-intro">
  <h2>Übersicht – Wörter in Thema 2</h2>
  <p class="small">Bild, deutsches Wort, Muttersprache und Plural.</p>
</section>

<section id="list"></section>

<footer>© SprachPilot</footer>
</div>

<script src="app.js?v=226"></script>
<script>
header("Übersicht");

function groupOf(w){
  return w.releaseGroup || (w.set==="plus" ? "extra" : "book");
}

function card(w){
  return `<div class="word-card">
    <img src="${w.image}" onerror="fixImg(this)" alt="">
    <div class="word-de">${w.full}</div>
    <div class="word-tr">${translateWord(w)}</div>
    <div class="word-plural">Plural:<br><b>${w.plural}</b></div>
  </div>`;
}

const bookWords = WORDS.filter(w=>groupOf(w)==="book");
const extraWords = WORDS.filter(w=>groupOf(w)!=="book");

list.innerHTML = `
  <div class="overview-section">
    <div class="overview-title book"><span>Im Buch</span><span>${bookWords.length}</span></div>
    <div class="word-overview-grid">${bookWords.map(card).join("")}</div>
  </div>

  <div class="overview-section">
    <div class="overview-title extra"><span>Nicht im Buch</span><span>${extraWords.length}</span></div>
    <div class="word-overview-grid">${extraWords.map(card).join("")}</div>
  </div>
`;
</script>
</body>
</html>
