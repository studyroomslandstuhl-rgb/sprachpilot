<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Übersicht – Thema 2</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><section class="card"><h2>Übersicht – Wörter in Thema 2</h2><p class="small">Alle Wörter mit Bild, Deutsch, Muttersprache, Artikel, Plural, Set und Wortgruppe.</p></section><section class="word-overview-grid" id="list"></section><footer>© SprachPilot</footer></div><script src="app.js?v=30"></script><script>
header("Übersicht");
list.innerHTML=WORDS.map(w=>`<div class="word-card"><img src="${w.image}" onerror="fixImg(this)" alt=""><div class="word-de">${w.full}</div><div class="word-tr">${translateWord(w)}</div><div class="word-meta">Artikel: <b>${w.article}</b><br>Plural: <b>${w.plural}</b><br>Kategorie: <b>${w.category}</b><br>Set: <b>${w.set==="plus"?"Erweiterter Wortschatz":"Basis/Buchwortschatz"}</b><br>Gruppe: <b>${WORD_GROUPS[w.wordGroup]?.label||w.wordGroup||"-"}</b></div></div>`).join("");
</script></body></html>
