<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karteikarten Thema 3</title><link rel="stylesheet" href="style.css?v=310"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="/js/sp-progress-guard.js?v=points-safe"></script><script src="app.js?v=310"></script><script>
header('Farben & Adjektive');
const file='karteikarten.html', total=CARDS.length;
function showCardImage(w){
  if(w.type==='color') return colorImg(w,'task-img');
  if(w.type==='reaction') return `<div class="smile-card" style="margin:12px auto">${w.emoji}</div>`;
  return img(w.img||w.id+'.png','task-img');
}
function render(){
  let i=nextIndex(file,total);
  if(i===null)return complete(area,file,'hoeren.html');
  let w=CARDS[i];
  area.innerHTML=progressHtml(file,total)+
  `<div class="question">Sage das deutsche Wort.</div>
   <div class="hint">Muttersprache: <b>${safe(translate(w))}</b></div>
   ${showCardImage(w)}
   <div class="actions">
     <button id="micBtn" class="btn mic-btn" onclick="startMic(this,(v)=>{writeBox();answer.value=v;check(v,true)})">🎤 Deutsch sprechen</button>
     <button class="btn secondary" onclick="writeBox()">Ich kann nicht sprechen</button>
     <button class="btn secondary" onclick="turn()">Karte umdrehen</button>
   </div>
   <div id="micStatus" class="mic-status"></div>
   <div id="box" class="hidden">
     <input id="answer" class="answer-line" placeholder="Schreiben Sie die Antwort hier">
     <button class="btn" onclick="check(answer.value,false)">Kontrollieren</button>
   </div>
   <div id="fb" class="feedback"></div>`;
}
function writeBox(){
  box.classList.remove('hidden');
  answer.focus();
}
function turn(){
  let st=loadTask(file,total),w=CARDS[st.current];
  writeBox();
  answer.value=w.word;
  let t=markWrong(file,total,w.word);
  fb.innerHTML=`<div class="no">Lösung: ${safe(w.word)}</div>`;
}
function check(val,fromSpeech=false){
  let st=loadTask(file,total),w=CARDS[st.current];
  if(simple(val)===simple(w.word)){
    fb.innerHTML='<div class="ok">Richtig!</div>';
    setTimeout(()=>{markRight(file,total)?complete(area,file,'hoeren.html'):render()},500)
  }else{
    let t=markWrong(file,total,w.word);
    fb.innerHTML='<div class="no">'+feedbackForTry(t,w.word,'das deutsche Wort')+'</div>';
  }
}
maybeStart(render,'karteikarten.html');
</script></body></html>
