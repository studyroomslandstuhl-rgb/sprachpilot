<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karteikarten Thema 3</title><link rel="stylesheet" href="style.css?v=305"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=305"></script><script>
header('Farben & Adjektive');
const file='karteikarten.html', total=CARDS.length;
function showCardImage(w){
  return w.type==='color' ? colorImg(w,'task-img') : img(w.img||w.id+'.png','task-img');
}
function render(){
  let i=nextIndex(file,total);
  if(i===null)return complete(area,file,'hoeren.html');
  let w=CARDS[i];
  area.innerHTML=progressHtml(file,total)+
  `<div class="question">Sage das deutsche Wort.</div>
   <div class="hint">Hinweis: ${safe(translate(w))}</div>
   ${showCardImage(w)}
   <input id="answer" class="answer-line" placeholder="Schreiben Sie die Antwort hier">
   <div class="actions">
     <button class="btn mic-btn" onclick="startMic(this,(v)=>{answer.value=v;check(v,true)})">🎤 Sprechen</button>
     <button class="btn secondary" onclick="answer.focus()">Ich kann nicht sprechen</button>
     <button class="btn secondary" onclick="turn()">Karte umdrehen</button>
     <button class="btn" onclick="check(answer.value,false)">Kontrollieren</button>
   </div>
   <div id="micStatus" class="mic-status"></div>
   <div id="fb" class="feedback"></div>`;
}
function turn(){
  let st=loadTask(file,total),w=CARDS[st.current];
  answer.value=w.word;
  let t=markWrong(file,total,w.word);
  fb.innerHTML=`<div class="no">Lösung: ${w.word}</div>`;
}
function check(val,fromSpeech=false){
  let st=loadTask(file,total),w=CARDS[st.current];
  if(simple(val)===simple(w.word)){
    fb.innerHTML='<div class="ok">Richtig!</div>';
    setTimeout(()=>{markRight(file,total)?complete(area,file,'hoeren.html'):render()},500)
  }else{
    let t=markWrong(file,total,w.word);
    fb.innerHTML='<div class="no">'+feedbackForTry(t,w.word,'das Wort')+'</div>';
  }
}
render();
</script></body></html>
