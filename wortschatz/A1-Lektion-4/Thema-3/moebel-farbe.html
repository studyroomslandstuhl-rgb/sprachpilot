<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Möbel + Farbe</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=1"></script><script>
header("Möbel + Farbe");const FILE="moebel-farbe.html";let i=0;
function show(){if(loadTask(FILE,MOEBEL_FARBE.length).done.length>=MOEBEL_FARBE.length){complete(area,FILE,"gegenteil-memory.html");return}i=nextIndex(FILE,MOEBEL_FARBE.length);let t=MOEBEL_FARBE[i];area.innerHTML=`${progressHtml(FILE,MOEBEL_FARBE.length)}<div class="question">Schreibe den Satz.</div><img class="task-img" src="${t.image}" onerror="fixImg(this)"><div class="hint">${t.noun} ist ...</div><input id="ans" placeholder="${t.noun} ist ..."><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}
function check(){let t=MOEBEL_FARBE[i];if(simple(ans.value)===simple(t.sentence)){fb.textContent="Richtig!";markRight(FILE,MOEBEL_FARBE.length);setTimeout(show,700)}else{let tr=markWrong(FILE,MOEBEL_FARBE.length);fb.innerHTML=feedbackForTry(tr,t.sentence,"Satz und Farbe");}}show();
</script></body></html>
