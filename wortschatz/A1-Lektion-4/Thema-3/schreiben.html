<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Schreiben Thema 3</title><link rel="stylesheet" href="style.css?v=300"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=300"></script><script>header('Farben & Adjektive');const file='schreiben.html',total=WRITING.length;function render(){let i=nextIndex(file,total);if(i===null)return complete(area,file,'index.html');let t=WRITING[i],f=furnitureById(t.item),a=adjById(t.adj);area.innerHTML=progressHtml(file,total)+`<div class="question">Schreibe den Satz.</div><div class="imgrow">${img(f.img,'task-img')}${img(a.img,'task-img')}</div><div class="hint">${f.full} + ${a.word}</div><input id="answer" placeholder="Schreiben Sie die Antwort hier"><div class="actions"><button class="btn mic-btn" onclick="startMic(this,check)">🎤 Sprechen</button><button class="btn" onclick="check(answer.value)">Kontrollieren</button></div><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`}function check(val){let st=loadTask(file,total),t=WRITING[st.current];if(String(val||'').trim()===t.text){fb.innerHTML='<div class="ok">Richtig!</div>';setTimeout(()=>{markRight(file,total)?complete(area,file,'index.html'):render()},500)}else{let tr=markWrong(file,total,t.text);fb.innerHTML='<div class="no">'+feedbackForTry(tr,t.text,'Großschreibung, Artikel und Punkt')+'</div>'}}render();</script></body></html>
