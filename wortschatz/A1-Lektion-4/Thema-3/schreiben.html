<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Schreiben Thema 3</title><link rel="stylesheet" href="style.css?v=305"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=305"></script><script>
header('Farben & Adjektive');
const file='schreiben.html',total=WRITING.length;
function render(){
  let i=nextIndex(file,total);
  if(i===null)return complete(area,file,'index.html');
  let t=WRITING[i];
  area.innerHTML=progressHtml(file,total)+
  instruction('Schreibe einen Satz zu den Bildern.')+
  exampleBox('Der Sessel ist bequem.')+
  `<div class="imgrow">${t.imgs.map(x=>img(x,'task-img')).join('')}</div>
   <input id="answer" placeholder="Schreiben Sie die Antwort hier">
   <div class="actions">
     <button class="btn mic-btn" onclick="startMic(this,(v)=>{answer.value=v;check(v,true)})">🎤 Sprechen</button>
     <button class="btn" onclick="check(answer.value,false)">Kontrollieren</button>
   </div>
   <div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`;
}
function check(val,fromSpeech=false){
  let st=loadTask(file,total),t=WRITING[st.current];
  if(exactOrSpeech(val,t.text,fromSpeech)){
    fb.innerHTML='<div class="ok">Richtig!</div>';
    setTimeout(()=>{markRight(file,total)?complete(area,file,'index.html'):render()},500)
  }else{
    let tr=markWrong(file,total,t.text);
    fb.innerHTML='<div class="no">'+feedbackForTry(tr,t.text,'Großschreibung, Artikel und Punkt')+'</div>';
  }
}
render();
</script></body></html>
