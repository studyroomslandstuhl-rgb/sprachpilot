<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gefallen Thema 3</title><link rel="stylesheet" href="style.css?v=308"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=308"></script><script>
header('Farben & Adjektive');
const file='gefallen.html',total=GEFAELLEN_TASKS.length;
let phase='question';
function taskItemImg(t){
  const src=t.itemImg||furnitureById(t.item).img;
  if(t.plural){
    return `<div class="plural-visual" aria-label="Plural: zwei gleiche Bilder">${img(src,'task-img small-copy')}${img(src,'task-img small-copy')}</div>`;
  }
  return img(src,'task-img');
}
function visualWord(id){
  const c=COLORS.find(x=>x.id===id);
  if(c) return colorImg(c,'task-img');
  const a=ADJECTIVES.find(x=>x.id===id);
  return img((a&&a.img)||id+'.png','task-img');
}
function normalizeGefallenAnswer(txt){
  let low=simple(txt).replace(/^ganz gut\b/,'gut').replace(/^sehr gut\b/,'gut');
  low=low.replace(/\ber ist sehr\b/g,'er ist');
  low=low.replace(/\bsie ist sehr\b/g,'sie ist');
  low=low.replace(/\bes ist sehr\b/g,'es ist');
  low=low.replace(/\bsie sind sehr\b/g,'sie sind');
  return low.trim();
}
function render(){
  let i=nextIndex(file,total);
  if(i===null)return complete(area,file,'saetze-bauen.html');
  let t=GEFAELLEN_TASKS[i],r=reactionById(t.reaction);
  if(phase==='question'){
    area.innerHTML=progressHtml(file,total)+
      instruction('Bilde zuerst die Frage mit „gefällt“ oder „gefallen“.')+
      exampleBox('Ein Bild = Singular: Wie gefällt dir der Sessel?<br>Zwei gleiche Bilder = Plural: Wie gefallen dir die Stühle?')+
      `<div class="imgrow">${taskItemImg(t)}</div>
       <input id="q" placeholder="Schreiben Sie die Frage hier">
       <div class="actions">
         <button class="btn mic-btn" onclick="startMic(this,v=>{q.value=v;checkQuestion(true)})">🎤 Frage sprechen</button>
         <button class="btn" onclick="checkQuestion(false)">Kontrollieren</button>
       </div>
       <div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`;
  }else{
    area.innerHTML=progressHtml(file,total)+
      instruction('Antworte mit der Reaktion und einem ganzen Satz.')+
      exampleBox('Frage: Wie gefällt dir der Sessel?<br>Antwort: Sehr gut. Er ist bequem.')+
      `<div class="imgrow three-img">${taskItemImg(t)}<div class="smile-card">${r.emoji}</div>${visualWord(t.adj)}</div>
       <input id="a" placeholder="Schreiben Sie die Antwort hier">
       <div class="actions">
         <button class="btn mic-btn" onclick="startMic(this,v=>{a.value=v;checkAnswer(true)})">🎤 Antwort sprechen</button>
         <button class="btn" onclick="checkAnswer(false)">Kontrollieren</button>
       </div>
       <div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`;
  }
}
function checkQuestion(fromSpeech=false){
  let st=loadTask(file,total),t=GEFAELLEN_TASKS[st.current];
  if(isExactSentence(q.value,t.question,fromSpeech)){
    fb.innerHTML='<div class="ok">Richtig. Jetzt die Antwort.</div>';
    phase='answer';
    setTimeout(render,350);
  }else{
    let tr=markWrong(file,total,t.question);
    fb.innerHTML='<div class="no">'+feedbackForTry(tr,t.question,'gefällt/gefallen und Artikel')+'</div>';
  }
}
function checkAnswer(fromSpeech=false){
  let st=loadTask(file,total),t=GEFAELLEN_TASKS[st.current];
  const expected=normalizeGefallenAnswer(t.answer);
  const actual=normalizeGefallenAnswer(a.value);
  if(actual===expected){
    fb.innerHTML='<div class="ok">Richtig!</div>';
    phase='question';
    setTimeout(()=>{markRight(file,total)?complete(area,file,'saetze-bauen.html'):render()},420)
  }else{
    let tr=markWrong(file,total,t.answer);
    fb.innerHTML='<div class="no">'+feedbackForTry(tr,t.answer,'Reaktion, Pronomen und ist/sind')+'</div>';
  }
}
maybeStart(render,'gefallen.html');
</script></body></html>
