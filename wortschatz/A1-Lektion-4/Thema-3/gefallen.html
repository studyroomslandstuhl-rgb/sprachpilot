<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gefallen Thema 3</title><link rel="stylesheet" href="style.css?v=300"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=300"></script><script>header('Farben & Adjektive');const file='gefallen.html',total=GEFAELLEN_TASKS.length;function questionFor(f){return `Wie gefällt dir ${f.article==='die'?'die':f.article==='das'?'das':'der'} ${f.word}?`}function render(){let i=nextIndex(file,total);if(i===null)return complete(area,file,'saetze-bauen.html');let t=GEFAELLEN_TASKS[i],f=furnitureById(t.item);area.innerHTML=progressHtml(file,total)+`<div class="question">Frage und antworte.</div>${img(f.img)}<div class="hint">Reaktion: <b>${t.reaction}</b> · Adjektiv: <b>${t.adj}</b></div><label>Frage</label><input id="q" placeholder="Schreiben Sie die Frage hier"><label>Antwort</label><input id="a" placeholder="Schreiben Sie die Antwort hier"><div class="actions"><button class="btn mic-btn" onclick="startMic(this,v=>{a.value=v;check()})">🎤 Antwort sprechen</button><button class="btn" onclick="check()">Kontrollieren</button></div><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`}function check(){let st=loadTask(file,total),t=GEFAELLEN_TASKS[st.current],f=furnitureById(t.item),solQ=questionFor(f);if(isExactSentence(q.value,solQ)&&isExactSentence(a.value,t.answer)){fb.innerHTML='<div class="ok">Richtig!</div>';setTimeout(()=>{markRight(file,total)?complete(area,file,'saetze-bauen.html'):render()},500)}else{let tr=markWrong(file,total,solQ+' '+t.answer);fb.innerHTML='<div class="no">'+feedbackForTry(tr,solQ+' / '+t.answer,'Frage und Antwort')+'</div>'}}render();</script></body></html>
