<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>nicht kein keine Thema 3</title><link rel="stylesheet" href="style.css?v=300"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=300"></script><script>header('Farben & Adjektive');const file='kein.html',total=12;const tasks=[
{gap:'nicht',sentence:'Der Sessel ist ___ unbequem. Er ist bequem.'},{gap:'kein',sentence:'Das ist ___ Stuhl. Das ist ein Sessel.'},{gap:'keine',sentence:'Das ist ___ Lampe. Das ist ein Tisch.'},{gap:'nicht',sentence:'Das Waschbecken ist ___ schmutzig. Es ist sauber.'},{gap:'kein',sentence:'Hier ist ___ Bett. Hier ist ein Sofa.'},{gap:'keine',sentence:'Hier ist ___ Dusche. Hier ist ein Waschbecken.'},{gap:'nicht',sentence:'Der Stuhl ist ___ bequem. Er ist unbequem.'},{gap:'kein',sentence:'Das ist ___ Schrank. Das ist ein Kühlschrank.'},{gap:'keine',sentence:'Das ist ___ Küche. Das ist ein Bad.'},{gap:'nicht',sentence:'Das Sofa ist ___ alt. Es ist modern.'},{gap:'kein',sentence:'Hier ist ___ Fernseher. Hier ist ein Teppich.'},{gap:'keine',sentence:'Hier ist ___ Toilette. Hier ist eine Dusche.'}];function render(){let i=nextIndex(file,total);if(i===null)return complete(area,file,'reaktionen.html');let t=tasks[i];area.innerHTML=progressHtml(file,total)+`<div class="question">Wähle das richtige Wort.</div><div class="big">${t.sentence}</div><div class="options">${['nicht','kein','keine'].map(x=>`<button class="opt" onclick="check('${x}')">${x}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}function check(x){let st=loadTask(file,total),t=tasks[st.current];if(x===t.gap){fb.innerHTML='<div class="ok">Richtig!</div>';setTimeout(()=>{markRight(file,total)?complete(area,file,'reaktionen.html'):render()},500)}else{let tr=markWrong(file,total,t.gap);fb.innerHTML='<div class="no">'+feedbackForTry(tr,t.gap,'nicht / kein / keine')+'</div>'}}render();</script></body></html>
