<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Malen nach Zahlen</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=1"></script><script>
header("Malen nach Zahlen");const FILE="farbenbild.html";let selectedColor=null;let done={};
function show(){area.innerHTML=`${progressHtml(FILE,PAINT_TASKS.length)}<div class="question">Malen nach Zahlen</div><div class="hint">${PAINT_TASKS.map(t=>t.n+" = "+wordById(t.color).word).join(" · ")}</div><div class="paint-grid">${PAINT_TASKS.map(t=>`<div class="paint-cell" data-n="${t.n}" onclick="paint(${t.n})">${t.n}</div>`).join("")}</div><div class="palette">${PAINT_TASKS.map(t=>`<button class="btn secondary" onclick="selectedColor='${t.color}'">${wordById(t.color).word}</button>`).join("")}</div><div id="fb" class="feedback"></div>`}
function paint(n){let t=PAINT_TASKS.find(x=>x.n===n);if(!selectedColor){fb.textContent="Wähle zuerst eine Farbe.";return}if(selectedColor===t.color){document.querySelector(`[data-n="${n}"]`).style.background=colorCss(t.color);done[n]=true;fb.textContent="Richtig!";if(Object.keys(done).length===PAINT_TASKS.length){let st=loadTask(FILE,PAINT_TASKS.length);st.done=[...Array(PAINT_TASKS.length).keys()];saveTask(FILE,st);setTimeout(()=>complete(area,FILE,"pruefung.html"),700)}}else{let tr=markWrong(FILE,PAINT_TASKS.length);fb.innerHTML=feedbackForTry(tr,wordById(t.color).word,"Farbe");}}
show();
</script></body></html>
