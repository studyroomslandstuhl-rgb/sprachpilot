<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SprachPilot Thema 3</title><link rel="stylesheet" href="style.css?v=317"></head><body><div class="container"><header class="topbar"></header><section class="card progress-card"><div class="circle" id="circle">0%</div><div class="progress-main"><h2>Dein Fortschritt</h2><div class="small" id="countText"></div><div class="progress"><div class="bar" id="mainBar"></div></div><p class="small">Ziel: Farben, Adjektive, Gegenteile und Gefallen üben.</p><div id="examSummary"></div></div></section><section class="grid" id="tasksGrid"></section><footer>© SprachPilot</footer></div><script src="/js/sp-progress-guard.js?v=points-safe"></script><script src="app.js?v=317"></script><script>header('Farben & Adjektive', true);
const TASK_INFO=[
['karteikarten.html','1. Karteikarten','🃏','Lerne die Wörter.'],['hoeren.html','2. Hören','🎧','Wähle Farbe und Bild.'],['farben.html','3. Farben','🎨','Wähle die Farbe.'],['memory.html','4. Gegenteile-Memory','🧠','Finde Gegenteile.'],['gegenteile.html','5. Gegenteile','↔️','Beschreibe mit nicht/sehr.'],['kein.html','6. nicht / kein','🚫','Wähle das Wort.'],['reaktionen.html','7. Reaktionen','🙂','Wähle den Smiley.'],['gefallen.html','8. Gefallen','💬','Sprich oder schreibe.'],['saetze-bauen.html','9. Sätze bauen','🧩','Wähle ist oder sind.'],['schreiben.html','10. Schreiben','✍️','Schreibe den Satz.']
];
function draw(){let done=taskDoneCount(), total=TASK_FILES.length, p=Math.round(done/total*100)||0;circle.textContent=p+'%';countText.textContent=`${done} / ${total} Aufgaben abgeschlossen`;mainBar.style.width=p+'%';let best=bestExamResult();if(best){examSummary.innerHTML=`<div class="exam-done-box exam-summary-wide"><div class="exam-summary-title"><span class="exam-check">✓</span><span>Thema abgeschlossen!</span></div><div class="exam-summary-grid"><div class="exam-summary-item"><span>Prüfung</span><strong>${best.percent}% ${starsHtml(starsForPercent(best.percent))}</strong></div><div class="exam-summary-item"><span>Punkte</span><strong>${best.score}/${best.maxScore}</strong></div><div class="exam-summary-item"><span>Versuche</span><strong>${examHistory().length}</strong></div></div></div>`}else examSummary.innerHTML='';tasksGrid.innerHTML=TASK_INFO.map(([file,title,icon,sub])=>{let p=pct(file,getTotal(file));return `<a class="module" href="${file}"><div class="num">${title}</div><div class="icon">${icon}</div><p>${sub}</p><div class="progress"><div class="bar" style="width:${p}%"></div></div><div class="small">${p}%</div><div class="start">Starten</div></a>`}).join('')+examTile()}
function examTile(){let open=examUnlocked(), best=bestExamResult();let p=best?best.percent:0;return `<a class="module ${open?'':'exam-locked'}" href="${open?'pruefung.html':'#'}"><div class="num">11. Prüfung</div><div class="icon exam-icon">★</div><p>${open?'Teste dein Wissen.':'Prüfung wird erst freigeschaltet, wenn alle anderen Aufgaben 100% erreicht haben.'}</p><div class="progress"><div class="bar" style="width:${p}%"></div></div><div class="small">${open?(best?best.percent+'%':'offen'):'Prüfung gesperrt'}</div><div class="start">${open?'Starten':'Prüfung gesperrt'}</div></a>`}
draw();</script></body></html>
