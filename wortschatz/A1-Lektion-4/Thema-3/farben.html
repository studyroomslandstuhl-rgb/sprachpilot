<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Farben Thema 3</title><link rel="stylesheet" href="style.css?v=310"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=310"></script><script>
header('Farben & Adjektive');
const file='farben.html',total=COLORS.length;
function render(){
  let i=nextIndex(file,total);
  if(i===null)return complete(area,file,'memory.html');
  let c=COLORS[i],opts=shuffle([c,...shuffle(COLORS.filter(x=>x.id!==c.id)).slice(0,3)]);
  area.innerHTML=progressHtml(file,total)+
    instruction('Welche Farbe ist das? Wähle das richtige Bild.')+
    `<div class="big">${c.word}</div>`+
    `<div class="options image-grid-4">${opts.map(o=>`<button class="opt image-only" onclick="check('${o.id}')">${colorImg(o,'choice-img')}</button>`).join('')}</div>
     <div id="fb" class="feedback"></div>`;
}
function check(id){
  let st=loadTask(file,total),c=COLORS[st.current];
  if(id===c.id){
    fb.innerHTML='<div class="ok">Richtig!</div>';
    setTimeout(()=>{markRight(file,total)?complete(area,file,'memory.html'):render()},500)
  }else{
    let t=markWrong(file,total,c.word);
    fb.innerHTML='<div class="no">'+feedbackForTry(t,c.word,'die Farbe')+'</div>'
  }
}
maybeStart(render,'farben.html');
</script></body></html>
