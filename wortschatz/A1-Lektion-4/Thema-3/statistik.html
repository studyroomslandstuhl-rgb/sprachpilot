<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Statistik Thema 3</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><section class="card"><h2>Statistik – Wörter</h2></section><section class="stat-grid" id="stats"></section></div><script src="app.js?v=1"></script><script>
header("Statistik");
stats.innerHTML=WORDS.map(w=>{const p=wordProgress(w.id);return `<div class="stat-card"><div class="stat-head">${w.type==='color'?`<div class="swatch" style="background:${colorCss(w.id)}"></div>`:`<img src="${w.image}" onerror="fixImg(this)">`}<div><div class="stat-word">${w.full}</div><div class="stat-tr">${translateWord(w)}</div></div></div><div class="progress"><div class="bar" style="width:${p}%"></div></div><b>${p}%</b> · <span class="status-pill">${wordStatus(p)}</span></div>`}).join("");
</script></body></html>
