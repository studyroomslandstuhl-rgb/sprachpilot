<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Statistik Thema 3</title><link rel="stylesheet" href="style.css?v=304"></head><body><div class="container"><header class="topbar"></header><section class="card"><h2>Statistik – Thema 3</h2><p class="small">Fortschritt pro Aufgabe.</p></section><section id="stats"></section><footer>© SprachPilot</footer></div><script src="app.js?v=304"></script><script>header('Farben & Adjektive');stats.innerHTML='<section class="grid">'+TASK_FILES.map(f=>{let p=pct(f,getTotal(f));return `<div class="module"><h3>${TASK_TITLES[f]}</h3><div class="progress"><div class="bar" style="width:${p}%"></div></div><div class="big">${p}%</div><p>${p>=100?'gelernt':p>0?'in Arbeit':'neu'}</p></div>`}).join('')+'</section>';</script></body></html>
