<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gegenteile Thema 3</title><link rel="stylesheet" href="style.css?v=301"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=301"></script><script>
header('Farben & Adjektive');
const file='gegenteile.html', total=CONTRAST_TASKS.length;
function adjImage(word){
  let a=ADJECTIVES.find(x=>simple(x.word)===simple(word));
  return a?img(a.img,'task-img'):iconCard(`<b>${safe(word)}</b>`);
}
function render(){
  let i=nextIndex(file,total);
  if(i===null)return complete(area,file,'kein.html');
  let t=CONTRAST_TASKS[i],f=furnitureById(t.item);
  area.innerHTML=progressHtml(file,total)+
  instruction('Schreibe zwei Sätze mit „nicht“ und „sehr“.')+
  exampleBox('Das Sofa ist nicht hell. Es ist sehr dunkel.')+
  `<div class="imgrow three-img">${adjImage(t.wrong)}${adjImage(t.right)}${img(f.img,'task-img')}</div>
   <input id="answer" placeholder="Schreiben Sie die Antwort hier">
   <div class="actions">
    <button class="btn mic-btn" onclick="startMic(this,(v)=>{answer.value=v;check(v,true)})">🎤 Sprechen</button>
    <button class="btn" onclick="check(answer.value,false)">Kontrollieren</button>
   </div>
   <div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`;
}
function check(val,fromSpeech=false){
  let st=loadTask(file,total),t=CONTRAST_TASKS[st.current];
  if(isExactSentence(val,t.sentence,fromSpeech)){
    fb.innerHTML='<div class="ok">Richtig!</div>';
    setTimeout(()=>{markRight(file,total)?complete(area,file,'kein.html'):render()},500)
  }else{
    let tr=markWrong(file,total,t.sentence);
    fb.innerHTML='<div class="no">'+feedbackForTry(tr,t.sentence,'Artikel, Pronomen und Punkt')+'</div>';
  }
}
render();
</script></body></html>
