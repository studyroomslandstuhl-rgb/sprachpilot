<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gegenteile Thema 3</title><link rel="stylesheet" href="style.css?v=300"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=300"></script><script>header('Farben & Adjektive');const file='gegenteile.html', total=CONTRAST_TASKS.length;function render(){let i=nextIndex(file,total);if(i===null)return complete(area,file,'kein.html');let t=CONTRAST_TASKS[i],f=furnitureById(t.item);area.innerHTML=progressHtml(file,total)+`<div class="question">Schreibe den Satz.</div><div class="hint">${safe(t.wrong)} / ${safe(t.right)}</div>${img(t.img)}<input id="answer" placeholder="Schreiben Sie die Antwort hier"><div class="actions"><button class="btn mic-btn" onclick="startMic(this,check)">🎤 Sprechen</button><button class="btn" onclick="check(answer.value)">Kontrollieren</button></div><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`}function check(val){let st=loadTask(file,total),t=CONTRAST_TASKS[st.current];if(isExactSentence(val,t.sentence)){fb.innerHTML='<div class="ok">Richtig!</div>';setTimeout(()=>{markRight(file,total)?complete(area,file,'kein.html'):render()},500)}else{let tr=markWrong(file,total,t.sentence);fb.innerHTML='<div class="no">'+feedbackForTry(tr,t.sentence,'Artikel, Pronomen, Punkt')+'</div>'}}render();</script></body></html>
