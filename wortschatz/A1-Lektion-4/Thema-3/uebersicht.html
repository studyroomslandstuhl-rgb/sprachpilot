<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Übersicht Thema 3</title><link rel="stylesheet" href="style.css?v=301"></head><body><div class="container"><header class="topbar"></header><section class="card"><h2>Übersicht – Wörter in Thema 3</h2><p class="small">Farben, Adjektive und Reaktionen.</p></section><section id="overview"></section><footer>© SprachPilot</footer></div><script src="app.js?v=301"></script><script>header('Farben & Adjektive');
function cardWord(x){let content=x.type==='color'?swatch(x,true):img(x.img||x.id+'.png','task-img');return `<div class="module"><div>${content}</div><h3>${safe(x.word)}</h3><p>${safe(translate(x))}</p></div>`}
overview.innerHTML=`<section class="card"><h2>Farben <span class="small">${COLORS.length}</span></h2><div class="grid">${COLORS.map(x=>cardWord({...x,type:'color'})).join('')}</div></section><section class="card"><h2>Adjektive <span class="small">${ADJECTIVES.length}</span></h2><div class="grid">${ADJECTIVES.map(x=>cardWord({...x,type:'adj'})).join('')}</div></section><section class="card"><h2>Reaktionen</h2><div class="grid">${REACTIONS.map(x=>`<div class="module"><div class="icon">💬</div><h3>${x.word}</h3></div>`).join('')}</div></section>`;</script></body></html>
