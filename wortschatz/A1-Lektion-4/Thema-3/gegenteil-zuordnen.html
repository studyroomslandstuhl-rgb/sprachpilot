<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gegenteil zuordnen</title><link rel="stylesheet" href="style.css"></head><body>
<div id="accountStrip" class="account-strip"></div>
<script type="module" src="/js/guard.js"></script><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=1"></script><script>
header("Gegenteil zuordnen");const FILE="gegenteil-zuordnen.html";let i=0;
function show(){if(loadTask(FILE,OPPOSITES.length).done.length>=OPPOSITES.length){complete(area,FILE,"satz-ergaenzen.html");return}i=nextIndex(FILE,OPPOSITES.length);let p=OPPOSITES[i],w=wordById(p[0]);area.innerHTML=`${progressHtml(FILE,OPPOSITES.length)}<div class="question">Was ist das Gegenteil von <b>${w.word}</b>?</div><input id="ans" placeholder="Gegenteil schreiben"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}
function check(){let p=OPPOSITES[i],sol=wordById(p[1]).word;if(simple(ans.value)===simple(sol)){fb.textContent="Richtig!";markRight(FILE,OPPOSITES.length);setTimeout(show,700)}else{let tr=markWrong(FILE,OPPOSITES.length);fb.innerHTML=feedbackForTry(tr,sol,"Gegenteil");}}show();
</script></body></html>
