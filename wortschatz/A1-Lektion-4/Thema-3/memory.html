<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gegenteile-Memory Thema 3</title><link rel="stylesheet" href="style.css?v=310"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="/js/sp-progress-guard.js?v=points-safe"></script><script src="app.js?v=310"></script><script>
header('Farben & Adjektive');
const file='memory.html';
const base=PAIRS.map(([a,b])=>({a:adjById(a).word,b:adjById(b).word,id:a+'-'+b}));
const total=base.length*2;
let cards=shuffle(base.flatMap(p=>[{pair:p.id,word:p.a},{pair:p.id,word:p.b}]));
let openCards=[];
let done=new Set();
function loadDone(){
  let st=loadTask(file,total);
  done=new Set(Array.isArray(st.done)?st.done:[]);
}
function saveMemory(){
  let st=loadTask(file,total);
  st.done=[...done];
  st.current=0;
  saveTask(file,st);
}
function visible(i){return done.has(i)||openCards.includes(i)}
function render(){
  loadDone();
  if(done.size>=total)return complete(area,file,'gegenteile.html');
  area.innerHTML=progressHtml(file,total)+
  `<div class="question">Finde die Gegenteile.</div>
   <div class="hint">Drehe zwei Karten um. Nur passende Paare bleiben offen.</div>
   <div class="memory-grid word-memory">${cards.map((c,i)=>`<button class="memory-card ${done.has(i)?'done':''} ${openCards.includes(i)?'selected':''}" onclick="pick(${i})">${visible(i)?safe(c.word):'?'}</button>`).join('')}</div>`;
}
function currentTwoMatch(){
  if(openCards.length!==2)return true;
  return cards[openCards[0]].pair===cards[openCards[1]].pair;
}
function pick(i){
  if(done.has(i)||openCards.includes(i))return;
  if(openCards.length===2){
    if(!currentTwoMatch()){
      markWrong(file,total,cards[openCards[0]].word+' / '+cards[openCards[1]].word);
      openCards=[];
    }else{
      openCards=[];
    }
  }
  openCards.push(i);
  if(openCards.length===2){
    const [a,b]=openCards;
    if(cards[a].pair===cards[b].pair){
      done.add(a);done.add(b);saveMemory();openCards=[];
    }
  }
  render();
}
maybeStart(render,'memory.html');
</script></body></html>
