<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Satz ergänzen</title><link rel="stylesheet" href="style.css"></head><body>
<div id="accountStrip" class="account-strip"></div>
<script type="module" src="/js/guard.js"></script><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=1"></script><script>
header("Satz ergänzen");const FILE="satz-ergaenzen.html";let i=0;
function show(){if(loadTask(FILE,SENTENCE_TASKS.length).done.length>=SENTENCE_TASKS.length){complete(area,FILE,"farbenbild.html");return}i=nextIndex(FILE,SENTENCE_TASKS.length);let t=SENTENCE_TASKS[i];area.innerHTML=`${progressHtml(FILE,SENTENCE_TASKS.length)}<div class="question">Ergänze den Satz.</div><img class="task-img" src="${t.image}" onerror="fixImg(this)"><div class="hint">${t.sentence.replace("___","_____")}</div><input id="ans" placeholder="Wort schreiben"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}
function check(){let t=SENTENCE_TASKS[i],sol=wordById(t.answer).word;if(simple(ans.value)===simple(sol)){fb.textContent="Richtig!";markRight(FILE,SENTENCE_TASKS.length);setTimeout(show,700)}else{let tr=markWrong(FILE,SENTENCE_TASKS.length);fb.innerHTML=feedbackForTry(tr,sol,"Adjektiv oder Farbe");}}show();
</script></body></html>
