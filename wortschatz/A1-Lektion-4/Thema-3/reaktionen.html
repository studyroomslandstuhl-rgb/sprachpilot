<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reaktionen Thema 3</title><link rel="stylesheet" href="style.css?v=310"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=310"></script><script>
header('Farben & Adjektive');
const file='reaktionen.html',total=REACTIONS.length;
function render(){
  let i=nextIndex(file,total);
  if(i===null)return complete(area,file,'gefallen.html');
  let r=REACTIONS[i],opts=shuffle(REACTIONS);
  area.innerHTML=progressHtml(file,total)+
  instruction('Wähle den passenden Smiley.')+
  `<div class="big reaction-word">${r.word}</div>
   <div class="options reaction-options">${opts.map(o=>`<button class="opt smile-opt" onclick="check('${o.id}')"><span>${o.emoji}</span></button>`).join('')}</div>
   <div id="fb" class="feedback"></div>`;
}
function check(id){
  let st=loadTask(file,total),r=REACTIONS[st.current];
  const eq=(a,b)=>([a,b].every(x=>['gut','ganz-gut'].includes(x)))||a===b;
  if(eq(id,r.id)){
    fb.innerHTML='<div class="ok">Richtig!</div>';
    setTimeout(()=>{markRight(file,total)?complete(area,file,'gefallen.html'):render()},500)
  }else{
    let tr=markWrong(file,total,r.word);
    fb.innerHTML='<div class="no">'+feedbackForTry(tr,r.emoji+' = '+r.word,'die Reaktion')+'</div>';
  }
}
maybeStart(render,'reaktionen.html');
</script></body></html>
