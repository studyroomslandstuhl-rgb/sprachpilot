<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reaktionen Thema 3</title><link rel="stylesheet" href="style.css?v=300"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=300"></script><script>header('Farben & Adjektive');const file='reaktionen.html',total=REACTIONS.length;function render(){let i=nextIndex(file,total);if(i===null)return complete(area,file,'gefallen.html');let r=REACTIONS[i],opts=shuffle(REACTIONS);area.innerHTML=progressHtml(file,total)+`<div class="question">Wähle die Reaktion.</div><div class="big">${r.word}</div><div class="options">${opts.map(o=>`<button class="opt" onclick="check('${o.id}')">${o.word}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}function check(id){let st=loadTask(file,total),r=REACTIONS[st.current];if(id===r.id){fb.innerHTML='<div class="ok">Richtig!</div>';setTimeout(()=>{markRight(file,total)?complete(area,file,'gefallen.html'):render()},500)}else{let tr=markWrong(file,total,r.word);fb.innerHTML='<div class="no">'+feedbackForTry(tr,r.word,'die Reaktion')+'</div>'}}render();</script></body></html>
