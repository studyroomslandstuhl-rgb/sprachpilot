<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><!-- SprachPilot Thema 4 V8 Hardfix -->
<title>Welche Anzeige passt?</title><link rel="stylesheet" href="../shared/lektion4-standard.css?v=thema4-v8"><link rel="stylesheet" href="style.css?v=thema4-v8"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="../shared/lektion4-standard.js?v=thema4-v8"></script><script src="app.js?v=thema4-content-v1"></script><script>renderSprachPilotHeader({title:"Wohnungsanzeigen",subtitle:"A1 Lektion 4 · Thema 4",backHref:"index.html",overviewHref:"uebersicht.html",statsHref:"statistik.html"});

const FILE="welche-anzeige-passt.html";let i=null;
function adsHtml(){return Object.entries(MATCH_ADS).map(([k,v])=>`<div class="ad-box"><b>Anzeige ${k}</b><br>${esc(v)}</div>`).join('')}
function show(){if(pct(FILE,MATCH_SITUATIONS.length)>=100)return complete(area,FILE,"reihenfolge.html");i=nextIndex(FILE,MATCH_SITUATIONS.length);const [sit,answ]=MATCH_SITUATIONS[i];area.innerHTML=`${progressHtml(FILE,MATCH_SITUATIONS.length)}<div class="question">Welche Anzeige passt?</div><div class="match-grid"><div><div class="hint"><b>Situation ${i+1}</b><br>${esc(sit)}</div><div class="options">${Object.keys(MATCH_ADS).map(k=>`<button class="opt" onclick="check('${k}')">Anzeige ${k}</button>`).join('')}</div></div><div class="ad-list">${adsHtml()}</div></div><div id="fb" class="feedback"></div>`}
function check(k){const right=MATCH_SITUATIONS[i][1];if(k===right){fb.className='feedback ok';fb.textContent='Richtig!';markRight(FILE,MATCH_SITUATIONS.length);setTimeout(show,650)}else{const tr=markWrong(FILE,MATCH_SITUATIONS.length);fb.className='feedback no';fb.innerHTML=feedbackForTry(tr,`Situation ${i+1} passt zu Anzeige ${right}.`,'das wichtigste Detail')}}
show();

</script></body></html>
