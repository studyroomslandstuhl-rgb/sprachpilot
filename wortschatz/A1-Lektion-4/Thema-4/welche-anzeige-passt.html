<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><!-- SprachPilot Thema 4 V8 Hardfix -->
<title>Welche Anzeige passt?</title><link rel="stylesheet" href="../shared/lektion4-standard.css?v=thema4-v8"><link rel="stylesheet" href="style.css?v=thema4-v8"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="../shared/lektion4-standard.js?v=thema4-v8"></script><script src="app.js?v=thema4-content-v2"></script><script>renderSprachPilotHeader({title:"Wohnungsanzeigen",subtitle:"A1 Lektion 4 · Thema 4",backHref:"index.html",overviewHref:"uebersicht.html",statsHref:"statistik.html"});

const FILE="welche-anzeige-passt.html";let i=null;
function adsHtml(task){return Object.entries(task.ads).map(([k,v])=>`<div class="ad-box"><b>Anzeige ${k}</b><br>${esc(v)}</div>`).join('')}
function show(){if(pct(FILE,MATCH_TASKS.length)>=100)return complete(area,FILE,"reihenfolge.html");i=nextIndex(FILE,MATCH_TASKS.length);const task=MATCH_TASKS[i];area.innerHTML=`${progressHtml(FILE,MATCH_TASKS.length)}<div class="question">Welche Anzeige passt?</div><div class="match-grid"><div><div class="hint"><b>Situation ${i+1}</b><br>${esc(task.situation)}</div><div class="options">${Object.keys(task.ads).map(k=>`<button class="opt" onclick="check('${k}')">Anzeige ${k}</button>`).join('')}</div></div><div class="ad-list">${adsHtml(task)}</div></div><div id="fb" class="feedback"></div>`}
function check(k){const task=MATCH_TASKS[i];if(k===task.answer){fb.className='feedback ok';fb.textContent='Richtig!';markRight(FILE,MATCH_TASKS.length);setTimeout(show,650)}else{const tr=markWrong(FILE,MATCH_TASKS.length);fb.className='feedback no';fb.innerHTML=feedbackForTry(tr,`Situation ${i+1} passt zu Anzeige ${task.answer}.`,'lies Zimmer, Preis und Extras genau')}}
show();

</script></body></html>
