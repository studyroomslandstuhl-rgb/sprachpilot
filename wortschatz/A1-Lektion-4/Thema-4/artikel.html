<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Artikel</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=thema4v2"></script><script>header("Artikel",{back:"index.html"});

const FILE="artikel.html";let i=null;
function show(){if(pct(FILE,NOUNS.length)>=100)return complete(area,FILE,"plural.html");i=nextIndex(FILE,NOUNS.length);const w=NOUNS[i];area.innerHTML=`${progressHtml(FILE,NOUNS.length)}<div class="question">Welcher Artikel passt?</div>${imgTag(w)}<div class="hint">___ ${esc(w.word)}</div><div class="options">${['der','die','das'].map(a=>`<button class="opt" onclick="check('${a}')">${a}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}
function check(a){const w=NOUNS[i];if(a===w.article){fb.className='feedback good';fb.textContent='Richtig!';markRight(FILE,NOUNS.length);setTimeout(show,650)}else{const tr=markWrong(FILE,NOUNS.length);fb.className='feedback bad';fb.innerHTML=feedbackForTry(tr,w.full,'Prüfe der, die oder das.')}}
show();

</script></body></html>
