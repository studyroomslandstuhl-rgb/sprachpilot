<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karteikarten</title><link rel="stylesheet" href="../shared/lektion4-standard.css"><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="../shared/lektion4-standard.js"></script><script src="app.js?v=thema4v3shared"></script><script>renderSprachPilotHeader({title:"Wohnungsanzeigen",subtitle:"A1 Lektion 4 · Thema 4",backHref:"index.html",overviewHref:"uebersicht.html",statsHref:"statistik.html"});

const FILE="karteikarten.html";let i=null;
function show(){if(pct(FILE,WORDS.length)>=100)return complete(area,FILE,"hoeren.html");i=nextIndex(FILE,WORDS.length);const w=WORDS[i];area.innerHTML=`${progressHtml(FILE,WORDS.length)}<div class="question">Sage das deutsche Wort mit Artikel.</div><div class="hint">${esc(translateWord(w))}</div>${imgTag(w,'flash-img')}<div class="input-row"><input id="ans" placeholder="Schreiben Sie die Antwort hier"><button class="btn" id="mic" onclick="say()">🎤 Sprechen</button><button class="btn secondary" onclick="writeMode()">Ich kann nicht sprechen</button><button class="btn secondary" onclick="flip()">Karte umdrehen</button><button class="btn" onclick="check()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}
function writeMode(){ans.focus()}
function say(){startMic(mic,t=>{ans.value=t;check()})}
function flip(){const w=WORDS[i];ans.value=w.full;const tr=markWrong(FILE,WORDS.length);fb.className='feedback no';fb.innerHTML=feedbackForTry(Math.max(3,tr),w.full,'das deutsche Wort');}
function check(){const w=WORDS[i];if(eq(ans.value,w.full)){fb.className='feedback ok';fb.textContent='Richtig!';markRight(FILE,WORDS.length);setTimeout(show,650)}else{const tr=markWrong(FILE,WORDS.length);fb.className='feedback no';fb.innerHTML=feedbackForTry(tr,w.full,'Artikel und Wort')}}
show();

</script></body></html>
