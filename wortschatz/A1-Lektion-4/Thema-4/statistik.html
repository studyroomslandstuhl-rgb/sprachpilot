<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Statistik</title><link rel="stylesheet" href="../shared/lektion4-standard.css"><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="content"></main><footer>© SprachPilot</footer></div><script src="../shared/lektion4-standard.js"></script><script src="app.js?v=thema4v4teacher"></script><script>renderSprachPilotHeader({title:"Wohnungsanzeigen",subtitle:"A1 Lektion 4 · Thema 4",backHref:"uebersicht.html",overviewHref:"uebersicht.html",statsHref:"statistik.html"});

const groups=[...new Set(WORDS.map(w=>w.group))];
document.getElementById('content').innerHTML=groups.map(g=>{const list=WORDS.filter(w=>w.group===g);return `<section class="overview-group"><div class="group-title"><span>${esc(g)}</span><span>${list.length}</span></div><div class="stat-grid">${list.map(w=>{const p=wordProgress(w.id);return `<div class="stat-card">${imgTag(w,'small-img')}<div class="word-full">${esc(w.full)}</div><div class="word-tr">${esc(translateWord(w))}</div><div class="progress"><div class="bar" style="width:${p}%"></div></div><b>${p}%</b> · <span class="status-pill">${wordStatus(p)}</span></div>`}).join('')}</div></section>`}).join('');

</script></body></html>
