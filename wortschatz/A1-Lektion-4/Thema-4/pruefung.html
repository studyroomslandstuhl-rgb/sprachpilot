<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prüfung</title><link rel="stylesheet" href="../shared/lektion4-standard.css"><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="../shared/lektion4-standard.js"></script><script src="app.js?v=thema4v3shared"></script><script>renderSprachPilotHeader({title:"Wohnungsanzeigen",subtitle:"A1 Lektion 4 · Thema 4",backHref:"index.html",overviewHref:"uebersicht.html",statsHref:"statistik.html"});

const FILE="pruefung.html";const EXAM_TOTAL=20;let state=null;
function buildExamItems(){let items=[];HOREN_IDS.slice(0,4).forEach(id=>items.push({type:'hoeren',id}));ARTICLE_WRITE_IDS.slice(0,4).forEach(id=>items.push({type:'write',id}));NOUNS.slice(0,4).forEach(w=>items.push({type:'article',id:w.id}));NOUNS.slice(6,10).forEach(w=>items.push({type:'plural',id:w.id}));PAIRS.slice(0,3).forEach((p,idx)=>items.push({type:'pair',idx}));MEANING_TASKS.slice(0,3).forEach((m,idx)=>items.push({type:'meaning',idx}));items.push({type:'ad',idx:0});items.push({type:'match',idx:0});items.push({type:'order'});items=shuffle(items).slice(0,EXAM_TOTAL);return items}
function loadExam(){try{const s=JSON.parse(localStorage.getItem(taskKey(FILE))||'null');if(s&&Array.isArray(s.items))return s}catch(e){}return {items:buildExamItems(),pos:0,score:0,max:0,tries:0,waiting:false,done:false}}
function saveExam(){localStorage.setItem(taskKey(FILE),JSON.stringify(state));syncDashboardProgress()}
function startExam(){state={items:buildExamItems(),pos:0,score:0,max:0,tries:0,waiting:false,done:false};saveExam();show()}
function finishExam(){state.done=true;const percent=Math.min(100,Math.round((state.score/(state.max||1))*100));const result={percent,score:state.score,maxScore:state.max,stars:starsForPercent(percent),date:new Date().toISOString()};const h=examHistory();h.push(result);localStorage.setItem(EXAM_HISTORY_KEY,JSON.stringify(h));localStorage.setItem(EXAM_UNLOCK_KEY,'1');saveExam();area.innerHTML=`<div class="finish-box"><div class="finish-icon">✓</div><div class="question">Prüfung geschafft!</div><div class="exam-stars">${starsHtml(result.stars)}</div><div class="big">${percent}%</div><p><b>Punkte:</b> ${state.score}/${state.max}</p><div class="progress"><div class="bar" style="width:${percent}%"></div></div><div class="actions finish-actions"><button class="btn" onclick="startExam()">Prüfung neu starten</button><a class="btn secondary" href="index.html">Zurück zum Thema</a></div></div>`}
function examProgress(){const p=Math.round((state.pos/(state.items.length||1))*100);return `<div class="small">Aufgabe ${Math.min(state.pos+1,state.items.length)} / ${state.items.length} · Punkte: ${state.score}/${state.max}</div><div class="progress"><div class="bar" style="width:${p}%"></div></div>`}
function good(){if(state.tries===0)state.score++;state.max++;state.pos++;state.tries=0;state.waiting=false;saveExam();if(state.pos>=state.items.length)finishExam();else show()}
function bad(solution,hint){state.tries++;saveExam();fb.className='feedback no';fb.innerHTML=(state.tries===1?'Da ist noch ein Fehler.':state.tries===2?'Tipp: '+esc(hint):'Lösung: '+esc(solution))+`<br><button class="btn secondary" onclick="skipWrong()">Weiter</button>`}
function skipWrong(){state.max++;state.pos++;state.tries=0;state.waiting=false;saveExam();if(state.pos>=state.items.length)finishExam();else show()}
function show(){if(!isExamUnlocked()){area.innerHTML='<div class="question">Prüfung gesperrt</div><p>Erst alle anderen Aufgaben auf 100% abschließen.</p><a class="btn secondary" href="index.html">Zurück zum Thema</a>';return}state=loadExam();if(state.done){const best=bestExamResult();area.innerHTML=`<div class="finish-box"><div class="finish-icon">✓</div><div class="question">Prüfung geschafft!</div><div class="exam-stars">${starsHtml(best?.stars||0)}</div><div class="big">${best?.percent||0}%</div><div class="actions finish-actions"><button class="btn" onclick="startExam()">Prüfung neu starten</button><a class="btn secondary" href="index.html">Zurück zum Thema</a></div></div>`;return}const item=state.items[state.pos];if(!item)return finishExam();if(item.type==='hoeren')return showHear(item);if(item.type==='write')return showWrite(item);if(item.type==='article')return showArticle(item);if(item.type==='plural')return showPlural(item);if(item.type==='pair')return showPair(item);if(item.type==='meaning')return showMeaning(item);if(item.type==='ad')return showAd(item);if(item.type==='match')return showMatch(item);if(item.type==='order')return showOrder(item)}
function showHear(item){const w=byId(item.id);const opts=pickOptions(HOREN_IDS.map(byId),w,4,'full');area.innerHTML=`${examProgress()}<div class="question">Höre und wähle das Wort.</div><button class="btn" onclick="speak('${esc(w.full)}')">🔊 Hören</button><div class="options">${opts.map(o=>`<button class="opt" onclick="${o.id===w.id?'good()':`bad('${esc(w.full)}','Höre noch einmal.')`}">${esc(o.full)}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}
function showWrite(item){const w=byId(item.id);area.innerHTML=`${examProgress()}<div class="question">Schreibe mit Artikel.</div>${imgTag(w)}<input id="ans" placeholder="Schreiben Sie die Antwort hier"><button class="btn" onclick="eq(ans.value,'${esc(w.full)}')?good():bad('${esc(w.full)}','Artikel und Wort prüfen.')">Kontrollieren</button><div id="fb" class="feedback"></div>`}
function showArticle(item){const w=byId(item.id);area.innerHTML=`${examProgress()}<div class="question">Welcher Artikel passt?</div><div class="hint">___ ${esc(w.word)}</div><div class="options">${['der','die','das'].map(a=>`<button class="opt" onclick="${a===w.article?'good()':`bad('${esc(w.full)}','Prüfe den Artikel.')`}">${a}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}
function showPlural(item){const w=byId(item.id);area.innerHTML=`${examProgress()}<div class="question">Schreibe den Plural.</div><div class="hint">${esc(w.full)}</div><input id="ans" placeholder="Schreiben Sie die Antwort hier"><button class="btn" onclick="simple(ans.value)===simple('${esc(w.plural)}')?good():bad('${esc(w.plural)}','Pluralform prüfen.')">Kontrollieren</button><div id="fb" class="feedback"></div>`}
function showPair(item){const p=PAIRS[item.idx];const opts=shuffle([p[1],...shuffle(PAIRS.filter((_,i)=>i!==item.idx)).slice(0,3).map(x=>x[1])]);area.innerHTML=`${examProgress()}<div class="question">Was passt zu ${esc(p[0])}?</div><div class="options">${opts.map(o=>`<button class="opt" onclick="${o===p[1]?'good()':`bad('${esc(p[0]+' ↔ '+p[1])}','Bedeutung prüfen.')`}">${esc(o)}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}
function showMeaning(item){const t=MEANING_TASKS[item.idx];const opts=shuffle([t.answer,...shuffle(MEANING_TASKS.filter(x=>x.answer!==t.answer)).slice(0,3).map(x=>x.answer)]);area.innerHTML=`${examProgress()}<div class="question">${esc(t.term)}</div><div class="options">${opts.map(o=>`<button class="opt" onclick="${o===t.answer?'good()':`bad('${esc(t.answer)}','Erklärung prüfen.')`}">${esc(o)}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}
function showAd(item){const q=ADS[0].qs[0];area.innerHTML=`${examProgress()}<div class="question">Anzeige lesen</div><div class="ad-box">${esc(ADS[0].text)}</div><div class="hint">${esc(q[0])}</div><input id="ans" placeholder="Schreiben Sie die Antwort hier"><button class="btn" onclick="checkExamAd()">Kontrollieren</button><div id="fb" class="feedback"></div>`}
function checkExamAd(){(strictSentenceOk(ans.value)&&eq(ans.value,'Die Wohnung hat 2 Zimmer.'))?good():bad('Die Wohnung hat 2 Zimmer.','Ganzer Satz mit Punkt.')}
function showMatch(item){const right=MATCH_SITUATIONS[0][1];area.innerHTML=`${examProgress()}<div class="question">${esc(MATCH_SITUATIONS[0][0])}</div><div class="ad-list">${Object.entries(MATCH_ADS).map(([k,v])=>`<div class="ad-box"><b>Anzeige ${k}</b><br>${esc(v)}</div>`).join('')}</div><div class="options">${Object.keys(MATCH_ADS).map(k=>`<button class="opt" onclick="${k===right?'good()':`bad('Situation 1 passt zu Anzeige C.','Detail Balkon suchen.')`}">${k}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}
function showOrder(item){area.innerHTML=`${examProgress()}<div class="question">Was kommt zuerst?</div><div class="options"><button class="opt" onclick="good()">Wohnung suchen</button><button class="opt" onclick="bad('Wohnung suchen','Der erste Schritt ist die Suche.')">Mietvertrag unterschreiben</button><button class="opt" onclick="bad('Wohnung suchen','Der erste Schritt ist die Suche.')">Umzug machen</button></div><div id="fb" class="feedback"></div>`}
show();

</script></body></html>
