<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hören</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="app.js?v=thema4v2"></script><script>header("Hören",{back:"index.html"});

const FILE="hoeren.html";const ITEMS=HOREN_IDS.map(byId);let i=null,selectedWord=false,selectedImg=false;
function show(){if(pct(FILE,ITEMS.length)>=100)return complete(area,FILE,"schreibe-mit-artikel.html");i=nextIndex(FILE,ITEMS.length);selectedWord=false;selectedImg=false;const w=ITEMS[i];const words=pickOptions(ITEMS,w,4,'full');const imgs=pickOptions(ITEMS,w,4,'image');area.innerHTML=`${progressHtml(FILE,ITEMS.length)}<div class="question">Höre und wähle Wort und Bild.</div><div class="input-row"><button class="btn" onclick="speak('${esc(w.full)}',.92)">🔊 Hören</button><button class="btn secondary" onclick="speak('${esc(w.full)}',.62)">🐢 Langsam hören</button></div><div class="wordrow">${words.map(o=>`<button class="opt" data-word="${esc(o.id)}" onclick="chooseWord('${esc(o.id)}')">${esc(o.full)}</button>`).join('')}</div><div class="imgrow">${imgs.map(o=>`<button class="opt" data-img="${esc(o.id)}" onclick="chooseImg('${esc(o.id)}')">${imgTag(o,'small-img')}</button>`).join('')}</div><div id="fb" class="feedback"></div>`;setTimeout(()=>speak(w.full,.92),250)}
function chooseWord(id){const w=ITEMS[i];document.querySelectorAll('[data-word]').forEach(b=>b.classList.remove('selected','ok','no'));const b=document.querySelector(`[data-word="${id}"]`);if(id===w.id){selectedWord=true;b.classList.add('ok');tryDone()}else{b.classList.add('no');const tr=markWrong(FILE,ITEMS.length);fb.className='feedback bad';fb.innerHTML=feedbackForTry(tr,w.full,'Höre noch einmal und prüfe den Artikel.')}}
function chooseImg(id){const w=ITEMS[i];document.querySelectorAll('[data-img]').forEach(b=>b.classList.remove('selected','ok','no'));const b=document.querySelector(`[data-img="${id}"]`);if(id===w.id){selectedImg=true;b.classList.add('ok');tryDone()}else{b.classList.add('no');const tr=markWrong(FILE,ITEMS.length);fb.className='feedback bad';fb.innerHTML=feedbackForTry(tr,w.full,'Prüfe das Bild.')}}
function tryDone(){if(selectedWord&&selectedImg){fb.className='feedback good';fb.textContent='Richtig!';markRight(FILE,ITEMS.length);setTimeout(show,650)}}
show();

</script></body></html>
