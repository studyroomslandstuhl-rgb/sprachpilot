<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Paare finden</title><link rel="stylesheet" href="../shared/lektion4-standard.css"><link rel="stylesheet" href="style.css"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="../shared/lektion4-standard.js"></script><script src="app.js?v=thema4v3shared"></script><script>renderSprachPilotHeader({title:"Wohnungsanzeigen",subtitle:"A1 Lektion 4 · Thema 4",backHref:"index.html",overviewHref:"uebersicht.html",statsHref:"statistik.html"});

const FILE="paare-finden.html";let left=null;let done=[];
function state(){try{return JSON.parse(localStorage.getItem(taskKey(FILE))||"null")||{done:[]}}catch(e){return{done:[]}}}
function savePairState(){const st=loadTask(FILE,PAIRS.length);st.done=done;st.queue=[...Array(PAIRS.length).keys()].filter(i=>!done.includes(i));st.current=null;saveTask(FILE,st)}
function show(){done=state().done||[];if(done.length>=PAIRS.length)return complete(area,FILE,"woerter-verstehen.html");const l=shuffle(PAIRS.map((p,i)=>({i,t:p[0]})));const r=shuffle(PAIRS.map((p,i)=>({i,t:p[1]})));area.innerHTML=`${progressHtml(FILE,PAIRS.length)}<div class="question">Verbinde, was zusammengehört.</div><div class="pair-board"><div class="pair-col">${l.map(x=>`<button class="pair-card ${done.includes(x.i)?'ok':''}" data-left="${x.i}" onclick="pickLeft(${x.i},this)">${esc(x.t)}</button>`).join('')}</div><div class="pair-mid">${PAIRS.map(_=>'↔').join('<br>')}</div><div class="pair-col">${r.map(x=>`<button class="pair-card ${done.includes(x.i)?'ok':''}" data-right="${x.i}" onclick="pickRight(${x.i},this)">${esc(x.t)}</button>`).join('')}</div></div><div id="fb" class="feedback"></div>`}
function pickLeft(i,el){if(done.includes(i))return;left=i;document.querySelectorAll('[data-left]').forEach(b=>b.classList.remove('selected'));el.classList.add('selected')}
function pickRight(i,el){if(done.includes(i)||left===null)return;if(i===left){done.push(i);left=null;fb.className='feedback ok';fb.textContent='Richtig!';savePairState();setTimeout(show,500)}else{const tr=markWrong(FILE,PAIRS.length);fb.className='feedback no';fb.innerHTML=feedbackForTry(tr,PAIRS[left][0]+' ↔ '+PAIRS[left][1],'die Bedeutung');document.querySelectorAll('[data-left],[data-right]').forEach(b=>b.classList.remove('selected'))}}
show();

</script></body></html>
