<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><!-- SprachPilot Thema 4 V8 Hardfix -->
<title>Anzeige lesen</title><link rel="stylesheet" href="../shared/lektion4-standard.css?v=thema4-v8"><link rel="stylesheet" href="style.css?v=thema4-v8"></head><body><div class="container"><header class="topbar"></header><main id="area" class="card"><div class="question">Aufgabe wird geladen …</div></main><footer>© SprachPilot</footer></div><script src="../shared/lektion4-standard.js?v=thema4-v8"></script><script src="app.js?v=thema4-content-v2"></script><script>renderSprachPilotHeader({title:"Wohnungsanzeigen",subtitle:"A1 Lektion 4 · Thema 4",backHref:"index.html",overviewHref:"uebersicht.html",statsHref:"statistik.html"});

const FILE="anzeige-lesen.html";const ITEMS=[];ADS.forEach((ad,ai)=>ad.qs.forEach((q,qi)=>ITEMS.push({ad,ai,qi,q:q[0],answers:q[1]})));let i=null;
function answerOk(v,item){if(!strictSentenceOk(v))return false;return item.answers.some(a=>eq(v,a))}
function show(){if(pct(FILE,ITEMS.length)>=100)return complete(area,FILE,"welche-anzeige-passt.html");i=nextIndex(FILE,ITEMS.length);const item=ITEMS[i];area.innerHTML=`${progressHtml(FILE,ITEMS.length)}<div class="question">Anzeige lesen</div><div class="ad-box">${esc(item.ad.text)}</div><div class="hint"><b>${esc(item.q)}</b><br>Antworte in einem ganzen Satz.</div><div class="input-row"><input id="ans" placeholder="Schreiben Sie die Antwort hier"><button class="btn" onclick="check()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}
function check(){const item=ITEMS[i];if(answerOk(ans.value,item)){fb.className='feedback ok';fb.textContent='Richtig!';markRight(FILE,ITEMS.length);setTimeout(show,650)}else{const tr=markWrong(FILE,ITEMS.length);const hint=!strictSentenceOk(ans.value)?'ganzen Satz, Großschreibung und Punkt am Ende':'die Information in der Anzeige';fb.className='feedback no';fb.innerHTML=feedbackForTry(tr,item.answers[0],hint)}}
show();

</script></body></html>
