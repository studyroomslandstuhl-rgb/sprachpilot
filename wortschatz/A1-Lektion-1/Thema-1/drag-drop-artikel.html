<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Artikel zuordnen</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card"><div id="prog"></div><p class="small">Wort antippen, dann Tabelle antippen. Danach Kontrollieren.</p><div id="chips"></div><div class="drop-grid"><div class="dropzone" data-a="der"><h2>der</h2></div><div class="dropzone" data-a="die"><h2>die</h2></div><div class="dropzone" data-a="das"><h2>das</h2></div></div><div class="actions"><button class="btn" onclick="control()">Kontrollieren</button></div><div id="fb" class="feedback"></div><a id="nextTask" class="btn hidden" href="plural.html">Nächste Aufgabe →</a></section><footer>© SprachPilot</footer></div><script src="app.js?v=31"></script><script>header("Artikel zuordnen");let pool=singularWords().filter(w=>w.article!=='der/das').slice(0,20),selected=null;prog.innerHTML=`<div class="small">0 von ${pool.length} kontrolliert</div><div class="progress"><div class="bar" style="width:0%"></div></div>`;chips.innerHTML=pool.map(w=>`<span class="chip" data-id="${w.id}">${w.word}</span>`).join('');document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('selected'));selected=c;c.classList.add('selected')});document.querySelectorAll('.dropzone').forEach(z=>z.onclick=()=>{if(selected){z.appendChild(selected);selected.classList.remove('selected');selected=null}});function control(){let ok=0;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('ok','no'));document.querySelectorAll('.dropzone .chip').forEach(c=>{let w=pool.find(x=>x.id===c.dataset.id);let zone=c.closest('.dropzone');if(articleOk(zone.dataset.a,w)){c.classList.add('ok');ok++;updateWordProgress(w.id)}else c.classList.add('no')});let pct=Math.round(ok/pool.length*100);prog.innerHTML=`<div class="small">${ok} von ${pool.length} richtig · ${pct}%</div><div class="progress"><div class="bar" style="width:${pct}%"></div></div>`;if(ok===pool.length){finishTask('drag-drop-artikel.html');nextTask.classList.remove('hidden');fb.textContent='Gut gemacht!'}else fb.textContent='Korrigiere die roten Wörter und kontrolliere noch einmal.'}</script></body></html>
