<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Thema 1</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><section class="hero"></section><section class="card"><h2 class="module-title">Wortgruppe</h2><div id="batch"></div></section><section class="card"><h2 class="module-title">Aufgaben</h2><div id="mods" class="grid"></div></section><footer>© SprachPilot</footer></div><script src="app.js?v=31"></script><script>header("Thema 1");let b=batchInfo();batch.innerHTML=`<p>Gruppe ${b.batch+1}: Wörter ${b.start+1}–${b.end} von ${b.total}</p><p class="small">Die nächste Gruppe wird automatisch freigeschaltet, wenn alle Aufgaben fertig sind.</p>`;
mods.innerHTML=TASKS.map((t,i)=>{let p=taskPercent(t.file);return `<a class="module" href="${t.file}"><div class="module-title">${i+1}. ${t.name}</div><div class="progress"><div class="bar" style="width:${p}%"></div></div><span class="badge">${p}%</span></a>`}).join('');</script></body></html>
