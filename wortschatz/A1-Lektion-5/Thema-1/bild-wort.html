<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bild → Wort</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=6"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=11"></script><script src="points-hook.js?v=4"></script><script>header('Bild → Wort');const FILE='bild-wort.html';const ITEMS=WORDS.filter(w=>hasGoodImage(w));let i=0;function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'wort-bild.html');return}i=spNextIndex(FILE,ITEMS.length);const w=ITEMS[i];area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}<div class="question">Was ist das? Schreibe das deutsche Wort.</div>${bigImgHtml(w)}<input id="ans" placeholder="Schreiben Sie die Antwort hier"><div class="actions"><button class="btn" onclick="check()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}function check(){const w=ITEMS[i];if(simple(ans.value)===simple(full(w))||simple(ans.value)===simple(w.word)){fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{const t=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=t<3?'Da ist noch ein Fehler.':'Lösung: '+full(w)}}show();</script></body></html>
