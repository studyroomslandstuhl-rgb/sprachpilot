<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Was machst du gern?</title><link rel="stylesheet" href="style.css?v=4"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=4"></script><script>header('Was machst du gern?');const FILE='was-machst-du-gern.html';const DATA=[['kochen','Ich koche gern.'],['spielen','Ich spiele gern.'],['essen','Ich esse gern.'],['schlafen','Ich schlafe gern.'],['spazieren_gehen','Ich gehe gern spazieren.']];const ITEMS=DATA.map(d=>({w:WORDS.find(x=>x.id===d[0]),a:d[1]})).filter(x=>x.w);let i=0;function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'mini-dialog.html');return}i=spNextIndex(FILE,ITEMS.length);const it=ITEMS[i];area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}<div class="question">Bilde Frage und Antwort zum Bild.</div>${bigImgHtml(it.w)}<input id="q" placeholder="Frage: Was machst du gern?"><input id="a" placeholder="Antwort: Ich ... gern."><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}function check(){const it=ITEMS[i];const qok=simple(q.value)==='was machst du gern';const aok=simple(a.value)===simple(it.a);if(qok&&aok){fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{const t=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=t<3?'Prüfe Frage und Antwort.':'Lösung: Was machst du gern? — '+it.a}}show();</script></body></html>
