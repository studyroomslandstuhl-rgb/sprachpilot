<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Was machst du gern?</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=6"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=9"></script><script src="points-hook.js?v=3"></script><script>header('Was machst du gern?');const FILE='was-machst-du-gern.html';const DATA=[['kochen',['Ich koche gern.','Ich koche gerne.']],['spielen',['Ich spiele gern.','Ich spiele gerne.']],['essen',['Ich esse gern.','Ich esse gerne.']],['schlafen',['Ich schlafe gern.','Ich schlafe gerne.']],['spazieren_gehen',['Ich gehe gern spazieren.','Ich gehe gerne spazieren.']]];const ITEMS=DATA.map(d=>({w:WORDS.find(x=>x.id===d[0]),answer:d[1]})).filter(x=>x.w);let phase='question';function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'ja-nein-fragen.html');return}const i=spNextIndex(FILE,ITEMS.length);const it=ITEMS[i];if(phase==='question'){area.innerHTML=spProgressHtml(FILE,ITEMS.length)+instruction('Bilde zuerst die Frage. Sie ist immer gleich.')+exampleBox('Was machst du gern?')+bigImgHtml(it.w)+`<input id="q" placeholder="Schreibe die Frage hier"><div class="actions"><button class="btn mic-btn" onclick="startMic(this,v=>{q.value=v;checkQuestion()})">🎤 Deutsch sprechen</button><button class="btn" onclick="checkQuestion()">Kontrollieren</button></div><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`}else{area.innerHTML=spProgressHtml(FILE,ITEMS.length)+instruction('Antworte mit einem ganzen Satz und gern/gerne.')+exampleBox('Ich koche gern.')+bigImgHtml(it.w)+`<input id="a" placeholder="Schreibe die Antwort hier"><div class="actions"><button class="btn mic-btn" onclick="startMic(this,v=>{a.value=v;checkAnswer()})">🎤 Deutsch sprechen</button><button class="btn" onclick="checkAnswer()">Kontrollieren</button></div><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`}}function checkQuestion(){if(exactAnswer(q.value,['Was machst du gern?','Was machst du gerne?'])){fb.innerHTML='<div class="ok">Richtig. Jetzt die Antwort.</div>';phase='answer';setTimeout(show,350)}else{spMarkWrong(FILE,ITEMS.length);fb.innerHTML='<div class="no">Lösung: Was machst du gern?</div>'}}function checkAnswer(){const st=loadTask(FILE,ITEMS.length);const it=ITEMS[st.current];if(exactAnswer(a.value,it.answer)){fb.innerHTML='<div class="ok">Richtig!</div>';phase='question';spMarkRight(FILE,ITEMS.length);setTimeout(show,500)}else{spMarkWrong(FILE,ITEMS.length);fb.innerHTML='<div class="no">Lösung: '+it.answer[0]+'</div>'}}show();</script></body></html>
