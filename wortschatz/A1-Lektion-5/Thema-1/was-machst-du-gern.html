<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Was machst du gern?</title>
<link rel="stylesheet" href="style.css?v=7">
</head>
<body>
<div class="container">
  <header class="topbar"></header>
  <section class="card"><div id="area"><div class="question">Aufgabe wird geladen …</div></div></section>
  <footer>© SprachPilot</footer>
</div>
<script src="../data/wortschatz.js?v=6"></script>
<script>
window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};
</script>
<script src="app.js?v=11"></script>
<script>
(function(){
  const FILE='was-machst-du-gern.html';
  const KEY='SP_L5_T1_V1_'+FILE;
  const area=document.getElementById('area');
  const FALLBACK={
    kochen:{id:'kochen',word:'kochen',type:'verb',image:'/verben-A1/bilder/kochen.png'},
    spielen:{id:'spielen',word:'spielen',type:'verb',image:'/verben-A1/bilder/spielen.png'},
    essen:{id:'essen',word:'essen',type:'verb',image:'/verben-A1/bilder/essen.png'},
    schlafen:{id:'schlafen',word:'schlafen',type:'verb',image:'/verben-A1/bilder/schlafen.png'}
  };
  const DATA=[
    ['kochen',['Ich koche gern.','Ich koche gerne.']],
    ['spielen',['Ich spiele gern.','Ich spiele gerne.']],
    ['essen',['Ich esse gern.','Ich esse gerne.']],
    ['schlafen',['Ich schlafe gern.','Ich schlafe gerne.']]
  ];
  function s(x){return String(x||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ß/g,'ss').replace(/[.,!?;:]/g,'').replace(/\s+/g,' ')}
  function eq(v,arr){return arr.some(x=>s(v)===s(x))}
  function word(id){
    try{const w=(window.WORDS||[]).find(x=>x.id===id);if(w)return w}catch(e){}
    return FALLBACK[id];
  }
  function img(w){
    const src=(typeof displayImage==='function'?displayImage(w):w.image)||FALLBACK[w.id]?.image||'';
    return src?`<img class="task-img" src="${src}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'placeholder-img',textContent:'Bild fehlt'}))" alt="">`:'';
  }
  function getState(){try{const st=JSON.parse(localStorage.getItem(KEY)||'null');if(st&&st.total===ITEMS.length&&Array.isArray(st.done)&&Array.isArray(st.queue))return st}catch(e){}return{total:ITEMS.length,done:[],queue:[...Array(ITEMS.length).keys()].sort(()=>Math.random()-.5),current:null,tries:0,hadWrong:false}}
  function saveState(st){localStorage.setItem(KEY,JSON.stringify(st))}
  function nextIndex(){let st=getState();if(st.current===null||st.current===undefined){if(!st.queue.length&&st.done.length<ITEMS.length)st.queue=[...Array(ITEMS.length).keys()].filter(i=>!st.done.includes(i)).sort(()=>Math.random()-.5);st.current=st.queue.shift();st.tries=0;st.hadWrong=false;saveState(st)}return st.current}
  function markRight(){let st=getState(),c=st.current;if(c!==null&&c!==undefined){if(st.hadWrong||st.tries>0){if(!st.done.includes(c)&&!st.queue.includes(c))st.queue.push(c)}else if(!st.done.includes(c))st.done.push(c)}st.current=null;st.tries=0;st.hadWrong=false;saveState(st)}
  function markWrong(){let st=getState();st.tries=(st.tries||0)+1;st.hadWrong=true;saveState(st)}
  function progress(){let st=getState();let p=Math.round((st.done.length||0)/ITEMS.length*100)||0;return `<div class="small">${st.done.length} richtig · ${ITEMS.length-st.done.length} übrig · ${p}%</div><div class="progress"><div class="bar" style="width:${p}%"></div></div>`}
  function done(){return getState().done.length>=ITEMS.length}
  function finish(){area.innerHTML='<div class="finish-box"><div class="finish-icon">✓</div><div class="question">Geschafft!</div><div class="hint">Diese Aufgabe ist abgeschlossen.</div><div class="actions"><a class="btn" href="ja-nein-fragen.html">Weiter →</a><a class="btn secondary" href="index.html">Zum Menü</a></div></div>'}
  function fallbackHeader(){const h=document.querySelector('.topbar');if(h&&!h.innerHTML.trim())h.innerHTML='<div class="topbar-main"><a class="brand" href="/index.html"><div><h1>SprachPilot</h1><div class="subtitle">Was machst du gern? · A1 Lektion 5 · Thema 1</div></div></a></div><nav class="nav sp-page-nav"><a class="btn secondary" href="index.html">← Zurück</a><a class="btn secondary" href="uebersicht.html">Übersicht</a><a class="btn secondary" href="statistik.html">Statistik</a></nav>'}
  const ITEMS=DATA.map(d=>({w:word(d[0]),answer:d[1]})).filter(x=>x.w);
  let phase='question';
  window.checkQuestion=function(){const q=document.getElementById('q'),fb=document.getElementById('fb');if(eq(q?q.value:'',['Was machst du gern?','Was machst du gerne?'])){fb.innerHTML='<div class="ok">Richtig. Jetzt die Antwort.</div>';phase='answer';setTimeout(show,300)}else{markWrong();fb.innerHTML='<div class="no">Lösung: Was machst du gern?</div>'}}
  window.checkAnswer=function(){const a=document.getElementById('a'),fb=document.getElementById('fb'),st=getState(),it=ITEMS[st.current]||ITEMS[0];if(eq(a?a.value:'',it.answer)){fb.innerHTML='<div class="ok">Richtig!</div>';phase='question';markRight();setTimeout(show,500)}else{markWrong();fb.innerHTML='<div class="no">Lösung: '+it.answer[0]+'</div>'}}
  window.show=function show(){
    fallbackHeader();
    if(!ITEMS.length){area.innerHTML='<div class="finish-box"><div class="question">Keine Aufgabe geladen.</div><div class="actions"><a class="btn secondary" href="index.html">Zum Menü</a></div></div>';return}
    if(done()){finish();return}
    const it=ITEMS[nextIndex()]||ITEMS[0];
    if(phase==='question'){
      area.innerHTML=progress()+'<div class="task-instruction">Bilde zuerst die Frage. Beispiel: Was machst du gern?</div>'+img(it.w)+'<input id="q" placeholder="Schreibe die Frage hier"><div class="actions"><button class="btn" onclick="checkQuestion()">Kontrollieren</button></div><div id="fb" class="feedback"></div>';
    }else{
      area.innerHTML=progress()+'<div class="task-instruction">Antworte mit einem ganzen Satz. Beispiel: Ich koche gern.</div>'+img(it.w)+'<input id="a" placeholder="Schreibe die Antwort hier"><div class="actions"><button class="btn" onclick="checkAnswer()">Kontrollieren</button></div><div id="fb" class="feedback"></div>';
    }
  }
  try{if(typeof header==='function')header('Was machst du gern?')}catch(e){}
  show();
  setTimeout(()=>{const p=document.createElement('script');p.src='points-hook.js?v=5';document.body.appendChild(p)},1000);
})();
</script>
</body>
</html>
