<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Diktat</title><link rel="stylesheet" href="style.css?v=4"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=4"></script><script>header('Diktat');const FILE='diktat.html';const ITEMS=['aufstehen','einkaufen','aufräumen','anrufen','fernsehen','frühstücken','kochen','arbeiten','Ich stehe früh auf.','Ich kaufe ein.','Ich räume auf.','Ich bin müde.'];let i=0;function sayGerman(txt){const u=new SpeechSynthesisUtterance(txt);u.lang='de-DE';speechSynthesis.cancel();speechSynthesis.speak(u)}function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'index.html');return}i=spNextIndex(FILE,ITEMS.length);const txt=ITEMS[i];area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}<div class="question">Höre und schreibe.</div><div class="actions"><button class="btn" onclick="sayGerman('${txt.replace(/'/g,'&#39;')}')">▶ Audio hören</button></div><input id="ans" placeholder="Schreibe, was du hörst."><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`;setTimeout(()=>sayGerman(txt),350)}function check(){const sol=ITEMS[i];if(simple(ans.value)===simple(sol)){fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{const t=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=t<3?'Höre noch einmal.':'Lösung: '+sol}}show();</script></body></html>
