<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prüfung Thema 1</title><link rel="stylesheet" href="style.css?v=4"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=4"></script><script>header('Prüfung');const FILE='pruefung.html';const EXAM=[['Schreibe das deutsche Wort: to cook','kochen'],['Schreibe das deutsche Wort: to get up','aufstehen'],['Schreibe das deutsche Wort: tired','müde'],['Schreibe mit Artikel: supermarket','der Supermarkt'],['Ist aufstehen trennbar? ja/nein','ja'],['Ist kochen trennbar? ja/nein','nein'],['Ist anrufen trennbar? ja/nein','ja'],['Ist schlafen trennbar? ja/nein','nein'],['Ich ___ früh ___.','stehe auf'],['Maria ___ die Küche ___.','räumt auf'],['Ich ___ die Familie ___.','rufe an'],['Ich ___ gern ___.','sehe fern'],['Block: früh aufstehen. Satz mit Maria.','Maria steht früh auf'],['Block: im Supermarkt einkaufen. Satz mit Sie.','Sie kauft im Supermarkt ein'],['Block: fernsehen. Satz mit Sie.','Sie sieht fern'],['Frage: Was machst du gern? Antwort mit kochen.','Ich koche gern'],['Bilde die Frage zu kochen gern.','Kochst du gern'],['Positive Antwort: Kochst du gern?','Ja, ich koche gern'],['Diktat: Ich kaufe ein.','Ich kaufe ein'],['Diktat: Ich bin müde.','Ich bin müde']];let pos=0,score=0;function sayGerman(txt){const u=new SpeechSynthesisUtterance(txt);u.lang='de-DE';speechSynthesis.cancel();speechSynthesis.speak(u)}function render(){if(pos>=EXAM.length){finish();return}const q=EXAM[pos];const audio=q[0].startsWith('Diktat:');area.innerHTML=`<div class="small">Frage ${pos+1} / ${EXAM.length}</div><div class="progress"><div class="bar" style="width:${Math.round(pos/EXAM.length*100)}%"></div></div><div class="question">${audio?'Höre und schreibe.':q[0]}</div>${audio?'<div class="actions"><button class="btn" onclick="sayGerman(\''+q[1]+'\')">▶ Audio hören</button></div>':''}<input id="ans" placeholder="Antwort"><button class="btn" onclick="check()">Weiter</button><div id="fb" class="feedback"></div>`;if(audio)setTimeout(()=>sayGerman(q[1]),300)}function check(){const q=EXAM[pos];if(simple(ans.value)===simple(q[1]))score++;pos++;render()}function finish(){let st=loadTask(FILE,EXAM.length);const best=Math.max(st.done.length||0,score);st.done=[...Array(best).keys()];st.current=null;saveTask(FILE,st);const pct=Math.round(score/EXAM.length*100);const bestPct=Math.round(best/EXAM.length*100);area.innerHTML=`<div class="finish-box"><div class="finish-icon">✓</div><div class="question">Prüfung fertig</div><div class="hint">Ergebnis: ${score} / ${EXAM.length} = ${pct}%<br>Beste Leistung gespeichert: ${bestPct}%</div><div class="point-note">Prüfungspunkte: pro Run zählt die beste Leistung, Verbesserungen ergänzen nur die Differenz.</div><div class="actions"><a class="btn" href="index.html">Zum Thema</a></div></div>`}render();</script></body></html>
