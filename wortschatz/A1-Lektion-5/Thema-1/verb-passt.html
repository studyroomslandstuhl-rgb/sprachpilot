<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mini-Situationen</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=6"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=9"></script><script src="points-hook.js?v=3"></script><script>header('Mini-Situationen');const FILE='verb-passt.html';const ITEMS=[{ctx:'Der Wecker klingelt. Es ist 7 Uhr.',correct:'Maria steht früh auf.',wrong:['Maria sieht fern.','Maria kauft ein.','Maria schläft lange.']},{ctx:'Maria hat Hunger. Es ist Morgen.',correct:'Maria frühstückt am Morgen.',wrong:['Maria ruft ihre Familie an.','Maria räumt die Küche auf.','Maria geht ins Bett.']},{ctx:'Maria braucht Brot, Milch und Käse.',correct:'Maria kauft im Supermarkt ein.',wrong:['Maria schläft lange.','Maria hört Musik.','Maria macht eine Pause.']},{ctx:'Die Küche ist schmutzig.',correct:'Maria räumt die Küche auf.',wrong:['Maria steht früh auf.','Maria arbeitet lange.','Maria frühstückt am Morgen.']},{ctx:'Maria ist im Büro. Es ist Vormittag.',correct:'Maria arbeitet am Vormittag.',wrong:['Maria sieht fern.','Maria geht ins Bett.','Maria kocht das Abendessen.']},{ctx:'Es ist Abend. Maria hat Hunger.',correct:'Maria kocht das Abendessen.',wrong:['Maria kauft im Supermarkt ein.','Maria steht früh auf.','Maria arbeitet am Vormittag.']},{ctx:'Maria möchte mit ihrer Mutter sprechen.',correct:'Maria ruft ihre Mutter an.',wrong:['Maria hört ihre Mutter.','Maria schläft lange.','Maria macht eine Pause.']},{ctx:'Im Wohnzimmer läuft ein Film.',correct:'Maria sieht fern.',wrong:['Maria geht zur Arbeit.','Maria frühstückt am Morgen.','Maria räumt die Küche auf.']}];let i=0;function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'index.html');return}i=spNextIndex(FILE,ITEMS.length);const it=ITEMS[i];const opts=shuffle([it.correct,...it.wrong]);area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}${instruction('Lies die Situation. Wähle den passenden ganzen Satz.')}<div class="hint"><b>Situation:</b> ${it.ctx}</div><div class="choice-grid">${opts.map(o=>`<button class="choice" onclick="check(this,'${encodeURIComponent(o)}')">${o}</button>`).join('')}</div><div id="fb" class="feedback"></div>`}function check(btn,raw){const answer=decodeURIComponent(raw);const it=ITEMS[i];if(answer===it.correct){btn.classList.add('ok');fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{btn.classList.add('no');const t=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=t<2?'Das passt noch nicht. Lies die Situation noch einmal.':'Lösung: '+it.correct}}show();</script></body></html>
