<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Welches Verb passt?</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=6"></script><script>header('Welches Verb passt?');const FILE='verb-passt.html';const ITEMS=[{ctx:'Maria ist müde. Es ist sieben Uhr.',sent:'Maria ___ früh ___.',verb:'steht',pref:'auf',img:null},{ctx:'Sofia ist im Supermarkt.',sent:'Sofia ___ heute ___.',verb:'kauft',pref:'ein',img:'supermarkt'},{ctx:'Die Küche ist schmutzig.',sent:'Lara ___ die Küche ___.',verb:'räumt',pref:'auf',img:null},{ctx:'Tim telefoniert mit seiner Familie.',sent:'Tim ___ seine Familie ___.',verb:'ruft',pref:'an',img:null},{ctx:'Am Abend läuft ein Film.',sent:'Sofia ___ am Abend ___.',verb:'sieht',pref:'fern',img:null},{ctx:'Ich brauche Brot und Milch.',sent:'Ich ___ im Supermarkt ___.',verb:'kaufe',pref:'ein',img:'supermarkt'},{ctx:'Das Zimmer ist nicht sauber.',sent:'Ich ___ das Zimmer ___.',verb:'räume',pref:'auf',img:null},{ctx:'Ich möchte mit meiner Familie sprechen.',sent:'Ich ___ meine Familie ___.',verb:'rufe',pref:'an',img:null}];let i=0;function visual(it){if(it.img==='supermarkt'){const w=WORDS.find(x=>x.id==='supermarkt');return w?bigImgHtml(w):''}return ''}function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'index.html');return}i=spNextIndex(FILE,ITEMS.length);const it=ITEMS[i];area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}${instruction('Lies die Situation. Welches trennbare Verb passt? Schreibe die Verbform und das Ende.')}<div class="hint"><b>Situation:</b> ${it.ctx}</div>${visual(it)}<div class="sentence-box">${it.sent}</div><input id="verb" placeholder="Verbform, z. B. steht"><input id="pref" placeholder="Ende, z. B. auf"><div class="actions"><button class="btn" onclick="check()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}function check(){const it=ITEMS[i];if(simple(verb.value)===simple(it.verb)&&simple(pref.value)===simple(it.pref)){fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{spMarkWrong(FILE,ITEMS.length);fb.innerHTML='<div class="no">Lösung: '+it.verb+' ... '+it.pref+'</div>'}}show();</script></body></html>
