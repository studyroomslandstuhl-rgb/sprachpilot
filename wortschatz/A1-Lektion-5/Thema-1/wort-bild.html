<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wort → Bild</title><link rel="stylesheet" href="style.css?v=6"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=5"></script><script>header('Wort → Bild');const FILE='wort-bild.html';const ITEMS=WORDS.filter(w=>w.image);let i=0;function sample(a,n){return [...a].sort(()=>Math.random()-.5).slice(0,n)}function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'hoeren-schreiben.html');return}i=spNextIndex(FILE,ITEMS.length);const w=ITEMS[i];const opts=sample(ITEMS.filter(x=>x.id!==w.id),3).concat(w).sort(()=>Math.random()-.5);area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}<div class="question">Wähle das passende Bild.</div><div class="hint"><b>${full(w)}</b></div><div class="choice-grid">${opts.map(o=>`<button class="choice" onclick="check('${o.id}')" aria-label="${full(o)}"><img src="${o.image}" onerror="fixImg(this)" alt=""></button>`).join('')}</div><div id="fb" class="feedback"></div>`}function check(id){const w=ITEMS[i];if(id===w.id){fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{const t=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=t<3?'Das passt noch nicht.':'Lösung: '+full(w)}}show();</script></body></html>
