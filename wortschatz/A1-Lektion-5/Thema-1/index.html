<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lektion 5 · Thema 1</title><link rel="stylesheet" href="style.css?v=4"></head><body><div class="container"><header class="topbar"></header><section class="card progress-card"><div class="circle" id="totalCircle">0%</div><div class="progress-main"><h2>Dein Fortschritt</h2><p class="small" id="totalText">0 Aufgaben abgeschlossen</p><div class="progress"><div class="bar" id="totalBar"></div></div><p class="small">Ziel: Alltag, Bilder, trennbare Verben, Sätze, Dialoge und Prüfung.</p><div class="point-note">Punkte: 100% abgeschlossene Aufgaben zählen für den aktuellen Run. Prüfung speichert die beste Leistung pro Run.</div></div></section><section class="grid" id="taskGrid"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=4"></script><script>header(CFG.title,true);const imageCount=WORDS.filter(w=>w.image).length;const tasks=[['karteikarten.html',WORDS.length,'Karteikarten','🃏','Übersetzung oder Bild → deutsches Wort.'],['bild-wort.html',imageCount,'Bild → Wort','🖼️','Nur Wörter mit vorhandenem Bild.'],['wort-bild.html',imageCount,'Wort → Bild','🔁','Nur Wörter mit vorhandenem Bild.'],['hoeren-schreiben.html',WORDS.length,'Hören → Schreiben','🎧','Immer Deutsch hören und schreiben.'],['trennbare-verben.html',15,'Trennbare Verben erkennen','🧲','Pull & Drop: trennbar oder nicht trennbar.'],['trennbare-verben-im-satz.html',10,'Trennbare Verben im Satz','✍️','Verbform und Präfix am Ende schreiben.'],['marias-tag.html',9,'Marias Tag','🧩','Schreib Sätze über Marias Tag.'],['was-machst-du-gern.html',5,'Was machst du gern?','😊','Frage und Antwort mit Bild bilden.'],['mini-dialog.html',6,'Mini-Dialog','💬','Ja/Nein-Fragen mit Smiley-Antwort.'],['diktat.html',12,'Diktat','🔊','Wörter und kurze Sätze hören und schreiben.']];function card(t,n){const p=pctFor(t[0],t[1]);return`<a class="module" href="${t[0]}"><div class="num">${n}. ${t[2]}</div><div class="icon">${t[3]}</div><p>${t[4]}</p><div class="progress"><div class="bar" style="width:${p}%"></div></div><div class="small">${p}%</div><div class="start">${p>=100?'Fertig':'Starten'}</div></a>`}function lockedExam(n){return`<div class="module locked exam-locked"><div class="num">${n}. Prüfung</div><div class="icon">🔒</div><p>Prüfung wird erst freigeschaltet, wenn alle Aufgaben 100% haben.</p><div class="progress"><div class="bar" style="width:0%"></div></div><div class="small">gesperrt</div><div class="start">Prüfung gesperrt</div></div>`}function exam(n){const p=pctFor('pruefung.html',20);return`<a class="module" href="pruefung.html"><div class="num">${n}. Prüfung</div><div class="icon">★</div><p>Gemischte Prüfung zu Thema 1.</p><div class="progress"><div class="bar" style="width:${p}%"></div></div><div class="small">${p}%</div><div class="start">${p>=100?'Fertig':'Starten'}</div></a>`}let n=1;taskGrid.innerHTML=tasks.map(t=>card(t,n++)).join('');const examOpen=tasks.every(t=>pctFor(t[0],t[1])>=100);taskGrid.innerHTML+=examOpen?exam(n):lockedExam(n);const allTasks=[...tasks,['pruefung.html',20]];const avg=Math.round(allTasks.reduce((s,t)=>s+pctFor(t[0],t[1]),0)/allTasks.length)||0;const done=allTasks.filter(t=>pctFor(t[0],t[1])>=100).length;totalCircle.textContent=avg+'%';totalBar.style.width=avg+'%';totalText.textContent=done+' / '+allTasks.length+' Aufgaben abgeschlossen';</script></body></html>
