<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lektion 5 · Thema 1</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card progress-card"><div class="circle" id="totalCircle">0%</div><div class="progress-main"><h2>Dein Fortschritt</h2><p class="small" id="totalText">0 Aufgaben abgeschlossen</p><div class="progress"><div class="bar" id="totalBar"></div></div><p class="small">Ziel: Alltag, Verben, Sätze, Fragen und Prüfung üben.</p><div id="topicExamSummary"></div></div></section><section class="grid" id="taskGrid"><div class="card">Aufgaben werden geladen …</div></section><footer>© SprachPilot</footer></div><script type="module" src="/js/guard.js"></script><script src="../data/wortschatz.js?v=6"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=11"></script><script>try{header(CFG.title,true);const grid=document.getElementById('taskGrid');const circle=document.getElementById('totalCircle');const totalBar=document.getElementById('totalBar');const totalText=document.getElementById('totalText');const imageCount=WORDS.filter(w=>hasGoodImage(w)).length;const verbCount=WORDS.filter(w=>w.type==='verb').length;const tasks=[['karteikarten.html',WORDS.length,'Karteikarten','🃏','Wörter lernen.'],['bild-wort.html',imageCount,'Bild → Wort','🖼️','Schreibe das Wort.'],['wort-bild.html',imageCount,'Wort → Bild','🔁','Wähle das Bild.'],['hoeren-schreiben.html',WORDS.length,'Hören → Schreiben','🎧','Höre und schreibe.'],['trennbare-verben.html',verbCount,'Trennbare Verben erkennen','🧲','Ordne die Verben zu.'],['trennbare-verben-im-satz.html',12,'Sätze bauen','✍️','Ergänze passende Verben im Satz.'],['marias-tag.html',11,'Marias Tag','🧩','Schreib Sätze in der richtigen Reihenfolge.'],['was-machst-du-gern.html',4,'Was machst du gern?','😊','Bilde Frage und Antwort.'],['ja-nein-fragen.html',5,'Ja-/Nein-Fragen','💬','Bilde Frage und Antwort.'],['verb-passt.html',8,'Mini-Situationen','🧠','Lies die Situation und wähle den passenden Satz.']];function card(t,n){const p=pctFor(t[0],t[1]);return`<a class="module" href="${t[0]}"><div class="num">${n}. ${t[2]}</div><div class="icon">${t[3]}</div><p>${t[4]}</p><div class="progress"><div class="bar" style="width:${p}%"></div></div><div class="small">${p}%</div><div class="start">${p>=100?'Fertig':'Starten'}</div></a>`}function lockedExam(n){return`<div class="module locked exam-locked"><div class="num">${n}. Prüfung</div><div class="icon exam-icon">🔒</div><p>Prüfung wird erst freigeschaltet, wenn alle freigegebenen Aufgaben 100% erreicht haben.</p><div class="progress"><div class="bar" style="width:0%"></div></div><div class="small">gesperrt</div><div class="start">Prüfung gesperrt</div></div>`}function exam(n){const p=pctFor('pruefung.html',20);return`<a class="module" href="pruefung.html"><div class="num">${n}. Prüfung</div><div class="icon exam-icon">★</div><p>Teste dein Wissen.</p><div class="progress"><div class="bar" style="width:${p}%"></div></div><div class="small">${p}%</div><div class="start">${p>=100?'Fertig':'Starten'}</div></a>`}let n=1;grid.innerHTML=tasks.map(t=>card(t,n++)).join('');const examOpen=tasks.every(t=>pctFor(t[0],t[1])>=100);grid.innerHTML+=examOpen?exam(n):lockedExam(n);const allTasks=[...tasks,['pruefung.html',20]];const avg=Math.round(allTasks.reduce((s,t)=>s+pctFor(t[0],t[1]),0)/allTasks.length)||0;const done=allTasks.filter(t=>pctFor(t[0],t[1])>=100).length;circle.textContent=avg+'%';totalBar.style.width=avg+'%';totalText.textContent=done+' / '+allTasks.length+' freigegebene Aufgaben abgeschlossen';setTimeout(()=>{const s=document.createElement('script');s.src='points-hook.js?v=4';document.body.appendChild(s)},1400)}catch(e){console.error(e);const grid=document.getElementById('taskGrid');if(grid)grid.innerHTML='<div class="card"><b>Fehler beim Laden.</b><br>Bitte Seite neu laden. Wenn der Fehler bleibt, Cache löschen.</div>'}</script></body></html>
