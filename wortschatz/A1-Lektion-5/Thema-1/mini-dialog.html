<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mini-Dialog</title><link rel="stylesheet" href="style.css?v=4"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=4"></script><script>header('Mini-Dialog');const FILE='mini-dialog.html';const RAW=[['kochen','Kochst du gern?','Ja, ich koche gern.','Nein, ich koche nicht gern.'],['spielen','Spielst du gern?','Ja, ich spiele gern.','Nein, ich spiele nicht gern.'],['essen','Isst du gern?','Ja, ich esse gern.','Nein, ich esse nicht gern.'],['schlafen','Schläfst du gern?','Ja, ich schlafe gern.','Nein, ich schlafe nicht gern.'],['arbeiten','Arbeitest du gern?','Ja, ich arbeite gern.','Nein, ich arbeite nicht gern.'],['spazieren_gehen','Gehst du gern spazieren?','Ja, ich gehe gern spazieren.','Nein, ich gehe nicht gern spazieren.']];const ITEMS=RAW.map(r=>({w:WORDS.find(x=>x.id===r[0]),q:r[1],yes:r[2],no:r[3],pos:Math.random()>.5})).filter(x=>x.w);let i=0;function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'diktat.html');return}i=spNextIndex(FILE,ITEMS.length);const it=ITEMS[i];area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}<div class="question">Bilde eine Ja/Nein-Frage und die passende Antwort.</div><div class="dialog-card"><div>${bigImgHtml(it.w)}</div><div><div class="smiley">${it.pos?':-)':':-('}</div><input id="q" placeholder="Frage, z. B. Kochst du gern?"><input id="a" placeholder="Antwort passend zum Smiley"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div></div></div>`}function check(){const it=ITEMS[i];const sol=it.pos?it.yes:it.no;if(simple(q.value)===simple(it.q)&&simple(a.value)===simple(sol)){fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{const t=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=t<3?'Prüfe Frage und Smiley-Antwort.':'Lösung: '+it.q+' — '+sol}}show();</script></body></html>
