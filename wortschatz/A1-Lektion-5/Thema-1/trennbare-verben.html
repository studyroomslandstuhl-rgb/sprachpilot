<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trennbare Verben erkennen</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"><p>Verb antippen, dann Gruppe antippen. Danach kontrollieren.</p><div id="chips"></div><div class="drop-grid"><div class="dropzone" data-a="sep"><h2>trennbar</h2></div><div class="dropzone" data-a="not"><h2>nicht trennbar</h2></div></div><div class="actions"><button id="controlBtn" class="btn" onclick="control()">Kontrollieren</button></div><div id="fb" class="feedback"></div></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=7"></script><script src="points-hook.js?v=1"></script><script>header('Trennbare Verben erkennen');const FILE='trennbare-verben.html';const SEP=['aufstehen','einkaufen','aufraeumen','anrufen','fernsehen'];const VERBS=WORDS.filter(w=>w.type==='verb');let selected=null;chips.innerHTML=VERBS.map(w=>`<span class="chip" data-id="${w.id}">${w.word}</span>`).join('');function clearCorrectionsForChip(c){c.classList.remove('selected','no');let n=c.nextElementSibling;if(n&&n.classList.contains('correction'))n.remove()}function makeSelectable(){document.querySelectorAll('.chip').forEach(c=>{c.onclick=(ev)=>{ev.stopPropagation();if(c.classList.contains('ok'))return;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('selected'));selected=c;c.classList.add('selected')}})}function setupZones(){document.querySelectorAll('.dropzone').forEach(z=>{z.onclick=()=>{if(!selected)return;clearCorrectionsForChip(selected);z.appendChild(selected);selected=null;makeSelectable()}})}function control(){document.querySelectorAll('.correction').forEach(x=>x.remove());let ok=0;document.querySelectorAll('.dropzone .chip').forEach(c=>{const z=c.closest('.dropzone');const should=SEP.includes(c.dataset.id)?'sep':'not';c.classList.remove('ok','no','selected');if(z.dataset.a===should){c.classList.add('ok');ok++}else{c.classList.add('no');let note=document.createElement('span');note.className='correction';note.textContent='richtig: '+(should==='sep'?'trennbar':'nicht trennbar');c.after(note)}});selected=null;makeSelectable();setupZones();if(ok===VERBS.length){markTaskDone(FILE,VERBS.length);complete(area,FILE,'trennbare-verben-im-satz.html')}else{fb.textContent='Korrigiere die roten Verben. Tippe ein rotes Verb an und tippe dann die richtige Tabelle an.'}}makeSelectable();setupZones();</script></body></html>
