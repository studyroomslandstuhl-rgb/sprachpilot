<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trennbare Verben erkennen</title><link rel="stylesheet" href="style.css"></head><body><script type="module" src="/js/guard.js"></script><div class="container"><section class="hero"></section><div class="actions"><a class="btn secondary" href="index.html">← Zurück</a></div><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=3"></script><script>header('Trennbare Verben erkennen');const FILE='trennbare-verben.html';const SEP=['aufstehen','einkaufen','aufraeumen','anrufen','fernsehen'];const VERBS=WORDS.filter(w=>w.type==='verb'&&!['praesentation','supermarkt'].includes(w.id));let placed={};function render(){area.innerHTML=`${spProgressHtml(FILE,VERBS.length)}<div class="question">Ziehe die Verben in das richtige Feld.</div><div class="drag-bank" id="bank">${VERBS.map(w=>`<span class="drag-item" draggable="true" data-id="${w.id}">${w.word}</span>`).join('')}</div><div class="drop-wrap"><div class="dropzone" data-zone="sep"><h3>trennbar</h3></div><div class="dropzone" data-zone="not"><h3>nicht trennbar</h3></div></div><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`;document.querySelectorAll('.drag-item').forEach(el=>el.ondragstart=e=>e.dataTransfer.setData('text/plain',el.dataset.id));document.querySelectorAll('.dropzone').forEach(z=>{z.ondragover=e=>e.preventDefault();z.ondrop=e=>{e.preventDefault();const id=e.dataTransfer.getData('text/plain');const item=document.querySelector(`[data-id='${id}']`);z.appendChild(item);placed[id]=z.dataset.zone;}})}function check(){let correct=0;VERBS.forEach(w=>{const should=SEP.includes(w.id)?'sep':'not';if(placed[w.id]===should)correct++});if(correct===VERBS.length){let st=loadTask(FILE,VERBS.length);st.done=[...Array(VERBS.length).keys()];st.current=null;saveTask(FILE,st);fb.textContent='Richtig!';setTimeout(()=>complete(area,FILE,'trennbare-verben-im-satz.html'),700)}else{fb.innerHTML='Noch nicht richtig: '+correct+' / '+VERBS.length+'. Prüfe die Felder.'}}render();</script></body></html>
