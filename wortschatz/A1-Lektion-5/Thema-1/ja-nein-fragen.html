<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ja-/Nein-Fragen</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=6"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=12"></script><script src="points-hook.js?v=5"></script><script>header('Ja-/Nein-Fragen');const FILE='ja-nein-fragen.html';const RAW=[['kochen','Kochst du gern?','Ja, ich koche gern.','Nein, ich koche nicht gern.',true],['spielen','Spielst du gern Fußball?','Ja, ich spiele gern Fußball.','Nein, ich spiele nicht gern Fußball.',false],['essen','Isst du gern?','Ja, ich esse gern.','Nein, ich esse nicht gern.',true],['schlafen','Schläfst du gern?','Ja, ich schlafe gern.','Nein, ich schlafe nicht gern.',false],['arbeiten','Arbeitest du gern?','Ja, ich arbeite gern.','Nein, ich arbeite nicht gern.',true]];const ITEMS=RAW.map(r=>({w:WORDS.find(x=>x.id===r[0]),q:r[1],yes:r[2],no:r[3],pos:r[4]})).filter(x=>x.w&&hasGoodImage(x.w));let phase='question';function exactCaseAnswer(a,sol){return String(a||'').trim()===sol}function questionBox(q){return `<div class="example-box" style="font-size:24px;font-weight:900;text-align:center;color:#145f5b"><b>Frage:</b> ${q}</div>`}function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'verb-passt.html');return}const i=spNextIndex(FILE,ITEMS.length);const t=ITEMS[i];if(phase==='question'){area.innerHTML=spProgressHtml(FILE,ITEMS.length)+instruction('Bilde zuerst die Ja-/Nein-Frage. Achte auf Groß-/Kleinschreibung und Fragezeichen.')+exampleBox('Kochst du gern?')+bigImgHtml(t.w)+`<input id="q" placeholder="Schreibe die Frage hier"><div class="actions"><button class="btn mic-btn" onclick="startMic(this,v=>{q.value=v;checkQuestion()})">🎤 Deutsch sprechen</button><button class="btn" onclick="checkQuestion()">Kontrollieren</button></div><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`}else{const smile=t.pos?':-)':':-(';area.innerHTML=spProgressHtml(FILE,ITEMS.length)+instruction('Antworte passend zum Smiley. Achte auf Groß-/Kleinschreibung und Punkt am Ende.')+exampleBox(':-) = Ja, ich koche gern.<br>:-( = Nein, ich koche nicht gern.')+questionBox(t.q)+`<div class="smile-card">${smile}</div>`+bigImgHtml(t.w)+`<input id="a" placeholder="Schreibe die Antwort hier"><div class="actions"><button class="btn mic-btn" onclick="startMic(this,v=>{a.value=v;checkAnswer()})">🎤 Deutsch sprechen</button><button class="btn" onclick="checkAnswer()">Kontrollieren</button></div><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`}}function checkQuestion(){const st=loadTask(FILE,ITEMS.length);const t=ITEMS[st.current];if(exactCaseAnswer(q.value,t.q)){fb.innerHTML='<div class="ok">Richtig. Jetzt die Antwort.</div>';phase='answer';setTimeout(show,350)}else{const n=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=help3(n,'Da ist noch ein Fehler.','Tipp: Das Verb steht am Anfang. Achte auf Großschreibung und Fragezeichen.',t.q)}}function checkAnswer(){const st=loadTask(FILE,ITEMS.length);const t=ITEMS[st.current];const sol=t.pos?t.yes:t.no;if(exactCaseAnswer(a.value,sol)){fb.innerHTML='<div class="ok">Richtig!</div>';phase='question';spMarkRight(FILE,ITEMS.length);setTimeout(show,500)}else{const n=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=help3(n,'Da ist noch ein Fehler.','Tipp: Beginne mit Ja/Nein. Achte auf nicht, Großschreibung und Punkt.',sol)}}show();</script></body></html>
