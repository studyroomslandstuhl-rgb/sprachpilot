<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ja-/Nein-Fragen</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=6"></script><script>header('Ja-/Nein-Fragen');const FILE='ja-nein-fragen.html';const RAW=[['kochen','Kochst du gern?','Ja, ich koche gern.','Nein, ich koche nicht gern.'],['spielen','Spielst du gern?','Ja, ich spiele gern.','Nein, ich spiele nicht gern.'],['essen','Isst du gern?','Ja, ich esse gern.','Nein, ich esse nicht gern.'],['schlafen','Schläfst du gern?','Ja, ich schlafe gern.','Nein, ich schlafe nicht gern.'],['arbeiten','Arbeitest du gern?','Ja, ich arbeite gern.','Nein, ich arbeite nicht gern.'],['spazieren_gehen','Gehst du gern spazieren?','Ja, ich gehe gern spazieren.','Nein, ich gehe nicht gern spazieren.']];const ITEMS=RAW.map((r,n)=>({w:WORDS.find(x=>x.id===r[0]),question:r[1],yes:r[2],no:r[3],pos:n%2===0})).filter(x=>x.w);let phase='question';function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'verb-passt.html');return}const i=spNextIndex(FILE,ITEMS.length);const t=ITEMS[i];const sol=t.pos?t.yes:t.no;if(phase==='question'){area.innerHTML=spProgressHtml(FILE,ITEMS.length)+instruction('Bilde zuerst die Ja-/Nein-Frage mit „gern“.')+exampleBox('Bild: kochen<br>Frage: Kochst du gern?')+bigImgHtml(t.w)+`<input id="q" placeholder="Schreiben Sie die Frage hier"><div class="actions"><button class="btn mic-btn" onclick="startMic(this,v=>{q.value=v;checkQuestion()})">🎤 Deutsch sprechen</button><button class="btn" onclick="checkQuestion()">Kontrollieren</button></div><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`}else{area.innerHTML=spProgressHtml(FILE,ITEMS.length)+instruction('Antworte passend zum Smiley.')+exampleBox(':-) = Ja, ich koche gern.<br>:-( = Nein, ich koche nicht gern.')+`<div class="imgrow">${bigImgHtml(t.w)}<div class="smile-card">${t.pos?':-)':':-('}</div></div><input id="a" placeholder="Schreiben Sie die Antwort hier"><div class="actions"><button class="btn mic-btn" onclick="startMic(this,v=>{a.value=v;checkAnswer()})">🎤 Deutsch sprechen</button><button class="btn" onclick="checkAnswer()">Kontrollieren</button></div><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`}}function checkQuestion(){const st=loadTask(FILE,ITEMS.length);const t=ITEMS[st.current];if(exactAnswer(q.value,t.question)){fb.innerHTML='<div class="ok">Richtig. Jetzt die Antwort.</div>';phase='answer';setTimeout(show,350)}else{spMarkWrong(FILE,ITEMS.length);fb.innerHTML='<div class="no">Lösung: '+t.question+'</div>'}}function checkAnswer(){const st=loadTask(FILE,ITEMS.length);const t=ITEMS[st.current];const sol=t.pos?t.yes:t.no;if(exactAnswer(a.value,sol)){fb.innerHTML='<div class="ok">Richtig!</div>';phase='question';spMarkRight(FILE,ITEMS.length);setTimeout(show,500)}else{spMarkWrong(FILE,ITEMS.length);fb.innerHTML='<div class="no">Lösung: '+sol+'</div>'}}show();</script></body></html>
