<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ja-/Nein-Fragen</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=7"></script><script src="points-hook.js"></script><script>header('Ja-/Nein-Fragen');const FILE='ja-nein-fragen.html';const RAW=[['kochen','Kochst du gern?'],['spielen','Spielst du gern?'],['essen','Isst du gern?'],['schlafen','Schläfst du gern?'],['arbeiten','Arbeitest du gern?'],['spazieren_gehen','Gehst du gern spazieren?']];const ITEMS=RAW.map(r=>({w:WORDS.find(x=>x.id===r[0]),q:r[1]})).filter(x=>x.w);let i=0;function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'verb-passt.html');return}i=spNextIndex(FILE,ITEMS.length);const t=ITEMS[i];area.innerHTML=spProgressHtml(FILE,ITEMS.length)+instruction('Bilde eine Ja-/Nein-Frage mit gern.')+exampleBox('Kochst du gern?')+bigImgHtml(t.w)+`<input id="q" placeholder="Frage"><div class="actions"><button class="btn" onclick="check()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}function check(){const t=ITEMS[i];if(exactAnswer(q.value,t.q)){fb.innerHTML='<div class="ok">Richtig!</div>';spMarkRight(FILE,ITEMS.length);setTimeout(show,500)}else{spMarkWrong(FILE,ITEMS.length,t.q);fb.innerHTML='<div class="no">Lösung: '+t.q+'</div>'}}show();</script></body></html>
