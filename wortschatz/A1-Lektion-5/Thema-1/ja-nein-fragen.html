<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ja-/Nein-Fragen</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card"><div id="area"></div></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=6"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=9"></script><script src="points-hook.js?v=3"></script><script>header('Ja-/Nein-Fragen');const FILE='ja-nein-fragen.html';const RAW=[['kochen',['Kochst du gern?','Kochst du gerne?'],['Ja, ich koche gern.','Ja, ich koche gerne.'],['Nein, ich koche nicht gern.','Nein, ich koche nicht gerne.'],true],['spielen',['Spielst du gern?','Spielst du gerne?'],['Ja, ich spiele gern.','Ja, ich spiele gerne.'],['Nein, ich spiele nicht gern.','Nein, ich spiele nicht gerne.'],false],['essen',['Isst du gern?','Isst du gerne?'],['Ja, ich esse gern.','Ja, ich esse gerne.'],['Nein, ich esse nicht gern.','Nein, ich esse nicht gerne.'],true],['schlafen',['Schläfst du gern?','Schläfst du gerne?'],['Ja, ich schlafe gern.','Ja, ich schlafe gerne.'],['Nein, ich schlafe nicht gern.','Nein, ich schlafe nicht gerne.'],false],['arbeiten',['Arbeitest du gern?','Arbeitest du gerne?'],['Ja, ich arbeite gern.','Ja, ich arbeite gerne.'],['Nein, ich arbeite nicht gern.','Nein, ich arbeite nicht gerne.'],true],['spazieren_gehen',['Gehst du gern spazieren?','Gehst du gerne spazieren?'],['Ja, ich gehe gern spazieren.','Ja, ich gehe gerne spazieren.'],['Nein, ich gehe nicht gern spazieren.','Nein, ich gehe nicht gerne spazieren.'],false]];const ITEMS=RAW.map(r=>({w:WORDS.find(x=>x.id===r[0]),q:r[1],yes:r[2],no:r[3],pos:r[4]})).filter(x=>x.w);let phase='question';function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'verb-passt.html');return}const i=spNextIndex(FILE,ITEMS.length);const t=ITEMS[i];if(phase==='question'){area.innerHTML=spProgressHtml(FILE,ITEMS.length)+instruction('Bilde zuerst die Ja-/Nein-Frage mit gern/gerne.')+exampleBox('Kochst du gern?')+bigImgHtml(t.w)+`<input id="q" placeholder="Schreibe die Frage hier"><div class="actions"><button class="btn mic-btn" onclick="startMic(this,v=>{q.value=v;checkQuestion()})">🎤 Deutsch sprechen</button><button class="btn" onclick="checkQuestion()">Kontrollieren</button></div><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`}else{const smile=t.pos?':-)':':-(';area.innerHTML=spProgressHtml(FILE,ITEMS.length)+instruction('Antworte passend zum Smiley.')+exampleBox(':-) = Ja, ich koche gern.<br>:-( = Nein, ich koche nicht gern.')+`<div class="smile-card">${smile}</div>`+bigImgHtml(t.w)+`<input id="a" placeholder="Schreibe die Antwort hier"><div class="actions"><button class="btn mic-btn" onclick="startMic(this,v=>{a.value=v;checkAnswer()})">🎤 Deutsch sprechen</button><button class="btn" onclick="checkAnswer()">Kontrollieren</button></div><div id="micStatus" class="mic-status"></div><div id="fb" class="feedback"></div>`}}function checkQuestion(){const st=loadTask(FILE,ITEMS.length);const t=ITEMS[st.current];if(exactAnswer(q.value,t.q)){fb.innerHTML='<div class="ok">Richtig. Jetzt die Antwort.</div>';phase='answer';setTimeout(show,350)}else{spMarkWrong(FILE,ITEMS.length);fb.innerHTML='<div class="no">Lösung: '+t.q[0]+'</div>'}}function checkAnswer(){const st=loadTask(FILE,ITEMS.length);const t=ITEMS[st.current];const sol=t.pos?t.yes:t.no;if(exactAnswer(a.value,sol)){fb.innerHTML='<div class="ok">Richtig!</div>';phase='question';spMarkRight(FILE,ITEMS.length);setTimeout(show,500)}else{spMarkWrong(FILE,ITEMS.length);fb.innerHTML='<div class="no">Lösung: '+sol[0]+'</div>'}}show();</script></body></html>
