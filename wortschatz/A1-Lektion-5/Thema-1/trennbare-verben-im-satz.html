<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sätze bauen</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=6"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=9"></script><script src="points-hook.js?v=3"></script><script>header('Sätze bauen');const FILE='trennbare-verben-im-satz.html';const ITEMS=[{ctx:'Der Wecker klingelt. Es ist 7 Uhr.',sent:'Maria ___ früh ___.',verb:'steht',end:'auf'},{ctx:'Es ist Morgen. Maria hat Hunger.',sent:'Maria ___ Brot und Käse.',verb:'frühstückt',end:''},{ctx:'Maria braucht Brot und Milch.',sent:'Sie ___ im Supermarkt ___.',verb:'kauft',end:'ein'},{ctx:'Das Zimmer ist schmutzig.',sent:'Maria ___ das Zimmer ___.',verb:'räumt',end:'auf'},{ctx:'Am Vormittag ist Maria im Büro.',sent:'Sie ___ lange.',verb:'arbeitet',end:''},{ctx:'Es ist Mittag. Maria ist müde.',sent:'Sie ___ eine Pause.',verb:'macht',end:''},{ctx:'Am Abend hat Maria Hunger.',sent:'Sie ___ das Abendessen.',verb:'kocht',end:''},{ctx:'Maria möchte mit ihrer Mutter sprechen.',sent:'Sie ___ ihre Mutter ___.',verb:'ruft',end:'an'},{ctx:'Im Wohnzimmer läuft ein Film.',sent:'Maria ___ ___.',verb:'sieht',end:'fern'},{ctx:'Nach dem Essen ist Musik an.',sent:'Maria ___ Musik.',verb:'hört',end:''},{ctx:'Am Sonntag ist das Wetter schön.',sent:'Maria ___ spazieren.',verb:'geht',end:''},{ctx:'Es ist spät. Maria ist sehr müde.',sent:'Maria ___ lange.',verb:'schläft',end:''}];let i=0;function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'marias-tag.html');return}i=spNextIndex(FILE,ITEMS.length);const it=ITEMS[i];area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}${instruction('Lies die Situation. Ergänze das passende Verb. Bei trennbaren Verben schreibe auch das Satzende.')}<div class="hint"><b>Situation:</b> ${it.ctx}</div><div class="sentence-box">${it.sent}</div><input id="verb" placeholder="Verbform, z. B. steht">${it.end?'<input id="pref" placeholder="Satzende, z. B. auf">':''}<div class="actions"><button class="btn" onclick="check()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}function check(){const it=ITEMS[i];const okVerb=simple(verb.value)===simple(it.verb);const okEnd=!it.end||simple(pref.value)===simple(it.end);if(okVerb&&okEnd){fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{const t=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=t<3?'Prüfe die Verbform und den Satz.':'Lösung: '+it.verb+(it.end?' ... '+it.end:'')}}show();</script></body></html>
