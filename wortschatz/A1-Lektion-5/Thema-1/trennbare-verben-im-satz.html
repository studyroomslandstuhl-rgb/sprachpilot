<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sätze bauen</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=6"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=12"></script><script src="points-hook.js?v=5"></script><script>header('Sätze bauen');const FILE='trennbare-verben-im-satz.html';const ITEMS=[{ctx:'Der Wecker klingelt. Es ist 7 Uhr. Lara ist noch im Bett.',sent:'Lara ___ früh ___.',verb:'steht',end:'auf'},{ctx:'Es ist Morgen. Tim hat Hunger.',sent:'Tim ___.',verb:'frühstückt',end:''},{ctx:'Sofia braucht Brot und Milch. Sie ist im Supermarkt.',sent:'Sofia ___ im Supermarkt ___.',verb:'kauft',end:'ein'},{ctx:'Das Zimmer von Lili ist schmutzig.',sent:'Lili ___ das Zimmer ___.',verb:'räumt',end:'auf'},{ctx:'Am Vormittag ist Herr Müller im Büro.',sent:'Herr Müller ___ lange.',verb:'arbeitet',end:''},{ctx:'Es ist Mittag. Frau Weber ist müde.',sent:'Frau Weber ___ eine Pause.',verb:'macht',end:''},{ctx:'Am Abend hat Bogdan Hunger.',sent:'Bogdan ___ das Abendessen.',verb:'kocht',end:''},{ctx:'Nina möchte mit ihrer Mutter sprechen.',sent:'Nina ___ ihre Mutter ___.',verb:'ruft',end:'an'},{ctx:'Im Wohnzimmer läuft ein Film. Paul sitzt auf dem Sofa.',sent:'Paul ___ ___.',verb:'sieht',end:'fern'},{ctx:'Nach dem Essen ist Musik an. Anna sitzt ruhig da.',sent:'Anna ___ Musik.',verb:'hört',end:''},{ctx:'Am Sonntag ist das Wetter schön. Ali geht in den Park.',sent:'Ali ___ spazieren.',verb:'geht',end:''},{ctx:'Es ist spät. Omar ist sehr müde.',sent:'Omar ___ lange.',verb:'schläft',end:''}];let i=0;function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'marias-tag.html');return}i=spNextIndex(FILE,ITEMS.length);const it=ITEMS[i];area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}${instruction('Lies den ganzen Text. Ergänze das passende Verb. Bei trennbaren Verben schreibe auch das Satzende.')}<div class="sentence-box"><span>${it.ctx}</span> <span>${it.sent}</span></div><input id="verb" placeholder="Verbform, z. B. steht">${it.end?'<input id="pref" placeholder="Satzende, z. B. auf">':''}<div class="actions"><button class="btn" onclick="check()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}function check(){const it=ITEMS[i];const okVerb=simple(verb.value)===simple(it.verb);const okEnd=!it.end||simple(pref.value)===simple(it.end);if(okVerb&&okEnd){fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{const t=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=help3(t,'Lies die Situation noch einmal.','Tipp: Prüfe das Subjekt und konjugiere das Verb passend. Bei trennbaren Verben steht der zweite Teil am Ende.',it.verb+(it.end?' ... '+it.end:''))}}show();</script></body></html>
