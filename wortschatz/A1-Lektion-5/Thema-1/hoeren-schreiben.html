<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hören → Schreiben</title><link rel="stylesheet" href="style.css?v=4"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=4"></script><script>header('Hören → Schreiben');const FILE='hoeren-schreiben.html';let i=0;function sayGerman(txt){const u=new SpeechSynthesisUtterance(txt);u.lang='de-DE';speechSynthesis.cancel();speechSynthesis.speak(u)}function show(){if(loadTask(FILE,WORDS.length).done.length>=WORDS.length){complete(area,FILE,'trennbare-verben.html');return}i=spNextIndex(FILE,WORDS.length);const w=WORDS[i];area.innerHTML=`${spProgressHtml(FILE,WORDS.length)}<div class="question">Höre und schreibe das Wort auf Deutsch.</div><div class="actions"><button class="btn" onclick="sayGerman('${full(w).replace(/'/g,'&#39;')}')">▶ Audio hören</button></div><input id="ans" placeholder="Deutsch schreiben"><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`;setTimeout(()=>sayGerman(full(w)),350)}function check(){const w=WORDS[i];if(simple(ans.value)===simple(full(w))||simple(ans.value)===simple(w.word)){fb.textContent='Richtig!';spMarkRight(FILE,WORDS.length);setTimeout(show,700)}else{const t=spMarkWrong(FILE,WORDS.length);fb.innerHTML=t<3?'Höre noch einmal und prüfe die Schreibweise.':'Lösung: '+full(w)}}show();</script></body></html>
