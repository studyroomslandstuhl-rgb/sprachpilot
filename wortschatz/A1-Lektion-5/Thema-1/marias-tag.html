<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marias Tag</title><link rel="stylesheet" href="style.css?v=4"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=5"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=4"></script><script>header('Marias Tag');const FILE='marias-tag.html';const ITEMS=[['früh aufstehen',['maria steht früh auf','sie steht früh auf']],['frühstücken',['maria frühstückt','sie frühstückt']],['im Supermarkt einkaufen',['maria kauft im supermarkt ein','sie kauft im supermarkt ein']],['arbeiten',['maria arbeitet','sie arbeitet']],['am Abend kochen',['maria kocht am abend','sie kocht am abend']],['die Küche aufräumen',['maria räumt die küche auf','sie räumt die küche auf']],['die Familie anrufen',['maria ruft die familie an','sie ruft die familie an']],['fernsehen',['maria sieht fern','sie sieht fern']],['schlafen',['maria schläft','sie schläft']]];let i=0;function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'was-machst-du-gern.html');return}i=spNextIndex(FILE,ITEMS.length);const it=ITEMS[i];area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}<div class="question">Schreib Sätze über Marias Tag.</div><div class="hint">Subjekt: Maria oder sie</div><div class="block-bank"><span class="block">${it[0]}</span></div><input id="ans" placeholder="z. B. Maria steht früh auf."><button class="btn" onclick="check()">Kontrollieren</button><div id="fb" class="feedback"></div>`}function check(){const it=ITEMS[i];const a=simple(ans.value);if(it[1].some(s=>simple(s)===a)){fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{const t=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=t<3?'Prüfe Subjekt, Verbform und Satzende.':'Beispiel: '+it[1][0]+'.'}}show();</script></body></html>
