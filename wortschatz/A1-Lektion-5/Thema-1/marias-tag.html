<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marias Tag</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=6"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=9"></script><script src="points-hook.js?v=3"></script><script>header('Marias Tag');const FILE='marias-tag.html';const ITEMS=[['steht früh auf','Maria steht früh auf.'],['frühstückt am Morgen','Maria frühstückt am Morgen.'],['geht zur Arbeit','Maria geht zur Arbeit.'],['arbeitet am Vormittag','Maria arbeitet am Vormittag.'],['macht eine Pause','Maria macht eine Pause.'],['kauft im Supermarkt ein','Maria kauft im Supermarkt ein.'],['kocht das Abendessen','Maria kocht das Abendessen.'],['ruft ihre Familie an','Maria ruft ihre Familie an.'],['sieht am Abend fern','Maria sieht am Abend fern.'],['geht ins Bett','Maria geht ins Bett.'],['schläft lange','Maria schläft lange.']];let i=0;function ok(a,sol){return exactAnswer(a,sol)||exactAnswer(a,sol.replace('Maria','Sie'))}function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'was-machst-du-gern.html');return}i=spNextSequentialIndex(FILE,ITEMS.length);const it=ITEMS[i];area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}${instruction('Schreib den nächsten Satz über Marias Tag. Die Aufgabe kommt in einer logischen Reihenfolge.')}<div class="small">Schritt ${i+1} / ${ITEMS.length}</div><div class="block-bank"><span class="block">${it[0]}</span></div><input id="ans" placeholder="z. B. Maria steht früh auf."><div class="actions"><button class="btn" onclick="check()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}function check(){const it=ITEMS[i];if(ok(ans.value,it[1])){fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{const t=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=t<3?'Prüfe Subjekt, Verbform und Wortstellung.':'Beispiel: '+it[1]}}show();</script></body></html>
