<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marias Tag</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=6"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=11"></script><script src="points-hook.js?v=5"></script><script>header('Marias Tag');const FILE='marias-tag.html';const ITEMS=[['früh aufstehen','Maria steht früh auf.'],['am Morgen frühstücken','Maria frühstückt am Morgen.'],['zur Arbeit gehen','Maria geht zur Arbeit.'],['am Vormittag arbeiten','Maria arbeitet am Vormittag.'],['eine Pause machen','Maria macht eine Pause.'],['im Supermarkt einkaufen','Maria kauft im Supermarkt ein.'],['das Abendessen kochen','Maria kocht das Abendessen.'],['ihre Familie anrufen','Maria ruft ihre Familie an.'],['am Abend fernsehen','Maria sieht am Abend fern.'],['ins Bett gehen','Maria geht ins Bett.'],['lange schlafen','Maria schläft lange.']];let i=0;function exactCaseAnswer(a,sol){return String(a||'').trim()===sol}function show(){if(loadTask(FILE,ITEMS.length).done.length>=ITEMS.length){complete(area,FILE,'was-machst-du-gern.html');return}i=spNextSequentialIndex(FILE,ITEMS.length);const it=ITEMS[i];area.innerHTML=`${spProgressHtml(FILE,ITEMS.length)}<div class="question" style="font-size:34px;text-transform:uppercase;font-weight:900">Marias Tag</div>${instruction('Schreib den nächsten Satz. Die Vorgabe steht im Infinitiv. Konjugiere das Verb selbst. Achte auf Groß-/Kleinschreibung und Punkt am Ende.')}<div class="small">Schritt ${i+1} / ${ITEMS.length}</div><div class="block-bank"><span class="block">${it[0]}</span></div><input id="ans" placeholder="z. B. Maria steht früh auf."><div class="actions"><button class="btn" onclick="check()">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}function check(){const it=ITEMS[i];if(exactCaseAnswer(ans.value,it[1])){fb.textContent='Richtig!';spMarkRight(FILE,ITEMS.length);setTimeout(show,700)}else{const t=spMarkWrong(FILE,ITEMS.length);fb.innerHTML=t<3?'Prüfe: Maria groß, Verbform, Wortstellung, Groß-/Kleinschreibung und Punkt am Ende.':'Lösung: '+it[1]}}show();</script></body></html>
