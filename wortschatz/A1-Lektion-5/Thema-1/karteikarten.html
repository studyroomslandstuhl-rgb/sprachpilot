<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karteikarten</title><link rel="stylesheet" href="style.css?v=7"></head><body><div class="container"><header class="topbar"></header><section class="card" id="area"><div class="question">Aufgabe wird geladen …</div></section><footer>© SprachPilot</footer></div><script src="../data/wortschatz.js?v=6"></script><script>window.SP_L5_THEME={id:'Thema-1',title:'Alltag und trennbare Verben',sub:'A1 Lektion 5 · Thema 1',key:'SP_L5_T1_V1'};</script><script src="app.js?v=12"></script><script src="l5-theme1-assets.js?v=1"></script><script src="points-hook.js?v=5"></script><script>header('Karteikarten');const FILE='karteikarten.html';const areaEl=document.getElementById('area');let i=null;function show(){if(loadTask(FILE,WORDS.length).done.length>=WORDS.length){complete(areaEl,FILE,'bild-wort.html');return}i=spNextIndex(FILE,WORDS.length);if(i===undefined||i===null){i=0}const w=WORDS[i];areaEl.innerHTML=`${spProgressHtml(FILE,WORDS.length)}<div class="question">${cardPrompt(w)}</div><div class="hint">Muttersprache: <b>${tr(w)}</b></div>${bigImgHtml(w)}<div class="actions"><button id="micBtn" class="btn mic-btn" onclick="say()">🎤 Sprechen</button><button class="btn secondary" onclick="writeBox()">Ich kann nicht sprechen</button><button class="btn secondary" onclick="flip()">Karte umdrehen</button></div><div id="micStatus" class="mic-status"></div><div id="box" class="hidden"><input id="ans" placeholder="Schreiben Sie die Antwort hier"><button class="btn" onclick="check(document.getElementById('ans').value)">Kontrollieren</button></div><div id="fb" class="feedback"></div>`}function writeBox(){document.getElementById('box').classList.remove('hidden')}function flip(){const w=WORDS[i];const tries=spMarkWrong(FILE,WORDS.length);document.getElementById('fb').innerHTML=feedbackForCard(tries,full(w),cardTip(w));writeBox();document.getElementById('ans').value=full(w)}function say(){const mic=document.getElementById('micBtn');startMic(mic,txt=>{writeBox();document.getElementById('ans').value=txt;check(txt)})}function check(txt){const w=WORDS[i];const fb=document.getElementById('fb');if(simple(txt)===simple(full(w))||simple(txt)===simple(w.word)){fb.textContent='Richtig!';spMarkRight(FILE,WORDS.length);setTimeout(show,700)}else{const tries=spMarkWrong(FILE,WORDS.length);fb.innerHTML=feedbackForCard(tries,full(w),cardTip(w))}}function feedbackForCard(tries,solution,type){if(tries===1)return'Da ist noch ein Fehler.';if(tries===2)return'Tipp: Prüfe '+type+'.';return'Lösung: '+solution}show();</script></body></html>
