dden}.part-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.part-number{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#84E3FF,var(--sp-blue));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#123047;flex:0 0 auto}.part-title{font-size:22px;font-weight:900;margin-bottom:6px}.part-desc{color:#5f6670;line-height:1.4;font-size:15.5px;margin-bottom:12px}.meta{border-radius:999px;padding:7px 10px;font-size:13px;font-weight:900;background:var(--sp-blue-soft);border:1px solid var(--sp-border);color:#215a6a;white-space:nowrap}.words{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0 16px}.word-chip{background:var(--sp-blue-soft);color:#215a6a;border:1px solid var(--sp-border);border-radius:999px;padding:6px 9px;font-size:12.5px;font-weight:800}details{border-top:1px solid var(--sp-border);padding-top:12px}summary{cursor:pointer;font-weight:900;color:#215a6a}.word-list{margin-top:12px;display:grid;gap:10px}.word-row{border:1px solid #e3eef2;border-radius:16px;padding:12px;background:#fbfeff}.word-main{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.word-full{font-size:17px;font-weight:900}.word-type{color:#667085;font-size:13px;margin-top:3px}.badge{border-radius:999px;padding:5px 8px;font-size:12px;font-weight:900;white-space:nowrap}.has-img{background:#E8F9F0;color:#18743a}.no-img{background:#FFF1E8;color:#A14E00}.sentence{font-size:14px;color:#344054;margin-top:8px}.trans{font-size:13px;color:#667085;margin-top:5px;line-height:1.35}.note{margin-top:16px;color:#667085;text-align:center;font-size:14px}@media(max-width:760px){body{padding:14px}.sp-shell{padding:18px}.sp-head{flex-direction:column}.account-area{justify-content:flex-start;max-width:none}.account-pill{min-width:0}.sp-title h1{font-size:28px}.sp-logo{width:62px;height:62px;font-size:24px}.part-grid{grid-template-columns:1fr}}

<section class="intro"><h2>Lektion 5: Mein Tag</h2><p>Der Wortschatz ist nach Foto-Hörgeschichte und den Buchteilen A–E geordnet. Diese Daten sind die Grundlage für spätere Übungen pro Teil.</p></section>
<section class="part-grid" id="partGrid"></section><footer class="note">© SprachPilot</footer></div>
<script src="data/wortschatz.js?v=1"></script>
<script type="module">
import { getActiveProfile, logout, safeText } from "/js/auth.js?v=l5content1";window.logout=logout;
function profile(){try{return getActiveProfile()||JSON.parse(localStorage.getItem("SP_USER_PROFILE")||"null")}catch(e){return null}}
function shortType(type){const m={noun:"Nomen",verb:"Verb",adjective:"Adjektiv",adverb:"Adverb",phrase:"Ausdruck",preposition:"Präposition",time:"Zeit",question:"Fragewort",conjunction:"Verbindung",determiner:"Begleiter"};return m[type]||type||"Wort"}
function render(){const data=window.SP_A1_LEKTION5_WORTSCHATZ;const grid=document.getElementById("partGrid");if(!data){grid.innerHTML="<p>Wortschatz konnte nicht geladen werden.</p>";return}grid.innerHTML=data.parts.map((part,idx)=>{const chips=(part.chips||[]).map(w=>`<span class="word-chip">${safeText(w)}</span>`).join("");const rows=(part.words||[]).map(w=>{const tr=w.tr||{};const img=w.imageNeeded?`<span class="badge no-img">Bild fehlt</span>`:`<span class="badge has-img">Bild vorhanden</span>`;const grammar=[shortType(w.type),w.plural?`Plural: ${w.plural}`:""].filter(Boolean).join(" · ");return `<div class="word-row"><div class="word-main"><div><div class="word-full">${safeText(w.full)}</div><div class="word-type">${safeText(w.section)} · ${safeText(grammar)}</div></div>${img}</div><div class="sentence">${safeText(w.sentence||"")}</div><div class="trans">EN: ${safeText(tr.en||"")} · RU: ${safeText(tr.ru||"")} · TR: ${safeText(tr.tr||"")}</div></div>`}).join("");return `<article class="part-card"><div class="part-head"><div class="part-number">${idx+1}</div><span class="meta">${part.wordCount} Wörter</span></div><div class="part-title">${safeText(part.label)} · ${safeText(part.title)}</div><p class="part-desc">${safeText(part.desc)}</p><div class="words">${chips}</div><details><summary>Wortliste anzeigen</summary><div class="word-list">${rows}</div></details></article>`}).join("")}
const p=profile();const pill=document.getElementById("accountPill");pill.textContent=p?`${p.vorname||""} ${p.nachname||""} · ${p.kurs||p.kursnummer||""}`.trim():"Nicht eingeloggt";render();
</script>
