t-size:17px;line-height:1.45}.theme-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:18px}.theme-card{position:relative;min-height:260px;background:rgba(255,255,255,.96);border:2px solid rgba(191,236,233,.92);border-radius:26px;padding:22px;box-shadow:0 10px 26px rgba(0,0,0,.10);text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:.18s ease;overflow:hidden}.theme-card:before{content:"";position:absolute;left:0;top:0;right:0;height:8px;background:linear-gradient(90deg,#39d5cf,#18a39d)}.theme-card:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(0,0,0,.14);border-color:#41c9c4}.theme-card.locked{filter:grayscale(.95);opacity:.68;cursor:not-allowed;pointer-events:auto;background:#f4f4f4;border-color:#d6d6d6}.theme-card.locked:before{background:#cfcfcf}.theme-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.theme-number{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#80ece8,#29b8b3);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#063f3d;flex:0 0 auto}.locked .theme-number{background:#d7d7d7;color:#777}.theme-status{border-radius:999px;padding:7px 10px;font-size:13px;font-weight:900;background:var(--sp-turquoise-soft);border:1px solid var(--sp-border);color:#145f5b}.theme-status.locked{background:#e8e8e8;border-color:#d1d1d1;color:#777}.theme-title{font-size:22px;font-weight:900;margin-bottom:8px}.theme-desc{color:#5f6670;line-height:1.4;font-size:15.5px;min-height:66px}.words{margin-top:15px;display:flex;gap:7px;flex-wrap:wrap}.word{background:var(--sp-turquoise-soft);color:#145f5b;border:1px solid var(--sp-border);border-radius:999px;padding:6px 9px;font-size:12.5px;font-weight:800}.locked .word{background:#eee;color:#777;border-color:#ddd}.card-footer{margin-top:auto;padding-top:18px}.start-btn{width:100%;border:2px solid #41c9c4;background:white;color:#16847f;border-radius:16px;padding:12px 14px;text-align:center;font-weight:900}.locked .start-btn{background:#e7e7e7;color:#777;border-color:#d1d1d1}.note{margin-top:16px;color:rgba(255,255,255,.95);text-align:center;font-size:14px}@media(max-width:760px){body{padding:14px}.sp-shell{padding:18px}.sp-head{flex-direction:column}.account-area{justify-content:flex-start;max-width:none}.account-pill{min-width:0}.lesson-nav{margin-top:16px}.sp-title h1{font-size:28px}.sp-logo{width:62px;height:62px;font-size:24px}.theme-grid{grid-template-columns:1fr}}

<body>
<script type="module" src="/js/guard.js"></script>
<div class="page">
  <header class="sp-shell">
    <div class="sp-head">
      <a class="sp-brand" href="/index.html">
        <div class="sp-logo">SP</div>
        <div class="sp-title"><h1>SprachPilot</h1><div class="sp-subtitle">Wortschatz · A1 Lektion 5 · Mein Tag</div></div>

      <div class="account-area"><span class="account-pill" id="accountPill">Profil wird geladen …</span><a class="account-link" href="/student-dashboard/index.html">📊 Dashboard</a><a class="account-link" href="/profile/index.html">👤 Profil</a><button class="account-link logout-btn" type="button" onclick="logout()">🚪 Abmelden</button></div>
    </div>
    <nav class="lesson-nav"><a class="nav-btn" href="../index.html">← Zurück</a></nav>
  </header>

  <section class="theme-grid" id="themeGrid"></section>

</div>
<script type="module">
import { getActiveProfile, logout, safeText } from "/js/auth.js?v=l5overview4";
import { db, doc, getDoc } from "/js/firebase.js";
window.logout=logout;
const THEMES=[
  {id:"Thema-1",number:"1",title:"Alltag und trennbare Verben",href:"Thema-1/",desc:"Tagesablauf beschreiben: aufstehen, einkaufen, aufräumen, fernsehen und anrufen.",words:["aufstehen","einkaufen","aufräumen","fernsehen"]},
  {id:"Thema-2",number:"2",title:"Uhrzeit",href:"Thema-2/",desc:"Wie spät ist es? Uhrzeiten mit halb, Viertel, vor, nach, kurz und gleich.",words:["halb","Viertel","vor","nach"]},
  {id:"Thema-3",number:"3",title:"Tage, Tageszeiten und Präpositionen",href:"Thema-3/",desc:"Wochentage, Tageszeiten und Zeitangaben mit am, um, von ... bis ... und in der Nacht.",words:["Montag","Morgen","am","um"]},
  {id:"Thema-4",number:"4",title:"Kurse, Familie und Öffnungszeiten",href:"Thema-4/",desc:"Kurse, Termine, Familie, Kita, Praxis, Bibliothek und Öffnungszeiten verstehen.",words:["Kurs","Termin","Kita","geöffnet"]}
];
function removeOverviewAndStatsFromLessonOverview(){document.querySelectorAll('a,button').forEach(el=>{const txt=(el.textContent||'').trim().toLowerCase();if(txt==='übersicht'||txt==='uebersicht'||txt==='statistik'){el.remove();}})}
function profile(){try{return getActiveProfile()||JSON.parse(localStorage.getItem("SP_USER_PROFILE")||"null")}catch(e){return null}}
async function loadCourseData(p){const code=p?.kurs||p?.kursnummer||p?.courseCode;let data=p?.assignments||{};if(!code)return data||{};try{const snap=await getDoc(doc(db,"courses",String(code)));if(snap.exists())data={...data,...snap.data()}}catch(e){console.warn("Kursdaten konnten nicht geladen werden:",e)}return data||{}}
function explicitValue(obj,keys){if(!obj||typeof obj!=="object")return undefined;for(const k of keys){if(Object.prototype.hasOwnProperty.call(obj,k))return obj[k]}return undefined}
function hasAnyKey(obj,prefixes){if(!obj||typeof obj!=="object")return false;return Object.keys(obj).some(k=>prefixes.some(p=>k===p||k.startsWith(p)))}
function themeRelease(courseData,themeId){const moduleKey="wortschatz";const lessonKey="A1-Lektion-5";const lessonKeys=[`${moduleKey}/${lessonKey}`,lessonKey,`A1/Lektion-5`,`A1-Lektion-5`];const themeKeys=[`${moduleKey}/${lessonKey}/${themeId}`,`${lessonKey}/${themeId}`,`A1/Lektion-5/${themeId}`,themeId];const lessonLegacy=explicitValue(courseData.enabledLessons,lessonKeys);if(lessonLegacy===false)return false;const themeLegacy=explicitValue(courseData.enabledThemes,themeKeys);if(themeLegacy===false)return false;if(themeLegacy===true)return true;const releases=courseData.releases||courseData.release||{};const mod=releases[moduleKey]||releases.Wortschatz||{};const lesson=(mod.lessons||mod.lektionen||{})[lessonKey]||{};if(lesson.enabled===false)return false;const themes=lesson.themes||lesson.themen||{};const theme=themes[themeId]||{};if(theme.enabled===false)return false;if(theme.enabled===true)return true;const hasThemeControls=hasAnyKey(courseData.enabledThemes,[`${moduleKey}/${lessonKey}/`,`${lessonKey}/`,`A1/Lektion-5/`])||Object.keys(themes).length>0;if(hasThemeControls)return false;return lessonLegacy===true||lesson.enabled===true}
function renderThemes(courseData){themeGrid.innerHTML=THEMES.map(t=>{const open=themeRelease(courseData,t.id);const tag=open?"Starten":"Gesperrt";const cls=open?"theme-card":"theme-card locked";const words=t.words.map(w=>`<span class="word">${safeText(w)}</span>`).join("");const body=`<div class="theme-top"><div class="theme-number">${safeText(t.number)}</div><span class="theme-status ${open?"":"locked"}">${tag}</span></div><div class="theme-title">${safeText(t.title)}</div><p class="theme-desc">${safeText(t.desc)}</p><div class="words">${words}</div><div class="card-footer"><div class="start-btn">${tag}</div></div>`;return open?`<a class="${cls}" href="${t.href}">${body}</a>`:`<div class="${cls}" aria-disabled="true">${body}</div>`}).join("");removeOverviewAndStatsFromLessonOverview()}
async function init(){removeOverviewAndStatsFromLessonOverview();const p=profile();const pill=document.getElementById("accountPill");if(p){pill.textContent=`${p.vorname||""} ${p.nachname||""} · ${p.kurs||p.kursnummer||""}`.trim()}else{pill.textContent="Nicht eingeloggt"}const data=await loadCourseData(p);try{if(p&&data){p.assignments=data;localStorage.setItem("SP_USER_PROFILE",JSON.stringify(p));localStorage.setItem("SP_COURSE_RELEASES",JSON.stringify(data))}}catch(e){}renderThemes(data);setTimeout(removeOverviewAndStatsFromLessonOverview,300);setTimeout(removeOverviewAndStatsFromLessonOverview,1200)}
init();
</script>
