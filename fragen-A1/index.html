function ensureSkillState(v){
  state.skillDone=state.skillDone||{}; state.skillAttempts=state.skillAttempts||{}; state.skillSuccess=state.skillSuccess||{};
  state.skillDone[v]=state.skillDone[v]||{}; state.skillAttempts[v]=state.skillAttempts[v]||{}; state.skillSuccess[v]=state.skillSuccess[v]||{};
}
function migrateState(){
  state.learned=state.learned||[]; state.active=state.active||[]; state.known=state.known||[]; state.unsure=state.unsure||[]; state.unknown=state.unknown||[];
  state.weak=state.weak||{}; state.skillDone=state.skillDone||{}; state.skillAttempts=state.skillAttempts||{}; state.skillSuccess=state.skillSuccess||{};
  state.taskQueues=state.taskQueues||{}; state.taskDoneSets=state.taskDoneSets||{}; state.alertsShown=state.alertsShown||{}; state.packageNo=state.packageNo||1;
  (state.active||[]).forEach(v=>ensureSkillState(v));
}
function loadState(){
  try{const saved=JSON.parse(localStorage.getItem(key())||"null"); if(saved) state={...state,...saved};}catch(e){}
  migrateState();
}
function saveState(){
  migrateState();
  localStorage.setItem(key(),JSON.stringify(state));
  sendProgress();
}
function sendProgress(){
  if(!profile)return;
  const payload={userId:profile.userId,kurs:profile.kurs,vorname:profile.vorname,nachname:profile.nachname,
    geburtsdatum:profile.geburtsdatum,heimatland:profile.heimatland,muttersprache:profile.muttersprache,
    fremdsprache:profile.fremdsprache,wohnort:profile.wohnort,kinder:profile.kinder,
    fragenFortschritt:profile.fragenFortschritt||0,verbenFortschritt:overall(),gesamtpunkte:overall(),
    profile:profile,verbenState:state,timestamp:new Date().toISOString()};
  try{fetch(GOOGLE_SHEET_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)})}catch(e){}
}

function imageFileName(v){return String(v||"").toLowerCase().replaceAll("ä","ae").replaceAll("ö","oe").replaceAll("ü","ue").replaceAll("ß","ss").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")+".png"}
function imageBox(v,small=false){const cls=small?"mem-img-holder":"img-holder";return `<span class="${cls}" data-verb="${safeText(v)}"><span class="image-fallback">Bild</span></span>`}
function hydrateImages(root){
  const base=root||document;
  base.querySelectorAll("[data-verb]").forEach(box=>{
    if(box.dataset.loaded==="1")return;
    box.dataset.loaded="1";
    const v=box.getAttribute("data-verb");
    const img=document.createElement("img");
    img.alt="";
    img.loading="eager";
    img.decoding="async";
    img.src="bilder/"+imageFileName(v);
    img.onerror=function(){box.innerHTML="<span class='image-fallback'>Bild</span>";};
    box.textContent="";
    box.appendChild(img);
  });
}
function renderAndHydrate(){setTimeout(()=>hydrateImages(document),20)}

function skillKey(skill){return skill==="zuordnung"?"bild_verb":skill}
function verbSkillCount(v){ensureSkillState(v);return VERB_SKILLS.filter(s=>state.skillDone[v]&&state.skillDone[v][s]).length}
function verbPercent(v){return Math.round((verbSkillCount(v)*100)/VERB_SKILLS.length)}
function overall(){if(!state.active.length)return 0;return Math.round(state.active.reduce((s,v)=>s+verbPercent(v),0)/state.active.length)}
function taskQueueKey(skill){return "queue_"+skillKey(skill)}
function taskDoneSetKey(skill){return "done_"+skillKey(skill)}
function queuedProgress(skill){
  const dKey=taskDoneSetKey(skill); state.taskDoneSets=state.taskDoneSets||{};
  const done=(state.taskDoneSets[dKey]||[]).filter(v=>(state.active||[]).includes(v)).length;
  const total=(state.active||[]).length;
  return {done,total,pct:total?Math.round(done*100/total):0};
}
function taskSkillProgress(skill){return queuedProgress(skill)}
function taskProgressHtml(skill,label){const p=taskSkillProgress(skill);return `<div class="task-progress"><div class="task-progress-title"><span>${label}</span><span>${p.done}/${p.total} · ${p.pct}%</span></div><div class="task-progress-line"><div class="task-progress-fill" style="width:${p.pct}%"></div></div></div>`}
function taskDone(skill){const p=taskSkillProgress(skill);return p.total>0 && p.done>=p.total}
function taskCardClass(skill){return taskDone(skill)?"task-card done-card":"task-card"}
function taskCardStatus(skill){const p=taskSkillProgress(skill);return taskDone(skill)?"Erledigt ✓":`${p.pct}%`}

function initTaskQueue(skill){
  state.taskQueues=state.taskQueues||{}; state.taskDoneSets=state.taskDoneSets||{};
  const qKey=taskQueueKey(skill), dKey=taskDoneSetKey(skill);
  state.taskDoneSets[dKey]=state.taskDoneSets[dKey]||[];
  const doneSet=new Set(state.taskDoneSets[dKey]);
  const remaining=(state.active||[]).filter(v=>!doneSet.has(v));
  if(!Array.isArray(state.taskQueues[qKey])) state.taskQueues[qKey]=shuffle(remaining);
  else {
    const current=state.taskQueues[qKey].filter(v=>remaining.includes(v));
    const missing=remaining.filter(v=>!current.includes(v));
    state.taskQueues[qKey]=current.concat(shuffle(missing));
  }
  saveState();
}
function nextFromTaskQueue(skill){
  initTaskQueue(skill);
  const qKey=taskQueueKey(skill);
  const q=state.taskQueues[qKey]||[];
  if(!q.length)return null;
  const v=q.shift();
  state.taskQueues[qKey]=q;
  saveState();
  return v;
}
function finishQueuedVerb(skill,v,good){
  state.taskQueues=state.taskQueues||{}; state.taskDoneSets=state.taskDoneSets||{};
  const qKey=taskQueueKey(skill), dKey=taskDoneSetKey(skill);
  state.taskQueues[qKey]=state.taskQueues[qKey]||[];
  state.taskDoneSets[dKey]=state.taskDoneSets[dKey]||[];
  if(good){
    if(!state.taskDoneSets[dKey].includes(v)) state.taskDoneSets[dKey].push(v);
    state.taskQueues[qKey]=state.taskQueues[qKey].filter(x=>x!==v);
  }else{
    if(!state.taskDoneSets[dKey].includes(v) && !state.taskQueues[qKey].includes(v)) state.taskQueues[qKey].push(v);
  }
  saveState();
}
function chooseVerbForPractice(skill){return skill?nextFromTaskQueue(skill):nextFromTaskQueue(state.currentGame||"schreiben")}

function markSkill(v,skill,good){
  const sk=skillKey(skill); ensureSkillState(v);
  state.skillAttempts[v][sk]=(state.skillAttempts[v][sk]||0)+1;
  if(good){
    state.skillSuccess[v][sk]=(state.skillSuccess[v][sk]||0)+1;
    if(sk==="karteikarte"){if((state.skillSuccess[v][sk]||0)>=2)state.skillDone[v][sk]=true;}
    else state.skillDone[v][sk]=true;
  }else state.weak[v]=(state.weak[v]||0)+1;
}
function addEncounter(v,skill,good=true){markSkill(v,skill,good);saveState();checkMilestones();}

function skillBadges(v){
  ensureSkillState(v);
  return VERB_SKILLS.map(s=>`<div class="small">${state.skillDone[v][s]?"✅":"⬜"} ${VERB_SKILL_LABELS[s]} ${state.skillAttempts[v][s]?`(${state.skillAttempts[v][s]}x)`:""}</div>`).join("");
}
function unusedVerbs(){
  const used=[...state.known,...state.unsure,...state.unknown,...state.active,...state.learned];
  return ALL_VERBS.map(x=>x.v).filter(v=>!used.includes(v));
}
function currentPickVerb(){
  const used=[...state.known,...state.unsure,...state.unknown,...state.active,...state.learned];
  for(let i=state.index;i<ALL_VERBS.length;i++){if(!used.includes(ALL_VERBS[i].v)){state.index=i;return ALL_VERBS[i];}}
  return null;
}
function packageComplete(){return (state.active||[]).length===20 && state.active.every(v=>verbPercent(v)>=100)}
function allTasksDone(){return VERB_SKILLS.every(s=>taskDone(s))}

function totalStars(){
  let stars=0;
  [...(state.active||[]),...(state.learned||[])].forEach(v=>{ensureSkillState(v);VERB_SKILLS.forEach(s=>{if(state.skillDone[v]&&state.skillDone[v][s])stars++;})});
  return stars;
}
function showAlert(title,msg,icon="⭐"){
  const old=document.getElementById("levelAlert"); if(old)old.remove();
  const el=document.createElement("div"); el.className="level-alert"; el.id="levelAlert";
  el.innerHTML=`<div class="level-alert-box"><div class="big-star">${icon}</div><h2>${title}</h2><p>${msg}</p><button class="success" onclick="document.getElementById('levelAlert').remove()">Weiter</button></div>`;
  document.body.appendChild(el);
}
function queueAlert(key,title,msg,icon="⭐"){state.alertsShown=state.alertsShown||{};if(state.alertsShown[key])return;state.alertsShown[key]=true;saveState();setTimeout(()=>showAlert(title,msg,icon),120)}
function checkMilestones(){
  const stars=totalStars();
  if(stars>=20)queueAlert("stars20","20 Sterne!","Du hast schon 20 Lernpunkte gesammelt.","⭐");
  if(stars>=40)queueAlert("stars40","40 Sterne!","Stark! Du kommst gut voran.","⭐");
  const learned=(state.active||[]).filter(v=>verbPercent(v)>=100).length+(state.learned||[]).length;
  if(learned>=1)queueAlert("firstVerb","Erstes Verb gelernt!","Ein Verb ist komplett auf 100 %.","🎉");
  if(learned>=5)queueAlert("fiveVerbs","5 Verben gelernt!","Du baust deinen Wortschatz auf.","🎉");
  if(learned>=10)queueAlert("tenVerbs","10 Verben gelernt!","Die Hälfte eines Pakets ist geschafft.","🎉");
  if(packageComplete())queueAlert("packageComplete_"+(state.packageNo||1),"Paket geschafft!","Alle 20 Verben sind auf 100 %. Jetzt kannst du neue Verben auswählen.","🏆");
}
function completedTaskMessage(label){return `<div class="achievement"><h3>Aufgabe erledigt ✓</h3><p><strong>${label}</strong> ist abgeschlossen.</p><div class="star-pill">⭐ geschafft</div></div>`}
function finishTaskIfComplete(skill,label){
  if(taskDone(skill)){
    checkMilestones();
    const g=$("game"); if(g)g.innerHTML=completedTaskMessage(label)+`<button class="success" onclick="renderHome()">Zur Aufgabenübersicht</button>`;
    return true;
  }
  checkMilestones();
  return false;
}

function recogVerb(cb){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){const fb=$("cardFeedback")||$("fb"); if(fb)fb.innerHTML="<div class='no'>Mikrofon funktioniert auf diesem Gerät/Browser nicht. Bitte die Antwort schreiben.</div>";scrollToFeedback();return;}
  try{
    let r=new SR(); r.lang="de-DE"; r.interimResults=false; r.continuous=false; r.maxAlternatives=3;
    let result="", done=false, timer=null;
    function finish(){if(done)return;done=true;clearTimeout(timer);setMicStatus("⚪ Mikrofon aus");if(result.trim())cb(result.trim());else{const fb=$("cardFeedback")||$("fb");if(fb)fb.innerHTML="<div class='no'>Ich habe nichts verstanden. Bitte noch einmal sprechen oder schreiben.</div>";scrollToFeedback();}}
    function stopSoon(){clearTimeout(timer);timer=setTimeout(()=>{try{r.stop()}catch(e){finish()}},1800)}
    r.onstart=()=>{setMicStatus("🔴 Mikrofon aktiv – sprechen Sie jetzt.");stopSoon();};
    r.onspeechstart=()=>clearTimeout(timer); r.onspeechend=()=>stopSoon(); r.onsoundend=()=>stopSoon();
    r.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i]&&e.results[i][0])result=e.results[i][0].transcript||result;}const h=$("heard");if(h)h.innerText="Gehört: "+result;stopSoon();};
    r.onerror=e=>{clearTimeout(timer);setMicStatus("⚪ Mikrofon aus");const fb=$("cardFeedback")||$("fb");if(fb)fb.innerHTML="<div class='no'>Mikrofonfehler. Bitte schreiben.</div>";scrollToFeedback();};
    r.onend=finish; r.start();
  }catch(e){const fb=$("cardFeedback")||$("fb");if(fb)fb.innerHTML="<div class='no'>Mikrofon konnte nicht gestartet werden. Bitte schreiben.</div>";scrollToFeedback();}
}

function rateVerb(v,level){
  ["known","unsure","unknown"].forEach(k=>state[k]=state[k].filter(x=>x!==v));
  state[level].push(v);
  if(level!=="known" && !state.active.includes(v)){state.active.push(v);ensureSkillState(v);}
  state.index++;
  if(state.active.length>=20){
    state.active=state.active.slice(0,20);
    state.taskQueues={}; state.taskDoneSets={}; state.flashSession=null;
    state.phase="tasks"; saveState(); renderHome();
  }else{saveState(); renderOneVerb();}
}

function startFlashcardSession(){
  state.flashSession=state.flashSession||{queue:[],correct:{},wrong:{},done:[],total:(state.active||[]).length,words:(state.active||[])};
  state.flashSession.correct=state.flashSession.correct||{}; state.flashSession.wrong=state.flashSession.wrong||{}; state.flashSession.done=state.flashSession.done||[];
  const doneSet=new Set(state.flashSession.done);
  const remaining=(state.active||[]).filter(v=>!doneSet.has(v));
  state.flashSession.words=state.active.slice(); state.flashSession.total=state.active.length;
  if(!state.flashSession.queue || !state.flashSession.queue.length) state.flashSession.queue=shuffle(remaining);
  remaining.forEach(v=>{state.flashSession.correct[v]=state.flashSession.correct[v]||0;state.flashSession.wrong[v]=state.flashSession.wrong[v]||0;});
  saveState();
}
function nextFlashVerb(){
  if(!state.flashSession || !state.flashSession.queue)startFlashcardSession();
  if((state.flashSession.done||[]).length>=state.flashSession.total)return null;
  if(!state.flashSession.queue.length){
    const doneSet=new Set(state.flashSession.done||[]);
    state.flashSession.queue=(state.active||[]).filter(v=>!doneSet.has(v));
  }
  if(!state.flashSession.queue.length)return null;
  const v=state.flashSession.queue.shift(); state.flashSession.current=v; saveState(); return v;
}
function flashProgressHtml(){
  const totalWords=(state.flashSession&&state.flashSession.total)||state.active.length;
  const totalPoints=totalWords*2;
  const points=Object.values((state.flashSession&&state.flashSession.correct)||{}).reduce((s,n)=>s+Math.min(2,Number(n)||0),0);
  const pct=totalPoints?Math.round(points*100/totalPoints):0;
  const doneWords=(state.flashSession&&state.flashSession.done?state.flashSession.done.length:0);
  return `<div class="flash-progress-box"><div class="flash-progress-title"><strong>${pct}% fertig</strong><span>${points}/${totalPoints} Punkte · ${doneWords}/${totalWords} Wörter</span></div><div class="flash-bar"><div class="flash-fill" style="width:${pct}%"></div></div></div>`;
}
function flashcards(){

function finishFlashVerb(v,good){
  state.flashSession=state.flashSession||{queue:[],correct:{},wrong:{},done:[],total:state.active.length,words:state.active.slice()};
  ensureSkillState(v); state.flashSession.correct[v]=state.flashSession.correct[v]||0; state.flashSession.wrong[v]=state.flashSession.wrong[v]||0;
  if(good){
    state.flashSession.correct[v]=Math.min(2,state.flashSession.correct[v]+1);
    markSkill(v,"karteikarte",true);
    if(state.flashSession.correct[v]>=2){
      state.skillDone[v]["karteikarte"]=true;
      if(!state.flashSession.done.includes(v))state.flashSession.done.push(v);
      finishQueuedVerb("karteikarte",v,true);
      state.flashSession.queue=state.flashSession.queue.filter(x=>x!==v);
    }else state.flashSession.queue.push(v);
  }else{
    markSkill(v,"karteikarte",false);
    state.flashSession.wrong[v]++; state.flashSession.queue.push(v);
  }
  saveState(); checkMilestones();
}
function checkFlashcardAnswer(v){

  scrollToFeedback();
}

function flip(i){
  if(state.lock)return; const c=state.memoryCards[i]; if(!c||c.o||c.d)return; c.o=true;
  if(state.first===null){state.first=i;saveState();renderMemory();return}
  const a=state.memoryCards[state.first], b=c; state.lock=true; renderMemory();
  setTimeout(()=>{if(a.p===b.p&&a.t!==b.t){a.d=b.d=true;finishQueuedVerb("memory",a.v,true);addEncounter(a.v,"memory",true);$("fb").innerHTML="<div class='ok'>Paar gefunden!</div>";}else{if(a&&a.v)finishQueuedVerb("memory",a.v,false);if(b&&b.v&&b.v!==a.v)finishQueuedVerb("memory",b.v,false);a.o=false;b.o=false;$("fb").innerHTML="<div class='no'>Noch nicht. Die Verben kommen am Ende wieder.</div>";}state.first=null;state.lock=false;saveState();renderMemory();if(state.memoryCards.every(x=>x.d))finishTaskIfComplete("memory","Memory");},650);
}

function sentencePuzzle(){saveCurrentTask("sentencePuzzle");state.currentGame="sentencePuzzle";let v=nextFromTaskQueue("satz_puzzle");if(!v){finishTaskIfComplete("satz_puzzle","Satz-Puzzle");return}state.currentVerb=v;const sentence=sentenceForVerb(v);puzzleCurrent=[];const words=shuffle(sentenceWords(v));$("game").innerHTML=`${taskProgressHtml("satz_puzzle","Satz-Puzzle")}<h3>Satz-Puzzle</h3><p class="small">Baue den Satz. Der Punkt gehört dazu.</p>${imageBox(v,false)}<div id="puzzleAnswer" class="puzzle-answer"></div><div id="puzzleBank" class="puzzle-bank">${words.map(w=>`<button class="word-chip" data-word="${safeText(w)}" onclick="pickPuzzleWord(this)">${safeText(w)}</button>`).join("")}</div><button class="secondary" onclick="speakTextVerb('${sentence.replace(/'/g,"\\'")}',false)">🔊 Satz hören</button><button class="secondary" onclick="speakTextVerb('${sentence.replace(/'/g,"\\'")}',true)">🐢 Langsam</button><button class="success" onclick="checkSentencePuzzle('${v}')">Prüfen</button><button class="secondary" onclick="sentencePuzzle()">Neu</button><div id="fb"></div>`;renderAndHydrate();scrollToGame();}
function pickPuzzleWord(btn){const w=btn.getAttribute("data-word");puzzleCurrent.push(w);btn.remove();const ans=$("puzzleAnswer");const chip=document.createElement("button");chip.className="word-chip answer";chip.textContent=w;chip.onclick=function(){const children=Array.from(ans.children);const index=children.indexOf(chip);if(index>=0)puzzleCurrent.splice(index,1);chip.remove();const bank=$("puzzleBank");const b=document.createElement("button");b.className="word-chip";b.textContent=w;b.setAttribute("data-word",w);b.onclick=function(){pickPuzzleWord(b)};bank.appendChild(b);};ans.appendChild(chip);}
function checkSentencePuzzle(v){const target=sentenceForVerb(v).replace(/\s+/g," ").trim();let answer=puzzleCurrent.join(" ").replace(" .",".").trim();const fb=$("fb");if(clean(answer)===clean(target)){addEncounter(v,"satz_puzzle",true);finishQueuedVerb("satz_puzzle",v,true);fb.innerHTML=`<div class="ok">Richtig: ${sentenceForVerb(v)}<br>Dieses Verb ist in dieser Aufgabe fertig.</div><button class="success" onclick="sentencePuzzle()">weiter</button>`;speakTextVerb(sentenceForVerb(v),false);finishTaskIfComplete("satz_puzzle","Satz-Puzzle");}else{addEncounter(v,"satz_puzzle",false);finishQueuedVerb("satz_puzzle",v,false);fb.innerHTML=`<div class="no">Noch nicht.<br>Richtig: ${sentenceForVerb(v)}<br>Dieses Verb kommt am Ende noch einmal.</div><button onclick="sentencePuzzle()">weiter</button>`;}scrollToFeedback();}

function showTranslationHelp(v){const fb=$("fb")||$("cardFeedback");if(fb){fb.innerHTML=`<div class="ok"><strong>Hilfe (${nativeLang()}):</strong><br>${safeText(nativeWord(v))}</div>`+fb.innerHTML;scrollToFeedback();}}
function showVerbOverview(){
  const cards=ALL_VERBS.map(x=>x.v).map(v=>`<div class="verb-overview-card">${imageBox(v,true)}<div class="verb-de">${safeText(v)}</div><div class="verb-native">${safeText(nativeWord(v))}</div><div class="verb-percent">${verbPercent(v)}%</div></div>`).join("");
  const modal=document.createElement("div");modal.className="overview-modal";modal.id="overviewModal";modal.innerHTML=`<div class="overview-box"><div class="overview-head"><h2>Alle Verben</h2><button class="secondary" onclick="document.getElementById('overviewModal').remove()">Schließen</button></div><div class="overview-grid">${cards}</div></div>`;
  document.body.appendChild(modal);renderAndHydrate();
}
function renderProgressPanel(openOnly){
  const p=$("progressPanel"); if(!p)return;
  const activeRows=state.active.map(v=>`<div class="progress-row"><div class="progress-row-head">${imageBox(v,true)}<div><strong>${safeText(v)}</strong><br><span class="small">${verbSkillCount(v)}/${VERB_SKILLS.length} · ${verbPercent(v)}%</span></div></div><div class="progress-line"><div class="progress-fill" style="width:${verbPercent(v)}%"></div></div><div class="small">Fehler: ${state.weak[v]||0}</div>${skillBadges(v)}</div>`).join("");
  p.innerHTML=`<h2>📊 Fortschritt</h2><button class="secondary" onclick="toggleProgressPanel()">Schließen</button><div class="progress-row"><strong>Paket ${state.packageNo||1}</strong><br>Aktiv: ${state.active.length}/20 · Gelernt: ${state.learned.length} · Offen: ${unusedVerbs().length}<br>Sterne: ${totalStars()}</div><h3>Aktive Verben</h3>${activeRows||"<p>Noch keine aktiven Verben.</p>"}<h3>Gelernte Verben</h3><p class="small">${state.learned.length?state.learned.join(", "):"Noch keine."}</p>`;
  renderAndHydrate();
}
function toggleProgressPanel(){const p=$("progressPanel");if(!p)return;p.classList.toggle("hidden");if(!p.classList.contains("hidden"))renderProgressPanel(true)}

function init(){if(!loadProfile())return;loadState();if(state.active.length>=20){state.phase="tasks";renderHome();}else{state.phase="select";renderOneVerb();}}
document.addEventListener("DOMContentLoaded",init);

/* FIX: Google Sheet nur bei Aufgabenabschluss senden */
function sendExerciseCompletedOnce(exName){
  if(!exName) exName = game;
  window._sentExerciseCompletions = window._sentExerciseCompletions || {};
  const key = keyPrefixForCompletion() + "_" + exName;
  if(window._sentExerciseCompletions[key]) return;
  window._sentExerciseCompletions[key] = true;
  try{
    sendToGoogleSheet("completed_" + exName, true);
  }catch(e){
    console.warn("Google Sheet Abschluss konnte nicht gesendet werden:", e);
  }
}
function keyPrefixForCompletion(){
  return String(course||"") + "_" + String(student||"");
}


/* FIX: Prüfung-Button startExam */
function startExam(){
  if(typeof renderExam === "function") return renderExam();
  if(typeof exam === "function") return exam();
  const g = document.getElementById("game");
  if(g){
    g.innerHTML = "<h2>🏆 Prüfung</h2><div class='no'>Die Prüfung konnte nicht gestartet werden.</div>";
  }
}

</script>
