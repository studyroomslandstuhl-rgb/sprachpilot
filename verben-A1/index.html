<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprachPilot Verben System</title>

<style>
body{margin:0;font-family:Arial;background:#667eea;color:white;text-align:center}
.nav{background:#222;padding:10px}
.logo{font-weight:bold;cursor:pointer}
.container{padding:15px}

.card{background:white;color:black;border-radius:20px;padding:15px;max-width:320px;margin:20px auto}
img{width:100%;max-width:220px;border-radius:10px}

button{padding:10px;margin:5px;border:none;border-radius:10px}
.primary{background:#4CAF50;color:white}
.secondary{background:#e74c3c;color:white}
.reset{background:#555;color:white;margin-top:20px}
.hidden{display:none}
</style>
</head>

<body>

<div class="nav">
  <span class="logo" onclick="location.href='../index.html'">SprachPilot</span>
</div>

<div class="container">

<h3 id="phaseTitle"></h3>

<div id="card" class="card hidden" onclick="flip()">
  <div id="front">
    <img id="img">
    <p id="ru"></p>
  </div>
  <div id="back" class="hidden">
    <h2 id="de"></h2>
  </div>
</div>

<input id="input" class="hidden" placeholder="Verb auf Deutsch">
<br>
<button id="checkBtn" class="primary hidden" onclick="check()">Prüfen</button>
<button id="dontBtn" class="secondary hidden" onclick="dontKnow()">Ich weiß es nicht</button>

<p id="info"></p>

<button class="reset" onclick="resetAll()">Alle Fortschritte löschen</button>

</div>

<script>

const verbs = [
{de:"essen",ru:"есть"},
{de:"sprechen",ru:"говорить"},
{de:"fahren",ru:"ехать"},
{de:"schlafen",ru:"спать"},
{de:"sehen",ru:"видеть"},
{de:"lesen",ru:"читать"},
{de:"rufen",ru:"звать"},
{de:"schreien",ru:"кричать"},
{de:"träumen",ru:"мечтать"},
{de:"kleben",ru:"клеить"},
{de:"kosten",ru:"стоить"},
{de:"schieben",ru:"толкать"},
{de:"ziehen",ru:"тянуть"}
];

let data = JSON.parse(localStorage.getItem("SP")||"{}");
data.stage = data.stage || "collect"; // collect → train
data.pool = data.pool || [];
data.progress = data.progress || {};

let current;

// PHASE CONTROL
function updatePhase(){
  if(data.stage==="collect"){
    document.getElementById("phaseTitle").innerText =
      "Phase 1: Kennst du das Verb? (max 20 unsichere sammeln)";
  }else{
    document.getElementById("phaseTitle").innerText =
      "Phase 2: Übe deine 20 Verben bis 100%";
  }
}

// PICK VERB
function pick(){
  if(data.stage==="collect"){
    return verbs[Math.floor(Math.random()*verbs.length)];
  }else{
    return data.pool[Math.floor(Math.random()*data.pool.length)];
  }
}

// SHOW
function show(){
  updatePhase();
  current = pick();

  document.getElementById("card").classList.remove("hidden");
  document.getElementById("input").classList.remove("hidden");
  document.getElementById("checkBtn").classList.remove("hidden");
  document.getElementById("dontBtn").classList.remove("hidden");

  document.getElementById("img").src = "bilder/"+current.de+".png";
  document.getElementById("ru").innerText = current.ru;
  document.getElementById("de").innerText = current.de;

  document.getElementById("front").classList.remove("hidden");
  document.getElementById("back").classList.add("hidden");

  document.getElementById("input").value="";
  document.getElementById("info").innerText="";
}

// FLIP → UNSURE
function flip(){
  document.getElementById("front").classList.add("hidden");
  document.getElementById("back").classList.remove("hidden");

  addToPool(current.de);
}

// ADD TO POOL
function addToPool(v){
  if(!data.pool.includes(v) && data.pool.length < 20){
    data.pool.push(v);
  }

  if(data.pool.length === 20){
    data.stage = "train";
  }

  save();
}

// CHECK
function check(){
  const val = document.getElementById("input").value.trim().toLowerCase();

  if(val === current.de){

    data.progress[current.de] = (data.progress[current.de]||0)+1;

    if(data.stage==="collect"){
      // known → do nothing
    }else{
      if(data.progress[current.de] >= 2){
        document.getElementById("info").innerText="⭐ gelernt!";
      }
    }

    next();

  }else{
    addToPool(current.de);
    document.getElementById("info").innerText="❌ kommt in Übung";
  }

  save();
}

// DON'T KNOW
function dontKnow(){
  addToPool(current.de);
  next();
}

// NEXT
function next(){
  setTimeout(show,700);
}

// RESET
function resetAll(){
  localStorage.removeItem("SP");
  location.reload();
}

// SAVE
function save(){
  localStorage.setItem("SP", JSON.stringify(data));
}

show();

</script>

</body>
</html>
