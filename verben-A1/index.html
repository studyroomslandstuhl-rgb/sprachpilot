<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SprachPilot Verben A1</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);color:white;text-align:center}
.card{background:white;color:black;padding:20px;margin:40px auto;width:340px;border-radius:20px}
img{width:220px;border-radius:10px}
input{padding:10px;margin-top:10px;width:80%}
button{margin-top:10px;padding:10px 20px;border:none;border-radius:10px;background:#4CAF50;color:white}
#status{margin-top:10px;font-weight:bold}
</style>
</head>
<body>

<h1>Verben Trainer</h1>

<div class="card">
  <h2 id="verb"></h2>
  <img id="img">
  <br>
  <input id="input" placeholder="Schreib das Verb...">
  <br>
  <button onclick="check()">Prüfen</button>
  <p id="feedback"></p>
  <p id="status"></p>
</div>

<script>

const verbs = ["essen","sprechen","fahren","schlafen","sehen","lesen","rufen","schreien","träumen","kleben","kosten","schieben","ziehen"];

let stats = JSON.parse(localStorage.getItem("stats")||"{}");
let current = 0;
let startTime = 0;

function pickVerb(){
  const unsure = verbs.filter(v => stats[v]?.status==="unsure");
  const known = verbs.filter(v => stats[v]?.status==="known");

  if(unsure.length>0 && Math.random()<0.7){
    return unsure[Math.floor(Math.random()*unsure.length)];
  }

  const pool = verbs.filter(v => !known.includes(v));
  if(pool.length>0) return pool[Math.floor(Math.random()*pool.length)];

  return verbs[Math.floor(Math.random()*verbs.length)];
}

function show(){
  const v = pickVerb();
  current = verbs.indexOf(v);

  document.getElementById("verb").innerText = v;
  document.getElementById("img").src = "bilder/"+v+".png";
  document.getElementById("input").value="";
  document.getElementById("feedback").innerText="";

  startTime = Date.now();
}

function check(){
  const v = verbs[current];
  const input = document.getElementById("input").value.trim().toLowerCase();
  const time = Date.now() - startTime;

  stats[v] = stats[v] || {correct:0,wrong:0,status:"new"};

  if(input === v){
    stats[v].correct++;

    if(time > 5000){
      stats[v].status = "unsure";
    }

    if(stats[v].correct >= 2 && stats[v].wrong === 0){
      stats[v].status = "known";
      document.getElementById("feedback").innerText = "✅ kannst du!";
    }else{
      document.getElementById("feedback").innerText = "✔ nochmal!";
    }

  }else{
    stats[v].wrong++;
    stats[v].correct = 0;
    stats[v].status = "unsure";
    document.getElementById("feedback").innerText = "❌ falsch!";
  }

  localStorage.setItem("stats", JSON.stringify(stats));
  updateStatus();

  setTimeout(show,1000);
}

function updateStatus(){
  let known=0, unsure=0;
  Object.values(stats).forEach(v=>{
    if(v.status==="known") known++;
    if(v.status==="unsure") unsure++;
  });
  document.getElementById("status").innerText = "✅ "+known+" | ⚠️ "+unsure;
}

show();
updateStatus();

</script>

</body>
</html>
