<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SprachPilot Verben</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

/* NAV */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#222;
}
.logo{font-weight:bold;font-size:18px;cursor:pointer}
.menu a{color:white;margin-left:10px;text-decoration:none;font-size:14px}

/* CONTENT */
.container{padding:15px;text-align:center}

.card{
  background:white;
  color:black;
  border-radius:20px;
  padding:15px;
  max-width:320px;
  margin:20px auto;
}

img{
  width:100%;
  max-width:220px;
  border-radius:12px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-size:14px;
}

.primary{background:#4CAF50;color:white}
.secondary{background:#e74c3c;color:white}

input{
  width:90%;
  padding:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="navbar">
  <div class="logo" onclick="goHome()">SprachPilot</div>
  <div class="menu">
    <a href="#">Verben</a>
  </div>
</div>

<div class="container">

<h3>Kennst du das Verb? Schreib es auf Deutsch ohne die Karte umzudrehen</h3>

<div class="card" onclick="flip()">
  <div id="front">
    <img id="img">
    <p id="ru"></p>
  </div>
  <div id="back" style="display:none">
    <h2 id="de"></h2>
  </div>
</div>

<input id="input" placeholder="Verb auf Deutsch">

<br>

<button class="primary" onclick="check()">Prüfen</button>
<button class="secondary" onclick="dontKnow()">Ich weiß es nicht</button>

<p id="feedback"></p>

</div>

<script>

function goHome(){
  window.location.href = "../index.html";
}

const verbs = [
{de:"essen",ru:"есть"},
{de:"sprechen",ru:"говорить"},
{de:"fahren",ru:"ехать"},
{de:"schlafen",ru:"спать"},
{de:"sehen",ru:"видеть"},
{de:"lesen",ru:"читать"},
{de:"rufen",ru:"звать"},
{de:"schreien",ru:"кричать"},
{de:"träumen",ru:"мечтать"},
{de:"kleben",ru:"клеить"},
{de:"kosten",ru:"стоить"},
{de:"schieben",ru:"толкать"},
{de:"ziehen",ru:"тянуть"}
];

let stats = JSON.parse(localStorage.getItem("stats")||"{}");
let current;

function pick(){
  const unsure = verbs.filter(v => stats[v.de]?.status==="unsure" || stats[v.de]?.status==="unknown");
  if(unsure.length>0) return unsure[Math.floor(Math.random()*unsure.length)];
  return verbs[Math.floor(Math.random()*verbs.length)];
}

function show(){
  const v = pick();
  current = v;

  document.getElementById("img").src = "bilder/"+v.de+".png";
  document.getElementById("ru").innerText = v.ru;
  document.getElementById("de").innerText = v.de;

  document.getElementById("front").style.display="block";
  document.getElementById("back").style.display="none";
  document.getElementById("input").value="";
  document.getElementById("feedback").innerText="";
}

function flip(){
  document.getElementById("front").style.display="none";
  document.getElementById("back").style.display="block";

  stats[current.de] = stats[current.de] || {status:"new"};
  stats[current.de].status = "unsure";

  save();
}

function check(){
  const val = document.getElementById("input").value.trim().toLowerCase();

  stats[current.de] = stats[current.de] || {correct:0,wrong:0,status:"new"};

  if(val === current.de){
    stats[current.de].correct = (stats[current.de].correct||0)+1;

    if(stats[current.de].correct >= 2){
      stats[current.de].status = "known";
    }

    document.getElementById("feedback").innerText="✅ richtig";
    next();

  }else{
    stats[current.de].status="unsure";
    document.getElementById("feedback").innerText="❌ falsch";
  }

  save();
}

function dontKnow(){
  stats[current.de] = {status:"unknown"};
  save();
  next();
}

function next(){
  setTimeout(show,800);
}

function save(){
  localStorage.setItem("stats", JSON.stringify(stats));
}

show();

</script>

</body>
</html>
