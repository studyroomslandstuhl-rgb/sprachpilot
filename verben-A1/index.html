<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SprachPilot Verben</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);color:white;text-align:center}
.card{background:white;color:black;width:320px;height:360px;margin:40px auto;border-radius:20px;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer}
img{width:200px;border-radius:10px}
.hidden{display:none}
input{padding:10px;margin-top:10px;width:80%}
button{margin-top:10px;padding:10px 20px;border:none;border-radius:10px;background:#4CAF50;color:white}
#task{margin-top:10px;font-weight:bold}
</style>
</head>
<body>

<h1>Verben Trainer</h1>

<div id="task">👉 Schau dir die Karte an und drehe sie um</div>

<div class="card" onclick="flip()">
  <div id="front">
    <img id="img">
  </div>
  <div id="back" class="hidden">
    <h2 id="translation"></h2>
  </div>
</div>

<div>
  <input id="input" placeholder="Schreib das Verb auf Deutsch...">
  <br>
  <button onclick="check()">Prüfen</button>
  <p id="feedback"></p>
</div>

<script>

const verbs = [
{de:"essen",ru:"есть"},
{de:"sprechen",ru:"говорить"},
{de:"fahren",ru:"ехать"},
{de:"schlafen",ru:"спать"},
{de:"sehen",ru:"видеть"},
{de:"lesen",ru:"читать"},
{de:"rufen",ru:"звать"},
{de:"schreien",ru:"кричать"},
{de:"träumen",ru:"мечтать"},
{de:"kleben",ru:"клеить"},
{de:"kosten",ru:"стоить"},
{de:"schieben",ru:"толкать"},
{de:"ziehen",ru:"тянуть"}
];

let current = 0;
let flipped = false;

function show(){
  const v = verbs[current];
  document.getElementById("img").src = "bilder/"+v.de+".png";
  document.getElementById("translation").innerText = v.ru;
  document.getElementById("input").value="";
  document.getElementById("feedback").innerText="";
  flipped = false;
  document.getElementById("front").classList.remove("hidden");
  document.getElementById("back").classList.add("hidden");
}

function flip(){
  flipped = !flipped;
  document.getElementById("front").classList.toggle("hidden");
  document.getElementById("back").classList.toggle("hidden");
}

function check(){
  const v = verbs[current];
  const input = document.getElementById("input").value.trim().toLowerCase();

  if(input === v.de){
    document.getElementById("feedback").innerText = "✅ richtig!";
    next();
  }else{
    document.getElementById("feedback").innerText = "❌ nochmal!";
  }
}

function next(){
  current++;
  if(current>=verbs.length) current=0;
  setTimeout(show,1000);
}

show();

</script>

</body>
</html>
