function nativeLang(){return (profile&&profile.muttersprache)?profile.muttersprache:"Englisch"}
function nativeWord(v){const lang=nativeLang();return (VERB_TRANSLATIONS[lang]&&VERB_TRANSLATIONS[lang][v])||(VERB_TRANSLATIONS["Englisch"]&&VERB_TRANSLATIONS["Englisch"][v])||v}
function key(){return "SP_VERBS_"+(profile?profile.userId:"guest")}

function loadProfile(){
  try{profile=JSON.parse(localStorage.getItem("SP_USER_PROFILE")||"null")}catch(e){profile=null}
  if(!profile){
    $("profileBox").innerHTML="<div class='no'>Bitte zuerst auf der Startseite registrieren oder einloggen.</div>";
    $("app").innerHTML="<button onclick=\"location.href='../'\">Zur Startseite</button>";
    return false;
  }
  $("profileBox").innerHTML=`<div class="ok">Eingeloggt: <strong>${safeText(profile.vorname)} ${safeText(profile.nachname)}</strong> | Kurs: ${safeText(profile.kurs||"")}</div>`;
  return true;
}

function ensureSkillState(v){
  state.skillDone=state.skillDone||{}; state.skillAttempts=state.skillAttempts||{}; state.skillSuccess=state.skillSuccess||{};
  state.skillDone[v]=state.skillDone[v]||{}; state.skillAttempts[v]=state.skillAttempts[v]||{}; state.skillSuccess[v]=state.skillSuccess[v]||{};
}
function migrateState(){
  state.learned=state.learned||[]; state.active=state.active||[]; state.known=state.known||[]; state.unsure=state.unsure||[]; state.unknown=state.unknown||[];
  state.weak=state.weak||{}; state.skillDone=state.skillDone||{}; state.skillAttempts=state.skillAttempts||{}; state.skillSuccess=state.skillSuccess||{};
  state.taskQueues=state.taskQueues||{}; state.taskDoneSets=state.taskDoneSets||{}; state.alertsShown=state.alertsShown||{}; state.taskRewardsShown=state.taskRewardsShown||{}; state.packageNo=state.packageNo||1;
  (state.active||[]).forEach(v=>ensureSkillState(v));
}

async function loadState(){
  try{
    const saved=JSON.parse(localStorage.getItem(key())||"null");
    if(saved) state={...state,...saved};
  }catch(e){}

  migrateState();

  const sid=firebaseStudentId();
  if(sid && typeof db!=="undefined"){
    try{
      const snap=await db.collection("progress").doc(sid).get();
      if(snap.exists){
        const data=snap.data()||{};
        if(data.verben && data.verben.state){
          state={...state,...data.verben.state};
          migrateState();
          localStorage.setItem(key(),JSON.stringify(state));
        }
      }
    }catch(e){
      console.warn("Firebase Verben-Fortschritt konnte nicht geladen werden:", e);
    }
  }
}

function saveState(){
  migrateState();
  localStorage.setItem(key(),JSON.stringify(state));
  sendProgress();
}

let firebaseSaveTimer=null;
function firebaseStudentId(){
  if(profile && (profile.studentId || profile.userId)) return profile.studentId || profile.userId;
  try{
    const p=JSON.parse(localStorage.getItem("SP_USER_PROFILE")||"null");
    return p && (p.studentId || p.userId);
  }catch(e){return null}
}
function firebaseProgressPercent(){
  try{return overall()}catch(e){return 0}
}
function firebaseStars(){
  try{return totalStars()}catch(e){return 0}
}
function sendProgress(){
  if(!profile)return;
  const sid=firebaseStudentId();
  if(!sid || typeof db==="undefined")return;

  clearTimeout(firebaseSaveTimer);
  firebaseSaveTimer=setTimeout(async()=>{
    try{
      const progressValue=firebaseProgressPercent();
      await db.collection("progress").doc(sid).set({
        studentId:sid,
        kurs:profile.kurs||profile.kursnummer||"",
        verben:{
          progress:progressValue,
          stars:firebaseStars(),
          activeVerbs:state.active||[],
          learnedVerbs:state.learned||[],
          known:state.known||[],
          unsure:state.unsure||[],
          unknown:state.unknown||[],
          state:state,
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        },
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      },{merge:true});

      await db.collection("students").doc(sid).set({
        studentId:sid,
        vorname:profile.vorname||"",
        nachname:profile.nachname||"",
        kurs:profile.kurs||profile.kursnummer||"",
        muttersprache:profile.muttersprache||"",
        verbenFortschritt:progressValue,
        lastActivity:firebase.firestore.FieldValue.serverTimestamp()
      },{merge:true});

      try{
        profile.verbenFortschritt=progressValue;
        localStorage.setItem("SP_USER_PROFILE",JSON.stringify(profile));
      }catch(e){}
    }catch(e){
      console.warn("Firebase Verben-Fortschritt konnte nicht gespeichert werden:", e);
    }
  },600);
}


function imageFileName(v){return String(v||"").toLowerCase().replaceAll("ä","ae").replaceAll("ö","oe").replaceAll("ü","ue").replaceAll("ß","ss").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")+".png"}
function imageBox(v,small=false){const cls=small?"mem-img-holder":"img-holder";return `<span class="${cls}" data-verb="${safeText(v)}"><span class="image-fallback">Bild</span></span>`}
function hydrateImages(root){
  const base=root||document;
  base.querySelectorAll("[data-verb]").forEach(box=>{
    if(box.dataset.loaded==="1")return;
    box.dataset.loaded="1";
    const v=box.getAttribute("data-verb");
    const img=document.createElement("img");
    img.alt="";
    img.loading="eager";
    img.decoding="async";
    img.src="bilder/"+imageFileName(v);
    img.onerror=function(){box.innerHTML="<span class='image-fallback'>Bild</span>";};
    box.textContent="";
    box.appendChild(img);
  });
}
function renderAndHydrate(){setTimeout(()=>hydrateImages(document),20)}

function skillKey(skill){return skill==="zuordnung"?"bild_verb":skill}
function verbSkillCount(v){ensureSkillState(v);return VERB_SKILLS.filter(s=>state.skillDone[v]&&state.skillDone[v][s]).length}
function verbPercent(v){return Math.round((verbSkillCount(v)*100)/VERB_SKILLS.length)}
function overall(){if(!state.active.length)return 0;return Math.round(state.active.reduce((s,v)=>s+verbPercent(v),0)/state.active.length)}
function taskQueueKey(skill){return "queue_"+skillKey(skill)}
function taskDoneSetKey(skill){return "done_"+skillKey(skill)}
function queuedProgress(skill){
  const dKey=taskDoneSetKey(skill); state.taskDoneSets=state.taskDoneSets||{};
  const done=(state.taskDoneSets[dKey]||[]).filter(v=>(state.active||[]).includes(v)).length;
  const total=(state.active||[]).length;
  return {done,total,pct:total?Math.round(done*100/total):0};
}
function taskSkillProgress(skill){return queuedProgress(skill)}
function taskProgressHtml(skill,label){const p=taskSkillProgress(skill);return `<div class="task-progress"><div class="task-progress-title"><span>${label}</span><span>${p.done}/${p.total} · ${p.pct}%</span></div><div class="task-progress-line"><div class="task-progress-fill" style="width:${p.pct}%"></div></div></div>`}
function taskDone(skill){const p=taskSkillProgress(skill);return p.total>0 && p.done>=p.total}
function taskCardClass(skill){return taskDone(skill)?"task-card done-card":"task-card"}
function taskCardStatus(skill){const p=taskSkillProgress(skill);return taskDone(skill)?"Erledigt ✓":`${p.pct}%`}

function initTaskQueue(skill){
  state.taskQueues=state.taskQueues||{}; state.taskDoneSets=state.taskDoneSets||{};
  const qKey=taskQueueKey(skill), dKey=taskDoneSetKey(skill);
  state.taskDoneSets[dKey]=state.taskDoneSets[dKey]||[];
  const doneSet=new Set(state.taskDoneSets[dKey]);
  const remaining=(state.active||[]).filter(v=>!doneSet.has(v));
  if(!Array.isArray(state.taskQueues[qKey])) state.taskQueues[qKey]=shuffle(remaining);
  else {
    const current=state.taskQueues[qKey].filter(v=>remaining.includes(v));
    const missing=remaining.filter(v=>!current.includes(v));
    state.taskQueues[qKey]=current.concat(shuffle(missing));
  }
  saveState();
}
function nextFromTaskQueue(skill){
  initTaskQueue(skill);
  const qKey=taskQueueKey(skill);
  const q=state.taskQueues[qKey]||[];
  if(!q.length)return null;
  const v=q.shift();
  state.taskQueues[qKey]=q;
  saveState();
  return v;
}
function finishQueuedVerb(skill,v,good){
  state.taskQueues=state.taskQueues||{}; state.taskDoneSets=state.taskDoneSets||{};
  const qKey=taskQueueKey(skill), dKey=taskDoneSetKey(skill);
  state.taskQueues[qKey]=state.taskQueues[qKey]||[];
  state.taskDoneSets[dKey]=state.taskDoneSets[dKey]||[];
  if(good){
    if(!state.taskDoneSets[dKey].includes(v)) state.taskDoneSets[dKey].push(v);
    state.taskQueues[qKey]=state.taskQueues[qKey].filter(x=>x!==v);
  }else{
    if(!state.taskDoneSets[dKey].includes(v) && !state.taskQueues[qKey].includes(v)) state.taskQueues[qKey].push(v);
  }
  saveState();
}
function chooseVerbForPractice(skill){return skill?nextFromTaskQueue(skill):nextFromTaskQueue(state.currentGame||"schreiben")}

function markSkill(v,skill,good){
  const sk=skillKey(skill); ensureSkillState(v);
  state.skillAttempts[v][sk]=(state.skillAttempts[v][sk]||0)+1;
  if(good){
    state.skillSuccess[v][sk]=(state.skillSuccess[v][sk]||0)+1;
    if(sk==="karteikarte"){if((state.skillSuccess[v][sk]||0)>=2)state.skillDone[v][sk]=true;}
    else state.skillDone[v][sk]=true;
  }else state.weak[v]=(state.weak[v]||0)+1;
}
function addEncounter(v,skill,good=true){markSkill(v,skill,good);saveState();checkMilestones();}

function skillBadges(v){
  ensureSkillState(v);
  return VERB_SKILLS.map(s=>`<div class="small">${state.skillDone[v][s]?"✅":"⬜"} ${VERB_SKILL_LABELS[s]} ${state.skillAttempts[v][s]?`(${state.skillAttempts[v][s]}x)`:""}</div>`).join("");
}
function unusedVerbs(){
  const used=[...state.known,...state.unsure,...state.unknown,...state.active,...state.learned];
  return ALL_VERBS.map(x=>x.v).filter(v=>!used.includes(v));
}
function currentPickVerb(){
  const used=[...state.known,...state.unsure,...state.unknown,...state.active,...state.learned];
  for(let i=state.index;i<ALL_VERBS.length;i++){if(!used.includes(ALL_VERBS[i].v)){state.index=i;return ALL_VERBS[i];}}
  return null;
}
function packageComplete(){return (state.active||[]).length===20 && state.active.every(v=>verbPercent(v)>=100)}
function allTasksDone(){return VERB_SKILLS.every(s=>taskDone(s))}

function totalStars(){
  return (state.active||[]).filter(v=>verbPercent(v)===100).length;
}
function showAlert(title,msg,icon="⭐"){
  const old=document.getElementById("levelAlert"); if(old)old.remove();
  const el=document.createElement("div"); el.className="level-alert"; el.id="levelAlert";
  el.innerHTML=`<div class="level-alert-box"><div class="big-star">${icon}</div><h2>${title}</h2><p>${msg}</p><button class="success" onclick="document.getElementById('levelAlert').remove()">Weiter</button></div>`;
  document.body.appendChild(el);
}
function queueAlert(key,title,msg,icon="⭐"){state.alertsShown=state.alertsShown||{};if(state.alertsShown[key])return;state.alertsShown[key]=true;saveState();setTimeout(()=>showAlert(title,msg,icon),120)}
function checkMilestones(){
  // Keine Zwischenbelohnungen. Nur wenn alle 20 aktiven Verben auf 100% sind.
  if(packageComplete()){
    queueAlert(
      "packageComplete_"+(state.packageNo||1),

function recogVerb(cb){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){const fb=$("cardFeedback")||$("fb"); if(fb)fb.innerHTML="<div class='no'>Mikrofon funktioniert auf diesem Gerät/Browser nicht. Bitte die Antwort schreiben.</div>";scrollToFeedback();return;}
  try{
    let r=new SR(); r.lang="de-DE"; r.interimResults=false; r.continuous=false; r.maxAlternatives=3;
    let result="", done=false, timer=null;
    function finish(){if(done)return;done=true;clearTimeout(timer);setMicStatus("⚪ Mikrofon aus");if(result.trim())cb(result.trim());else{const fb=$("cardFeedback")||$("fb");if(fb)fb.innerHTML="<div class='no'>Ich habe nichts verstanden. Bitte noch einmal sprechen oder schreiben.</div>";scrollToFeedback();}}
    function stopSoon(){clearTimeout(timer);timer=setTimeout(()=>{try{r.stop()}catch(e){finish()}},1800)}
    r.onstart=()=>{setMicStatus("🔴 Mikrofon aktiv – sprechen Sie jetzt.");stopSoon();};
    r.onspeechstart=()=>clearTimeout(timer); r.onspeechend=()=>stopSoon(); r.onsoundend=()=>stopSoon();
    r.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i]&&e.results[i][0])result=e.results[i][0].transcript||result;}const h=$("heard");if(h)h.innerText="Gehört: "+result;stopSoon();};
    r.onerror=e=>{clearTimeout(timer);setMicStatus("⚪ Mikrofon aus");const fb=$("cardFeedback")||$("fb");if(fb)fb.innerHTML="<div class='no'>Mikrofonfehler. Bitte schreiben.</div>";scrollToFeedback();};
    r.onend=finish; r.start();
  }catch(e){const fb=$("cardFeedback")||$("fb");if(fb)fb.innerHTML="<div class='no'>Mikrofon konnte nicht gestartet werden. Bitte schreiben.</div>";scrollToFeedback();}
}

function rateVerb(v,level){

  state.index++;

    state.active=state.active.slice(0,20);
    state.taskQueues={}; state.taskDoneSets={}; state.flashSession=null;
    state.phase="tasks"; saveState(); renderHome();
  }else{saveState(); renderOneVerb();}
}

function startFlashcardSession(){
  state.flashSession=state.flashSession||{queue:[],correct:{},wrong:{},done:[],total:(state.active||[]).length,words:(state.active||[])};
  state.flashSession.correct=state.flashSession.correct||{}; state.flashSession.wrong=state.flashSession.wrong||{}; state.flashSession.done=state.flashSession.done||[];
  const doneSet=new Set(state.flashSession.done);
  const remaining=(state.active||[]).filter(v=>!doneSet.has(v));
  state.flashSession.words=state.active.slice(); state.flashSession.total=state.active.length;
  if(!state.flashSession.queue || !state.flashSession.queue.length) state.flashSession.queue=shuffle(remaining);
  remaining.forEach(v=>{state.flashSession.correct[v]=state.flashSession.correct[v]||0;state.flashSession.wrong[v]=state.flashSession.wrong[v]||0;});
  saveState();
}
function nextFlashVerb(){
  if(!state.flashSession || !state.flashSession.queue)startFlashcardSession();
  if((state.flashSession.done||[]).length>=state.flashSession.total)return null;
  if(!state.flashSession.queue.length){
    const doneSet=new Set(state.flashSession.done||[]);
    state.flashSession.queue=(state.active||[]).filter(v=>!doneSet.has(v));
  }
  if(!state.flashSession.queue.length)return null;
  const v=state.flashSession.queue.shift(); state.flashSession.current=v; saveState(); return v;
}
function flashProgressHtml(){
  const totalWords=(state.flashSession&&state.flashSession.total)||state.active.length;
  const totalPoints=totalWords*2;
  const points=Object.values((state.flashSession&&state.flashSession.correct)||{}).reduce((s,n)=>s+Math.min(2,Number(n)||0),0);
  const pct=totalPoints?Math.round(points*100/totalPoints):0;
  const doneWords=(state.flashSession&&state.flashSession.done?state.flashSession.done.length:0);
  return `<div class="flash-progress-box"><div class="flash-progress-title"><strong>${pct}% fertig</strong><span>${points}/${totalPoints} Punkte · ${doneWords}/${totalWords} Wörter</span></div><div class="flash-bar"><div class="flash-fill" style="width:${pct}%"></div></div></div>`;
}

function finishFlashVerb(v,good){
  state.flashSession=state.flashSession||{queue:[],correct:{},wrong:{},done:[],total:state.active.length,words:state.active.slice()};
  ensureSkillState(v); state.flashSession.correct[v]=state.flashSession.correct[v]||0; state.flashSession.wrong[v]=state.flashSession.wrong[v]||0;
  if(good){
    state.flashSession.correct[v]=Math.min(2,state.flashSession.correct[v]+1);
    markSkill(v,"karteikarte",true);
    if(state.flashSession.correct[v]>=2){
      state.skillDone[v]["karteikarte"]=true;
      if(!state.flashSession.done.includes(v))state.flashSession.done.push(v);
      finishQueuedVerb("karteikarte",v,true);
      state.flashSession.queue=state.flashSession.queue.filter(x=>x!==v);
    }else state.flashSession.queue.push(v);
  }else{
    markSkill(v,"karteikarte",false);
    state.flashSession.wrong[v]++; state.flashSession.queue.push(v);
  }
  saveState(); checkMilestones();
}
function checkFlashcardAnswer(v){
  const val=($("cardAnswer")||{value:""}).value, fb=$("cardFeedback");

async function init(){
  if(!loadProfile())return;
  await loadState();
  if((state.active||[]).length>=20 || state.phase==="tasks"){
    state.phase="tasks";
    renderHome();
  }else{
    state.phase="select";

  }

function packageComplete(){
  spCleanVerbState();
  return state.active.length===20 && state.active.every(v=>verbPercent(v)>=100);
}
function totalStars(){
  spCleanVerbState();
  return state.active.filter(v=>verbPercent(v)>=100).length;
}
function unusedVerbs(){
  spCleanVerbState();
  const used=[...state.known,...state.unsure,...state.unknown,...state.active,...state.learned].filter((v,i,a)=>v&&a.indexOf(v)===i);
  return ALL_VERBS.map(x=>x.v).filter(v=>!used.includes(v));
}
function currentPickVerb(){
  spCleanVerbState();
  const used=[...state.known,...state.unsure,...state.unknown,...state.active,...state.learned].filter((v,i,a)=>v&&a.indexOf(v)===i);
  for(let i=0;i<ALL_VERBS.length;i++){
    if(!used.includes(ALL_VERBS[i].v)){state.index=i;return ALL_VERBS[i];}
  }
  return null;
}
function startNewVerbPackage(){
  spCleanVerbState();
  state.learned=[...state.learned,...state.active].filter((v,i,a)=>v&&a.indexOf(v)===i);
  state.active=[];state.known=[];state.unsure=[];state.unknown=[];
  state.taskQueues={};state.taskDoneSets={};state.flashSession=null;state.currentGame="";
  state.taskRewardsShown={};state.alertsShown={};
  state.packageNo=(state.packageNo||1)+1;state.phase="select";
  saveState();
  if(!currentPickVerb()){
    $("app").innerHTML=`<h2>Alle Verben fertig</h2><div class="ok">Alle Verben wurden bearbeitet.</div><button class="secondary" onclick="resetOnlyVerbProgress()">Verben neu starten</button>`;
    return;

}

function rateVerb(v,level){
  spCleanVerbState();

function flip(i){
  if(state.lock)return;
  const c=state.memoryCards[i];
  if(!c||c.o||c.d)return;
  c.o=true;

  if(state.first===null){
    state.first=i;
    saveState();
    renderMemory();
    return;
  }

  const a=state.memoryCards[state.first], b=c;
  state.lock=true;
  renderMemory();

  setTimeout(()=>{
    if(a.p===b.p && a.t!==b.t){
      a.d=b.d=true;
      finishQueuedVerb("memory",a.v,true);
      addEncounter(a.v,"memory",true);
      $("fb").innerHTML="<div class='ok'>Gut gemacht!</div>";
    }else{
      if(a&&a.v)finishQueuedVerb("memory",a.v,false);
      if(b&&b.v&&b.v!==a.v)finishQueuedVerb("memory",b.v,false);
      a.o=false;
      b.o=false;
      $("fb").innerHTML="<div class='no'>Versuch es nochmal.</div>";
    }

    state.first=null;
    state.lock=false;
    saveState();
    renderMemory();

    if(state.memoryCards.every(x=>x.d)){
      finishMemoryRound();
    }
  },650);
}

function spUnique(arr){ return [...new Set((arr||[]).filter(Boolean))]; }
function spTrainingVerbs(){ return spUnique([...(state.unsure||[]), ...(state.unknown||[])]).slice(0,20); }
function spCleanSelectionState(){
  state.known=spUnique(state.known);
  state.unsure=spUnique(state.unsure);
  state.unknown=spUnique(state.unknown);
  state.learned=spUnique(state.learned);
  state.active=spTrainingVerbs();
  state.taskQueues=state.taskQueues||{};
  state.taskDoneSets=state.taskDoneSets||{};
  state.skillDone=state.skillDone||{};
  state.skillAttempts=state.skillAttempts||{};
  state.skillSuccess=state.skillSuccess||{};
  state.packageNo=state.packageNo||1;
  state.active.forEach(v=>ensureSkillState(v));
}
function unusedVerbs(){
  const used=spUnique([...(state.known||[]),...(state.unsure||[]),...(state.unknown||[]),...(state.learned||[])]);
  return ALL_VERBS.map(x=>x.v).filter(v=>!used.includes(v));
}
function currentPickVerb(){
  const pool=unusedVerbs();
  if(!pool.length) return null;
  return ALL_VERBS.find(x=>x.v===pool[0])||null;
}
function packageComplete(){
  spCleanSelectionState();
  return state.active.length===20 && state.active.every(v=>verbPercent(v)>=100);
}
function totalStars(){
  spCleanSelectionState();
  return state.active.filter(v=>verbPercent(v)>=100).length;
}
function renderOneVerb(){
  state.phase="select";
  spCleanSelectionState();
  const trainingCount=spTrainingVerbs().length;

  if(trainingCount>=20){
    state.active=spTrainingVerbs();
    state.taskQueues={};
    state.taskDoneSets={};
    state.flashSession=null;
    state.phase="tasks";
    saveState();
    renderHome();
    return;
  }

  const v=currentPickVerb();
  if(!v){
    if(trainingCount>0){
      state.active=spTrainingVerbs();
      state.phase="tasks";
      saveState();
      $("app").innerHTML=`<h2>Verben üben</h2><div class="no">Es gibt keine weiteren neuen Verben. Du hast aktuell ${trainingCount}/20 Trainingsverben.</div><button class="success" onclick="renderHome()">Mit ${trainingCount} Verben üben</button><button class="secondary" onclick="resetOnlyVerbProgress()">Verben neu starten</button>`;

  updateVerbStatsBox();
  renderProgressPanel(false);
  renderAndHydrate();
}
function rateVerb(v,level){
  ["known","unsure","unknown"].forEach(k=>state[k]=spUnique(state[k]).filter(x=>x!==v));
  if(level==="known") state.known.push(v);
  if(level==="unsure"){ state.unsure.push(v); ensureSkillState(v); }
  if(level==="unknown"){ state.unknown.push(v); ensureSkillState(v); }

  state.active=spTrainingVerbs();

  if(state.active.length>=20){
    state.active=state.active.slice(0,20);
    state.taskQueues={};
    state.taskDoneSets={};
    state.flashSession=null;
    state.phase="tasks";
    saveState();
    renderHome();
  }else{
    saveState();
    renderOneVerb();
  }
}

}

/* ===== CLEAN FIX: 20 UNSICHER/KANN-NICHT VERBEN ===== */
function spVerbUnique(arr){ return [...new Set((arr||[]).filter(Boolean))]; }
function spVerbNormalizeState(){
  state.known=spVerbUnique(state.known);
  state.unsure=spVerbUnique(state.unsure);
  state.unknown=spVerbUnique(state.unknown);
  state.learned=spVerbUnique(state.learned);
  state.taskQueues=state.taskQueues||{};
  state.taskDoneSets=state.taskDoneSets||{};
  state.skillDone=state.skillDone||{};
  state.skillAttempts=state.skillAttempts||{};
  state.skillSuccess=state.skillSuccess||{};
  state.packageNo=state.packageNo||1;
}
function spVerbTrainingList(){
  spVerbNormalizeState();
  return spVerbUnique([...(state.unsure||[]),...(state.unknown||[])]).slice(0,20);
}
function spVerbUsedForSelection(){
  spVerbNormalizeState();
  return spVerbUnique([...(state.known||[]),...(state.unsure||[]),...(state.unknown||[]),...(state.learned||[])]);
}

unusedVerbs=function(){
  const used=spVerbUsedForSelection();
  return ALL_VERBS.map(x=>x.v).filter(v=>!used.includes(v));
};

currentPickVerb=function(){
  const pool=unusedVerbs();
  if(!pool.length)return null;
  return ALL_VERBS.find(x=>x.v===pool[0])||null;
};

rateVerb=function(v,level){
  spVerbNormalizeState();
  state.known=state.known.filter(x=>x!==v);
  state.unsure=state.unsure.filter(x=>x!==v);
  state.unknown=state.unknown.filter(x=>x!==v);

  if(level==="known") state.known.push(v);
  if(level==="unsure"){ state.unsure.push(v); ensureSkillState(v); }
  if(level==="unknown"){ state.unknown.push(v); ensureSkillState(v); }

  state.active=spVerbTrainingList();

  if(state.active.length>=20){
    state.active=state.active.slice(0,20);
    state.taskQueues={};
    state.taskDoneSets={};
    state.flashSession=null;
    state.phase="tasks";
    saveState();
    renderHome();
    return;
  }

  saveState();
  renderOneVerb();
};

renderOneVerb=function(){
  state.phase="select";
  spVerbNormalizeState();

  const training=spVerbTrainingList();
  state.active=training.slice();

  if(training.length>=20){
    state.active=training.slice(0,20);
    state.taskQueues={};
    state.taskDoneSets={};
    state.flashSession=null;
    state.phase="tasks";
    saveState();
    renderHome();
    return;
  }

  const v=currentPickVerb();

  if(!v){
    if(training.length>0){
      state.active=training.slice();
      state.phase="tasks";
      saveState();
      $("app").innerHTML=`<h2>Verben üben</h2><div class="no">Es gibt keine weiteren neuen Verben. Du hast aktuell ${training.length}/20 Trainingsverben.</div><button class="success" onclick="renderHome()">Mit diesen Verben üben</button><button class="secondary" onclick="startNewVerbPackage()">Neu auswählen</button>`;
      return;
    }
    $("app").innerHTML=`<h2>Keine weiteren Verben</h2><div class="ok">Alle Verben wurden eingeschätzt.</div><button class="secondary" onclick="startNewVerbPackage()">Neu starten</button>`;
    return;
  }

  $("app").innerHTML=`<h2>Verb einschätzen</h2>
    <div class="stats" id="verbStatsBox"></div>
    <p class="small">Ziel: Sammle 20 Trainingsverben. Nur <strong>unsicher</strong> und <strong>kann ich nicht</strong> zählen.</p>
    <div class="card" style="box-shadow:none;background:#f7f8ff;text-align:center">
      ${imageBox(v.v,false)}
      <h1 style="color:#667eea">${safeText(v.v)}</h1>
      <p>${safeText(v.img)}</p>
      <p class="small">Trainingsverben: ${training.length}/20</p>
    </div>
    <button class="success" onclick="rateVerb('${v.v}','known')">✅ kann ich</button>
    <button onclick="rateVerb('${v.v}','unsure')">❓ unsicher</button>
    <button onclick="rateVerb('${v.v}','unknown')">❌ kann ich nicht</button>`;
  updateVerbStatsBox();
  renderProgressPanel(false);
  renderAndHydrate();
};

updateVerbStatsBox=function(){
  try{
    const training=spVerbTrainingList().length;
    const learned=(state.active||[]).filter(v=>verbPercent(v)>=100).length;
    const open=Math.max(0,20-training);
    const box=document.getElementById("verbStatsBox");
    if(box){
      box.innerHTML=`<div class="stat"><div>Trainingsverben</div><div class="num">${training}/20</div></div>
      <div class="stat"><div>Noch auswählen</div><div class="num">${open}</div></div>
      <div class="stat"><div>Gelernt</div><div class="num">${learned}/20</div></div>
      <div class="stat"><div>Sterne</div><div class="num">⭐ ${learned}/20</div></div>`;
    }
  }catch(e){}
};

startNewVerbPackage=function(){
  spVerbNormalizeState();
  state.learned=spVerbUnique([...(state.learned||[]),...(state.active||[])]);
  state.active=[];
  state.known=[];
  state.unsure=[];
  state.unknown=[];
  state.taskQueues={};
  state.taskDoneSets={};
  state.flashSession=null;
  state.currentGame="";
  state.taskRewardsShown={};
  state.alertsShown={};
  state.packageNo=(state.packageNo||1)+1;
  state.phase="select";
  saveState();
  renderOneVerb();
};

const spOriginalInitCleanFix=init;
init=async function(){
  if(!loadProfile())return;
  await loadState();
  spVerbNormalizeState();
  const training=spVerbTrainingList();
  if(training.length>=20 || state.phase==="tasks"){
    state.active=training.length?training.slice(0,20):spVerbUnique(state.active).slice(0,20);
    state.phase="tasks";
    renderHome();
  }else{
    state.active=training.slice();
    state.phase="select";
    renderOneVerb();
  }
};


/* PATCH: Buttons immer sichtbar machen */
function continueVerbSelection(){
  state.phase = "select";
  saveState();
  renderOneVerb();
}

function resetAllVerbProgress(){
  if(!confirm("Wirklich alle Fortschritte löschen und von vorne anfangen?")) return;
  try{ localStorage.removeItem(key()); }catch(e){}
  state = {
    phase:"select", index:0, known:[], unsure:[], unknown:[], active:[], learned:[],
    weak:{}, currentGame:"", currentVerb:"", memoryCards:[], first:null, lock:false,
    skillDone:{}, skillAttempts:{}, skillSuccess:{}, flashSession:null,
    taskQueues:{}, taskDoneSets:{}, alertsShown:{}, taskRewardsShown:{}, packageNo:1
  };
  saveState();
  renderOneVerb();
}

function spEnsureMainButtons(){
  const app = document.getElementById("app");
  if(!app) return;

  let anchor = app.querySelector(".task-grid");
  if(!anchor) anchor = document.getElementById("game");

  if(!document.getElementById("spMoreVerbsBtn")){
    const btn = document.createElement("button");
    btn.id = "spMoreVerbsBtn";
    btn.className = "overview-button success";
    btn.textContent = "Weitere Verben einschätzen";
    btn.onclick = continueVerbSelection;
    if(anchor) app.insertBefore(btn, anchor);
    else app.appendChild(btn);
  }

  if(!document.getElementById("spResetAllBtn")){
    const btn = document.createElement("button");
    btn.id = "spResetAllBtn";
    btn.className = "overview-button danger";
    btn.textContent = "Alle Fortschritte löschen";
    btn.onclick = resetAllVerbProgress;
    if(anchor) app.insertBefore(btn, anchor);
    else app.appendChild(btn);
  }

  const oldMore = app.querySelector('button[onclick="startNewVerbPackage()"]');
  if(oldMore) oldMore.textContent = "Weitere Verben einschätzen";
}

const SP_OLD_RENDER_HOME = renderHome;
renderHome = function(){
  SP_OLD_RENDER_HOME();
  setTimeout(spEnsureMainButtons, 20);
};

init();
/* ===== ENDE CLEAN FIX ===== */
